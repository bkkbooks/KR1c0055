body:
  text: 詩識名解卷十四錢塘姚炳撰木部椅椅鄘風定之方中篇釋木訓椅為梓郭璞謂即楸陸璣以為楸之疏理白色而生子者為梓梓實桐皮曰椅羅瑞良引說文及郭璞椅梓楸檟諸注斷為一物而四名愚謂椅乃梓之一種釋木直云梓者從其類耳故傳定為梓屬是也詩小雅其桐其椅孟子拱把之桐梓皆類舉言可證其餘說家通混為楸恐未可據按釋木楸别見又埤雅廣要謂楸莖幹喬聳至秋條垂如綿與椅梓異惟鼠梓樹葉木理如楸舊謂山楸之異者亦名苦楸豈以此而誤耶陶隱居謂白桐一名椅桐然此詩椅桐明是二木觀湛露分言可見李時珍謂桐亦名椅與此椅不同此椅即尸子所謂荆有長松文梓者泡桐古謂之椅桐也先花後實故爾雅謂之榮桐其說似當又釋木梧為櫬桐為榮亦自分别今人混呼為梧桐已失其考陸璣乃謂俗稱椅為梧桐其類不愈紊耶小雅湛露篇鄭氏以桐椅同類而異名喻二王之後然謂其相類則是謂其同類則非二王之後亦異姓而同爵者以此取喻頗稱但必分諸侯等級求三章興義亦是穿鑿何元子云桐椅又髙於把棘以象其威儀可為人所瞻仰其說近似然要從離離取喻不必牽把棘較髙卑也梓鄘風定之方中篇蘇頌謂梓木似桐而葉小華紫六書故云江南梓木似桐葉小於桐生子成佩然今桐葉有三稜與梓葉不似木皮亦青黑相殊非一類也舊謂其樹有三種白木理者為梓赤者為楸梓美文為椅則梓之正者乃得專有梓名今依釋木文序椅條庶覽者知所類辨云梓不可謂楸猶椅不可謂桐韻語陽秋云楸花有香色杜詩楸花媚逺天蓋别是一木或謂古凡以皮皵者為楸要不得與梓合為一物明矣小雅小辨篇桑梓必恭敬猶魯論犬馬有養之意古者民居之制一夫受五畝之宅墻下樹木如桑梓之類既在宅中則出入必所瞻芘故以興父母耳傳乃謂父之所樹是以當恭敬則田間桑麻甚夥豈必一一前人手植耶羅瑞良引伯禽見周公事亦荒渺未足據且與此詩無涉詩但言梓之當敬而已未嘗言欲如梓之俯而敬也至五行書種梓令孝之說尤無稽不可入解楰小雅南山有臺篇楰為鼠梓亦稱虎梓乃梓屬非楸屬陸璣謂楰葉木理如楸山楸之異者要是形似而實非類也今附梓屬見梓後通志訛鼠梓作鼠李且有牛李山李名又合椑為一物愚按鼠李乃釋木之無實李椑乃烏椑絶非楰類蘇頌辨之云鼠李亦名鼠梓或云即楰然鼠梓花實都不相類恐别一物而名同則漁仲之誤可知矣桐桐鄘風定之方中篇釋木桐梧分列梧桐乃桐之一種非即青桐郭璞謂桐木即梧桐邢昺以為與上櫬梧為一並誤其專有桐名者則青白岡三者也宋皇祐間陳翥作桐譜又分六種謂紫花者名紫桐花如百合白花者名白桐類榖花而不實一種油桐名膏桐實可厭油一種刺桐文理細密性喜拆裂花側敷如掌體有巨刺如檔樹實如楓一種赬桐身青葉圓大而長髙三四尺即有花花色紅如火無實一種人家庭院所植名梧桐皮白葉青子可噉其槩具見於此鄭漁仲說椅是岡桐桐是梧桐引陶隱居說云白桐岡桐俱堪作琴瑟因以為白桐者梧桐也材最大可為棺槨故爾雅謂之櫬其說通誤夫琴瑟之材惟取白桐白桐乃葉三權白花不結子者漁仲以梧桐當之而謂岡桐即椅亦不察甚矣琴瑟必以桐為體惟脣則用他木梓材其選也椅又梓之美文者亦取以飾脣非謂其表似桐直作桐為琴瑟用耳乃或以岡白二者為椅桐何居小雅湛露篇羅瑞良說此詩之桐為油桐其子可以取油蓋因下其實離離云然然紫桐刺桐梧桐三者亦皆有實不必定是取油者也陸農師又謂岡桐生於髙岡亦謂之岡梧然岡梧乃俗稱此明是桐不應謂之梧總之梧有桐名桐不可以梧名耳詩意不在桐椅在桐椅之實舊謂以柔木况令儀非也蓋桐實參差懸綴離離可愛君子威儀蹌濟亦藹藹可親此取喻大指耳必謂下垂恭順亦是作時藝穿鑿法矣梧桐大雅卷阿篇釋木專有櫬梧之文郭璞以為今梧桐是也陸農師謂其别名青桐羅瑞良辨之以為桐有青赤白而青桐又有有實無實之辨今人以梧之青亦云青桐蓋假以為名耳然則梧别是一木故釋木專列而無桐名以其皮青不皺直生無節葉光滑有尖絶似桐故詩稱梧桐而本草諸書因附桐類分釋今從詩名併列桐後覽者類族辨物亦勿使與諸桐混可耳梧固非琴瑟材即棺櫬亦從無用梧者桐棺自是桐木不可以梧通也釋木梧别名櫬亦其名偶合非以材為棺槨之義如必棺槨之用始名櫬則釋草櫬木槿豈亦用為棺槨而名耶莊子據梧或以為琴或以為几或寓言取早凋之義其說不一然史記項籍傳莫敢枝梧注云小柱為枝邪柱為梧是柱有梧名也天運篇言倚梧齊物論言據梧倚據之義於柱較合訓琴非是然則以桐梧通稱者乃里俗訛語絶無考據耳詩明分梧鳳所在不當如傳以髙岡合朝陽為說且其云朝陽者祗取向明之義而已非必定是髙岡之東也今梧桐是處有之山椒亦頗林立安得以髙生為太平之化耶正義因傳說梧桐連髙岡遂謂不言鳳鳴處所直將詩中鳳鳴一語抹煞矣釋訓所謂臣盡力者蓋取師濟盈廷之况一如梧桐之向明而蕃茂耳傳似認梧生為盡力之化則非比喻之㫖矣何元子云中庸言官盛任使所以勸大臣孟子言與共天位與治天職與食天祿即此詩託喻菶萋之意是也漆漆鄘風定之方中篇漆本作漆從水者乃雍州水名然詩書每通用罕作漆者疑因取汁之義故亦從水為漆與其木身如柿葉如椿花如槐子如牛李出漢中山谷及峽嚴歙州皆有之今廣南又有漆樹似小檟而大六月取汁漆物黃澤如金又是一種漆自古用之禹貢豫州厥貢漆枲舊傳始造自舜故其貢亦始於此周制因之漢書陳夏千畝漆與千户侯等其為利廣矣文公樹此數木不專為琴瑟用而漆於琴瑟則亦以固而飾之今世好古者於其斷處驗新舊豈舜時五絃之製便用此為塗飾與唐風山有樞篇或謂漆可成琴瑟故以興下鼓琴此說最鑿與栗興酒食論同若然則何不兼云鼓琴而只云鼓瑟耶秦風車鄰篇序禮樂不可泥陳暘謂阪漆君子所以為樂隰栗君子所以為禮又引禮記並坐不橫肱以為並坐者禮也鼓瑟者樂也秦仲始大有禮樂之好是禮樂自諸侯出此大武斷桑桑鄘風定之方中篇桑書謂桑種甚多世所名者荆與魯也葉薄而尖其邊有瓣者為荆桑葉圓厚而多津者為魯桑愚按今桑有白桑雞桑子桑山桑諸名白桑葉大如掌而厚雞桑葉細而薄子桑先椹而後葉山桑葉尖而長類别之則荆魯各有其屬耳因疑釋木所謂梔者當是子桑子桑葉葉皆有子所謂瓣有椹是也㸤即㸤字不應訓半今人乃謂一半有椹一半無椹為梔誤矣種植書云桑以構接則桑大然則梔其未接者與此章通是相地形勢曰虛曰楚曰堂又皆地名不應夾入桑木且下云卜吉亦祗為形勢而卜與觀桑木辨土宜無涉愚疑桑亦地名即禹貢之桑土也樂記桑間濮上之音乃衛音鄘風桑中舊謂沫鄉中小地通典滑州衛南縣衛文公遷楚丘即此城郡縣志隋置楚丘縣屬滑州後改衛南本漢濮陽縣地又郡國志濮陽縣有顓帝冢皇覽云冢在城門外廣陽里而博物記云桑中亦在其中合諸說觀之則桑為衛地當在楚丘之傍與漕墟相屬故從虛而降觀耳且詩云望楚亦苐望之而已猶未身歷楚丘何緣便降至其下察樹木而辨土宜哉劉公瑾云衛詩多言桑蓋衛地跨冀兖二州據楚丘在冀河之東兖州之境則文公所觀所說其桑土之野乎蓋亦見及此矣三章桑田亦祗作桑中之田言靈雨方零土膏萌動故亟往田中勞勸之此明是勸耕未嘗勸蠶故說家以為農桑並勸者非也何元子解觀桑句復補出田亦因其義有礙不得不曲為通之耳衛風氓篇此桑自是寓言鄭氏實指為秋期非也以下文斷之沃若時為仲秋不應猶有桑椹且詩明以鳩桑興士女兩兩相形安得以為實事嚴華谷以沃若黃落為情眷歡弛之喻蓋從下耽字看出於傳顔色喻較合况詩三嵗食貧三嵗為婦則相隨至相棄曾未數年何至顔色盛衰之速若此耶鄭氏以秋桑無椹故謂鳩非時而食喻女子嫁不以禮此總緣秋期之說而强合耳鄭風將仲子兮篇吕東萊謂孟子樹墻下以桑則桑在墻下引證適合愚又謂云里云牆云園皆取同居之義於叔段極有關照所謂蕭牆之內是也魏風汾沮洳篇鄭氏前謂國君采菜已非兹更謂其采桑尤無理夫治圃猶男子之事親蠶則婦人之職魏君縱極鄙瑣未有身遵微行而躬代婦職者以致陸農師侵蠶侵繅之說浸淫益甚直堪一噱魏風十畝之間篇間字釋文及穆天子傳注皆作閒自是休暇之意魏國小政促民不安居故有避世之想欲得十畝而閒居耳傳真謂地隘無所相避以至男女雜沓無别不知於間間義何取司馬法六尺為步步百為畝禮記疏云徑一步長百步為畝折而方之則東西南北各十步種桑之地亦寬然有餘矣何至一家聚采十畝便男女不可復别且亦何至如華谷所說十畝之桑鮮所可來徒閒閒然無所得而空歸如是耶何元子引晉語子犯謀桑下殺蠶妾之事以實此詩觀與子還逝二語恰似姜與犯謀醉載同行情况然蠶妾已除不應有間間之象未可據以强證也字書泄泄弛緩貌又散也十畝之外則地又寬廣采桑者散舒自得較間間更覺從容矣傳訓多人於字義絶不合正義乃謂地旁徑路行非一家則豈十畝之間定是一家所有耶以此益證十畝之非削小之說也唐風鴇羽篇傳依釋言文解苞栩之苞為稹鄭氏以為稹者根相迫迮梱緻也於苞棘苞桑義同故不復釋愚謂據孫炎叢生之解亦當指枝條言桑枝繁茂叢起故鴇集於其上若根雖迫迮梱緻於集者何與且使以根本堅緻之木而鴇集之其安甚矣奚言危苦耶易否卦上六有苞桑之占蓋桑枝柔軟不能繫集故云其亡與詩意正合說家皆以安固之義為解恐非其㫖秦風車鄰篇或謂以桑興下文其亡者桑之為言喪也此蓋本劉向祥桑傳㑹按喪亡之喪去聲乃喪本音其陽韻則變音也先有喪亡之喪傷其亡而後有喪服之喪今欲泛下亡義以桑通喪亦誕甚矣且詩以桑楊興君子至鼓簧句為一截未嘗興及其亡也不然則漆栗二者又於耋義何居秦風交交黃鳥篇陸璣謂黃鳥當椹熟時來在桑間故里語云黃栗留看我麥黃椹熟否則黃鳥固有時止桑特非其所恆止處耳舊以桑人所常採鳥性見人則駭為說大是穿鑿曹風鳲鳩篇正義謂子自飛去母常不移此取首章儀一義合序刺不一之㫖然詩以鳲鳩均養起興於在桑之文無涉况其子有七則所棲自非一木惟養之者均平故在梅在棘在榛各得其所以順其性不致羣集桑間以求食於母爾首句每章重言不必泥作專一解也豳風七月篇蠶桑之候相待蠶稚時桑亦正柔非謂因始生之蠶而别求所為柔桑也懿無深義何元子云爾雅說文皆訓懿為美以之言筐猶言精緻是也條桑舊謂斬條於地就地采之則是下文斧斨之伐矣愚謂條長也解如厥木維條之條言蠶月之時桑枝正條達可以采而伐之正為下斧斨張本耳嚴華谷云桑樹之髙大者其枝條逺人而楊起人手所不能及故取斧斨以伐其條然後就地采其葉而棄其條即上文所謂條桑也此說最明要之斬條就采乃從斧斨之伐看出不可以徑解條桑耳女桑自是小桑之稱釋木訓為桋桑按桋與荑字不相通傳易作荑恐誤正義又通枯楊生梯為生荑以為葉之新生者取合女桑則尤誤矣掎角之掎從手鹿善決驟故角而掎之若桑乃植物枝條柔軟隨人女桑更其卑小者何用此掎角束縛耶補傳通猗作倚取猗重較猗畝丘為證其說近似按倚有傾側之意猶甘棠之言拜也桑樹弱小者攀其條使傾側就採見其不用斧斨之伐耳豳風鴟梟篇桑土之土韓詩爾雅注及石經皆作杜方言云東齊謂根曰杜又字林作􅪂云桑皮也則桑土之為桑根無疑者要非桑根在土之說耳或謂取桑根和土膠結成巢此不學人語豳風東山篇此桑野疑亦是桑中之野東征時所經歷者不當泛言桑麻之野也羅瑞良乃以為蠋雖蠶類而不食桑亦固於言詩矣蒸之本義訓衆况蜎蜎之動其非一蠋可知此與蒸在栗薪無二解嚴華谷以為喻獨宿不當取衆不知彼對室家為獨宿耳否則東征軍士不知凡幾而云獨耶小雅南山有臺篇陸農師謂沃若之桑以賁乎山有光之象此較氓詩容色之喻更强合詩意不過以桑楊有用之木興君子有用之材光邦家正其材之有用處耳豈可泥光以求桑之解耶小雅黃鳥篇何元子又援劉向祥桑之說以為桑非惡木而字音不佳故以為醜太戊時桑榖俱生謂之不祥此詩首章言榖次章言桑其醜可知此大謬也漢時儒者好言五行禍福之事每多臆測如太戊時所見其災不在桑榖之生而在七日之拱今乃傅㑹以桑為喪亡之兆誣矣夫黃鳥食椹自止桑間特以非時而處故託為禁語而去之耳小雅小辨篇舊謂桑梓為祖父手植已非羅瑞良更以梓屬父而桑屬母以為桑者母之所事以供蠶繅則尤傅㑹矣小雅隰柔篇桑木原隰皆有然亦隨所見言如秦風所見者阪則言阪有此所見者隰則言隰有正不當泥為君子在野之喻且汾洳十畝皆是隰地桑木於隰為宜大抵在隰者多又不必如舊說以原為對耳次句明言其葉則有阿自以枝條總言然阿難二字合言之即萇楚之猗儺韻㑹小補作婀娜訓為弱態是也正不必分美盛二義求解涵泳二語大有偏反自得意當取下樂字傳箋謂庇䕃利人此可以言凡樹不可以言桑夫植桑豈所以休䕃者耶傳訓沃為柔義以阿難之狀推之其說為近如六轡沃若亦取柔從之意是矣或云肥也故土不磽曰沃壤幽色固近黑然謂桑葉茂盛而柔軟其色純黑則不可通矣愚謂幽乃幽隂不可以葉之色言惟葉盛密則隂濃而幽所謂桑隂是也小雅白華篇桑性斬伐始茂今田舍多取以為薪如七月斧斨之伐葉既飼蠶則幹自供㸑理所必然非獨以為善也何元子引程大昌剃桑之說以為為薪者桑之附枝乃庶妾之比亦不必然蓋樵薪本為烘燎之用烘煁則桑薪得所宜今妻妾易位貴賤相陵曾桑薪之不若耳或牽合氓詩謂鳩食椹則淫以刺褒姒淫亂不能不先為嘉木負屈也大雅桑柔篇釋言謂旬為均均則遍故說文亦云遍也二義自通若劉訓爆爍雖見釋詁文而義難解惟蘇子由援商書無盡劉左傳䖍劉為證訓殘近是蓋捋采而至殘盡也周頌遏劉亦作勝殘解與此字義略同何元子引豳風七月詩為配以為采蘩祁祁所謂采也猗彼女桑所謂捋也取彼斧斨以伐逺揚所謂劉也取證亦確桑葉雖茂而或采之或捋之又或劉之則無遺棄喻王之於民所以殘削之者無所不至也詩意盡此故下徑接云瘼此下民魯頌泮水篇說文專以桑椹之黑者名為黮解之者云椹有黑白二種以黑者為美故稱黮泥矣黮本黑之稱讀若醰上聲莊子人固受其黮暗束晢詩黮黮重雲是也詩特借通作椹耳詎可專謂黑椹為黮耶泮林梟黮通是寓言何元子以為泮林有此桑黮亦可貴之物何其固甚檿大雅皇矣篇檿為山桑顔師古以為桑之有㸃文者其用亦主飼蠶故禹貢青州以檿絲為貢蘇子由謂山桑之絲惟東萊有之以之為繒其堅韌異常萊人謂之山繭蓋即今所呼焦繭是也考工記工人取幹凡七檿居於三又其餘用耳柘大雅皇矣篇柘亦桑之一種禮月令季春命野虞無伐桑柘柘與桑並言可見性喜叢生幹疏直葉圓有尖結實如椒名佳見古今注但其枝條柔弱婀娜葉大僅如掌寇宗奭謂其木理有紋亦可旋為器是也古史考載烏號弓以柘枝為之故弓幹以柘為上然此但取韻不辨良否陸農師謂先檿後柘即駉篇馬序鑿論耳此但開闢荒徑非是布列室家與公劉卒章不同公劉明有止旅之文此則僅如頌所謂有夷之行云耳既是刋除險阻則於衆木自當去其惡者存其美者故嚴華谷分作屏修平啓闢為除去其木攘剔則成長其木義各有别是也且如衛文徙楚猶皇皇樹木為百年大計今岐西新定不為小民謀農桑之本而若檿若柘務所誅鋤雖險阻刋除將何所賴以安其室家也哉檜檜衛風竹竿篇檜乃柏葉松身其松葉柏身者為樅此釋木明文不可混也檜大段似柏其葉亦如細杉謂之柏葉松身者對樅而言勿泥可耳羅瑞良謂有一種别名檜柏不甚長其枝葉乍檜乍柏一枝之間屢變此即柏之種非檜也其材亦鮮大者左傳翰檜乃棺傍飾非為棺之木詩亦但稱楫而已不徑言舟也正義謂檜書禹貢作栝又字書别作桰愚按釋木無桰名亦無栝名說文專訓桰為矢桰不訓木此必有據禹貢杶幹栝柏幹為弓幹則栝亦當為矢栝杶柏皆弓矢之材謂之栝柏者錯文耳然則謂檜别名栝又謂檜有栝音俱未可信玩此詩上下詞㫖但摹寫故鄉風物無一託喻之意傳箋通作寓言以舟楫之配喻男女之合非也檜楫松舟乃是麗語猶云桂棹蘭漿而已觀下徑接駕言出遊明是乘此舟楫以遊故地則其非託喻顯然矣駕猶言乘舟車通用子瞻賦駕一葉之扁舟是也嚴華谷别謂乘車出遊則與檜楫松舟句不貫亦未是松松衛風竹竿篇松别作枀不作㮤㮤乃榕樹南方巨木也說文以㮤同松誤其樹􅛡砢修聳多節皮粗厚四時不改柯易葉二三月抽㽔生花長四五寸結實狀如猪心叠成鱗砌秋老則子長鱗裂葉有二針三針五針之别出遼海者子大可食謂之海松子是也通雅云方書言松為五粒粒當是鬛誤李賀有五粒小松歌從鬛為正是也按太平廣記謂五鬛松皮不鱗俗謂孔雀三鬛松又李衛公言二鬛松與孔雀松别皆作鬛可證此蓋以音似誤通者鄭風山有扶蘇篇松生於山有凌雲蔽日之勢且釋木謂木下勾為喬其枝柯屈伸偃仰矯若游龍而正義反以枯槁為說以妃放縱之龍草則非其㫖矣愚謂山有名材隰有文草猶人之有子都子充皆其可美者故類舉以為喻耳山隰分言不相比例嚴華谷必以名材凡草對勘非也此當與同車之詩同㫖鄭忽不婚於齊而他娶故序謂其所美非所美詩取橋松四者以喻子都子充蓋指齊女而言見山隰各有所應有正破他齊大非吾耦之說小雅斯千篇一說竹苞松茂皆表此地景物之美乃枚舉之詞其言如者孰如之主下文兄及弟矣為言兄弟相好則其根本堅固而不可搖其枝葉茂盛而不可替所以擬之竹苞松茂也其說似合小雅頍辨篇三章變松柏言松上亦祗取叶句蓋古韻通也何元子有柏視公之語膠於其胸因别松上為專責王之詞非是大雅皇矣篇兌傳訓易直集傳訓通逹嚴氏訓悅澤三說互異按松柏霜幹􅛡砢鮮滑易調直者商頌丸丸訓易直彼自為宫室之木云然此不當以易直訓也兌有徑路門闕之象則通義亦自有說然謂行道通則可謂松柏通則不成語矣悅澤亦取卦義要不可以强合松柏愚謂兑與隊通用通史王毛仲牧馬每色為一兑注兑隊同是也以言松柏則亦茂長成行之義綿之傳訓兑為成蹊與此集傳義同魯頌閟宫篇按郡縣志徂來山亦曰龍來山一統志在濟南府泰安州東南四十里水經注鄒山記云在兖州梁父奉髙博城三縣界今猶有美松傳訓舄為大貌王肅以為無雕飾文章徒見彊大至牢固義何元子謂通作寫禮記器之溉者不寫其餘皆寫注訓寫為倒傳之又或加水作瀉考工記以澮瀉水義與此同屋之有桷其形斜長首髙而末低所以瀉雨水故云有舄此又一說商頌殷武篇傳訓梴為長按說文以梴為長木室之深廣者其椽必長是也木瓜木瓜衛風木瓜篇木瓜一名楙大者如甒其木可以為杖花作房生子形似栝樓蘇頌謂即榠樝之類蒂間别有重蒂如乳者為木瓜無者為榠樝是也陸農師諸說家俱以榠樝為木桃木李蓋就其類言耳六書故引釋木文楙木瓜也或云冬桃然冬桃别名旄見釋木不與楙同未可混或駁初學記六帖於果食木瓜門皆引衛風木瓜之詩為誤謂詩以木為瓜果如畫餅土飯之說果爾則其欺我䙝我甚矣而反答以寶貴之物此情理所必無者且此詩為衛人欲厚報齊桓之作夫桓之於衛德亦大矣救敗存亡又遺以車服此奚翅木瓜桃李之投而乃比之畫餅土飯反自多其報瓊之厚豈詩人忠厚之意與傳謂木瓜為可食之木然投贈正不取此意今惟用以製釀及療筋轉用之不可與桃李例言郭璞謂其酢可食疑亦榠樝非木瓜也以此為投蓋猶茞蘭紉佩取芳臭以相遺耳或引古語云梨百損一益楙百益一損報人之道宜有以益之則并及療筋諸說益非其㫖矣木瓜自為衛人思報齊桓之作故孔子謂於木瓜見苞苴之禮行賈誼新書載繇余之說亦以施報言又左傳韓宣子聘於衛衛侯享之北宫文子賦淇澳宣子賦木瓜思報德也皆其可驗者檀檀鄭風將仲子兮篇檀有黃白二種皮青而澤肌細而緻體重而堅木性彊韌葉類槐論衡云楓桐之樹生而速長故其皮肌不能堅剛樹檀以五月生葉後彼春榮之木其材彊徑車以為幅是也陸璣謂與檕迷相似檕迷一名挈醯按釋木有榽橀郭璞以為大木似檀鄭漁仲謂俗呼朴樹其木如檀子大如梧桐子而黃則挈醯固與檀相似者或謂檀彊韌之木亦以比段然詩之取喻却不重檀乃重園內之檀以為兄弟之比耳魏風伐檀篇坎坎傳訓伐檀之聲為是非用力也木之堅者伐之聲洪而壯宛丘云坎其擊鼓伐木云坎坎鼓我皆可證或以坎為險義曲解作經歷險陷以伐之則後章伐輻伐輪是已取材而製器矣而猶曰坎坎何耶何元子謂伐檀為衛國女關傷怨曠而作以檀比其夫以河自比此出陳暘樂書述古琴曲然通詩詞㫖絶不似婦人語且夫婦相處今雖暫離終必歸其居室豈如檀輻河干之適然萍值已哉琴操載古琴有詩歌五曲伐檀與鹿鳴騶虞鵲巢白駒並傳有大戴禮投壺篇謂凡雅八篇可歌亦列伐檀並難深考小雅杕杜篇此舉車之最堅者以為言堅車而亦敝則其時之久力之瘁可知徐鍇謂車敝則木連及韋革金鐏起皆起若敗巾故字從巾為幝也小雅鶴鳴篇此主求賢言檀蘀並列美惡判然以喻求之不可不慎蓋樂其園之檀即當别其下之蘀勿使雜進而後真賢得升於朝耳若說向求理便腐蘀為他木敗葉與下榖對舉明非檀葉可知且使檀而為蘀是賢者而淪於不肖之喻矣奚以反樂觀之何元子謂檀葉凋零為賢者衰謝之况則又不應聞野聞天聲名之著若此自當以良楛分觀較合大雅大明篇傳訓煌煌為明於車無取即解為鮮明義亦但可言旗幟之屬此則專云檀車而已愚按煌與皇通煌煌猶皇皇著盛之象言兵車張皇赫業也故韓詩外傳直作檀車皇皇扶蘇扶蘇鄭風山有枎蘇篇傳謂扶蘇為扶胥然其名無所考何元子謂即管子所說之枎通作榑為榑桑於蘇字又無著落均未可據要以下三者各專一物則此當有所指非僅如扶疏四布之空語耳何元子駁傳謂下篇喬松是喬木則扶蘇非小木通論云蓋謂枝葉扶疏乃大木也扶蘇喬松比子都子充荷華游龍比狂狡義甚明然人不敢為此解者以荷華亦佳卉也宋儒尤重之以周茂叔愛蓮故不知詩意止以在山之髙大者喻美在隰之卑弱者喻不美初未嘗拘自解者拘之於是不得不以扶蘇為小木而以喻不美以荷花喻美下章則又以喬松喻美而以游龍喻不美使山隰倒置比物錯互非也栁栁齊風東方未明篇栁陶隱居謂即今水楊栁唐本草駁之云栁與水楊全不相似水楊葉圓濶而尖枝條短硬栁葉狹長而青緑枝條長軟陶以栁為水楊非陳藏器又謂江東人通名楊栁北人都不言楊楊樹枝葉短栁樹枝葉長而李時珍則以為楊枝硬而揚起故謂之楊栁枝弱而垂流故謂之栁蓋一類二種也據說文爾雅則楊可稱栁栁亦可稱楊故今人猶并稱楊栁余宗種樹書又謂順插為栁倒插為楊諸說紛紜皆未盡當愚謂釋木文栁類甚多有河栁澤栁蒲栁諸名而楊僅列栁之一則楊為栁屬栁不可言楊屬明矣說家多謂栁有小楊水楊垂楊之稱並未足據或謂古詩南楊北有栁分為二其合稱楊栁蓋兼楊與栁言之非楊即栁栁即楊一物異名也愚按此僅别栁與楊為二而不悟栁為總名楊乃栁之一種所謂知其一未知其二者今俗通稱楊栁不知此乃蒲栁專名耳栁春初生柔荑即開黃蘂花至春晚葉長成後花中結細黑子及蘂落絮出如白絨因風飄揚如雪則栁絮非花也至萍薸自有種非栁絮所生今詞章家稱絮為楊花及以萍為一物變化者並非齊民要術云凡作園籬法髙七尺便足匪直姦人慙失而返狐狼亦息望而回其種栁作之者一尺一樹初時斜插插時即遍數年長成共相蹙迫交柯錯葉折似房櫳則栁正為籓之木傳箋乃謂柔脆不足為樊比狂夫之不能知時則非其㫖矣集傳以狂夫瞿瞿屬樊圃解直比不能晨夜二句義捷而當折栁折字即齊民要術中編字乃所以作樊使之共相蹙迫要之仍是生栁耳蔡元度謂以栁為樊而生之不足以為固故折栁者柔之至也解誤小雅小辨篇栁盛蜩多嚴華谷以為物皆有依是也此緊對下不知所届言蓋蟬鳴于栁草生于淵各有依託今宜臼被放無歸如舟流之靡所屆極則安得菀栁以為蜩鳴之所漼淵以為萑葦之地哉小雅菀栁篇郝仲輿謂楊之垂者曰栁柔脆之木也桑車亦曰栁日酉亦曰栁昧谷謂之栁谷蓋頽敗喪亡之比愚按釋木文松柏醜茂桑栁醜菀所謂發而成暢茂積而成菀結是也栁以菀言自取其垂䕃之繁反喻王之暴虐無親耳必謂比頽敗喪亡則於菀義何居把鄭風將仲子兮篇此釋木所謂旄澤柳也陸璣云生水旁樹如栁葉粗而白色木理微赤故今人以為車轂孟子猶以杞栁為杯棬即此嚴華谷辨之云詩有三杞將仲子無折我樹杞栁屬也有臺南山有杞湛露在彼杞棘山木也四牡集于苞杞雅枤杜北山言采其杞四月隰有杞桋枸杞也其辨甚晰楊秦風車鄰篇楊為栁屬之一釋木所謂楊蒲栁是也與澤栁河栁文並列可見舊說或以栁為水楊又以楊為栁之揚起者並誤鄭氏解揚之水束蒲謂即此楊則誤之又誤矣陸璣云蒲栁有兩種皮正青者為小楊紅者為大楊陸農師以為有黃白青赤四種則又從楊之類屬分之耳何元子謂此詩之楊當指白楊白楊墓上所種以興其亡此較桑說更幻果爾則有臺之楊何以反興萬夀其於黃青赤三者又安所指耶陳風東門之楊篇傳訓牂牂為盛於字義無解何元子云楊木有四種以牂牂推之正謂赤楊牂乃赤色羊也前漢書天文志云牂雲如狗赤色又太嵗在午曰敦牂午亦火德其色赤則牂為赤色明矣引據皆確存其說何氏又援周禮肺石注云肺石赤石也疏云肺屬南方火之色赤肺亦赤葉之色似之比牂為深此於赤義亦有據或讀若弗與芾通叶下晳晳本音淅也芾有赤芾朱芾楊葉之色似之其說並存考陸農師别牂牂為盛肺肺為衰以言嫁娶之暮此强解耳肺無衰義可通且兩章詞㫖無别何云一盛而一衰耶蔡元度又謂牂從羊言美而未大肺為金臟言其已成所以刺婚姻之失時尤穿鑿無理霜降逆女冰泮殺止古婚禮所傳可據至周禮仲春大㑹奔者不禁乃為過時者而設也此詩云失時蓋失昏旦之時所謂親迎而有不至者不然赤楊霜降則葉赤詩言牂牂肺肺正霜降後矣而顧失時耶若鄭氏以楊葉牂牂為三月中則溺於仲春婚姻之說因并誣物候耳小雅采薇篇傳專釋此為蒲栁甚當以其為栁屬故亦得稱為楊栁非兼言楊與栁也今人不問蒲澤之類統呼楊栁可哂詩云依依則柔條初長婀娜可人正薇柔之候為往戍時矣小雅南山有臺篇陸農師謂鬱彼之楊以賁乎山有光之象此較桑更强合桑猶有沃若光澤之稱楊益難通矣小義菁莪篇楊木不堅實性輕善浮舟之用利之故云載沉載浮言其與波上下耳嚴華谷云舊說沉物亦載浮物亦載韓退之亦從之且詩中載馳載驅載笑載言載饑載渴載清載濁載飛載止凡言載皆則也不當獨以此為載物於舟是也小雅采菽篇楊舟喻諸侯紼纚乃喻天子之寵賜正下所謂福祿膍之也鄭氏以為治民禮法之喻何哉柳大雅皇矣篇柳為河栁陸璣云生水旁皮正赤如絳一名雨師枝葉似松鄭漁仲謂又名春栁一說柳得水則垂如絲師當為絲訛非如羅瑞良應雨之說寇宗奭謂人呼為三春栁以一年三秀也花肉紅色成細穗河西者戎人取滑枝為鞭亦謂之赤柳木以其材赤故也鄭氏因材可卷為盤合之說通穫落為一此因郭注而誤駁見釋榆至赤楊當即是柳故杜詩亦稱頳柳今漁仲分為二未可據柳栁性喜水故多生河傍然平原廣陸中亦時有之六書故謂詩言啓土不宜先河傍此泥也且太王率滸至岐凡所經過之地必須開闢以便行李往來又安知不河傍折栁俾勿礙行塵而猥云平原廣陸之是啓也亦見之固矣詩識名解卷十四

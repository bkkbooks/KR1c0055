body:
  text: 詩識名解卷十三錢塘姚炳撰木部桃桃周南夭篇釋草荆桃旄桃榹桃諸條皆有桃名而形種各異今按花有紅紫白數種其實有緋桃碧桃緗桃白桃金桃胭脂桃取其色而名也有綿桃油桃方桃扁桃偏核桃象其形而名也有五月早桃冬桃秋桃霜桃因其時而名也其性易生易死陸農師所謂白頭種桃其華子之利可待羅瑞良亦云華實早茂而早成七八年即死是矣夭説文通作枖徐鍇以為草木始生未幾得地力而先長大與毛傳少壯集傳少好義同陸農師云桃皮束莖幹頗急四年以上宜以刀儷其皮不然皮急則死故周南取少桃以興嚴華谷亦謂與書厥草惟夭皆少長之意然按少稚之夭讀若杳月令孟春母殺胎夭王制不夭夭要皆指蟲獸言無作雙聲者今讀平韻作雙聲惟見此詩及凱風與魯論三書大抵是形容態度之詞愚謂桃幹舒放茂長近是不當泥之子取少為義識者斷之一説讀若歪唐人詩隨風趁蝶學夭斜又錢塘蘇小小人道最夭斜今詞章家多以此言桃杏但作雙聲義究未安耳夭夭以樹態言灼灼以華容言二語開説首句但拈出桃字為發語之端故三章華實葉文遞變而夭夭不易也舊皆因少盛為説故正義謂桃或少而未華或華而不少此詩並言之言由桃少則華盛皆是添足何元子云周禮仲春令會男女康成謂仲春隂陽交以成婚禮順天時也意古制如此后妃始嫁時或當桃始華故詩人本而詠之此大謬解按古婚制霜降而逆女氷泮而殺止孔子對哀公云霜降而婦功成嫁娶者行焉逮氷泮而婚禮殺故媒氏職以仲春大會男女使之急通其婚姻為失時也此詩託賦桃夭不過取其華葉盛麗果實成熟為之子宜家預兆豈必定為婚期况后妃貴族之女自應以時來歸何至遲及仲春大會而始嫁耶且下云蕡實葉蓁則是夏時並非春時矣傳以實為虛之匹故對色言取興婦德然按之詞旨似未暇及大抵此詩為始嫁祝頌之語以華喻色以實喻子言之親切而有味通論云桃花色最豔故以取喻女子開千古詞賦之祖本以華喻色而其實其葉因華及之毛傳以實為喻德而以葉為喻形體至盛近滯且形體至盛語尤未妥大抵説詩貴神會不必著迹如華喻色矣實喻德可喻子亦可蓋婦人貴有子也有實之時其葉亦至盛即承有實來唐人詩云緑葉成隂子滿枝不必定有所喻耳羅瑞良引麻實之蕡證蕡實然麻實亦别作草木中多子者頗夥何必桃實而以麻子為喻耶嚴華谷云墳為大防鼖鼓為大鼓有頒其首用宏茲賁皆訓為大則蕡亦桃實之大貌似也顧其字義爾雅中已有之釋木云蕡藹郭璞謂樹實繁茂奄藹則大義猶非真諦耳釋訓云蓁蓁孽孽戴也郭璞謂皆頭戴物按戴義不可解故傳注皆不引其文若訓頭戴物於桃夭更難通此滯説也愚謂蓁固盛貌孽同蘖萌芽也公羊傳以為孽賤子猶樹之有蘖生則孽亦旁生之盛者戴固當為盛字之誤衛風木瓜篇舊謂瓜有瓜瓞桃有羊桃李有雀李此皆枝蔓故言木瓜木桃木李以别之是也然桃本木生謂之木桃者因上木瓜而言耳陸農師乃謂圓而小於木瓜食之酢澀而木者為木桃則即木瓜之類矣姚寬亦主其説蓋由認樝子以為桃故也不知任昉述異記有云桃之大者為木桃魏風園有桃篇園是假境桃亦泛設傳取桃喻民詞旨逺甚鄭氏以為不取民而食己之桃尤滯陸農師則謂國君有一國以自養今園之外莫能理亦拘牽之論也愚謂桃不在山林而在園則國小而迫之譬有實而落之以為殽則日以侵削之譬睹此景况得不心憂而發於聲也乎故直接之曰心之憂矣我歌且謠楚楚周南漢廣篇説文云楚叢木一名荆羅瑞良謂楚者楚地所出其一名荆故楚國入春秋稱荆其後稱楚而荆州亦以此木得名也按荆有牡荆蔓荆其種各異廣志以牡荆即蔓荆復别赤荆大實者為牡荆並誤蘇頌云牡荆即作箠杖者枝莖堅徑作科不為蔓生故曰牡葉如萆麻更疏瘦花紅作穗實細而黃如麻子大蔓荆莖髙四尺對節生枝初春因舊枝而生葉類小楝夏盛茂有花淺紅色蘂黃白花下有青萼秋結實斑黑如梧子大而輕虛此與羅瑞良所説合翹翹訓逺不訓髙以楚言之蔓荆莖髙僅四尺而衆薪尋丈者頗多其不得以楚為薪中之尤髙者明矣江漢泳廣正歎其必不可求而反云我欲取其尤髙潔者抑何孟浪至此耶詩蓋曰薪逺不可致也近有荆焉我庶就而刈之女貞不可求也乘有馬焉我庶附而秣之是則所謂執鞭欣慕之心已矣王風揚之水篇舊謂楚小於薪蒲輕於楚按楚髙者僅四尺薪之小者也首章薪總楚蒲而言此言楚小於薪語滯耳觀此則知楚為薪之小而易刈者漢廣翹翹之解不待辨而自明矣鄭風揚之水篇此與王風異解取喻全在一束字舊以此詩為閔忽之無臣而作無臣則孤立少助易致侵奪如楚木雖輕而能盈束則雖有洪波激揚亦或不至漂流而忽則孑然一身而已故以是為憂也或謂此先楚後薪以見臣之愈強愚按楚即是薪詩凡言薪必及楚蓋楚者薪木之一也漢廣戍申綢繆三詩皆從薪拈出楚此章因楚槩言薪隨文先後更無别意勿拘可也唐風綢繆篇首章總薪而言次云芻薪草也三云楚薪木也不過易字成文絶無區别何元子乃引漢廣詩所誤解者以解此詩謂楚在衆薪中特為翹起故以興粲者見其美異於他女則更誤矣且亦思國亂則婚姻不得其時此際如飢渴飲食雖媸亦妍何暇求其尤美者耶舊謂薪者析於彼而合於此有婚姻之義蘇子瞻云合異姓以為婚姻譬如錯取衆薪而束之薪之為物束之則合而釋之則解是則綢繆固之而後可以望其合是也愚按古多以薪為婚姻喻者漢廣南山外如車舝四章亦然蓋即執柯之説大抵取分合義近之唐風葛生篇蒙楚蔓野蓋錯舉言之不必定以葛蘞所生之髙卑言如葛生河漘未嘗不蔓野圖經謂烏蘞莓多在林中作蔓則亦未嘗不蒙楚棘也陸農師謂葛生髙而蒙楚蘞生卑而蔓野各繫所遇殊泥陶詩荆棘籠髙墳與何元子所説荒冢纍纍景象適合詳見草部蘞條秦風黃鳥篇此詩首尾以棘楚言荆棘非好鳥所棲今三良從葬恍若在荆棘叢中不復得出蓋惜之也或謂棘桑楚人所共見丘隅則人所不見以止非其地故不免於禍則是責之非哀之矣甘棠甘棠召南甘棠篇杜為甘棠此釋木明文也後又恐混於白者故復釋為赤以别之則赤棠為杜杜為草棠明矣白者但有棠名無杜名并不可以甘名陸璣謂棠美而杜惡白者為棠赤者為杜其説相反説文分牝為棠牡為杜鄭漁仲又謂南為棠北為杜要未可據或云棠杜實二物杜蓋小梨實小於梨大於棠棠則海紅嘉慶來禽之類併存其説蔽奄也齊語使海于有蔽注云可依蔽也芾説文云草木盛貌召伯巡行聽政舍止甘棠之下必是枝葉敷舒可休蔭者則隂翳茂盛之説得之傳獨訓為小義不可解嚴華谷云召公所歷不止一處所憩亦不專在棠下詩人偶因其嘗憩之木而起興此論最活愚謂召伯侯國命吏巡行所至自有候館斷無空止樹下而布化宣澤之理此必驛路之旁偶一休蔭人思其德遂作勝迹耳鄭氏謂不重煩勞百姓止舍小棠之下而聽斷與韓詩外傳及説苑之説同要是鑿論耳九域志載甘棠樹在陜州府署西南隅今其處當猶有可考者翦傳訓去説文解為齊斷是也蓋翦而盡去之義釋言云翦齊也禮記公族無宫刑不翦其類注謂翦滅其嗣皆可證伐則斬刈之落其枝葉未去其根幹如伐其枚肄以伐逺揚俱是故三章皆以勿翦貫而伐敗拜異文遞輕之詞也若伐猛於翦則不應與拜敗例言矣鄭氏釋拜為拔較伐尤猛今不從是也説文但以首至地為拜無他義則攀屈近之恐亦不至折折即敗意更與二章無别矣杜唐風有枤篇杜多一本特生至上則枝葉敷舒故召伯坐其下聽政詩中言枤杜者凡三見可知惟杜之特生者謂之杕非凡樹通稱也説文泛訓樹貌非湑湑自取茂盛不取稀疏嚴華谷云本無枝葉則日燥其根上之土而其木易枯有杕然特生之杜其葉湑湑然潤澤雖無旁木之蔭而葉猶足以庇其本根是也傳為無兄弟引喻故云不相比然對下菁菁便難通矣唐風杕杜篇先儒皆泥枤取孤特義故以喻寡弱不知幹則特生葉自繁蔭正為往來休息之所是以下文直接肯適肯來何云隂涼寡薄耶觀甘棠言蔽芾前杕杜言湑湑菁菁小雅言萋萋皆可證鄭氏以道左為道東謂日中之後樹隂過東不可休息果爾則下何又易左言周耶不知左與我叶周與遊叶取韻而已豈有他義耶小雅杕杜篇傳解睆為實貌無所取義何元子引檀弓華睆之睆訓明亦強合愚謂字從目當以人之視其實言按字書睆窮視貌莊子睆然在纆繳之中又陸士衡擬古詩跂彼無良緣睆焉不得度皆可證蔡元度云睆者實大而可見萋者葉齊而已成亦取視義舊以萋萋為新葉言杕杜睆實是去年十月間物色於今杜葉萋萋則實落而又生葉為今年之二月矣愚按行役踰期以為次年新葉亦通但當睆實時舊葉猶未落固自萋萋然盛也且詩先言實而後言葉者如桃夭類然又未可執以驗先後之期耳趙宧光謂牡棠牝杜與楊栁同義是詩代為室家思夫之詞故以杜寄興此大可哂詩但因時序之變覩物興懷而已孤特義亦覺是贅况取類牝牡耶正義謂杜實猶繁滋君子不得安於室家而長子孫亦是穿鑿梅梅召南摽有梅篇釋木三釋梅一梅柟柟木也一時英梅即雀梅似梅而小一朹檕梅狀如梅其子赤色似小奈而和羮之梅未有釋詁今按梅古薦豆籩乃周禮所稱乾橑是也蜀志載蜀名梅為橑而夏小正亦云五月煮梅為豆實均足互證其枝葉形狀是處可驗若釋木文梅名三見要各有類屬不可強合耳詩特以梅實之零落喻盛年之難久是以思及時婚姻耳何嘗念及梅之香色與花實早晚且即以色論之冰玉之姿較勝夭斜多矣陸農師必以華先桃李著實在後曲求風人之旨耶梅實落三而始衰女年十六七而方盛二者正相反非可相例也正義解傳謂以梅落始衰喻女年始衰豈傳本意耶歐陽永叔云梅實有七至於落盡不出一月之間故前世學者多謂詩人不以梅實紀時早晚信然傳訓摽為落嚴華谷引柏舟詩寤辟有摽作證訓擊謂擊而落之愚按梅實自落者少又摽從手當取擊義左傳長木之斃無不摽也或又同拋作拋擲解公羊傳曹子摽劍而去之亦通塈無取義嚴華谷引塗堅解作霑地亦強合何元子易土為木謂即槩量之槩傳寫訛者盈筐則以木槩之尤非理梅實非米粟比安得用此取平耶當從讀詩記作暨訓及為長或云去土為既既者盡也義亦通秦風終南篇果實之梅無柟名釋木釋梅為柟而傳用以訓此詩之梅當非果實之木若郭鄭諸注則仍謂是似杏實酢者誤矣陸璣又分梅柟為兩種謂梅樹皮葉似豫章柟葉大可三四葉一叢木理細緻於豫章以地近故亦有通稱而孫炎但以為荆揚方言之異要當是柟之一種耳一説終南梅本作柟叶下丹如次章堂叶下蹌傳寫者以方言誤也陸農師解此詩仍以摽梅之梅為説雖變枳變杏於義甚鑿然舉二果實以見地産之饒未為不可不必定是巨木堪誇也集傳闕其文不釋嚴華谷引梅柟之文而存郭注兩賢之意毋亦同此何元子謂梅柟異木不得同混蓋梅至北方多變而成杏故北人有不識梅者不應為終南所有當通作枚與汝墳篇條枚義同此易字求解未可據也且按文索義亦覺未安夫條者小枝也枚者别生條也今不言何木而但曰終南之山有枝有條成何語陳風墓門篇傳亦謂此梅為似豫章者以生於空山墓隊中當是大木不應為調羮之梅其説近是後之解者或但云美木不直指為柟或竟同摽梅例訓今並存之墓門不過山中之地不得謂非梅所宜生且詩但言梅木耳未言梅子也亦但言梟集梅木耳未言梟食梅子也陸農師總認食椹變音為實事膠固於胸故即借以言梅謂梟非梅所能養而美之者亦不根甚矣曹風鳲鳩篇此當是摽梅之梅以下對棘榛俱有實可食者故傳亦無明文小雅四月篇梅栗俱可供籩實故為嘉卉不必定以竒果為嘉也侯梅不槩見書傳若西京雜記載梅七種有侯梅要是標識佳名以相炫美不可為典要耳鄭氏訓侯為維作助語極當鄭氏泥卉作草故别謂嘉草為梅栗之下所生果爾則侯亦不應訓維矣維者從嘉卉而撮舉之也朴􅈪朴􅈪召南野有死麕篇此木之名詩與雅倒置固是疑案然以二字恰合又他書别無􅈪檏之名則其所釋或當指此且朴非木專稱釋木云朴枹者郭璞以為朴屬叢生者為枹詩所謂棫朴枹櫟據此則詩之朴􅈪當是單名􅈪者以叢生故加朴字即槲􅈪是也槲􅈪似櫟亦有斗皆叢生彼云枹櫟此則云朴􅈪詞義允合且與下死鹿文對若爾雅倒其辭為􅈪朴亦自有證大雅芃芃棫朴是也今定其名與釋木合别出一部以俟博考者林有野有文義對舉蓋林中木衆不必盡是朴樕猶野中獸多不必盡是死鹿也此就其中拈出一木為言亦足證朴樕之非小木通稱矣鄭氏誤以二語串説故不言林而正義支離其詞尤難解唐棣唐棣召南何彼穠矣篇唐棣為栘此釋木明文郭璞謂似白楊是也本草扶栘樹葉緑花黃又古今注謂扶栘圓葉弱蒂微風大搖一名髙飛一名獨搖與此詩所詠穠華及逸詩偏反極合斷當指此陸璣以為薁李嚴華谷謂即櫻薁並非也集傳於此詩依釋木文而注論語逸詩則云郁李恐有誤沈存中謂扶栘即白楊而逸詩之唐棣乃白栘小木比郁李稍大者又與扶栘不同然按釋木文無他栘且其所説白栘小木書中不槩見不若扶栘之黃華搖風於詩語較有合殆未可據也戴侗謂常棣唐棣棠棣特一物猶夫栘扶栘蒲栘之為一物常唐棠夫扶蒲皆聲相邇故通用自爾雅分常棣唐棣為二遂啓後誤此大謬語常唐異字不可以音近通若其所説紅白花乃常棣非唐棣也惟辨郁李非薁言之甚晰而當此但以華之盛喻車服之盛鄭氏取况顔色已非其旨陸農師乃牽序語為反夫之説羅瑞良又從華之反合興及王姬築館於外為有反而後合之道亦傅會甚矣或語唐棣華一柎輒生二萼以美夫婦如云並蒂芙蓉此後世新昏陋語不可以入經解且一柎二萼乃郁李花非此唐棣也李李召南何彼穠矣篇李類甚多西京雜記有朱李黃李紫李緑李青李綺李青房李車下李顔回李合枝李羌李燕李猴李諸名又間居賦房陵朱仲之李而兩京記東都嘉慶坊有美李號嘉慶子皆其著者也其見釋木文惟三種而休痤諸名頗不經見他書云二章穠承上唐棣言桃李則喻唐棣之華之色正見其穠也此是比中之比玩文自明惟正義得之其後説家多舍唐棣而言桃李則失其本矣且桃李華同時色同豔子同繁故每並言如投桃報李之類是矣而何二人之取興為哉衛風木瓜篇陸農師謂木李大於木桃似木瓜而無鼻亦或謂之木梨此蓋以榠樝為木李謂與木桃俱木瓜類非也瓜不木生故謂楙為木瓜若桃李本木實不過依上章木字以成文耳何必别求所謂木桃木李耶舊有以枝蔓之雀李别之足破其説王風丘中有麻篇李與麻麥皆是假設鄭氏實謂留子所治則是農圃細民耳賢者即放逐不應事此陸農師又引吕子文謂子産相鄭桃李垂街者莫援因以推及不盜而見其政之善尤非其旨矣小雅南山有臺篇李實非榖粟菜茹雖果籩尚不及之而陸農師謂李可養人以喻父母之道亦強合矣近世俗詁謂李性多子以與下父母相關會尤陋通詩草木皆錯舉無他意鬱豳風七月篇釋木無鬱名傳以為棣屬而正義定為唐棣後儒皆宗其説此由誤認唐棣因以誤認鬱耳唐棣乃扶栘大木不聞有子可食何得以鬱屬之今據劉稹詩義問謂鬱樹髙五六尺實大如李陸璣疏亦同而本草又有車下李之名與西京雜記所載李名正合爰定為李屬附李後覽者辨焉本草列郁李一條而載薁李鬱李車下李爵李棠棣諸名於下則傳所謂棣屬者乃棠棣非唐棣也自正義釋為唐棣之屬而其名益紊矣今定鬱為李類而以本草車下李之名屬之至以郁李為車下李及謂鬱為雀李者並誤郁李乃棠棣别名非李屬其不得有車下之名可知若雀李乃枝蔓所生又名罕見書傳尤不容混入也互見後棠棣及草部薁柏柏弼風柏舟篇柏有數種葉扁而側生者為側柏此乃真柏也若葉柏而身松者為檜身柏而葉松者為樅又峨嵋山一種竹葉柏身謂之竹柏皆非柏種今人呼側柏為扁柏葉尖者為圓柏疑即樅類不可槩以柏混耳釋木謂柏别名椈而説文作鞠則古字當通月令鞠有黃花周禮鞠衣皆可證嚴華谷云柏美材也以柏為舟美言之也詩有柏舟松舟楊舟皆言舟耳義不在柏與松楊也此説最得若徒取喻美材則是憤悶自矜之語非憂國意要從泛流看出無人維楫真是巨眼至其引證諸篇並確持此説詩乃是風雅解人何慮墮入惡道而或猶沾沾以為內貞外固之喻何哉鄘風柏舟篇鄭氏謂舟在河中猶婦人在夫家是其常處詩取義止此陸農師仍泥柏求解謂柏不宜為舟喻婦不宜他適果爾則詩何以兩咏柏舟又與松楊並言耶且弼柏舟傳云柏木宜為舟喻仁人宜為官而農師説此詩則云不宜可知皆隨詩作解無定詞耳故嚴華谷謂詩人取義不在於柏此確論也弼鄘衛地皆近河故詩每即所見以起興如河廣河水是也此云中河固非泛設言柏舟者河中之所有耳若必云奪汝歸齊當乘舟渡河因以為咏則泥矣小雅頍辨篇松柏皆以喻王先儒多主其説何元子引字説柏視松之語謂松喻王而柏喻相甚無謂夫王為宗族所依託如史記所謂松柏為百木長而守宫闕故以為比耳卿士特以輔王者奚可與王並言耶魯頌閟宫篇新甫以所産之地言作廟非必盡用松柏取柏亦非必定屬新甫特敘名山名材以見其事之慎重而華美耳後魏志魯郡汶陽縣有新甫山又通典漢汶陽故城在兖州泗水縣東南此故處可考者商頌殷武篇丸乃圓轉之名説文云圜傾仄而轉者字從反仄徐鍇謂仄者一靣歆而不可為也是故仄而可反為丸丸可左可右也木不圓則不能轉不直亦不能轉則嚴華谷兼圓直二義得之傳訓易亦圓意惟圓故便易耳而薛氏章句云丸取也取而伐斫之使其丸且澤故曰丸丸謬矣如馬融長笛賦丸挺雕琢笛亦取圓直故稱丸挺此尤明證棘棘弼風凱風篇棘與棗異種沈存中謂棗獨生髙而少橫枝棘列生卑而成林以此為别要是二物也凡詩言棘者皆荆棘之棘惟楚茨之棘為蒺藜刺辨見草部總非棗屬然棘亦有實如小棗而可食故詩云其實之食耳釋木專有終牛棘文至其分列棗類頗夥無名棘者孟子養其樲棘是二木與上梧檟例看明甚又釋木云樲酸棗未嘗連棘言則棘非棗益明矣寇宗奭謂棘生崖塹上久不樵則成幹人呼為酸棗更不言棘要亦美其名者而古今注直云棘實為棗誤矣陸農師援四時纂要云四月棗葉生正凱風之時此尤強合彼自言棗葉之生與棘無涉且下云棘薪則又成材時矣而凱風猶吹之豈亦葉初生之候與羅瑞良引白虎通云景風至棘造實以為言棘心者乃其造實之萌芽是也如此則與七子有關合詩所以徑接母氏劬勞見其長養之恩勤耳夭夭亦舒放茂長之意與桃夭同但以對下薪言則不妨從少取義且以見七子之自幼而壯皆賴恩勤為不忍忘也棘至為薪可云成立然僅共㸑燎則菲材而已必兼二義始與下詞旨合魏風園有桃篇此傳直訓棘為棗陸農師直以為酸棗蓋因上言桃不得不以棗為配耳愚謂國君即極儉嗇何至拾橡充飢豈有自取其棘實而以為供者説者因以傅會謂其安於儉嗇固陋而不知經制之大振起之謀如園桃以為殽園棘以為實且謂推其氣量所至必當以桃當肉以棘當穀其説益稚真堪捧腹秦風黃鳥篇棘多刺亦惡木又卑枝易見非黃鳥安集之處猶三良從葬不得其所所謂會見汝在荆棘叢中正此詩取喻之意耳陳風墓門篇取棘喻他義自允合但鄭氏以斧析為誅絶之喻嚴華谷謂為良師傅教誨之喻則嚴説為長也曹風鳴鳩篇棘叶國取韻故鳲鳩及青蠅之説同更無深意蔡元度以棘之心赤外刺為四國求解則鑿矣且鳩子有七安知不各隨所飛而何元子必謂始之在梅者降而在棘以合曹地被分不能成國之説尤曲甚小雅湛露篇何元子謂棘有二此棘乃樲棘之棘也愚按樲無棘名説見前且露無物不被正見其溥荆棘雖非美材與豐草亦相埓豈獨不應沐霑濡之澤而必易為樲棘耶或據本草謂把未有無刺者故詩稱把棘實一木與楚茨説同存考小雅青蠅篇棘與榛總以樊言傳説甚當亦不必訓刺人求合讒言也榛榛弼風簡兮篇榛陸璣以為栗屬其子小似柿子表皮黑味如栗陸農師謂其樹似梓羅瑞良謂其枝幹如木蓼葉如牛李色髙丈餘子核中悉如李生則胡桃味膏燭又美亦可食噉又一種大小枝葉皆如栗子如杼子味亦如栗所謂樹之榛栗者其下云爰伐琴瑟是大木非榛楛之榛至女贄則宜兩者皆可用愚謂榛亦自有各種然皆有實可食不得以詩中所云别異同也羅氏説蓋本齊民要術今人辨味如栗為樹之榛栗之榛莖可為燭為山有榛之榛通謂出自陸璣所云然正義引止數語他不槩見兹亦獨存正義所傳者以俟後詞義以榛苓興美人二物皆山澤中之所有者故以喻西方之所思不必如傳作籩實資用藥物救患觀也讀詩紀云山則有榛隰則有苓惟西方然後有此人數語較淺合鄘風定之方中篇鄭氏因文順遞以六木皆為琴瑟用非是且琴瑟正不必泥通論云因桐梓以言琴瑟意主祝其久居於此所植之木異時直可伐為琴瑟之用猶唐人詩種松皆作老龍鱗也下終焉允臧即其意非真欲伐之也孟子故國喬木可見喬木亦為故國之徵豈有伐之者哉鄭氏以為預備蘇氏謂種樹者求用於十年之後皆謂真欲伐之固矣曹風鳲鳩篇陸農師取每况愈下意謂榛卑於棘尤強解榛木亦髙尋丈豈有比棘更卑之理若其果實雖有先後然詩祗以取韻非以為序也此亦如駉篇説馬習氣最為可憾小雅青蠅篇榛亦以為籓只如傳解已足後之穿鑿者乃念及婦人所贄以生刺褒姒之説又因舊語謂榛木可為矢取備文武二義為讒人害善之興去詩人情旨逺甚大雅旱麓篇詩以草木興者殆半如必依周語韋昭注謂王者德及榛楛隂陽調草木盛則本詩葛藟柞棫且不勝其説矣彼自斷章取義安可據以為言耶此詩舊謂受祖之作當自推本先業以見其承藉之厚故即旱麓榛楛為喻傳泥草木固未是鄭氏因草木及民亦覺無謂嚴華谷云山喻先祖麓喻子孫榛楛喻福祿似較切近榛訓為菆此説文誤語榛乃木名菆則矢名有把栁杯棬之分何云榛即為菆耶羅瑞良因此説謂瑟彼玉瓚以下述文治之美而首章言武備誕矣且周之先世積德纍仁並未嘗耀武也即謂有文事者必有武備則弓矢斯張干戈戚揚公劉之篇有之而此詩並未一語道及乃取託興之榛楛而曰是武事之證可乎栗栗鄘風定之方中篇栗髙二三丈葉似櫟花青黃色似胡桃陸璣謂五方皆有周秦吳揚特饒有莘栗奧栗芧栗諸種寇宗奭以為河北路有一種栗頂圓末尖謂之旋栗又西京雜記上林苑有侯栗瑰栗魁栗嶧陽栗之名蓋其類頗夥亦任地生但分佳醜大小耳陸農師以為味鹹為北方之果不知何據廣雅釋辛為栗陸璣作莘以為出桂陽藂生大如杼子中仁皮子形色與栗無異蓋栗之一種也鄭風東門之墠篇栗對墠言明是表道之樹故以為近女子之家而心識之傳説是也鄭氏以為栗而在淺室家之內言易竊取故女以自喻此不可解詩但言栗之下有家室未嘗言家室中有栗且但言栗而已而必取其實與其味以為色喻是尤幻也至舊泥婦贄為説以為今方在門不待禮而相奔亦非作者之旨且念及備贄之禮尤不當作淫奔解矣唐風山有樞篇此以山隰之有興子有意自淺合必因他人入室句為山材為人所取用則蛇足矣栗瑟相叶如鄘秦諸風皆然此但趁韻無取義也何元子謂栗供籩實以興酒食之事義尤強合秦風車鄰篇羅瑞良説此詩以為燕秦千樹栗是其出處是也故蘇秦説燕文侯亦云北有棗栗之利阪漆隰栗舊以為上君下臣之喻以下有並坐文也或謂是伶工之輩與其儕侣並坐以供鼓瑟之事非君臣於秦風亦似豳風東山篇鄭氏解栗為析義且云栗裂聲同此臆斷也從軍大役豈止析薪細事於義已不可通又書傳從未有謂析薪為裂薪者况裂是分崩義栗是堅密義二字逈别烏得以聲同混耶愚疑栗堅木不易朽故人或取以為棚架之類以苦瓜之繫度之則何元子之説得矣或云栗薪猶云堅木併不必作栗樹言亦通小雅四月篇羅瑞良謂西京雜記稱漢上林苑中有侯栗此吳均之語不可取信是也然侯栗不獨見諸此廣志云栗有關中侯栗大如雞子又三秦記侯國出栗皆可證要是異種不應隨山有之仍以鄭氏語助為斷栵大雅皇矣篇釋木訓栵為栭郭璞以為樹似槲樕而庳小子如細栗可食鄭漁仲以為即芧栗也通志謂橡實之類今俗謂之為芧栗猴栗柯栗皆其屬愚按內則芝栭菱椇並列諸果人君燕食庶羞用之陸璣亦謂栵葉如榆其名具在不可沒也以有栗名附見栗部中并述行生為栵之説於後以俟斷者先儒謂行生曰栵解之者以為灌栵並言灌非木名則栵亦非木名可知今字書以栭栵之栵屬屑韻音列灌栵之栵屬霽韻音例分為二亦本此説然釋木於災翳灌三者皆釋其狀而栵别列不與三者同條又以下柳椐檿柘四木推之則亦各為一木名所不敢強斷也詩識名解卷十三

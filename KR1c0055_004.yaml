body:
  text: 詩識名解卷四錢塘姚炳撰獸部馬馬周南卷耳篇馬生於午在易為乾象稟純陽之體而健行坤配乾取牝順牡故云利牝馬之貞以其行地因稱地類實與地無涉緯書謂地精為馬非也貨殖傳地用莫如馬亦行健之謂健則貞貞則久故十有二月始生其齒遂以年加長考異紀又謂地生月精為馬因取應月之説並非應月者皆隂類如顧在腹魚腦盈虚是也緯書以為王者駕馬故字以王為馬此偽説不足論也陸農師駁之謂王無駕馬之制古者天子乘龍葢取周禮八尺以上為龍之説亦未是釋畜云馬八尺為駥易駥作龍此周禮羙其辭耳陳用之又謂月令天子所乘皆言龍衛諸侯所畜則言騋是天子乗龍諸侯乗騋也其説並泥正義云虺隤者病之狀似通作隳頽是也隳頽則罷罷則不能升髙固是一意何元子穿鑿字義謂虺似蛇而小隤説文以為下墜也孫炎解虺隤為馬退不能升髙葢猶今人言蛇倒退耳易罷為退以就已説誕矣且虺九經考異作㾯豈可泥字文為小蛇耶傳云𤣥馬病則黃如此則專指色黑者言矣若騂騏黄白諸種又將以何為病名耶郭璞謂虺隤𤣥黃皆人病之通名人病則靣目黧黑而黄此自然之理馬之毛色病則不能潤澤亦當似此故或𤣥或黄耳駒周南漢廣篇駒有拘繫義禮月令游牝别羣則縶騰駒註謂季春妊孕已遂故仲夏不使同羣防踶齧是也釋畜云𤣥駒褭驂郭璞亦謂小馬别名則是馬之小者總名駒耳傳謂五尺以上株林箋謂六尺以下皆從周禮庾人文差等之鑿甚舊説六書不專以馬齒立字説文馬一嵗為馬八嵗為􅦩果爾則駟當是四歳馵當是二十歳他七歳當作九歳當作豈古人制字本義况説文馬二歳曰駒何以不從三歳曰駣何以不從即如周禮教駣亦苐指馬之未閑習者駒䮘駣皆馬之通稱不必拘年數分詁耳此論最達然則以駒為二歳馬者亦拘也陳風株林篇傳云大夫乘駒其意葢謂天子乘八尺者為龍諸侯乘六尺者為馬則大夫乘五尺者宜為駒凖此則士初試為大夫者當乘三四尺為矣此説之不可通者也陸農師又謂駒血氣未定則有踶齧之虞故大夫乘之夫問大夫之富數馬以對亦既儼然卿貳矣而必乘踶齧之馬以危其身此何禮制耶小雅皇皇者華篇陸農師謂維騏維駱維駰蒙上之文宜皆為駒此亦泥大夫分宜乘駒之説陋矣夫駪駪征夫衆多疾行所遣不一人所駕不一馬安得盡為五尺以上者而乘之乎小雅白駒篇白駒取潔白意猶如玉之謂何元子謂此為餞箕子之詩由其不受周爵故退而就卿大夫之服不乘馬而乗駒也白者殷所尚之色與振鷺有客義同此本詩傳闡亦武斷小雅角弓篇此與下章皆根受爵不讓來老馬為駒喻父兄之退處教猱升木喻子弟之凌尊所謂不顧其後謂今日子弟不讓如此全不顧後時為父兄亦有起而凌我者復將自蹈於老馬為駒之勢耳騋鄘風定之方中篇騋牝不當分訓釋畜云騋牝驪牡葢騋之牝驪之牡皆馬之良者故指以為言正義謂諸侯齊道髙八尺田馬髙七尺駑馬髙六尺獨言騋者舉中言之非也若云兼言牝馬則周禮校人職云凡馬特居四之一謂一牡可配四牝此詩誇牝之多適形牡之少矣鄭氏檀弓註引釋畜文又以𤣥駒之𤣥上屬謂七尺曰騋牝者色驪牡者色𤣥其于此詩騋牝之義何居箋以邦國六閑之制例此詩謂文公徙而能富馬數過制國人羙之泥甚後儒紛紜擬議其説不一以為可用者三百乘而其牝牡乃三千此蘇氏説也以為革車不用牝馬今併牝馬數之故為三千此嚴氏説也以為成周以民牧者如丘甸歳取馬四疋之類葢天子十二閑是養之于官者文公三千舉官民通數言之此林氏説也以為馬特居四之一騋牝三千則當有牡一千革車不用牝純用牡牡馬一千為車二百五十乗取成數曰三百此羅氏説也愚謂三千不過侈言其盛以見良馬衆多如此其下焉者更可知耳若必泥三千之字以求合馬制迨於制不合則又曲為之解以通其説不識無羊章三百九十為數何隘而詩人誇之耶即左傳元年三十季年三百亦苐謂其生馬蕃息十倍昔時不必定限以三百之數取合于邦國六閑也衛風于旄篇傳以轡為多寡之數謂驂馬五轡其制不可考王肅因以為夏駕兩殷駕三言驂則三馬之名駕三馬則五轡王基駁之云商頌約軧錯衡八鸞鏘鏘是殷駕四不駕三明矣豈可據肅語以解傳併以解詩耶箋謂五見之六見之於義為近嚴華谷云言來見者愈衆也只可作如是解五之五馬六之六馬此以馬為多寡之數然亦苐謂極言其盛不可以禮制拘也若拘禮制言則五馬屬後世事不可入經解六馬之說雖歴見古文尚書及易孟京春秋公羊禮王度白虎通諸書然皆謂天子之制耳此為衛大夫見賢之詩不當以是例也况大雅駟騵彭彭武王所乘未嘗過四尚書諸侯入應門皆布乘黄朱獻天子者亦祇四耶衛風碩人篇傳訓驕為壯貌於義未確字書謂馬驃逸不受控制得之葢諸侯之女嫁于諸侯車馬之雄皆為上駟其辟易之狀若不受控制者故謂之有驕云爾說文乃云馬髙六尺為驕由其見周禮庾人三等之說六尺以上為馬更無他字相代遂以驕為六尺之名其傅㑹如此黄鄭風大叔于田篇傳以乘黄為四馬皆黄何元子辨之謂黄下必四鴇叔不應乘馬之驟易若此當於乘字畧斷讀之葢四馬為乘於乘之中有黄者有鴇者或兩服為黄而兩驂為鴇也愚謂此不過舉馬之上色誇之固不必泥四馬為一色亦不必分驂服各一色如小雅四黄既駕魯頌駜彼乘黄則亦非必不可得者以叔之驕侈何知不比物齊色以快一時耳目耶襄訓駕本釋言文但此詩直指鉤衡之處馬之所以駕者而言所謂轅端横木是也下齊首亦是此義葢服在驂前直近轅端而兩驂次之故謂服為上駕與驂之鴈行正相合鄭氏謂馬之最良者為上駕誤矣或通作驤引説文馬低昻之謂則又易字求解不必從小雅車攻篇陸農師以四黄兩驂為駕六之證誕甚兩驂即於四黄中指其易於出入者而能不倚以見御之良耳若泥兩驂在四黄之外以為田獵盛事制固如此則方其徂東伊始屬車載道何盛如之而龎龎者僅以四牡稱耶魯頌駉篇黄純色無雜易辨故釋畜無文傳恐黄白之皇通混作黄故專言黄者加騂以别之然頗涉語贅不必也試合舉之黄辭曰黄又云赤黄曰騂兩馬不幾無辨乎鴇鄭風大叔于田篇釋畜驪白雜毛鴇郭璞以為今烏驄陸農師謂其名取諸鳥葢毛色似耳詩舊本字從鳥釋畜文從馬古通或云猶八尺以上曰龍二目白曰魚馬可以曰龍曰魚鴇亦可曰鴇古稱良馬如翔麟紫燕駁龍紫鹿黄鵠晨鳧鐵獺緑虵之屬不盡出馬類也其説達矣驪齊風載驅篇釋畜於驪無正文駉傳謂純黑曰驪不知何據如黄白皆以色稱况鬛喙之黑者亦直言黑此何獨易為驪耶愚疑驪乃良馬之號故釋畜盜驪驪牡皆為上駟其毛色不同則分驪馬白跨驪馬黃脊青驪驪白諸種耳未必驪為純黑名也識者斷之小雅六月篇四驪但稱比物不言齊色則驪固是良馬非黑馬可知舊註以為既比其物而曰四驪則其色又齊似屬添足白顚秦風車鄰篇釋畜訓馰顙為白顛舍人云的白也顙額也額有白毛今之戴星馬也愚按的顙亦名的盧盧與顱通猶顙也馬政論云顙有白毛謂之的盧是也世說載劉備乘的盧得出厄其為良馬無疑若相馬經云馬白額入口至齒者名的盧奴乘客死主乘棄市此誤也晉書庾亮所乘馬有的盧殷浩以為不祥勸賣之殆亦因相經而誤稱者按釋畜云白達素縣邢昺以為其白自額下達鼻莖者名縣俗謂漫髗徹齒此當即相經所云白額入口至齒者深源名士必不妄語其謂不样者乃漫髗非的盧也的盧良馬而以為殺人何其寃乎且秦以牧馬開基馬政固其世業其于良駑自熟悉必不取殺人者而乘之而誇之明矣陸農師引覲禮云奉束帛匹馬卓上九馬隨之説者以為卓即的顙故以為上列而九馬隨其後此本鄭註素的之説而誤者覲禮卓者特立之義謂先以束帛匹馬特達而九馬隨以獻非卓為的顙名也鐵秦風駟鐵篇傳解此直作鐵驪葢以驪為純黑故合稱之亦不察甚矣月令駕鐵驪乃謂鐵色之驪馬耳鐵為黑金說文以為馬之赤黑色者是也陸農師云先儒謂非特有取于色亦取其堅壯如鐵故曰鐵存其說騏秦風小戎篇騏釋畜無文楚詞騏驥抗軛則騏疑亦良馬名未必為色名不當以青黑定之說文謂馬青驪文如博綦未知何據但字與綦通尚書二人綦弁曹風其弁伊騏俱互用故正義謂弁色如騏馬之文此詩又謂馬色作綦文耳小雅采芑篇陸農師謂騏中駟驪上駟北伐舉四驪南征舉四騏者方是時馬政愈修故雖騏亦閑習為用非也騏乃馬之良者舊謂即今驄馬非駑駘也故小戎皇華駉篇皆備舉之况周禮軍事物馬而頒此乃供元帥服御者其為上駟之選何疑翼翼驂服整齊之貌即上襄鴈行意傳訓壯健無謂何元子謂馬在車左右如鳥之有翼亦是但謂兩服為兩翼兩驂又為兩翼故重言翼翼則曲解矣魯頌駉篇傳謂蒼祺曰騏正義以為祺者黑色之名今按祺從示者訓祥從衣者訓繫並無黒義傳作祺尤不可解豈亦通綦耶馵秦風小戎篇左白馵釋畜明文郭璞以為後左脚白是也說文謂䭴從馬一絆其足馵從馬二絆其足馽從馬口其足則穿鑿之甚矣釋畜又云膝上皆白惟馵亦謂馵之左足連膝皆白也郭璞謂馬膝上皆白為惟馵後脚白者專名馵恐未然陸農師謂騏與馵祇兩馬正合王肅駕兩之說謬甚戎車未聞有兩馬者此省文耳必若所云則載驂載駟當駕七馬矣且亦可謂騏馵為騏馬而馵足是又駕一非駕二也說詩者之以辭害志如此駵秦風小戎篇釋畜駵無明文愚按駵同驑驊騮古良馬之稱其毛色不一則有駵馬白腹者有駵馬黄脊者有駵白者傳箋以為赤身黒鬛並臆説也正義云駵是色名說者皆以駵為赤色若身鬛俱赤則為騂馬故為赤身黒鬛固是强解月令夏駕赤駵中央駕黄駵若駵定為赤身黑鬛之名則黄駵又作何解豈有赤身黑鬛而仍黄者耶何元子謂篇中騏駵騧驪四牡備矣益以上章之馵反成五馬則知駵即馵也乃爾雅所謂駵白駁者因其白之在足而題之以馵因其駵之在體而題之以駵愚謂不然馵駵駁三者毛色自别釋畜分釋鑿鑿無庸强混况本章中驂四牡言之甚悉必欲連馵為五謂其不成駕數遂牽合馬色武斷成文是猶執騏馵為駕兩者也方其出師西征車馳馬驟不可勝紀詩特約畧言之若合二章始成一車之所駕則是一車之外更無他車四馬之外更無他馬矣固矣夫元子之為詩也騧秦風小戎篇按釋畜云白馬黒鬛駱白馬黑脣駩黑喙騧文義似蒙上白馬來而傳獨斷為色黄不知何據郭璞酌衷于黄白之間謂今之淺黄色者為騧亦騎牆見耳皇豳風東山篇正義解黄白皇謂馬色有黄處有白處非也夫有黄有白是雜毛矣而釋畜此條未有雜毛之語且後文明釋黄白雜毛為駓可證愚意皇葢黄色之近白者疑今淺黄色是也駁豳風東山篇釋畜云駵白駁葢駵馬之白者名為駁也先儒誤以駵為色名謂馬色有駵處有白處夫駵誠為赤身黑鬛則直謂之駵矣又安得云有駵處耶此説之不可通者也今以釋畜文考之駵之白腹者名騵此則言其通白者耳徐鉉謂疑象駮文亦臆揣此言皇駁特取馬色燦爛若雲錦然與熠燿相輝映耳陸農師引文王晉侯乘駁事謂皇駁國君所乘詩亦言此則士昏禮攝盛故何其鑿也駱小雅四牡篇白馬黑鬛為駱釋畜明文廣雅易作朱鬛陸農師解之云今呼黄馬尾鬛一道通黑如界者為駱葢馬無分于黄白若今衣脊絡縫故曰駱也禮明堂位夏后氏駱馬黑鬛此以别白馬朱鬛之駱也月令孟秋駕白駱此以别黄馬黑鬛之駱也愚謂此正强解明堂位駱馬黑鬛即白馬黑鬛葢謂之駱者未有不白也月令駕白駱即駕黒鬛之白駱葢謂之白駱者未有不黑鬛也禮單言之省文耳黄朱之說並不必從絡縫為駱尤鑿傳訓騑騑為行不止貌此因使臣作解於義未確正義引少儀云車馬之容騑騑翼翼雖行不止不廢其容騑騑也愚謂此直當作車馬之容解不必為傳行不止之語回䕶或本說文謂騑為驂旁馬今云騑騑特指兩驂而言亦鑿嘽嘽當為聲氣盛疾之狀與戎車嘽嘽徒御嘽嘽王旅嘽嘽無二義葢車馬行聲也又上聲音闡樂記其聲嘽以緩則緩弛之意傳因愍使臣勞苦即以為馬喘息貌與騑騑訓行不止皆相因起義耳陸農師謂駱善耐勞苦而喘息不平如此以甚勞故尤傅㑹駰小雅皇皇者華篇陸農師謂此詩馬序先後與駉合則駰不如駱駱不如騏卒言駰者以明馬雖彌劣所以御之滋善此鑿說也皇華乃極道使臣每懷靡及之心不過借馬名同韻者押出諏詢謀度四字而其先後適與駉合耳何必拘牽文義以為説乎魯頌駉篇隂白雜毛為駰按舊解隂不一或云目下白或云白隂或云淺黑色見舍人樊光孫炎郭璞諸說愚謂隂乃幽隂之義如重雲宻布風雨欲來昧晦難辨之狀又如漆室深閉帷幙周遮于櫺隙間稍露微光若隱若見合之于色當作淺黑無疑舍人謂今之泥驄是也小雅吉日篇傳以伯為馬祖正義云伯者長也馬祖始是長也何元子駁之謂未聞田獵有馬祖之祭亦未聞馬祖有伯之稱祖者始也伯者長也二義懸殊何得以伯當祖伯當通作貊亦作貉鄭司農讀為禡師田皆行軍之事宜同有禡祭觀説文既伯作既禡可證即田獵表貉之祭也愚按釋天明有馬祭之文亦作既伯說文易禡非也况爾雅既釋禷禡為師祭此何得以混之特竟以伯為馬祖恐未然釋天云是禷是禡師祭也既伯既禱馬祭也通以祭名並舉則伯為祭馬祖之名非伯為馬祖名耳若云伯通作貊又讀貉為伯是易字求解矣小雅節南山篇項無大義説文但訓頭後領即項也駕四牡者必加衡軛於頸上故以項領言葢駕車主於行今有馬可駕而無地可行故但見俛首伏軛好其項領而已新序宋玉曰此皮筋非加急而體益短也處世不便故也詩不云乎駕彼四牡四牡項領小雅鴛鴦篇何元子云此乘馬乃親迎時所用與碩人車舝之四牡同漢廣詩之子于歸言秣其駒事亦似此愚按如此説乗馬便覺親切有味存之詳見鳥部鴛鴦騵大雅大明篇陸農師以為騵從縓省縓淺赤也此穿鑿説釋畜明言腹白何得反以淺赤之名加之總因認駵為赤馬故耳先儒惟以駵為赤色故謂腹白者為上周下殷語尤誕夫二代革易之際正當異其所尚何必以勝國之色雜之且似兵家厭勝術非王師所為傳説葢本檀弓要不可據故或言方叔率止乗其四騏則於戎事乗騵之説害矣此確證也陸農師反曲為之解亦不察耳驈魯頌駉篇驈乃驪馬而白跨者郭璞以為白在髀間孫炎以為股脚皆白按跨者所跨據之處則其白當及股本而止未至於脚若股脚并白不得但謂之白跨矣騅魯頌駉篇釋畜以騅為蒼白雜毛説文易白作黑不知何據史記項羽駿馬名騅所當無敵一日千里世號烏騅此别是一種豈可以烏泥耶陸農師謂騅亦鴇類取鵻之色鵻在青黑之間亦在青白之間此騎牆説也且騅馬未必因鵻鳥而名豈可以鴇例而併以為一類乎駓魯頌駉篇釋畜以駓為黄白雜毛說文以駓為黄馬白毛夫既云黄馬矣而又以為白毛豈黄為馬名白為馬色乎其為黄白毛相雜無疑也郭璞謂即今桃花馬按桃花良馬名梁簡文西齋行馬詩桃花紫玉珂又蘭成謝賚馬啟陵源猶逺忽見桃花豈其黄白斑駁如桃片零落者與不言雜毛者乃純色之毛如黄白為淺黄是也雜色則是二色相間雜無疑邢昺於凡言雜毛者皆謂復有雜毛又云兼雜毛則是二色之外更有他色相雜矣爾雅立言之㫖似不如是騂魯頌駉篇騂釋畜亦無文正義解傳謂周人尚赤而牲用騂剛禮稱陽祀用騂牲是騂為赤色也從之傳兼言黄者以馬色無正赤故謂赤黄為騂於義近似特上章黄騂曰黄則贅語耳驒魯頌駉篇釋畜云青驪驎驒葢謂青色之驪馬有淺深斑駁隱粼者謂之驒孫炎以為似魚鱗是也舊皆作青黒斑駁解為小異耳說文别有驒騱乃埜馬文亦如鼉魚然駉篇乃畜牧不當入野馬其中郭璞以為即今連錢驄未知是否韓詩外傳以白馬黒鬛為驒以色考之乃是駱馬焉可誣也雒魯頌駉篇正義謂定本集註及徐音皆作駱而俗本多作駁按上句既明言駱其以雒為駱者固非俗本易作駁尤誕孔氏論之詳矣傳見釋畜無文莫可定解意以白馬黑鬛為駱此亦名雒字異音同便取其文倒置之為黑身白鬛其説究無所出耳何元子以雒乃鴝鵒鳥疑馬之色似之故名此倣駂馬為說但雒名釋鳥兩見皆作雒說文從佳者訓鵋䳢從鳥者訓烏􅖂又分二種則馬色亦不知於二者何似要是臆揣未可據也騢魯頌駉篇釋畜云彤白雜毛騢郭璞謂即今赭白馬是也說文以為色似鰕魚按鰕魚色青黒與赤白者全不類許氏因文同作段故謬為釋非是徐鍇謂騢色似霞近之顔延之賦云膺門沬赭汗溝流血有可想見又宋梅堯臣雜志號碧雲騢謂莊憲太后以馬賜荆王王惡其旋毛留以借上閑遂為御馬策一以其物肉色碧如霞片故號之此似霞之證也但堯臣特即其所見以刺朝紳又非必騢馬盡旋毛耳驔魯頌駉篇驔釋畜無文今皆從傳鐘伯敬云毛傳本作豪骭白驔朱傳因此四種馬文連餘三俱有曰字故言豪骭曰驔若然則豪是長毛骭是脚脛註云豪在骭而白白字從何生出愚按鍾說是此章四馬皆應主雜白者言駰隂白也騢彤白也魚二目白也則驔當為豪骭白者但毛傳今本皆作曰不獨朱傳也孔氏去古未逺其舊本或原作白今譌為曰或曰上更有白字故釋毛意以白言朱傳仍毛譌文而又本孔舊義故其說如此釋畜驪馬黄脊者名騽文甚明說文易訓驔而解騽為馬豪骭此謬也然驔釋畜無文而傳所說又與說文騽同究不知其何所出耳魚魯頌駉篇二目白魚郭璞以為似魚目也羅瑞良引相馬之說云馬目欲得黄又欲光而有紫焰若小而多白則驚畏驚畏馬之大病故其序尤在後此非也夫馬固以黄瞳紫焰為良然相馬黄白之辨但就病不病而言若二目本白者自是一種不可以為病馬而棄之序後之說泥甚正義謂僖公使牧於炯埜馬皆肥健作者因馬有良戎田駑四種故每章各取其一此迂論也夫諸侯四馬禮無明文本不足據乃欲拘牽此詩分别良駑豈有一當乎即以駉篇之馬言之舊分首章為良乃朝祭所乘者其不䙝用可知乃六月篇比物四驪駕戎車矣車攻篇四黄既駕供田獵矣且二章備行陣而皇華維騏以遣征夫三章主蒐苗而四牡駕駱以勞行役即此以推可知皆拘文牽墨執此例彼無論作詩者無是心即傳舉是四者以為言亦未嘗鑿鑿分配如此也後人於凡言馬者動謂其與駉序合此孔氏之作俑矣駉與炯音同義亦畧同炯火光也後人借為精神强旺意則駉駉猶炯炯所謂馬肥張也說文在坰之坰亦作駉故以駉為牧苑此不足據何元子本之以為重言駉駉者一苑又一苑也此大可哂按傳林外曰坰又郡縣志坰澤俗名連泉澤在兗州曲阜縣東九里傳虚志實其字要皆從土無從馬者許氏訛其一何氏并訛其二試就其文言之一苑一苑之馬在一苑之埜叠牀駕屋有是理乎駽魯頌有駜篇釋畜云青驪駽葢青色之驪馬别名為駽也孫炎謂色青黑之間青毛黑毛相雜者名駽此總以驪為黒色馬名故耳郭璞謂即今之鐵驄未知是否在公專以臣言何元子引漢樂府君黄臣蒼之說謂此詩特以黄駽相對當分屬君臣所乘非也樂府漢歌不必為古制且其曰黄曰蒼亦不過錯舉為言何甞定屬君臣之分耶駜傳訓馬肥彊貌說文訓馬飽也二義亦自蒙合兕兕周南卷耳篇釋獸謂兕似牛犀似豕兩形判然不容相混郭璞亦謂犀有三角一角之不同而於兕但云一角山海經嶓冢之山獸多犀兕葢並舉二物言之考工記犀甲七屬壽百年兕甲六屬壽二百年則犀革又劣於兕其非一族可知羅瑞良謂兕即犀之㹀者但犀青而兕黑兕一角而犀二角以此為異又謂古人多言兕今人多言犀北人多言兕南人多言犀俱混為一種恐未然也李時珍乃云犀有山犀水犀兕犀三種直以兕為犀之一更誤觥惟用兕不用犀故舊引先師說云刻木為之形似兕角葢不以犀代也今之角觥皆稱犀杯不知犀文頗闇僅入藥餌兕觥則文理瑩然故凢帯鉤之飾皆用之惟唐敬宗時南昌國進夜明犀上令解為腰帶其餘通天辟寒辟暑却塵諸類僅供几座未聞琢為服玩其不以為酒器更可知左成十四年衛侯饗苦成叔寗武子歌兕觥昭元年鄭人燕趙孟穆叔子皮及曹大夫興拜舉兕爵以知觥未有不用兕者陸農師云老子兕無所投其角兕善抵觸故先王之制罰爵以兕角為之酒陽物也而善發人之剛其過則在抵觸先王制此以為酒戒其用兕之微意也與鄭氏泥觥為罰爵於詩中詞㫖全無繫著夫我者后妃自我也憂思之深託言惟酒可忘耳何故忽以罍自勸又何故忽以觥自罰耶通論云罰爵偶用兕觥非兕觥為罰爵也一語破的豳風七月篇傳解此詩亦謂觥所以示衆葢皆泥罰爵立論耳不知躋堂稱祝何等和樂氣象豈有舉罰誓衆之事不過酒行無算後稱觥以盡其歡耳小雅桑扈篇吕東萊謂卷耳罍觥並陳則不必指為罰爵若此詩則罰爵也愚按下思柔匪傲詞㫖近似然其器凡燕饗皆設之亦不必以罰為說如左傳歌兕觥舉兕爵未嘗定為違禮罸飲要是醉飽後稱觥以極其情亦如七月公堂之祝耳周頌絲衣篇鄭氏謂繹之旅大用兕觥變於祭也此亦因罸爵曲解夫兕觥器之美者故以為宗廟之獻詩人顧物思義取其不話傲而寧胡考以是為祭之備物盡志云耳而反云變於祭耶曹氏云旅酬之後恐有失禮者以此罸之要屬臆說小雅吉日篇兕重千斤獸之最大者故以一矢而殪為難羅瑞良謂射以得兕為雋非也國策楚王游於雲夢有狂兕忽至王彎弓射之應發而殪仰天而歎曰樂矣正此意小雅何草不黄篇野獸當在曠野人不當常行道途此興義也陸農師謂兕抵觸虎搏噬先王驅而逺之則率彼曠野於義亦贅兔兔周南兔罝篇兔似羊而小長耳短足毛褐色隂類也舊說為明月之精月有時缺故兔口亦缺葢秉其精氣而降生者今詞章家據傅𤣥擬天問之說動摭擣藥事為典實則陋矣博物志云兔無雄望月而孕口中吐子故謂之此誑語也論衡兔䑛雄毫而孕則兔明有雄者又古樂府云雄脚撲朔雌眼迷離亦並舉雄雌言大抵物類中相感或以聲或以視或以跡所由孕者不同要皆具雌雄而後變化者亦不必如陸農師說分其為九竅八竅也若望月不過同氣相求之故非待望而始得孕耳傳解肅肅為敬此本釋訓文按肅自有敬義但釋訓别有所指非以兔罝之肅肅為敬也集傳以為整飭貌得之玩語意文下連罝亦以其周張完宻嚴不可越儼然干城之扞衛為足美耳於敬義何涉哉王風兔爰篇爰爰緩意何元子謂宜通作緩緩非也此雙聲字連讀之取其意為某字義猶藹藹為和悠悠為長也豈有易本字為雙聲之理乎小雅小弁篇猿兔之類窮則奔林未有反投人者鄭氏掩捕之說為長此當如投䑕忌器之投先之者哀其生而預釋之耳若奉時辰牡虞人固翼以待射則其不忍而先縱之理或然也小雅巧言篇傳以毚兔為狡兔正義引蒼頡解詁云毚兔大兔也大兔必狡猾又謂之狡兔此為傳文回䕶耳毚自為大兔之專稱格物論云㕙其狡者毚又其大是也夫三窟之智雖小猶狡况其大者特不可作毚義訓耳小雅瓠葉篇鄭氏訓斯為白謂今俗語斯白之字作鮮齊魯之間聲近斯大是臆説兔多褐色少白者故瑞應圖以白兔為祥今瓠葉之詩思古人不以微薄廢禮安得擇白首者而燔炙之此當與秩秩斯干彼疏斯稗例觀皆助語并不必如傳訓為此也王肅孫毓述傳皆云惟有一兔頭此滯語正義已駁之矣集傳謂斯首一兔也猶數魚以尾也得之今人凡於牛羊類皆云幾頭是矣何元子引内則於兔去尻謂既棄其後臀不用故但舉首以顯之亦不必炮燔炙三者綂言之皆為治庖之事詩中多換字法如鴛鴦篇乘馬始言摧秣繼言秣摧倒句成文更無深義此詩亦然舊分新殺及割截脯乾三種何元子疑兔不過二斤不當為用之宏如此因有先事後事之分亦不必也麐麐周南麐趾篇麕身牛尾一角見釋獸文此麐之實狀也其餘馬足黄色圖蹄五角有翼能飛含仁懷義音中律吕諸語要是褒羙亦如鳯凰之多為祥說耳羅瑞良云麐埜物也其為性又善鬬釋獸載之葢若麕䴥麋之屬初不之異其所見亦如此陸璣云今并州界有麟大小如鹿非瑞應麐也故司馬相如賦射麋脚麟謂此麟也愚疑此乃從粦之麟非從吝之麐麐與麟當有别齊詩麟趾本作麐趾爾雅公羊傳皆然廣雅作麐義同其後麐麟多通用無所分辨說文云麒仁獸也麐牝麒也麟大牝鹿也與璣說正合存考舊謂不踐生草不履生物有愛吝之意故麐從吝牡麒牝麐隂主吝嗇故云麐也一說麐不世出世衰則麐死故從吝吝惜也字義雖是穿鑿要不與麟同訓可知通論云振乃振起振興意傳訓仁厚欲附㑹麐趾言麐信而應禮以足至者也不知振豈有仁厚意乎按此則仁厚字全從麐之不踐不履生出於振義固無關也然即以不踐不履為仁厚則但謂之仁獸可矣何謂又以麐屬信且修禮又何為致屬信之麐吾不解也以足至三字尤費解正義謂麐是走獸以足而至若然則凡獸皆足至者何獨為麐譽耶且於定角二義又難通矣定釋言作顁為題此明文可據者何元子謂說文無顁字當通作頂非也說文多譌舛不可以彼所遺遂疑其無且頂不可以言額釋名云額鄂也有垠鄂也絶非頂義葢頂乃頭之顛額乃靣之顛顛者對末而言本始之通稱也何氏專以額為顛因以頂為額并以顁為頂於義踈矣趾定角亦是即其所具錯咏之必謂從下而上取每况愈上意則鑿矣何元子乃謂趾贊太姒定贊太任角贊太姜於公子公姓公族三者分别求解尤鑿附騶虞召南騶虞篇騶虞舊説不一以為白虎黑文者始自毛公而諸緯書附和若響其後司馬封禪之書中郎五靈之頌郭璞之賛薛綜之文陸璣之疏陸佃之雅其最著者也以為掌鳥獸之官者始自韓詩明於賈生踵於歐陽正義繼以嚴氏詩緝以為異獸者或執東方朔騶牙之説為劵以為神馬者或指淮南子文王之事為徵而愚獨取韓詩之說何也蓋爾雅一書於詩中鳥獸草木無不備列雖小物弗遺何况赫赫仁獸與麐鳯同靈者而顧不列一名則匪特白虎黑文無據即以為神馬異獸者總强合耳傳見周南以鳥始以獸終因指為感應自然之理而召南恰首鵲巢不可無物為應又其文皆有于嗟歎美詞指相似則騶虞當是靈獸無疑因飾為白虎黑文仍以不踐不履實之陽與麐異名而隂與麐同德以愚後人而後人亦遂以騶虞為與麐鳯同靈之獸也悲夫詩識名解卷四

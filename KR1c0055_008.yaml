body:
  text: 詩識名解卷八錢唐姚炳撰草部蓬蓬召南騶虞篇蓬似蒿散生故今俗亦稱蓬蒿要非蒿屬説文直訓為蒿非是釋草雕蓬黍蓬二種鄭漁仲皆名為茭不名蓬然按西京雜記宫中正月上辰出池邊盥濯食蓬餌以袚邪此即所謂雕胡者其為蓬無疑矣陸農師分蓬為陸草葭為澤草然蓬亦産隰間如雕胡野茭之類皆傍水而出不得專指為陸草也此為南國春田當在江沱汝濆之地故即其所生之草以為咏若因蕃殖義鑿分原隰以見其蕃則失之矣衛風伯兮篇蓬草散生少根舊謂末大於本故遇風則旋轉而亂髮之無膏沐者似之集傳獨謂其華如柳絮聚而飛若亂髮不以葉言不知何據附諼草衛風伯兮篇諼不通萱萱草亦非忘憂者此説文誕詞耳諼但訓忘本釋訓不易之解正義辨之甚明是詩以思伯之故飛蓬首疾故以忘憂解之且其曰焉得者不可得之詞也草必不可得而憂終不可忘是以至於心痗則諼草之非草明矣况爾雅備列草名而惟有諼義别無諼草此其尤足據者也兹附辨飛蓬後如騶虞之繫麟趾亦勿使得竊其名耳矣羅瑞良云願得善忘之草而植之庶幾漠然無所思然世豈有此物也哉蓋亦極言其情耳説者因萱音與諼同也遂命萱以為忘憂之草蓋以萱合其音以忘合其義耳而所謂忘憂憂之一字從何出哉説文養生論博物志古今注皆因解詩者之言而廣之爾愚按此最有識解語蓋諼草為萱之謬創自説文自後無宗之者唐世如陸璣孔頴達輩皆勿存其説至宋而其説盛行惟瑞良抉摘根柢獨伸舊説可謂雞羣之鶴矣集傳訓諼草為合歡而云食之令人忘憂者余前輩毛西河先生辨之云養生論合歡蠲忿萱草忘憂幾見合歡而忘憂也乎夫合歡者青堂也董子所謂欲蠲人之忿則贈以青堂者也然則青堂非萱矣愚按此嵇論及董子可證也而梁何遜為衡山候與婦書有云始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虛雖不言青堂亦分二義可見萱堂稱母乃世俗不根語覆瓿集引昏禮婦洗在北堂文正之且謂聶夷中詩慈親倚堂門不見萱草花亦非以萱比母是也愚謂就詩取義本當作婦事用若膏沐為容之詞豈母道所宜言乎何元子又據本草謂萱即今鹿蔥蓋鹿食九草之一食其花健忘一名宜男而風土記謂萱花宜懷妊婦人佩之必生男因以為即稱母萱堂之義皆傅會也且云萱花宜懷妊蓋寓思夫尤鄙俚甚矣葑葑邶風谷風篇傳但訓葑為須無明文按釋草須凡兩見而葑蓯獨有葑名故漢儒多據此為訓逮後説家始以薞蕪之須屬葑今合爾雅注參考之郭璞謂葑蓯未詳而鄭漁仲云積舊茭頭所成者其不堪采為茹明矣若薞蕪之須郭璞以為似羊蹄細葉味酢可食而漁仲謂即蔓青固當是此或云葑蓯即蔓菁一物異名非是韻書訓蔓菁者平聲訓菰葑者去聲分見東送二韻固自有别正義謂葑也須也蕪菁也蔓菁也葑蓯也蕘也芥也七者一物愚按既以葑屬蔓菁不當復列葑蓯之名邢昺易為薞蕪是矣然芥名亦有大芥辛芥幽芥之分其紫花者謂之蘆蔔東魯謂之菈􅫘見方言又蘇頌云一名薹子河朔謂之蕪根塞北呼為九英蜀呼為諸葛菜則是隨俗異稱非止七名也但蘆蔔當别是一種釋草云葖蘆萉非蔓菁屬此又子雲之誤蔡元度亦以蘆蔔為葑且謂葑者封也封之於土而後盛此傅會語按陶隱居云蘆蔔是今溫菘根可食葉不可食蕪菁根乃細於溫菘而葉似菘可食則明是二種無疑矣陸農師謂蕪菁與菘同類似菘而小有薹羅瑞良辨以為梗長葉瘦髙為菘葉闊厚短為蕪菁固是兩者又南北變種亦猶枳橘之隨地而化故舊説菘菜北種初年半為蕪菁二年菘種都絶蕪菁南種亦然是也但今所呼諸葛菜開紫花莖葉可食而味不美今亦罕食之相傳為武侯所止令軍士獨種蔓菁即此豈昔人所稱與今異物與蘇頌謂蔓菁四時俱有春食苖夏食心秋食莖冬食根是根莖秋冬可食詩蓋取不棄其晚節之義若錢氏以為下體莖葉近地多黃腐則凡菜皆然何為獨咏葑菲耶箋謂不可以根惡并棄其葉葉字添出且根可食原未始惡也程大昌以古祭牲貴上體為説擬非其倫至云蕪菁之葉可食而不如其根美故采葑菲者不棄之尤未是蕪菁根葉皆美非葉不如根之謂但根莖食於秋冬恐於衰晚相棄故戒以勿謂下體而遺之耳下體是詩人雋詞不必泥如韭曰豐本亦取其近根者他若萊蔔薯蕷之類惟根可用草木之質固不可以上下拘也鄘風桑中篇郝仲輿謂亦取下體賤褻之義為刺非是蕪根可食本不當以賤褻目之况此乃欲適所私而託為采物以行者連言我字當為淫者自道之語韓詩云匹夫匹婦相會於墻隂而明日有傳之者詩人即其自道之語以刺之爾自道安得自刺則其於義尤為蛇足矣唐風采苓篇詩每連類興懷但取叶韻初非有意此云采葑亦錯舉以諧下東從二音耳併不必云葑生於圃非山所有明其可以無信也陸農師乃謂葑有時而甘有時而苦采葑則因人所甘所苦而譖之之况羅瑞良又謂苓甘而苦苦讒者之入人必先甘而後苦而葑則甘苦相半見讒人所以嘗試其君者無所不用皆鑿説也且甘義更屬傅會説見釋苓菲菲邶風谷風篇釋草菲凡兩見一為芴郭璞謂即土瓜一為蒠菜郭璞謂生下濕地似蕪菁花紫赤色可食兩者異釋至陸璣合為一以為幽州人謂之芴爾雅又謂之蒠菜今河內人謂之宿菜正義從之今按舊注皆以芴為土瓜謂即月令王瓜王瓜僅食實而莖葉不可茹菲乃菜類宜從蒠菜之釋不當混作一物鄭漁仲謂蒠菜即蓫菜愚按釋草文蓫别見舊以為即牛藬俗呼羊蹄菜者則非菲種也菲似葍葍大葉白華根如指正白可啖固當以其類求之耳蔡元度解菲為薄義以為物之體薄而可食者此大穿鑿不知菲本未嘗專訓薄也上林賦吐芳揚烈郁郁菲菲有茂盛意若物之名菲者體即薄則名蘴者體當厚葑菲二菜果如是取義耶菲根無所考舊以為似葍疑亦如指正白可啖者而唐慎微云土瓜根似葛細而多糝此又以菲屬芴之説并存俟考禮坊記引此詩證君子不盡利於人謂無以其根美則并取之此是斷章於詩義迥别何元子謂與取節義同則強合也荼荼邶風谷風篇此荼為苦菜廣雅謂之遊冬鄭漁仲云今人呼苦益是也又本草一名荼草一名選王逸楚詞疏以為紫葉者為香荼青葉者為青荼蓋有二種其葉似苦苣而細斷之有白汁六月花從葉出色黃似菊堪食按儀禮鉶芼羊苦則荼古食物固用之今俗呼苦蕒菜用以羮肉者未知其即此否也嚴華谷謂詩有三荼一曰苦菜二曰委葉三曰英荼此詩荼苦及唐風采苦綿堇荼之荼皆苦菜也良耜以薅荼蓼之荼委葉也鄭風有女如荼英荼也鴟梟豫所捋荼傳云􅍉苕疏云薍之秀穗亦英荼之類愚按諸詩之荼名同物異嚴氏之辨甚晰而集傳解此詩獨以荼為蓼屬則是毒草非苦菜矣讀者斷之楊用修謂荼一名吳葵唐王氷注素問引古月令四月吳葵華而無苦菜秀一句唐本草注吳葵云即關河間謂之苦菜者俗作鵝兒菜又名野苦蕒可證然按吳羅瑞良作胡謂即釋草戎葵猶胡豆謂之戎菽郭璞以為今之蜀葵似葵其華如木槿戎蜀蓋其所自也據此則吳葵與荼迥别又夏小正云四月小滿後五日吳葵華王氷之注本此與月令小異不應即以苦菜當之或謂以荼之苦喻新人之醜惡非是夫以醜惡詆新人則非詩人溫厚之旨且亦安見新昏者之為醜惡耶此明根上薄送來見離别大苦何啻如荼而其夫有新昏之戀一送不顧若甚甘之猶云甘苦失宜焉爾唐風采苓篇正義釋此苦為荼所以别於大苦蓋大苦僅入藥類而月令明有苦菜秀之文則不得以大苦名苦明矣今從之陸農師以為采苦則因人所苦而譖之之况此固曲説或云苦生於田非山中之物今云得之首陽之下者謾詞也亦未是按陸璣謂苦菜生山田及澤中此云山下何知非田澤間應有之處而必以為謾詞不可信耶豳風七月篇此食農夫之具與瓜壺苴三者並為常食則是苦菜無疑陸璣云苦菜得霜甜脆而美是也大雅綿篇集傳解此荼為苦菜又云蓼屬語録亦謂詩人與堇並稱堇乃烏頭非先苦而後甘也又云荼毒蓋荼有毒今人用以藥溪魚荼是堇類則宜亦有毒而不得為苦苣矣愚按飴謂之餳以言其甘甘與苦為對者今乃置苦而言毒恐失其旨殆由誤認堇因以誤認荼耳此以地之美言雖苦亦甘甚其詞耳若嚴華谷謂得霜甜脆故言如飴則隨地皆然何獨為周原異乎劉協有云梟音之醜豈有泮林而變好荼味之苦寧以周原而成飴並意深褒讚故義成矯飾是矣大雅桑柔篇正義分釋荼為苦葉毒為螫蟲則荼有苦名而無毒性明矣集傳合之以為荼味苦氣辛能殺物故謂之荼毒則宜其别以為蓼屬耳若苦菜不聞有殺物者焉可誣也周頌良耜篇舊説此釋草委葉之蒤也郭璞注引此詩直作以茠蒤蓼易荼為蒤豈舊本原如是與今附按苦菜後以便考者釋草以蒤與皇並列蒤為委葉皇為守田按名索義則詩所云薅者或當是此然亦未聞其有毒也而鄭漁仲又以蒤為茅針引良耜詩為證則與如荼之荼同亦是田間所有者并存其説於此惟陸農師以如荼附入苦菜則誤矣今從舊别歸茅部云王肅分荼為陸穢蓼為水穢集傳合之以為一物而有水陸之異今南方人猶謂蓼為辣荼或用以毒溪取魚即所謂荼毒也何元子云爾雅於苦菜蔈荂字皆作荼而委葉字乃作蒤又於别條有蒤虎杖之目則虎杖名蒤疑此即委葉也疏於本條下引陶注本草謂此物田野甚多狀如大馬蓼莖斑而葉圓此詩以荼蓼並言當是其形相近故集傳亦云一物而有水陸之異耳愚按虎杖一名斑杖秋有花直出作赤子與蒟蒻相似要是陸産不可與水蓼混也荼與蓼自是二物宜從王説為允薺薺邶風谷風篇釋草薺類不一有䓆蓂葶藶菧苨諸種惟其實名蒫者乃今所食菜陶隱居謂味甚甘人取其葉作菹及羮亦佳是也自冬至春開白花名蝸螺薺俗呼地英菜一名甘草師曠占云歲欲甘甘草先生即此冬令百草凋殘無生物之理薺乃得春氣之早而生者舊謂乘冬水氣而美非是且物壯則老早生則早萎理之常也淮南以五行生克之説論之余亦未敢信説文薺蒺藜也引詩作墻有薺愚按二物音既各殊種尤迥别師曠占甘草為薺旱草為蒺藜其不相假明甚今混而為一竄墻茨之文為墻薺亦誕甚矣苓苓邶風簡兮篇苓釋草作蘦大苦也説文於苓訓為卷耳於苦又謂即苓今考卷耳自名苓耳以其形如鼠耳故以耳名之若舍耳而專名苓是失其真面目矣此詩所詠必不指此愚按苓本通零管子宙合篇奮乃苓漢書失時者苓落可證而釋詁苓落又作蘦落則苓與蘦古亦通釋草有蘦無苓故應以此當之郭璞謂蘦即今甘草蔓延生葉似荷青黃莖赤有節節有枝相當或謂似地黃沈存中辨之云此乃黃藥也其味極苦故謂之大苦非甘草甘草枝葉悉如槐髙五六尺但葉端微尖而糙澀似有白毛結角如相思角作一本生至熟角折子扁如小豆極堅齒囓不破按今甘草狀皆如存中説璞所云自是大苦所謂黃藥是矣又按説文蘦大苦苷甘草分釋鑿確且以名義辨之甘甘也苦苦也若以甘為苦雖不知味者當不云然正義取榛苓得所興碩人處非其位意與下西方美人二語不貫嚴華谷以為山澤之有草木猶盛朝之出人物近之詩特以山隰興西方榛苓興美人耳非有深意也唐風采苓篇正義解傳以為采苓取草故為細事首陽在河曲之內故為幽辟大是鑿説詩人託物起興如葛覃卷耳雖后妃猶繫思之何獨於采苓而以為細若首陽在今山西蒲州東南三十里亦名雷首山又名首山左傳趙宣子田乎首山是也雖在河曲固非僻處豈以夷齊所隱而遂謂之幽耶可見皆緣讒言附會非作詩者本意人之為言苟亦無信吾於此亦欲云然蘇頌謂首陽在河東蒲阪縣與今甘草所生處相近而先儒所説苖葉與今全别疑種類有不同者此謬也按甘草生河西川谷積沙山及上郡陶隱居謂今不復通市近出蜀漢中悉從汶山諸夷中來而苓隨處皆有如邶地與首陽相去絶逺而詩亦稱隰有苓是矣頌溺於舊説不辨黃藥之誤反疑其地近而狀殊亦徒為古人愚耳茨茨鄘風墻有茨篇釋草謂茨為蒺藜按蒺藜有二種一種杜蒺藜即今之道傍布地而生者開小黃花結芒刺一種白蒺藜出同州沙苑牧馬處大如黍粒此詩所指當是道傍布地生者陶隱居謂多生道上及墻上葉布地子有刺狀如菱而小長安最饒行人多著木履今軍家乃鑄鐵作之以布敵路名蒺藜易據于蒺藜言其凶傷詩墻不可掃以刺梗穢是矣故别有旁通屈人止行休羽之名皆因其刺故也舊主掃刺傷墻之説愚謂蒺藜刺人之草難以掃除者趙簡子云植桃李者夏得其休息秋得其實焉植蒺藜者夏不得休息秋得其刺焉蓋喻陽虎所植非人而為人害也此詩亦當以傷人言不當以傷墻言墻上之茨不可掃掃則傷人中冓之言不可道道則汚口二義較明舊解殆因下中冓言醜為合好掩惡之説故云傷墻耳通論云茨即書梓材既勤垣墉惟其塗蔇茨之茨茨所以覆墻也言墻上有茨本不可掃以比中冓之言本不可道不必多為鑿論也毛鄭以爾雅釋茨為蒺藜謂墻生蒺藜當掃去之不可從按此與詩義較合解同小雅如茨如梁福祿如茨二詩又周禮圉司職茨墻則翦闔説文茨茅蓋屋皆可證小雅楚茨篇鄭氏分茨與棘為二物大誤嚴華谷辨之謂詩中棘有二其一為酸棗此篇與青蠅之棘舊不指為何物因以釋草茦刺當之是也然但知此棘為草木之刺而不悟此刺即蒺藜亦知其一未知其二耳按方言草木刺自關而西謂之刺江湘之間謂之棘今蒺藜子有三角刺人兵家鑄鐵為之以梗敵路亦名此非棘而何况語氣順遞所謂其者正指茨而言定是茨棘無疑也何元子謂楚茨疑即九夏中之祴夏又名采薺愚按釋草茨薺分釋判然其誤以茨為薺者乃起於東漢説文與康成采薺之説何氏反謂後人誤薺作茨失其考矣九夏出周禮他書惟左傳肆夏云是其一餘不槩見今合鄭許之訛以楚茨為楚薺因以楚薺為采薺并以采薺為祴夏但取卒章鐘鼓既戒戒字為祴證諺云不識字讀半邉良可哂哉抽本無除義乃因抽訓為拔會拔意為除耳嚴華谷主抽發其條之説謂詩人感田野荒蕪言昔日豐穰之樂如此而今為茨棘之場是可傷而思也於詞旨較合小雅甫田篇舊解如茨但取積義則屋上茅蓋是也與梁坻京三者取喻正相倫嚴華谷謂從髙處視之則稼在下而見其密如屋茅其説更長小雅瞻彼洛矣篇正義解箋謂福祿非積聚之物故云如屋蓋以喻多要之未有不積聚而能多者三章既同同非聚義乎或云此當為蒺藜之茨茨布地叢生有連延屬續之意故取以喻福祿與葛藟義同亦一説唐唐鄘風桑中篇孫炎以釋草唐蒙連讀故云三名郭璞分之為四名愚按釋唐為蒙自傳始其讀爾雅必有所據惟以芣苡馬舄之文律之又似以女蘿釋唐蒙者不然則當多下一蒙字矣然詩亦單言唐不連蒙爾雅所釋固當指此但今兔絲子僅供合藥非食菜傳遵釋草文為訓而於蒙下增一菜字豈唐别有蒙菜之名非釋草所謂唐蒙者耶蔡元度謂蒙取蔽義蒙蔽乎松者也淫者志在依蔽故以為采果爾則采麥采葑其志又何在耶何元子引淮南菟絲無根之説謂其不擇物而附有苟合之象尤鑿絲蘿松柏今約婚姻者多引為佳話豈得以苟合汚之且此詩為淫奔自道語漫託采物以行者非有深義即有之亦應謂彼美孟薑願附絲蘿已耳豈曰吾固苟合乎哉女蘿小雅頍辨篇傳訓此不及唐蒙而合女蘿菟絲松蘿三者為一物廣雅分女蘿為松蘿菟丘為菟絲陸璣謂女蘿即菟絲而以松蘿為别種吳普本草則謂菟絲一名松蘿而無女蘿之名陸農師以為在草曰菟絲在木曰女蘿羅瑞良又謂兩者皆附木或當有時相蔓引古樂府花葉同根枝條兩處及唐樂府兔絲隨風女蘿縈抱之語以為古今多知其為二物者又據博物志魏文帝所記諸物相似亂者女蘿寄生菟絲釋草或亦此義諸説紛如愚謂當以陸璣之説為正且以釋草文斷之則仍是女蘿兔絲為一物而松蘿别種也蓋松根結茯苓舊謂下有茯苓上有兔絲則兔絲明是松上所附者今女蘿亦云施于松上豈得以在草在木分乎抱朴子謂兔絲初生之根其形似兔是兔絲之名因此非有異種耳至於蘿類不一凡蔓延松上者疑通謂松蘿而兔絲乃專有女蘿名也又凡物小者稱女如女桑女葛之類則兔絲或亦蘿之細者與麥麥鄘風桑中篇説文謂麥以金王而生月令注則云麥實有孚甲屬木二説互異羅瑞良以為鄭氏特據四時與中央所食為説麥性微寒要是許説為優愚按月令以四時分配五行此秦漢讖緯習氣固不足據至草木春生夏長秋實冬成莫不備四時之氣未有獨稟一氣而生者麥性宜寒故秋冬種而春夏收不過得氣之早者耳舊傳小麥生於桃二百四十日秀秀後六十日成大麥生於杏二百日而秀秀後五十日成亦有春種而夏收者蘇頌以為四氣不足有毒是也則其非稟一氣而生明矣鄭漁仲以為麥從來象其實從夊象其根或駁之謂草木皆有根何以不從夊皆有實何以不從來且來為小麥來之下不從久是來無根也牟為大麥牟之上不從來是牟無實也愚按前説固泥駁義亦未為得從來自因來牟取義非取象芒刺之説從夕則戴侗以為夜吐花而晝合近之郝仲輿謂麥秋不收冬不藏三時在外有奔之象百物未長而獨先秋有淫之象此比唐蒙苟合之義較鑿若就其言反之霜雪含生比節後雕有守之象衆方春華彼已秋實有貞之象設易此為漢廣行露之詩安知不反其言以相譽甚矣説詩者之附會也鄘風載馳篇麥乃託言不當拘時為説蓋夫人在許思衛預為目擊心傷之詞曰我若行其野而故宫已不可復覩也荒煙蔓草惟麥芃芃己耳將求援救於他邦不知其何所因而何所至乎此即黍離麥秀之傷也正義謂以今歲而思得來歲之時何元子又易為次年入夏時並泥王風丘中有麻篇此詩通體無淫褻語或當依序為思賢之作然麻麥必非指賢者所治特借以發端耳蓋丘之中有麥留之中有子國兩以所有為興也若謂子治麻而父治麥以世其農業為賢則三章之李又是父子二人同治者耶或謂麥可養人故以興來食果爾則麻何以興施施李何以興佩玖乎鄭氏謂子國復來我乃得食亦非嚴華谷云猶唐風枤杜曷飲食之之意愛而欲飲食之也得之魏風碩鼠篇舊説麥者絶續所賴今皆為碩鼠所食則民之困甚矣愚謂黍以秋成麥以春實合春秋之收而皆為貪殘者所取是以不堪其困託碩鼠而傷悲耳下言苖則并其未成者亦取之甚言重斂之酷也大雅生民篇幪有覆蓋意麻麥盛茂覆滿田畦如帡幪然法言云震風凌雨然後知夏屋之帡幪也詩義亦當取此何元子謂詩以麻麥連言者以此菽麻之利人不及禾麥故言蓻菽即亟繼以禾言藝麻即亟繼以麥愚謂此備舉后稷所藝者如五榖之外尚言瓜瓞總見其無一不善種植無輕重緩急之意按齊民要術注以為麥黃種麻麻黃種麥亦其候相因故連類及之不可以他求耳來牟周頌思文篇傳但訓牟為麥不及來説文云天所來也惟廣雅以大麥為牟小麥為麳愚按方言麥有䴭䴳牟䤓䴹麴諸名别無稱來者則來牟自是一物乃大麥名也大麥宜為飯又可為酢其蘖可為餳皆所以繼禾之不逮者故古以為重今考麥字從來當亦由來牟取義耳或作麳䅘為小麥名並傅會之説來牟劉向封事作釐牟古釐來音通别見釋萊無殊義也但以為自天而來亦美其詞如天命玄鳥之説非真有雨粟事則其字義固不必深考耳觀孟子言牟麥而不言來麥可見麥無單言來者是來之不得為小麥名益信虻虻鄘風載馳篇虻與莔音同字異自傳以詩之虻屬雅之莔後儒皆宗之故陸璣直云虻今藥草貝母其葉如栝樓而細小其子在根下如芋子正白四方連纍相著有分解是也然虻從蟲即蚊虻之虻不當為草名此字義之不可解者今俗或作又作與仍歸草部義亦難通或云根狀如虻故名陸疏葉如栝樓今世所見郭注葉如韭今世不復見此張萱之説也愚按郭璞謂莔形根如小貝圓而白其華葉並似韭非但謂葉其説不知何據然萱謂葉如蕎麥蕎麥赤莖緑葉如烏桕樹葉而陸璣謂似栝樓栝樓引藤蔓葉如甜瓜葉而穿又有細毛此兩説亦正未可一視耳貝母廣雅作貝父愚疑其一根而生多貝如貝之父母然因通為名耳何元子泥此章詩義易貝作背為逺離父母之况穿鑿甚矣且詩並未明言及父母也因虻而推其别名以為説則虻之名不一如空草藥實苦花苦菜商草勤母之類亦將各有取義乎此專取興亦各有行一句蓋陟丘者意在采虻馳驅者心存唁衛故直接云女子善懷亦各有行也傳療疾意本贅説家因其説而甚之乃謂夫人親往山中采療鬱結亦鑿甚矣至有云治目眩不得返顧尤陋夫夫人不過思衛憂心耳何嘗抱目眩項直之病必須此以療之耶緑緑衛風淇澳篇緑齊魯韓三家及禮記詩疏皆作菉惟毛公作緑舊解因以緑為竹之色要之緑竹可通菉竹則不可通矣况小雅采緑亦作緑其為王芻何疑耶水經注云今淇川無復竹惟王芻萹草與昔無異蓋其所親見然也郭璞謂今呼鴟腳莎鄭漁仲以為即藎草按本草稱藎草葉似竹而細薄莖圓小産平澤溪澗之側亦呼淡竹葉即是其物陸璣别以菉竹為一草不知何據羅瑞良引上林賦緑蕙為香草而離騷薋菉又為惡草謂其各有取義愚按緑本非芳草此詩特取其鮮澤茂長有濯磨精進意故以為况豈以芳草而比之耶若上林賦所謂緑蕙對江離留夷蘼蕪言乃一物即楚詞所云樹蕙百畝者冠以緑字非王芻之緑也小雅采緑篇何元子謂菉草澀礪可以為攪洗之用故采而動歸沐之思又感其染色鮮好因而修容也愚按唐本草注藎草荆襄人煮以染黃色極鮮好采之者或當為此且以二章藍證之其皆為染草無疑至澀礪説本陸璣彼以緑竹為一物謂即木賊草故云然今分言之則非矣乃謂因攪洗而思歸沐是誤解也萬時華云手方采緑忽念髮之曲局歸而膏沐其想頭轉動處大可味此是解人語會此則因染修容之説亦覺穿鑿耳詩識名解卷八

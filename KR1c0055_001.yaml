body:
  text: 詩識名解卷一錢塘姚炳撰鳥部鳩雎鳩周南闗雎篇釋鳥首列鳩族王雎其一鳩眼未化識者憎之其為猛摯明矣郭璞以為雕類江東呼為鶚陸璣謂大小如鴟幽州人謂之鷲蓋其屬也其他白鷢之說見禽經蒼鷃之說見風土記鳧類之説見通志鶗鴂之說見詩詁更相擬議要鮮確據至謂鳴戞和順游於水而息於洲常隻不雙又謂至秋化鷹之時能搏擊他禽所謂鷙常居幽澗人亦罕見所謂在河洲皆縁詩釋物吾無取爾矣集傳狀類鳧鷖蓋云詢之淮人然祇狀類而已鄭漁仲直以為鳧屬且云多在水邊尾有一點白故揚雄謂之白鷢反以舊說雕類為誤則真誤也摯與鷙通曲禮前有摯獸則載貔貅是也說文又至也商書大命不摯言受大命者何不來至亦無深至之義鄭氏乃謂王雎之鳥情意至然而有别遂使後儒附㑹謂猛摯之物不足比后妃之淑善於是杜鵑鳧屬紛紜擬議則鄭氏實開之端矣羅瑞良引思𤣥賦雎鳩相和歸田賦交頸頡頏之語以為明是乘居匹遊烏在論其有别且后妃之意方樂得淑女與其君子相與如雎之相為顧豈暇言其别此解最得猶未暢厥㫖也余世父通論云雎鳩有此和聲在於河洲游泳並樂其匹偶不亂之意自可於言外想見傳謂摯而有别夫曰摯猶是食魚有搏擊之象此但釋鳩之性習不必於正意有闗㑹也若云有别則傅㑹矣孟子夫婦有别此二字所從出豈必以夫婦字加於雎鳩上哉詩人體物縱精安能擇一物之有别者以比夫婦烈女傳因云人未嘗見其乘居而匹處夫謂之有别乃不亂羣之謂耳非異處也今云未嘗見其乘居匹處則非所以比夫婦亦大乖闗闗之㫖矣闗闗和聲本釋詁文何元子謂通作引說文云織絹以絲貫杼也蓋象衆鳥飛翔徃來之狀如穿梭形則易字求解矣嚴華谷以郯子五鳩備見詩中分配鑿鑿然雲鳥紀官事屬荒渺難可據信且以類考之亦頗舛錯未足為典要也但釋鳥以鵻冠鳩餘四者又各有鳩名則亦從鳩類備列於後以俟考者召南鵲巢篇傳以此鳩為鳲鳩歐陽正義辨以為拙鳩謂惟今人直呼鳩者不能為巢如舊所傳架枝墮鷇破卵逐雌之事王雪山駁之云詩人偶見鵲有空巢而鳩來居而後人必以為常是譚詩之病也此翻案語已為古今說詩者下一針砭余世父又不謂然通論云王說名為擺脫實成固滯按詩言鵲鳩者以鳥之異類况人之異族也其言巢言居者以鳩之居鵲巢况女之居男室也詩義止此不穿鑿不刻畫方可說詩一切紛紜盡可掃却矣讀之不覺渙然衛風氓篇傳以此鳩為鶻鳩按釋鳥云鶌鳩鶻鵃郭璞以為似山鵲而小短尾青黑色多聲是也至孫炎謂一名鳴鳩舎人謂即今斑鳩陸璣亦謂鶻鳩一名斑鳩似鵓鳩而大項有繍文斑然三說皆非陸農師云鶻鳩似山鵲而小釋鳥鷽山鵲故此一名鶯鳩與郭說合正義云爾雅鳩類非一知此是鶻鳩者以鶻鳩冬始去今秋見之以為喻故知非餘鳩也愚謂沃若黄隕自是顔色盛衰之况不必拘上章秋期為仲秋季秋也况貿絲是孟夏時事桑葚又是孟夏時物俱非秋時所見明矣故謂此鳩為鶻鳩則可謂因秋見而知為鶻鳩則不可鄭氏以為戒鳩非時而食葚者并滯語也葚味最甘鳩喜食則不厭猶私情易溺士女耽樂則不自禁惟其如是是以為戒耳傳謂鳩食葚過則醉而傷其性夫詩苐言無食而已未嘗言無過食也因過食以至醉因醉以至傷性皆是添足鳲鳩曹風鳲鳩篇嚴華谷云舊說鳲鳩凡十一名惟李氏别以為今之鴝鵒愚按鴝鵒似鵙而有幘亦謂之哵哵其非鳲鳩明矣所謂十一名者鳲鳩也鴶鵴也秸鞠也布穀也穫榖也擊穀也戴勝也桑鳩也題肩也擊正也搏黍也若博考之方言梁楚之間謂之結誥羅瑞良謂又呼撥穀又呼郭公又呼鷜則一物而十五名矣然鳲鳩自即布穀所謂鴶鵴秸鞠穫穀擊穀結誥撥穀郭公有音同而字異者亦有字異而義同者固是一物無疑搏黍與黄鳥名同或亦布穀之義至以為題肩擊正謂即鷹化之布穀釋鳥謂之茅鴟者則大謬矣不知彼乃未化布穀之雀鷹所謂隼耳眼雖可憎尚故從其舊而名之耶斑鳩禽經作班鳩註云班次序也凡哺子朝從上下暮從下上故謂之班非項有斑文之謂此蓋因傳養子均平之說起義未可據鵻小雅四牡篇鵻名紛如釋鳥謂之夫不郭璞以為今䳕鳩是也方言有􅟇鷱鵴鳩鳻鳩􅝣鳩䳫鳩䳕鳩鶻鳩鷦鳸諸稱凡八名廣雅則别􅟇鷱專名鳩而以􅝣鳩辟鷱鳩鵴鳩為一物陸璣以為即今小鳩幽州人謂之􅟇鷱梁宋之間謂之鵻陸農師以為一名荆鳩一名楚鳩一名乳鳩嚴華谷以為鵻一鳥十四名内有鵓鳩祝鳩鵾鳩之稱又在諸說外愚謂其中有以音贅者夫與䳕是也有以字贅者䳕與與乳是也有以地贅者荆與楚是也鄭漁仲以為其者指之之詞鳥之短尾者皆謂之佳惟夫不專名焉故指隹為夫不此亦曲解通爾雅中無此行文之法當為衍文闕之若嚴華谷竟以隹其二字為名更無義矣鵻改作隼贅作鵻並屬杜譔字書已辨之其害使人以隼同以鵻同隼張冠李戴名物混淆則皆子雲輩好作奇字之遺孽也廣雅釋隹為鶉按隹者短尾禽總名鶉頭細無尾亦是隹類但謂鶉為隹則可以隹屬鶉則不可說文註云鵻又從隹一或曰鶉字此誤隹為鶉之本矣小雅小宛篇傳以鳴鳩為鶻鵰非陸璣云鶻鳩一名斑鳩陸農師駁之謂鶻鳩短尾青黑色多聲故名鳴鳩斑鳩與此全異璣之言非愚謂璣以斑鳩釋鳴鳩本不誤但不當以鶻鳩為斑鳩耳鳴鳩自是鳲鳩即月令所稱拂羽者許叔重謂鳴鳩奮迅其羽直刺上飛數千丈入雲中此翰飛戾天之證蓋鳲鳩鷹所變化鼓翅摩天固其能事若鶻鳩小物決起而飛搶榆枋時則不至控於地而已矣何以戾天為傳因鶻鳩起義故謂刺幽王行小人之道責髙明之功終不可得要是强解愚疑下有念先人懐二人教誨式穀無忝所生諸語當是亂離思親之詞與鳲鳩亦有闗合鳲鳩性壹而慈有哺子之恩故即以起興耳詩中宛字未嘗專作小訓若宛在水中央宛其死矣之宛不可以小通也如云戾天之鳩奮迅入雲遠不可即望之宛然如可見者較當且詩篇舊名小宛若宛并以小訓之則是篇義作小小矣何元子引考工記惌訓孔小為解亦强證鷹大雅大明篇釋鳥以鷹為鶆鳩郭璞謂鶆為鷞字之誤杜預左傳註云鷞鳩鷹鷙鳥是也又禮月令鷹化為鳩王制鳩化為鷹蓋一物而相變化者故爾雅通以鳩名之今依其義類辨於此夏小正亦云鷹者其殺之時也鳩者非其殺之時也隼小雅采芭篇鷹隼醜見釋鳥文隼當為鷂鷂即鷹之小者故兹從鷹并見鳩類陸璣云齊人謂之擊征或謂之題肩或謂之雀鷹春化為布穀者此屬數種皆為隼是矣韋昭以隼為鶚李善言鷙擊之鳥通呼為隼顔師古謂即今所呼鶻一曰鷸子許叔重解淮南子又以為鵧鷑即今鵶䳎皆未得其實也舊有合引月令列子淮南子艸木疏諸文謂鷹隼鶉鸇鳩鷂布穀晨風諸鳥總順節令以變形故爾雅曰屬曰醜是也但淮南鶉字當是鷂字之訛世無鶉化鸇之理况末云復為鷂必本上鷂來可證戾天爰止專為下試字取興隼有戾天之勇而翔止合其宜軍有三千之衆而練習得其法二語自遞合鄭氏舊分雨義失其㫖矣小雅沔水篇此飛止對上朝宗當從未亂時說若謂喻諸侯驕恣欲朝不朝自由無所懼心便與二章飛揚意複且沔水上何以言歸海下何以言湯湯耶何元子引說文訓率中陵之率為捕鳥畢對下懲字作解愚謂率字之義非必因鳥網而制且其用不過為掩取之具恐戾天之隼未必入其機中耳晨風秦風晨風篇晨風鸇釋鳥文郭璞以為鷂屬陸璣以為似鷂青黄色燕舍鈎喙禽經瞭曰鷂􅱞曰鸇蓋一以目名一以翼名也列子鷂之為鸇鸇之為布穀布穀久復為鷂則其先後變化之序如此者大抵鷹類始生為鷂鷂羽翼長成能嚮風摇翅為鸇月令鷹化為鳩所謂鸇之為布穀也鳩化為鷹所謂布穀久復為鷂也或謂願因晨風發送子以賤軀亦謂風也非晨風為鸇也按李陵詩屏營衢路側執手埜踟躇長當從此别且復立斯須俱是長途把别不能遠隨之語鸇飛急疾故云願因晨風之發發如宋玉言鯤魚朝發之發託賤軀以長隨耳且其屬多出遼海上李陵在匃奴送别之作固是即其所見云然不得謂晨風為朝風也舊引古詩證之云晨風懷苦心蟋蟀傷局促又亮無晨風翼焉能凌風飛又願為晨風鳥雙飛翔北林若非指鸇何以言鳥言翼何以晨風與蟋蟀並稱若晨風為朝風合古詩二句觀之似言風凌風文義難通矣此最鬯論六書故訓鴥為風之迅謂通作􅠞風迅林木披靡故言鬱彼北林若晨風為鸇當言集彼北林不得言鬱自爾雅誤認鴥為鳥飛因以晨風為鸇俗遂制鷐字此强駮也按鴥字詩中凡兩見一為晨風一為隼大抵鷹隼之飛急疾故謂之鴥耳若以鴥為風迅豈飛隼亦風名耶且制字從鳥其為鳥飛明甚不可以風之􅠞通也晨風北林各自為義以晨風迅飛喻賢臣之歸往以北林茂盛喻秦國之多才如下章苞櫟六駮亦自分山隰對言也傳疏皆以二義穿合故於鬱字難通適滋後人擬議耳晨風但取迅飛為歸往之意未嘗以其義為賢臣比也陸農師憑空譔出義字又從義生仁厚譽黄鳥為配更從三良之死造出賢臣之生轉輾支離不可紀極矣黄鳥黄鳥周南葛覃篇黄鳥有搏黍離畱栗畱黄鸎黄鸝諸名愚謂栗離聲之轉也離鸝字之訛也黄鸎取其聲也黄鳥從其色也搏黍因其時也若倉庚商庚鵹黄楚雀恐别一族否則爾雅不應複列如馬陵車前車前芣苢諸條皆連類相釋此何不類舉而釋以黄鳥耶其謂黄鳥即倉庚者以釋鳥文又有倉庚黧黄之語訛黧作鵹遂以倉庚為鵹黄因以鵹黄為黄鳥一誤再誤不可復辨識者審之喈喈說文訓聲衆且和其義止此通論云毛傳加遠聞意以后妃處深宫而聞之然安見深宫鄰於産葛之地耶拈出一笑弼風凱風篇傳釋睍睆為好貌舊皆主容貌言惟集傳以為鳥聲按六書故云睆目圜轉也此集傳圓轉二字所從出但易視為鳴加清和二字未知何據耳何元子謂睍以視言睆以目言乃注視凝眸之貌則從人之視鳥為說猶云瞻彼相彼也杕杜有睆其實大東睆彼牽牛皆可作如此解秦風黄鳥篇按交義共也合也互也友也又交加參錯也今重文曰交交自是往來如織之狀傳訓小於義無取小雅伐木篇嚶嚶不當專指黄鳥之聲按釋訓文丁丁嚶嚶相切直也鄭氏以為兩鳥聲要是鳥鳴通稱羽獵賦亦稱鴻鴈嚶嚶是矣羅瑞良引禽經鸎鳴嚶嚶謂詩即指此又苦無出谷遷喬之騐泥甚小雅黄鳥篇通論云此黄鳥黄雀也非黄鶯鶯不啄粟呼黄鳥與呼碩䑕同一寓言不必實指此物嚴華谷以為民適異國無可告語惟黄鳥飛鳴往來於此故於將去告别之引杜詩埜花送客檣燕畱人之句謂送畱惟花燕亦此詩告别黄鳥之意恐未然小雅緜蠻篇傳釋緜蠻為小鳥貌於義不可解集傳以為鳥聲何元子分釋之謂其聲之微細不絶如緜而鳥語不可與人解又似蠻也然鸎聲圓滑可人故有雙柑斗酒之聽若南蠻鴃舌何足入高人之耳而以是為好音誣所謂愈解則愈鑿不可通矣韓詩章句云緜蠻文貌亦未似又許由箕山歌甘𤓰施兮葉緜蠻則為葉盛之詞合之黄鳥究未有當也鵲鵲召南鵲巢篇鵲大如雅而長尾尖觜黑爪綠背白腹尾翮黑白駮雜舊呼烏鵲實不與烏類羅瑞良以為烏之屬故周禮總謂之烏鳥非也其名亦不一以性惡濕曰乾鵲以知人喜曰靈鵲以色駮雜曰飛駮或稱神女或稱芻尼雜見禽經釋藏諸書月令鵲始巢乃巢成而居之候鄭氏必謂冬至架之至春乃成正義因以始巢為季冬未成之驗恐未然也弼風鶉之奔奔篇韓詩以彊彊為乘匹之貌鄭氏謂居有常匹飛則相隨之貌大都對宣姜與頑言也然其義但可意㑹不可泥字求解陸農師直以剛釋彊補傳云鵲能不淫其匹故以剛言今試以彊彊易作剛剛便難通矣禮表記引詩作姜姜舊註云爭鬭惡貌愚按彊有二音亦分二義釋詁云彊當也註謂好與物相當值也釋言云彊暴也註謂彊梁凌暴也則當義讀若姜暴義讀若彊此作姜姜則義取當不取暴明矣故有溺舊解以為刺暴非刺淫者非也且左氏有明徴矣襄二十七年伯有賦鶉之賁賁趙孟曰牀笫之言不踰閾况在埜乎陳風防有鵲巢篇防傳訓邑集傳以為人所築以捍水者按防與中唐對舉廟中路謂之中唐不必實有所指傳訓為邑陳無邑名防者惟郡國志陳國陳縣註引博物記云卭地在縣北防亭在焉則或為亭上之巢未可知也若築隄捍水皆列柵如堵非槎枒可棲無結巢其上之理且鵲性惡濕必巢枝杪今郊外喬木巔多有之不聞有水小巢畀之事說文云鳥在木上為巢在穴為窠若以隄防穴居則是窠而非巢義更難通矣雀雀召南行露篇陸農師云雀固物之淫者也凡鳥皆雄乘雌鳴此鳥雌乘雄鳴又四時有子故詩以譬强暴愚謂詩但以穿屋為雀憎耳何必言及其淫說詩者多因詩起義而并以誣物大率如此吕氏春秋云季秋候鴈來賓雀入大水為蛤許叔重謂賓雀者老雀也棲宿人家堂宇之間如賓客然古今注亦謂一名嘉賓按禮記通論云賓濱通王莽傳率土之賓可證以其時更寒鴻鴈悉來南而宅於水濵也則雀又恐無賓名附識於此燕燕燕燕弼風燕燕篇鳦鳥本名燕燕不名燕以其雙飛往來遂以雙聲名之若周周蛩蛩猩猩狒狒之類最古之書凡三見而語適合此詩及釋鳥文燕燕鳦與漢書童謡燕燕尾涎涎是也餘書省其文多單言之其後詞章家習用乳燕海燕之類不知單言燕者乃烏名釋鳥云燕白脰烏小爾雅謂之燕烏鑿然可據則舊以燕燕為兩燕及曲為重言之說者皆非也說文訓巂為周燕通雅駁之謂失爾雅句讀引吕氏春秋云肉之美者有巂燕之翠因以巂周為燕之一名或又引周周銜羽之說謂巂者周也燕燕者鳦也三說互異愚按郭璞註子巂鳥出蜀中禽經亦云鸐巂周子規也則巂之為周與為周燕恐皆臆揣不敢傅㑹惟是燕燕之名於斯益信耳差池鄭氏兼言尾翼於一燕義猶未悖陸農師引禽經向宿背飛為說謂兩相差為差池通作遲徐行也則竟作兩燕矣愚謂此當專以尾言燕尾雙岐如剪故云差池耳左傳臭味差池臭與味不可分二物明甚頡說文云直項也頏同亢釋鳥云鳥嚨也又與吭通何元子謂鳥髙飛直上故見其項頸上向是也然則此亦當以孤燕言如戴媯涕泣而長往耳傳據三章下上以釋此章未確後人刻描雙燕之狀便謂一下一上為頡頏尤傅㑹下上作低昂訓以音之輕重疾徐言猶髙下其手之謂不然雄雉一鳥不應亦言下上其音矣傳疏皆實看上下二字必從飛論音泥甚鄭氏獨以為興戴媯將歸言語感激聲有大小此正低昂之㫖也𤣥鳥商頌𤣥鳥篇𤣥鳥生商乃詩人雋語欲求甚解已非何况傅㑹其事諸書紛紛語怪遞相祖述雖識者不免惟傳獨以己意斷之又蔡邕月令章句云𤣥鳥感陽而至其來主為孳乳蕃滋故重至日因以用事與傳意合通論云今人居數千載下豈能逆測古事但依文說經不必先立主見如生民詩文義實似謂履迹而生者不必為之闢異也此詩實無吞卵而生之文不必為之好異也此最為確論𤣥鳥降即𤣥鳥至也月令戴勝降于桑謂之天命可乎舊註云言降者重之若自天來亦飾說雉雉弼風雄雉篇說文謂雉有十四種皆本釋鳥文惟以鷂雉重出不列别分雗雉鵫雉為二以足十四之數又易顱為盧鷮為喬鸐為翟雗為翰鵫為卓鷂為搖鶅為甾鵗為希鷷為蹲頗失其本愚疑顱者雉之總名即下鷂雉鷮雉之類故謂之諸雉其東西南北之名特方言不同非於上諸雉之外别有所指也傳箋援序刺淫之說直拈雄字穿鑿鄭說則更穢矣陸農師云雉死耿介妬壟護疆一界之内要以一雄為長餘者雖衆莫敢鳴雊潘岳所謂畫墳衍以分畿者也愚按此即詩稱雄雉之意雄雉為衆雉之長猶君子為一家之長覩物懷人因以為詠無他義爾泄泄下明有羽字蓋以飛之羽言不專以其飛言猶二章下上乃音之下上非飛之下上也舊解多以泄泄屬飛故無確諦按字書泄泄弛緩貌又散也蓋雉之雄者有冠長尾身多文采刷羽而飛則文采舒散可觀所謂泄泄其羽耳嚴華谷云詩人之言不必盡同燕燕言下上其音謂雙燕相追逐而飛鳴也此言雄雉下上其音則止是一雉之音或下或上也愚謂此正是證低昂之義彼以詩鑿言雄雉不能仍訓一下一上又慮燕燕無以為解乃曲為詩言不必盡同之說此所謂欲蓋彌彰直為前篇立一左劵耳弼風匏有苦葉篇傳以鷕為雌雉聲說文云字從鳥唯趙宧光謂唯者譍聲也雄倡雌龢故從唯存其說舊解皆以飛雌求走牡為喻惟嚴華谷主飛走通之說謂凡鳥鳴皆雄求雌雌不甚鳴今乃雌求其雄為不知羞惡也愚謂嚴說固是而仍未得其解按此詩為刺淫之作首二章俱屬比以淺深之宜喻理濡軌求牡之况言情蓋男女大欲所存如濟盈未有不濡軌者雉鳴未有不求牡者但非理不可以相干故鳴鴈歸妻又由情而制為禮如此也似此文義明順舊解多為牡字拘牽所謂以文害辭耳翟弼風簡兮篇傳以翟為翟羽按釋鳥有鸐山雉之文郭璞以為長尾者此云秉翟蓋持其尾羽而舞也周禮羽舞惟用翟羽取尾長而色備禹貢羽畎夏翟是矣公羊說萬舞以鴻羽韓詩說以夷狄大羽皆不經南齊鄭義奏更以翟為笛謂笛飾以髦籥飾以羽梁武帝云翟是五雉之一取其毳羽以秉之耳寧謂羌笛耶宋元豐三年詳定朝㑹儀注以為今文舞所秉翟羽以雉尾掉髹漆之柄求之古制蓋無所本景祐廣樂記載聶崇義圖羽舞所執類羽葆幢析羽四重以結綬系之於柄請依崇義圖以翟羽為之其說與古義合則知以翟為笛者謬矣衞風碩人篇周禮王后五路翟車在重厭二者之外重厭但以翟羽飾車兩旁非車後戸也按釋器云輿革前謂之鞎後謂之茀竹前謂之禦後謂之蔽則茀是後戸之飾今正義槩言蔽車前後誤矣且茀蔽二者又有革竹之分不當混詩所謂翟茀者當是革車其後戸亦以革飾而畫翟羽之文於革上耳王風兔爰篇正義云言緩則雉為急此曲解傳緩急說耳愚謂文鳥離羅不過無辜受禍之况何得泥爰爰之緩遂以雉為急乎附翬小雅斯干篇說文云翬大飛也此翬飛猶釋鳥其飛也翬之意非翬雉也詩取象在飛不在采色且雉飛不過尋丈不可以擬騫舉之勢鄭氏訛據素質五采文以為奇異之鳥陋矣陸農師又謂翬雉從翬而不悟此詩之翬非雉意以矢棘鳥革皆指物言之則首句如跂斯翼跂又當指為何物耶小雅小弁篇鄭氏但訓雊為雉鳴正義誤引說文謂雊為雄雉鳴取配衞風之鷕截分雌雄恐未然按雊者勾頸而鳴之謂羅瑞良謂鴝鵒以足相勾雉以頸相勾故皆從勾商書雉勾鼎耳不特鳴而已是也勾非一雉則雊亦非一聲是說文雄雌鳴之義孔氏譌雌作雉誣矣詩中求雌之喻亦為幽王黜申后云然非真以雊為雄求雌聲也且鷕雊二者古亦並用之潘岳射雉賦云麥漸漸以擢芒雉鷕鷕而朝雊夏小正雉震呴註云震晨之譌也蓋取雉求雌而雊以朝之義按說文雷始動雉鳴而勾其頸則震乃雷震耳必牽合朝雊易字求解誤矣又月令章句云雷在地中雉性精剛知之應而鳴是也鷮小雅間關篇郭璞以鷮雉為鷮雞鄭漁仲以鷂雉為鷮雉愚按上有秩秩海雉鸐山雉之文明以此名釋彼名璞分鷂鷮為二而漁仲合之當非無據但山海經謂女几之山多白鷮則又與青質五采之鷂異矣要以尾長走鳴為驗可耳陸璣云鷮微小於翟走而且鳴曰鷮鷮其尾長是也說文謂鷮長尾雉走鳴乘輿尾為防釳著馬頭上按張衡東京賦方釳左纛李善註云五寸鐡中央低兩頭髙如山形翟尾結著轅兩邊防馬相突也則尾又是翟非鷮抑如陸璣所云微小於翟者故亦謂之翟與正義云此鷮是雉中之别名以雉有耿介之性與碩女有貞專之德詩義止此陸農師取翬衣揄翟鷩冕為說謂鷮又下鷩一等故詩用以况衆妾亦鑿甚矣雁雁弼風匏有苦葉篇雁有翁雞鶉䳸三名李巡謂埜曰雁家曰鵞而方言謂自闗而西謂之􅕯鵞南楚之外謂之鵞或謂之鶬􅕯羅瑞良以為鵞兼有雁名雁又假鵞以為名愚按二物形相似蓋相易為别名者釋鳥舒雁鵞是鵞有雁名也若方言廣雅諸書以鵞呼雁是雁又有鵞名矣但舊說埜鵞大於雁似人家蒼鵞謂之駕鵞亦曰􅕯鵞則駕鵞似又非雁族然今人直謂雁鵞耳法言云能來能往者朱鳥之謂張揖以為𤣥鳥朱鳥皆燕也陸農師則謂燕一名𤣥鳥雁一名朱鳥今按二鳥並有往來之義然𤣥乃燕色朱於二鳥皆無取或云雁以陽鳥名故曰朱朱者陽色也禹貢陽鳥自以隨陽之義而名但昏禮所取不當在此鄭氏以為似婦人從夫鑿矣本艸唐註云雁得中和之氣熱則即北寒則即南以就和氣所以為禮幣者一取其信一取其和其說似當親迎非昕時不當言旭旦則此詩之雁自為親迎以前時用但昏禮云下達納采用雁執雁請問名納吉用雁請期用雁此章為淫者陳其正禮固當通指鄭氏專以為請期之用不免執一耳鄭風女曰雞鳴篇古無以雁為饌惟内則有雁宜麥及雁腎之文舊皆謂人君燕食之物要非常用者且古以雁為贄及六禮之備皆生致之此言弋言宜以供飲燕當是田舍夫婦景况不宜如正義拘大夫食禮為說也小雅鴻雁篇傳解肅肅為羽聲嚴華谷引小星傳以為疾貌則此亦為羽聲之疾何元子云肅者矜持振肅之義鳥之振羽其形肅然故曰肅肅愚謂雁飛行列不亂有整肅之儀故謂之肅肅唐風肅肅鴇行鴇亦有行列如雁也首章以雁之行列整齊興民之劬勞離散次章以雁之棲止得所興民之還定安居二義各有所取故或以春北秋南專喻民不安居又或專以為避危就安喻者皆執一之論也易以鴻漸于木為失所書以陽鳥攸居為得所要之得所亦非易事此詩于垣作堵全從勞處得安陸農師云雁夜泊洲渚令雁奴圍而警察有遠害之道此正其集中澤之劬勞也鴻弼風新臺篇陸璣云鴻鵠羽毛光澤純白似鶴而大長頸肉美如雁又有小鴻大小如鳬色亦白愚謂此亦雁之一種詩註别大為鴻小為雁淮南鴻烈别仲秋來者為鴻雁季秋來者為候雁說文謂鴻雁從北漢中來過周雒南去至彭蠡候雁從北漢中來南之彭蠡八月來者其父母九月來者其子合諸說觀要是一族又杜詩云故國霜前白雁來白雁者鴻也舊以魚比伋鴻比宣公為所得非所求之喻愚謂上二章皆有燕婉籧除語則設網離鴻取譬當不在此蓋宣公作新臺而邀齊女猶漁人設魚網而羅鴻鵠反常背理之喻也豳風九罭篇鴻乃水鳥洲渚固其樓所傳謂鴻不宜棲渚喻公宜在朝廷而乃留滯東上者非也易鴻漸于陸有夫征不復之象二章疑亦取不復之義非謂不得其安也何元子謂遵渚者自北而南之時况公之避京師而居東遵陸者自南歸北之時况公之自東而歸不復來東亦鑿玩一歸字可知專取北鄉耳烏烏弼風北風篇烏似烏鴉而小多羣飛作啞啞聲淮南子云烏之啞啞是也有哺子之慈故廣雅謂之慈烏又有反哺之孝故說文謂之孝烏與凡烏迥别詩凡單言烏者皆屬此小爾雅云去隂就陽者謂之陽烏鳩雁是也純黑而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而羣飛者謂之燕烏白脰烏也按此足盡烏類然惟純黑而反哺者專有烏名林罕謂烏字全象鳥形但不注其目睛萬類目睛皆黑烏體全黑遠而不分别其睛是也今玩北風語意當指純黑者言若白腹白脰緇素斑然安得云莫黑匪烏耶慈烏反哺白脰不祥二者災祥異類必以此詩所言烏為不祥之物作危亂徴不能不為慈且孝者負屈也古語云愛人者兼愛其屋上之烏惟慈且孝故足愛耳若槩以為不祥之物思援弓繳之不暇而暇愛之乎小雅正月篇無祿猶云不幸與左傳無祿獻公即世義同疏謂得祿者福慶之事故謂福佑為祿雖民無福亦謂無祿是矣傳因卒章傅會作富人之屋正義乃謂烏求食陸農師因以為趨利總為祿字寫照夫烏非惡鳥何經說詩者之口動極醜詆如是不知詩但謂刑法之嚴如此我民從何而得生猶彼網羅之密如此飛烏何處而安止耳豈有他義耶誰知雌雄亦必以純黑者言惟其全體皆黑雖目睛不辨何况首尾毛色之間釋鳥云鳥之雌雄不可别者以翼右掩左雄左掩右雌殆亦為此類設者此詩前後二烏絶不相蒙前烏比無祿之民後烏喻予聖之君陸農師謂詩人每引烏以刺者為其初皆利合不以道匪特誣烏其誣詩甚矣夫詩人衝口吟咏不拘一轍如天保前頌岡陵後復以南山為祝各有取義不相關涉說詩者何自固乃爾耶鸒斯小雅小弁篇鸒斯即鴉烏有鵯鶋鵯烏壁屋賈烏諸名此烏自名鸒斯不名鸒以釋鳥已有明文也正義謂斯為語詞取蕭斯栁斯為證似矣然他書未有稱蕭栁為蕭斯栁斯者惟鸒斯數見别本自釋鳥文外若禽經法言類苑小爾雅注皆有斯字則此斯當非語助之比故或加鳥作􅠿六書綂收正韻傳多遵爾雅立說舊本疑皆有斯字非衍孔氏專以定本為據余未敢信鸒斯專有鴉名以其亦是烏類故謂之鴉烏非名為烏者即是鴉也如北風舊解直指烏為烏鴉誤矣烏鴉性貪鷙善避矰繳見異則噪古有鴉經以占吉凶即此然昔人專以白脰者為不祥則鸒斯恐猶不受不祥之名耳樂府朱鷺魚以烏統言烏也昌黎元和聖德詩魚魚雅雅舉烏之一也以叶上妥下墮韻故易字成文耳弇州巵言乃謂烏轉為鴉鴉轉為雅恐未然傳訓弁為樂集傳以為飛拊翼貌或云通作般謂般旋也俱未確按禮玉藻弁行剡剡起屨孔氏以弁為急是也詩意當與此同蓋歸飛爭宿有急疾意杜詩昏鴉噪晚林情景可見提提不徒取羣義蓋衆鴉歸棲先後翔集若同體而追隨者有提挈提擕之狀便覺隠隠闗情或訓提為舉謂羣飛髙舉之貌髙舉則不似歸飛光景矣即鸒斯之羣飛見追隨聚首為可幸嚴華谷謂烏鴉不能反哺猶已之不能致養是為不孝自罪之詞詩意似未及此詩識名解卷一

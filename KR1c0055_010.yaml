body:
  text: 詩識名解卷十錢塘姚炳撰草部麻麻王風丘中篇麻一名枲羅瑞良謂有實者名苴而無實者名枲非也枲蓋有實無實者之通名其為物衣食兼資然衣之用多而食之用少蓋古人藝麻本為績計至采子其餘事耳素問以麻麥稷黍豆為五穀彼所指乃油麻非大麻也如月令食麻嘗麻嘗則有之若三秋專食恐無是事耳釋草但有麻枲無胡麻名可知胡麻從大宛得來漢武以前無此種至廣雅始謂胡麻别名藤𢎞其非詩中所有明矣陶隱居以詩黍稷稻粱禾麻菽麥為八穀而引董仲書云禾是粟苖麻是胡麻蓋其誤也齊風南山篇齊民要術云種麻得良田耕不厭熟從橫七通以上則麻生無葉蓋古法如此愚謂衡從乃反覆熟治之謂不必定是南北為衡東西為縱也蓋麻生於畝必熟治其畝而後可蓻取妻之命由於父母必告父母而後可取猶四章斧媒之相喻無深意耳陳風東門之枌篇此不績麻而婆娑者即上子仲之子也嚴華谷謂如桑中溱洧諸詩亦是述淫者之言以為刺不績其麻正是誚責之詞非相樂之詞最為得解若婆娑者自知荒績麻之業而情見乎詞則子仲之子不淫矣箋云鬷總也於是以總行欲男女合行是也若以鬷為麻縷之數則上云不績其麻已明棄其所有事矣乃復挾持其總而行何哉且婆娑者舞也將挾其麻總而舞乎抑至其市棄其麻總而舞乎此又不可通矣説文訓鬷為釜屬按舊説烈祖鬷假無言即雍人陳鼎事凡祭必先雍人陳鼎以為烹牲體之用自鼎初至時即能秉其肅敬靡有譁爭是亦以鬷為釜也愚疑此時男女棄其舊業作旬日之遊各持㸑具以往不顧家室以是見其荒淫之甚亦通陳風東門之池篇池喻姬漚麻喻晤歌取兩可為興耳若謂柔麻績緝為衣喻柔順君子以成其德則鑿矣至何元子以為古人貴麻與絲並言詩以麻比靈公而紵與菅則孔儀二人之況尤鑿甚曹風蜉蝣篇古吉凶皆用麻惟以升數為别上言楚楚采采此自當為吉服鄭氏以為深衣諸侯之夕服是也麻本是白不必待鍛濯灰治傳云如雪言鮮潔不取白義甚當蜉蝣微物而盛羽翼昭公小國而侈服飾此引喻本意非有取於朝生暮死也何元子以為服深衣則薄暮之時蜉蝣之生亦不久其説甚稚豳風七月篇正義以績染對言最為得解蓋絲畢而麻績畢而染遞言其勞如此也周官染人秋染夏舊謂於時天朗氣清五色皆可染詩繫之八月之下以此故與正義云禾是大名稻秫蓏粱之輩皆云為禾若麻與菽麥則無禾稱故於麻麥之上更言禾字以總諸禾也此説是若左傳夏率師取溫之麥秋又取成周之禾則麥已無禾名麻更不必言矣苴豳風七月篇麻子名苴亦名蕡一作説文又謂之萉或以蕡為牡麻之華非也傳訓叔為拾寫官記云收也叔之為收雙聲之轉也紵陳風東門之池篇説文謂檾屬細者為絟粗者為紵陸璣云紵亦麻也科生數十莖宿根在地中至春自生不嵗種今南越紵布皆用此麻愚按紵同苧説文苧草為繩即此今俗呼為苧麻蓋亦麻屬之别種也附説文檾引詩衣錦檾衣或作檾又作苘又云褧檾也古作顈字書苘或作莔凡六字為一物今按褧通為禪此本鄭氏今皆從之又何元子引親迎之禮壻御婦車授綏姆為加景衣乃驅景衣即褧衣也而説文同作檾字似覺不倫且其詞云衣錦褧衣是謂著錦與麻之衣語尤有礙更不似中庸尚絅之説猶可通也因麻屬并附論於此舜舜鄭風有女同車篇釋草無舜名陸璣以木槿當之故謂一名櫬一名椵今從其説别有王蒸朝菌日及諸名今南方用以植籬名籓籬草亦謂之洽容又謂之愛老而楊用修謂重臺者永昌號花上花未知即其物否樊光謂花朝生暮落與草同氣故在草中存之説文謂舜草秦謂之葍楚謂之蔓此别是一草非詩之舜華也而釋草所謂葍蔓茅者又無舜名字書或訛作蕣又誤同並謬舜華但比顔色無朝生暮隕之刺陸農師謂舜取瞬義言其不可與久鑿矣羅瑞良謂舜華枝葉相當有同車之象且太子忽當有功於齊之時而不取則若日及之不可待又鑿之甚者也或謂舜並蒂之華彼以諸侯娶諸侯之女取華色相稱亦是強解且舜華豈必盡並蒂者耶舊解有女彼美皆指齊女言嚴華谷分同車為忽所取者孟薑為忽所不取者於義亦似然愚謂上云有女者虛想其容貌也下云彼美者實稱其氏族也通首皆愛慕稱羡之詞更無刺意仍從舊説為允荷荷鄭風山有扶蘇篇按釋草文荷為莖葉華實根的之總名芙蕖其别名也更有水芝澤芝水花諸稱郭璞專謂江東呼荷北方人便以藕為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤然耳但荷之為荷名義無考陸農師本字説取不知為問謂備加連遐密之衆義則可以何物可以為夫可以為渠故曰荷芙蕖皆不成語傳主髙下大小得宜為説箋主美惡上下失所為説今以詞旨按之荷固名華扶蘇亦非小木則以兩有為興者近是陳風澤陂篇鄭氏解此詩謂芙渠之莖曰荷彼意以二章蕳為蓮言其實三章菡蓞言其華因以荷為莖分三義曲就其説耳樊光注爾雅引詩有蒲與茄亦本鄭氏改文舊本未聞有作茄者也此亦以所有興所有并不必云取華之美以喻女色也舊謂女之形體佼大如荷或又云荷善傾倚言其質之柔皆鑿説菡蓞陳風澤陂篇菡蓞乃荷花之蕊説文謂未發為菡蓞已發為芙蓉是也或云通謂草木華未發者陳風菡蓞非荷乃蒲之初生此大謬語釋草文其華菡蓞明專謂荷其餘有隨文通用者如陸璣白雲賦紅蕊發而菡蓞杜甫享太廟賦雲菡蓞以張蓋張説華山銘菡蓞森爽要是借義形容耳茹藘茹藘鄭風東門之墠篇茹藘葉似棘頭尖下濶莖葉俱澀四五葉對生節間蔓延草木上根紫赤色釋草謂之茅搜陸璣云一名地血齊人謂之蒨徐州人謂之牛蔓是也以其能染絳色類血如地之血故名説文乃謂人血所生舊因以為搜從草從鬼以此亦誕甚矣漢書千石巵茜彼自有滋種故陸璣謂今圃人作畦種蒔之安得盡因人血耶陸農師又云茜草所産處東少西多故文西草為茜並鑿説也東門外有墠墠邊有坂茅搜生焉而繼之云其室則邇明是所居在阪之上故以茹藘為表而心識之也鄭氏乃謂茹藘為難又易越而出則非解矣觀室邇人逺子不我即二語有想慕不得近意與漢廣遊女相似不當以奔為説劉公瑾云自昔説鄭詩者惟以東門之墠與溱洧為淫詩吾猶未敢信羅瑞良謂茹藘女所以染今方在門則衣服未備蓋因後章縞衣茹藘之語設想耳要於此詩絶不相蒙也易林引詩作茹廬説家或解為菜廬不作草名并存考鄭風出其東門篇此與縞衣皆為女服傳分男女非是鄭氏謂即所以染巾者亦泥上既云綦此又為絳貧家婦未必具備如此當時薄繒之衣染赤色耳陸農師因傳以如荼之白為喪服故謂縞衣言服而非麻茹藘言色而非素明得吉服以相保不知荼自取繁衆意與如雲例言非喪服之説也紅紫婦人女子之常服豈必專取吉哉此詩疑即東門之墠之男子思得其女而作者以其雖不我即而我必欲求故謂如雲如荼皆不足欲而惟思得此女以為娛樂耳又其詩曰東門曰茹藘詞旨適合并論於此蕳蕳鄭風溱洧篇蕳之為蘭俗名省頭草亦名木香羅瑞良謂即都梁香荆州記都梁縣山下所生蘭草因山為號是也夏小正五月畜蘭為沐浴禮內則婦或賜之茝蘭皆指此非澤蘭也澤蘭祗可入藥餘無所用陸璣以為似澤蘭廣而長節節中赤髙四五尺正是其物而吕東萊獨謂即今山蘭且云陸璣指為他物蓋泥毛公香草之言必欲求香於柯葉置其花而不論耳愚按今山蘭乃家語所稱芝蘭生林谷不産水澤詩以溱洧所有為言明是水香非林谷産觀陳風澤陂蒲蕳並詠可見楚詞惟蘭蕙之蘭以芝蘭言餘椒蘭亦是蘭草故與揭車江離並列要之惟蘭草有蕳名芝蘭無蕳名也韓詩外傳注以蕳為蓮謂即華蘋俗呼並頭蓮者又或通作菅王氏詩考異字異義皆易為菅此康成一輩祓除事見漢書禮儀志蓋古俗有之然周禮女巫亦未嘗明言以何物釁浴禮內則男女皆佩容臭亦不必定為釁浴用也鄭氏謂今三月上已水上之類以香藥薰草沐浴其用蕳可知所謂想當然耳非有實證愚意此苐為尋春行遊採花樂事所謂國香媚人托此結歡者不然則勺藥之贈亦將用以釁浴乎通論云秉者身秉之不必定是手執也且手中既秉蘭又秉勺以贈亦稠疊不合矣愚按左傳稱服媚楚詞言紉佩正此詩秉字之義其不以手而以身槩可知耳陳風澤陂篇鄭氏謂此詩之蕳當作蓮以上下皆言蒲荷則此章不宜别據他草不知文以錯綜為妙變荷言蕳此正按目思生衝口句就必易三章為一草如泥木偶全無靈趣詩境索然矣正義不悟蕳為水香乃謂陸草非澤中物故宜鄭氏易之則亦誤也勺藥勺藥鄭風溱洧篇此即今藥草勺藥無二種陸璣孔頴逹皆泥傳香草之説以為藥草無香氣未審今何草則羅瑞良所謂醫方但用其根而不識其華者也廣雅一名攣夷本草一名白木一名餘容一名犂食一名解倉一名鋋一名黑牽一名沒骨花春生紅芽作叢莖上三枝五葉髙一二尺夏開花有紅白紫數種秋時採根根亦有赤白二色但其華不甚載文字故傳惟以香草釋之而先儒欲於柯葉間求香過矣通論云勺藥即今牡丹古惟名勺藥自唐玄宗始得木勺藥於宫中因呼牡丹又名以藥者其根古藥中用此甚廣故獨擅藥名即所謂白勺也漢人醫方有白勺無牡丹皮其丹皮亦後醫方始見之又鄭即今河南地今河南牡丹甚多蓋古時已然故詩人咏及焉愚按牡丹之名經傳不載永叔記謂自唐則天以後始盛於洛陽蓋前此鮮有稱之者惟張揖釋攣夷為勺藥而以白􅙥為牡丹分為二則魏時又先有其名存俟考者鄭氏謂士送女以勺藥結恩情此因上維士與女文言但云相謔則明是相贈不必拘也宋熙寧時始尚經術説詩者競為穿鑿謂此為淫佚之會必求其為士贈女乎女贈士乎劉貢父善滑稽嘗云勺藥能行血破胎氣此蓋士贈女也若視爾如荍貽我握椒則女之贈士也本草云椒性溫明目暖水臟故耳聞者絶倒勺藥之名離草出韓詩外傳然董子所謂將離贈勺藥相招贈文無乃詞章雋語非可為據鄭士女相謔以此為贈猶木瓜桃李託物將忱耳羅瑞良泥可離之名解為使去之喻情景便覺索然且何知不贈於相謔之時而必云贈於相謔之後耶莠莠齊風甫田篇説文云禾粟下生莠羅瑞良以為先儒不適言何物惟韋昭解魯論云莠草似稷無實又韋曜問答甫田維莠今何草答云今之狗尾也然後此物方顯然今字書又謂狗尾非莠莠似稷而無實狗尾似粟而小穗兩者互異識者辨之驕驕嚴華谷解謂人力不足芟夷不及見其蔓延長茂如有驕縱之狀是也桀則桀然挺立之義何元子謂宜通作傑不必又作桀傲訓小雅正月篇傳訓莠言為醜言舊解云莠惡也穀謂之善則莠惡可知取義較確莫莫魏風汾沮洳篇陸璣云莫莖大如箸赤節三葉似栁葉厚而長有毛刺今人繅以取繭緒其味酢而滑始生可以為羮又可生食五方通謂之酸迷冀州人謂之乾絳河汾之間謂之莫陸農師云其子如楮實而紅乾絳之名以此今吳越之俗呼為茂子是也愚按茂子一作莓子蘇子瞻嘗謂劉貢父戲呼黎錞為黎􅰧子一日聞市有唱是果粥之者吾謫海南居有此霜實纍纍髙數尺有刺開花落瓣則為子九月間紅熟可生采食之皆呼夢子其實即􅰧子也蓋其名以訛相傳不同如此陸農師因疏有繅以取繭之説又與采桑相配遂附會侵繅侵蠶以實序中儉勤之説穿鑿甚矣正義云采莫之事賤官尚不為之君何故親采莫乎以采莫屬君此陸氏侵繅之説所自來也藚藚魏風汾沮洳篇藚釋草訓牛脣傳訓水蕮陸璣直以為今澤蕮其葉如車前草大其味亦相似郭璞謂形如續斷寸寸有節拔之可復續鄭漁仲又謂狀如麻黃亦謂之續斷其節拔可復續諸説舛錯不一愚按藚無水蕮名其名蕮者乃釋草所謂蕍即澤瀉也陸璣以水澤同義遂因毛傳而誤為澤蕮鄭漁仲以拔續同形又因郭注而誤為續斷要之藚與澤瀉續斷三者各自為種不相混耳以類度之釋草謂牛脣今一種草生水中澤傍大葉長尺形似澤瀉又似車前謂之牛舌菜疑即是此舊謂采藚所以治疾愚按藚無論其是藥非藥即果為澤瀉之類國君何事而采之將自治其疾乎抑治人之疾乎且采莫云侵繅采桑云侵蠶則此采藚必為侵醫矣論至此直堪撫掌稻稻唐風鴇羽篇釋草訓稌為稻字林云糯粘稻也粳稻不粘者然則稻者粳糯之總名稌則稻之别名也説文以稌稻為糯名鄭氏周禮注又以稻為粳名本草分粳米稻米為名皆誤羅瑞良以為詩書之文自依所用而解如論語食夫稻則稻是粳月令秫稻必齊則稻是糯歷歷援據其説逹矣秈亦粳稻之一廣雅釋秈為粳蓋從其類今俗號秈為早稻粳為晚稻是矣又浙東有一種稻自播種至收穫裁兩易月土人謂之六十日秈疑即羅瑞良所謂占城種也豳風七月篇穫與釀是兩事食以穀為主未有養老具果酒菜茹而不具粢食者穫稻所以為粢食也與上鬱薁五者例言酒又因稻而類及之者自鄭氏專以穫稻為釀酒之需故本草謂糯為稻而别出粳則説詩者之不善耳矣月令章句云十月穫稻人君嘗其先熟故在季秋九月熟者謂之半夏稻愚謂此得氣先後之故無二種今晚稻大率以季秋成熟詩言十月者約其收穫之期也或云豳土地寒十月乃穫魯頌閟宫篇此從上有國來堯封稷於邰使之專掌教稼之事故得因地土之所宜而降種於民所謂揚州荆州其穀宜稻則俾民以稻使稼穡於其土故云奄有下土也不然楚茨諸詩何以專言黍稷而稻不概見與稌周頌豐年篇黍稌皆所以享神曲禮宗廟之祭稻曰嘉蔬是也蔡元度謂黍所以交神稌所以養人非是按此章詩義首三句祇誇豐年收穫之多下酒醴亦是從黍稌中帶出非必以黍稌之多專為酒醴用也粱粱唐風鴇羽篇粱有青黃白三種青粱穀穗有毛粒青米亦微青而細於黃白米黃粱穗大毛長殼米俱粗於白梁號竹根黃香味逾於他種白粱穗亦大毛多而長殼粗扁長不似粟圓米亦白而大其香美亞於黃粱羅瑞良以為古無粟名蓋以粱統粟今人以穀之最細而圓者為粟則粱是其類愚謂古以粟為黍稷粱秫之總稱今世惟以粱為粟北人謂之小米者是矣李時珍謂穗大毛長粒粗為粱穗小毛短粒細為粟要之皆是粱耳唐孟詵本草言人不識粟大抵黏者為秫不黏者為粟因呼粱為秈粟不知粱自有粳糯之别不得以秫名亦不得以秈名也羅瑞良謂粱性微寒其聲為粱蓋亦借涼音此謬語物性亦有大涼而不聞以涼稱者粱性甘平頗得中氣何獨以涼得名耶至引許叔重説黍大暑而種黍從暑粱從涼其義為一則傅會之尤者也蔡元度謂豐年言養人之物而不言粱者蓋稌加膳於粱則為常膳愚謂古者食以粱為重曲禮粱曰薌萁宗廟之祭用之又大夫無故不食粱古天子之飯有白粱黃粱所謂膏粱之味食之最美者也豐年舉黍稌以例其餘豈有加膳常膳之别存乎其間耶穈大雅生民篇釋草云虋赤苖按穈虋字同然但謂之赤苖不言何物舊注皆以為粱屬惟羅瑞良沈存中謂即丹黍存中又以為稷之赤者鄭剛中云岐山之陽種􅔋俗穈字尤盛米類稷可麵可餅西人飽麵非􅔋猶飢據此則當是稷屬今從舊注附論粱後季明德謂黍為總名分言之則穈芑為粱粱似粟而大即今膏粱也愚按穈芑以釋草無明文故黍粱之屬任人作解至粱與黍種異性殊判不容混而謂黍中之穈芑為粱則粱是黍之一種矣不亦誤乎芑大雅生民篇釋草但訓芑為白苖亦無明文從郭璞舊注則謂即今白粱粟所謂穗大毛多而長殼粗扁長不似粟圓者未知是否傳訓恆為遍舊本多作亘字嚴華谷云亘義通也遍也竟也今傳訓遍則本作亘者愚謂詩明作恆不當易亘為訓此疑與月恆之恆同恆月弦也凡引之弦直者皆曰恆楚詞恆瑟是矣蓋田畦一畝三􅎌謂播種竟畝若一如弦之直皆是嘉種是也或謂字同縆大索也言以大索捆載而歸故繼之云是任是負以歸肇祀此又一説小雅采芑篇此芑傳但訓菜陸璣謂似苦菜莖青白色摘其葉白汁出肥可生食亦可蒸為茹青州人謂之芑西河鴈門芑尤美胡人戀之不出塞集傳則以為即今苦蕒菜宜馬食愚按芑菜於釋草無所見後之説者一云似苦一云即苦兩説亦未合惟嚴華谷力主嘉穀之説於新田災畝中鄉較當舊疑既謂之采則不宜謂之穀何元子引桑中詩辨之謂麥可言采何芑不可言采亦確今從之列論穈芑後或引顔氏家訓謂江南别有苦菜葉似酸漿即爾雅所謂蘵黃除也今河北謂之龍葵梁世講禮者以此當苦菜據云此菜可以釋勞宜乎人馬皆食或青州鴈門以為芑江南無其名耳然按釋草黃除别是一種鄭漁仲謂俗呼竹茶葉似蒟醬無芑名并無苦菜名未敢援據臆斷也舊解皆以采芑作引喻取義太深於詞旨未合愚謂新田災畝中鄉瘠沃不一土而皆有嘉穀之采喻其車三千士卒不一人而皆有佐師扞敵之用大意止此無他義也中鄉不必定為美地蓋三千之衆非一處之人猶之嘉穀之種非一處之地所以采之者於彼而又於此耳大雅文王有聲篇傳於此芑又訓草未知何指正義仍作芑菜嚴華谷則主嘉穀之説似於詒孫燕子義較合今從之山海經東始之山有木狀如楊赤理汁如血不實名曰芑又本草地黃亦名芑然芑木於他書不槩見地黃釋草但有芐名無芑名詩所詠亦不應指此若芑為地黃傳何不直云地黃而但云草乎豐芑引喻通章蓋謂豐水地靈至今猶有嘉穀之貽豈武王神聖反無所以貽子孫者思文之詩云詒我來牟即豐水有芑之謂也有駜之詩云君子有穀貽孫子即武王以貽燕為事之謂也審此則芑之為嘉穀可斷矣蘞蘞唐風葛生篇蘞於釋草無所見惟有萰兔荄之文郭璞云未詳而本草蘞有兔核之名取象其形又萰蘞音近或即是此未敢妄據也説文謂即白蘞陸璣云蘞似栝樓葉盛而細其子正黑如燕薁不可食幽人謂之烏服又蘇頌謂其蔓生莖端五葉花青白色俗呼五葉莓葉五稏子黑一名烏蘞草即烏蘞莓二月生苖多在林中作蔓蜀本注謂或生人家籬落俗呼籠草此可得其大概矣按詩詞蔓草凄涼枕衾虛設及百嵗歸居歸室諸語疑為悼夫之作何元子云以次章于域推之域為塋域乃此婦之夫所葬之地地在野中故先言于野此二句寫出冢上荒涼之景宛然在目次章變野言域知是賦其所見詩翼云讀此恍然荒冢纍纍祭掃悲哀之狀存其説蒹蒹秦風蒹葭篇釋草訓蒹為薕郭璞謂似􅍉而細高數尺江東呼為薕陸璣云蒹草堅實牛食之令牛肥強青徐州人謂之蒹兖州遼東通語也按此則蒹惟有薕名後人多誤菼薍為蒹故陸農師以為萑之未秀者今人用作簾箔因名薕嚴華谷以為蒹薕荻一物三名鄭漁仲以為荻即蘆屬之小者何元子以為蒹自小至大有七名菼薍隼蒹薕荻􅍉也並謬觀郭璞但云似􅍉則其非􅍉可斷矣傳謂淒淒猶蒼蒼義混陸農師易之以為其色淒而未蒼亦未是淒不可以色言也嚴華谷云本亦作萋尤非淒不與萋通説文淒雲雨起貌愚謂文從水有沾濡寒涼意鄭風風雨淒淒義同此與白露未晞文連蓋露零未乾之貌耳作萋者乃石經及豐昉偽本不足據荍荍陳風東門之枌篇釋草訓荍為蚍􅗶無葵名郭璞謂即荆葵鄭漁仲謂即蜀葵陸璣亦謂荍一名荆葵崔豹又謂荆葵一名戎葵羅瑞良以為荆葵蓋戎葵之類比戎葵葉小一名錦葵愚按釋草别有菺戎葵之名戎葵乃蜀葵也荆蜀之分蓋各從其地以為名而華之小大亦異崔豹混荆葵為戎葵而漁仲遂以荍為蜀葵皆未是今别見於此或疑蚍􅗶字何以從蟲一説紫荆花生幹上連接甚密如蟣窠故名俗一名火蟣猶茢薽之名豕首綬草之名旨鷊也愚按以荍為紫荆此濮氏説以其亦有荆稱又不列葵名於釋草文頗似存俟考者舊説皆以芘芣之華比女色玩如荍貽椒二語屬對工妙蓋一言其色美一言其臭芳總是愛慕形容之意或乃以如荍比觀者謂同時湊集而觀子仲婆娑其人亦如芘芣開華之盛於詞意反覺索然矣龍龍鄭風山有扶蘇篇釋草訓紅為蘢傳亦以龍為紅草惟廣雅云葒蘢馬蓼也陸璣亦謂遊龍一名馬蓼葉粗大而赤白色生水澤中髙丈餘愚按本草謂龍一名鴻如馬蓼而大陶隱居謂馬蓼生下濕地莖斑葉大有黑點最大者是葒草即水紅也下溼地皆有之則龍又非馬蓼大抵與蓼相似而葉較大故今水紅俗猶呼紅蓼可證兹别見於此或引管子五位云其山之淺有龍與卉則是龍生上土不若諸蓼之下溼皆有此非也水紅生水涯乃最下溼處又詩明言隰有與荷花並舉可見若管子所云乃是山木如桑松把茸詎可牽合作水草耶遊以水言紅草生水中隨風蕩漾若泳遊然故謂之遊龍緯書地有四遊遊訓動與此義正相似鄭氏放縱之説未合至淮南逆溯浮草所自必是從其始生微者言之豈有紅蘢之大而生萍蔈細物者耶羅瑞良以屈龍為遊龍未可據也水草皆柔弱附著水面不可以為陸草之比嚴華谷引李德裕正人如松柏邪人如藤蘿之説欲以水草之柔者並山木之挺者不知輿金片羽相懸萬萬胡可同日語耶要之山隰各有其美不當軒輊以為美惡之喻也詩識名解卷十一

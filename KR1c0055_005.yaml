body:
  text: 詩識名解卷五錢塘姚炳撰獸部鼠鼠召南行露篇鼠具尾足如獸其屬若鼬鼠鼫鼠皆出沒山林與猿兔同類説文以為穴蟲者猶倮毛羽介之説蓋生物通稱也爾雅諸書並列獸部陸農師誤讀説文别出附蟲族於義未當今正之按釋獸文鼠屬凡十有三種廣雅增至二十餘兹不贅列取其見於詩者著之篇説文訓牙為牡齒徐鍇以為比於齒為牡蓋齒之最堅者也然凡物無牙者齒必鋭其用更厲於牙鼠僅四齒而能穿墉則似有牙者故舊謂雀角以無為有鼠牙似是而非陸農師亦謂必合兩説觀其義始足是也獄與屋叶訟與墉叶取韻成文非有深旨也即以獄訟言之周禮司寇職注云訟謂以財貨相告者獄謂相告以罪名者則不得專以圜牆為獄明矣陸農師謂雀言獄鼠言訟當别有義遂以晝夜難易之説解之鑿甚且謂召南之初事易察者至獄而後明其後貞信已興則雖難知者不待獄而明是直以獄作圜牆矣鄘風相鼠篇舊以此詩之鼠為禮鼠亦名拱鼠録異記云拱鼠形如常鼠行田野中見人即拱手而立人近欲捕之即跳躍而走今秦川有之愚謂今鼫鼠人畜之家中飼以食亦拱而受大抵足前高後卑者類然不必别有禮名也禮鼠之名亦因詩為説耳一説相州所出之鼠故稱相鼠非通詩語意以有無二字呼應蓋鼠一小物耳猶有皮齒四體之具存而人反無禮儀容止之可法全是喚醒人不如物意嚴華谷謂鼠只有皮人則不可以無儀語意反懈此本正義不必從止字當依鄭氏作容止解非止息也羅瑞良謂齒有時以齧有時以止在易艮為鼠故齒象止是強解取興武斷甚矣此亦叶韻成文耳何必為之説乎魏風碩鼠篇釋獸於鼠屬有鼫鼠無碩鼠愚疑碩鼫古字當借用郭璞謂鼫鼠頭似兔如鼠形而大故序稱大鼠不必訓碩為大也鄭氏所據乃釋詁文然釋詁所指當是碩人之碩非碩鼠之碩今鼫鼠有黃白二種人畜之家中多純白者馴擾從人每行遇豐草一食輒盡則其害稼可知陸璣以鼫鼠為螻蛄而别謂河東有大鼠能人立交前兩腳於頸上跳舞善鳴食人禾苖魏國今河北縣言其方物宜謂此鼠非鼫鼠也不知璣所説正鼫鼠别無所謂碩鼠耳説文謂鼫為五技鼠廣雅謂一名䶂鼠陸農師謂一名雀鼠何元子謂䶂雀碩音相近宜可信李時珍謂關西方音轉石為䶂訛䶂為雀又字書謂雀鼠即拱鼠䶂鼠即鼠不與鼫鼠同省作䶂䶂無雀音鼫無䶂名愚按鼯似蝙蝠有翅尾五技所謂能飛不能上屋彼為近之荀子亦謂鼯鼠五技而窮非鼫明甚雀鼠當即鼫鼠曹憲釋廣雅亦作爵鼠見人能拱而立不必更有拱鼠也至别䶂作與廣雅異又非釋獸所謂豹文者恐未可信通雅引蜀圖經虎鼠即鼠亦刺蝟之一種又談藪云虎必居草薄者畏木上有鼠也音相近省作䶂耳愚謂異字不當以音近而混且豹從豸亦不應省為勺也世無孝亷郎此業固當益晦矣鄭氏謂鼠為斥其君非嚴華谷以為指聚斂之臣即伐檀所言在位貪鄙者是也豳風七月篇此釋獸所謂鼶鼠夏小正云鼶鼬則穴是也邢昺謂鼶似鼬則形當如鼠狼其穴地中為隙甚大寒氣易入又穴於九月故豳人以十月熏之使出按之時令自是此種若莊子所謂鼷鼠深穴神臯以避熏鑿又食物本草謂鼱鼩大如蠶豆即今地鼠此亦皆穴地中者但小不為患耳小雅正月篇癙憂之癙詩本從疾癙病釋詁文舊説屚創也淮南子云貍頭療癙又癢釋詁亦訓病説文同痬周禮痬醫掌諸痬蓋其小心憂思如人有隱疾備極痛苦不能告人者故謂之癙憂云耳舊必去疾為鼠謂鼠伏獸病而憂在穴內人所不知則是鼠思之解非癙憂之解矣小雅雨無正篇此竟作鼠則當如字解猶今人言狐疑狼疾雉乖之類舊説鼠性疑出穴多不果故持兩端謂之首鼠韓子所謂狐鼠進退是也羊羔羊召南羔羊篇舊説羔之德宜施於朝故古者以為朝服春秋繁露云羔羣而不黨有角而不用類仁執之不鳴殺之不嘷類義飲其母必跪類禮又公羊傳注云死義生禮者此羔羊之德也傳謂大夫羔裘以居正義辨之以為居於朝廷非居於家是也如羔裘逍遙檜君以朝服而遊燕詩猶刺之豈有大夫而反為私居服者况下云退食自公明是由朝歸家其非燕居時可知嚴華谷何元子皆主趨朝之服是也緎紽總皆合絲所成即俗稱線是也西京雜記謂五絲為䌰倍䌰為升倍升為緎倍緎為紀倍紀為緵蓋線粗細之殊名耳此乃為縫裘之用非飾裘之名也陸農師乃謂緎寡於總紽寡於緎以昭儉德何居且謂裘革縫為裘敝之漸尤非理夫既儼然在位而一裘蒙戎可謂儉不中禮矣奚為反舉羔羊美之耶詩所謂五者明是紽與緎與總而補傳因序中儉字立説易作五羊之皮此大可哂姚旅又謂皮小則合縫多而用絲繁五紽見其皮之大皮大則賤正言其儉皆傅會也夫詩既稱羔羊則皮必小皮小則一裘必非五羊所能成明矣且裘縫內蘊不露何用復假素絲以飾其外耶通論云大夫羔裘乃當時之制何得謂之節儉此詩固贊大夫然無一字及其賢何以獨知其為正直乎若夫或以其服羊裘及以言革言縫為節儉或以為羊性柔順逆牽不進像士難易進退為正直所謂豈徒順之又從為之辭已閲此可為掃却一切鄭風羔裘篇三英之為裘飾無文可據范祖禹謂五紽五緎五總皆所以英裘是之謂三然紽緎總只是縫皮之線而已豈為裘外飾者且古亦無飾裘之制其訓英為飾者蓋因二矛重英之英訓為矛飾云然不知彼亦但作鋭字解不可云飾也此疑即三事大夫之稱傳訓三德謂剛克柔克正直亦太泥檜風羔裘篇脂膏色白此羔裘當指其白者言所謂白亂蒸肪是也故日出照耀有光非但取潤澤義耳王風于役篇牛羊羊牛行文者偶倒其詞非有義也陸農師謂先羊後牛者羊性畏露而早歸常先於牛此固物理有之然詩人亦念不及此今坊本次章作牛羊俗詁以為下山時羊先於牛到家時牛先於羊或云首章敘歸之先後次章論類之大小皆是鑿説詩中先羊後牛者凡四見小雅無羊篇何元子謂羊躁進競前又其性畏露歸先於牛與于役意同周頌我將篇何元子謂明堂祭天當用特牛而有羊者周禮積共羊牲乃積柴祭天則用羊實柴先柴後獻故維羊文在維牛之上絲衣篇傳云先羊後牛者從小及大也郝仲輿主繹祭之説謂祭牲入先太牢後少牢徹故羊先出而牛從之諸説紛如愚謂于役無羊我將三詩不過從小及大錯舉之耳絲衣則以牛叶䋔韻不必别為穿鑿也羜小雅伐木篇未成羊羜釋畜文郭璞謂今俗呼五月羔是也或駁之以為羊自始生時形體雖微即已成羊未可謂羜為未成羊此迂論耳所謂未成者乃極形其小猶今童子謂之未成人不得謂之非人也説文訓羜為五月生羔羅瑞良疑其似謂仲夏所生引齊民要術五六七月生者兩熱相仍惡中之甚以速諸父不應用此當是生及五月者是也羅瑞良謂諸父用小羊諸舅用大牛隆殺不同者食禮享禮之分各有所宜也此説非理詩限於韻束於句所謂釃酒灑掃陳饋羜牡皆一時行舅父皆一時速互文以相通亦因韻以成章耳正義舊分上為燕下為食又謂二者為一禮皆不必泥要之三禮之學不可以説詩也小雅無羊篇羣乃衆多之意不可以數泥六書故謂自三以往為羣是也周語獸三為羣亦謂自三以上蓋一則獨兩則耦皆不可以言羣故羣為三以上之通稱若依正義必三百之衆始成一羣而羣又不可勝數恐無是理愚意當其降阿飲池時或三五或什伯各自為羣約計羣數則饒有三百云爾史記卜式脫身出分獨取畜羊百餘入山牧十餘歲致千餘可知孶息亦非易事讀詩者善會之可也濈濈有聚意有斂意惟聚且斂而不相觸故和然所謂聚者即聚於降阿飲池寢訛之所非歸也三章麾肱來升乃正言其歸耳嚴華谷謂羊不歸而聚則不見其角之濈濈恐未然羊行安緩同羣不爭先後此言矜兢有相路前行矜慎不躁之意故能不患騫崩也傳訓堅強無此義陸農師以矜矜為愛牧人兢兢為畏牧人不免體物過當何元子謂矜之為言兢也兢之為言競也陵兢不讓競先爭歸乃是羊態如此則詩何不云兢兢競競而云矜矜兢兢耶騫之為虧義可通崩之為羣疾殊不倫陸農師以死善耗敗訓崩尤非其旨何元子有二説其一謂天保騫崩指山體言山中有虧損者有崩圯者今羣羊皆從正道而行未嘗奔逸傍出於崎嶇險仄之處致難收攝故謂之不騫崩此為近之其一引説文解騫為馬腹縶通崩作繃為束縳義則強合矣愚按字義騫亦訓輕儇躁進貌柳州乞巧文沓沓騫騫是也又自上墜下曰崩蓋羊行矜慎安緩無輕儇躁進之態故能馴擾隨人山中自上而下不患崩墜所以麾之以肱皆來升入於牢也核之詩義覺較諦當羖小雅賓筵篇夏羊牡羭牝羖釋畜明文説文反以羖為牡羊遂致後人通羖作牯其誤甚矣觀郭璞夏羊注謂之黑羖䍽則當時便統謂夏羊為羖其實但為牝者專名也且夏羊自有黑白二種又不得專以羖為黑者耳抑詩彼童而角童字訓作幼字謂牛羊之幼者無角也此童羖之童乃無角之稱如人之無髮山之無木者皆謂之童傳所謂羖羊不童是矣牂小雅苕之華篇釋畜云羊牡羒牝牂則牂自是吳羊牡者之名説文亦易牝作牡不知何據廣雅謂吳羊牝一歲曰䍮三歲曰牂則牂非小羊也正義欲合墳首之義訓為牝小羊羅瑞良駁之是傳訓墳為大羅瑞良謂猶羒也牂羊羒首喻婦人而為男子之事何元子引焦氏易林作羵謂説文有羒無羵其字當通然終嫌非詩本字不如仍依傳作大訓謂飢饉之餘百物凋耗羊瘠則首大故但見其墳首為通附達大雅生民篇箋訓達為羊子何氏辨之謂羊子名羍詩乃達字非羍也逹通也以言語相通也此時后稷未生而如有神焉告語之者即下不坼二句是也愚按小羊作羍此作達説文本分二字正義因鄭説便以其訓羍者實之恐未當也然何氏謂神以言語相通于詞旨不似愚謂不過后稷當彌月時通逹易生毫無留難二語足畢其解下不坼不副正所謂如逹耳羝生民篇廣雅謂吳羊三歲者名羝羅瑞良以為羝是牡羊之總名而羒乃吳羊之羝者古者大率多言羝易羝羊觸籓漢書蘇武牧羝又齊民要術畜牧之法大率十羊二羝皆是然則此詩所指當統謂牡羊非必謂吳羊之羝者也麕麕召南野有死麕篇釋獸有麕無麞周禮繢人注云齊人謂麕為獐説文訓亦同今從之其義以慞偟為近所謂性膽最怯飲水見影輒奔是也陸農師謂為章美之義非字從囷亦取諧聲故俗或作麏其善聚散之説尤鑿陸璣混麋為麕以為青州謂之麋誤釋獸麋麕並舉明是兩物且其牝牡之名各異其子種類亦殊無容合而為一也麇喜音聲麞喜文彩此好事者之説也今使獵者舍其罝羅弓矢而張樂空山以待逸材之獸吾恐麋鹿見之決驟矣是樂鷃以鐘鼓也且麞麋一物顧或以彩服誘之而或以音聲導之兩者各異如此可知皆從文字穿鑿非物情之真耳詩以死麕為興鄭氏漫謂麕肉作婚姻禮物陋矣此猶論語束修之訓十脡也若使死麕可為禮物則下章朴􅈪死鹿二者對舉亦將以朴􅈪為禮物耶愚謂麕鹿性奔逸不受拘縛林木勢高竦不可攀折然已死則包之而已朴􅈪則束之而已今貞潔之女子如麕鹿之奔逸林木之高竦者非可以無禮誘之耳嚴華谷謂麕肉以茅包恐為物汚也羅泌謂死麕可棄而包茅惡其汙地也二説相反然均非詩旨郝仲輿云麕鹿比奔也死麕死鹿如惡惡臭醜詆之詞若然則何必以白茅之潔清者包之乎亦強解小雅吉日篇麕牡為麌本釋獸文然但可作一字訓不可作兩字訓今鄭氏解之云麌復麌言多則強合矣若然則麀鹿亦何不重言麀麀鹿鹿耶此與三章其祁孔有易祁作麎皆武斷不可從也或乃謂於鹿則舉牝於麕則舉牡足盡乎麕鹿之類所謂強言耳鹿鹿召南野有死麕篇按釋獸文鹿牝麀牡麚異名而詩中俱作麀鹿則似謂牝者為麀牡者為鹿麚名不概見也又今人通謂牝牡為鹿則併不言麀矣蟫史云鹿牡有角而無齒牝有齒而無角然其角易辨齒之有無陸農師謂别於其上齦要是內藏難見耳上言麕此言鹿乃換字文其義亦猶首章耳若依毛鄭解謂廣可用之物以為昏禮而次及於鹿則古者儷皮為禮一死鹿足矣何必云凶荒殺禮而廣及羣田之獲哉此以知麕鹿肉之為昏禮斷屬臆説也何元子踵惡惡臭之説謂全用白茅裏束此死鹿亦惡其臭此陋説也臭豈可以茅包而遂掩耶况玩文義純束自總上兩語亦不得謂專為死鹿用明矣豳風東山篇町畽田畔踐踏之所不必定為鹿踐以下云鹿場則人迹少而鹿迹多故傳直訓為鹿迹不可泥也孔鮒云兔之所息謂之窟鹿之所息謂之場場之説本此詩小雅鹿鳴篇焦氏易林云白鹿鳴呦呼其老少喜彼茂草樂我君子則呦自是相呼之和聲重言呦呦者呼之長也野有蘋必相呼而共食興君有承筐必笙簧以相將詞旨燎然其謂以臣呼臣者謬矣懇誠二字亦是從下承筐好我看出必謂鹿無外貌矯飾之情得草相呼出自中心則贅也舊以鹿呼同類如君呼臣子嫌於鳥獸為比然古人無所拘忌也若魚藻明以魚在王在對言豈至如後世表箋稱麟美鳯習為應制體耶小雅小辨篇奔則疾舒則緩二義相反然則既言奔不得為舒傳箋所謂安舒而稽留失其解矣何元子云通作跂説文以為足多指是也然則伎伎蓋奔趨足相及貌鹿愛其類發於天性同羣而奔足指甚衆所以同求雌之之雊雉異無枝之壞木耳大雅靈臺篇攸鄭氏訓所是也然云所伏不得云伏所此是不了語蓋謂文王視麀鹿所伏息之處則見麀鹿濯濯然耳趙岐孟子注韋昭國語注皆作懷孕伏息之説何元子辨之謂樂記羽者嫗伏毛者孕鬻不應以伏咏麀鹿且於濯濯不聨貫信然但又謂攸有行義伏有止義詩意言麀鹿行止皆自得亦強解濯濯自取鮮澤義孟子是以若彼濯濯蓋謂山無材木童然如洗濯者今麀鹿毛潤無汚之義亦當似之何元子所謂濯本訓浣取以擬鮮澤之貌如言新沐新浴是也傳作娛遊非其旨通論云攸伏濯濯合二語觀有自得境象詩人之描寫刻露善於體物如此要不可執字義強解也嚴華谷謂孟子最善説詩只民樂其有魚鱉一語道盡詩意毛氏以為靈道行於囿沼今鹿養之久則自馴白鳥未有不潔魚未有不躍者豈皆靈道之行乎後之説詩者推廣毛意其詞愈美而去詩義愈逺矣此深得子輿氏説詩心法大雅桑柔篇甡甡有並立相角意説文云衆生齊盛若鹿角然按之詩意似謂中林之鹿其角森然見人若將抵觸者以喻交譖之可畏亦如此是以進退維谷也虎虎邶風簡兮篇虎名不一白者名甝黑者名虪見釋獸文陳魏楚宋之間呼李父南楚之間呼李耳或呼關東西呼伯都見方言然按左傳楚人謂虎為於菟而方言兩志楚語所稱各異然則其姓其名不過好事者為之耳舊説虎舌大如掌生倒刺夜視一目放光一目看物有威骨如乙字長一寸在脅兩傍尾端亦有之故較他獸為獨猛説苑又謂其能知衝破每行以爪坼地卜食觀竒耦而行大抵物之靈者有之如豺祭狼卜之類是也舊本以有力如虎二句下屬惟集傳别作一章今按上兩言萬舞此緊從舞説來下又明言執籥秉翟之事似不當以才藝浮語解之或疑是武舞之形容蓋武舞中有所謂發揚蹈厲者故見為如虎也存考鄭風大叔于田篇或引説文作膻肉膻也亦作亶荀子露亶是也今文作袒乃丹縠衣與肉膻義無涉此説泥甚愚按袒同袒喪大紀設牀袒笫又大夫士袒之注即訓袒不必定從肉作膻也釋訓文與詩合可據秦風小戎篇傳以文茵為虎皮愚疑此無明文如三章虎韔則明言虎可據且覲禮云包干戈以虎皮是韔之用虎皮古制然耳茵之用虎皮何所考耶釋名蓋亦本傳為説恐未足取徴也小雅小旻篇先儒解此詩皆以暴虎馮河易見之端引起小人無形之禍於義殊淺按論語暴虎馮河死而無悔者吾不與也可見君子之戰兢無時不有暴虎馮河之懼所謂如臨如履即是不敢暴馮之心耳此詩中一與他二字之義也貓大雅韓奕篇按釋獸虎竊毛謂之虦貓正此詩之貓也傳謂貓似虎淺毛則似指畜貓非虎類矣陸農師引記迎貓迎虎之文以為貓食田鼠虎食田彘故詩以譽韓樂誤也鍾伯敬云以上下文熊羆虎類觀知是猛獸非捕鼠貓得之蓋此貓特淺毛虎别名西域傳注謂師子似虎即釋畜所謂狻麑如虦貓可知其狀必猙獰異常物而乃以尋常捕鼠者當之真鄙瑣之見矣且捕鼠之貓何地蔑有而獨韓以為樂耶大雅常武篇虓不獨為虎怒之狀蓋怒而發於聲者説文訓為虎鳴得之風俗通作哮格物論云虎怒而吼其聲如雷百獸為之震恐而風從之生是也説文又訓為師子名非狐狐邶風北風篇狐形如黃狗鼻尖口鋭尾大其性好羣每以類聚舊謂多疑蓋恐他物害己如郭緣生述征記聽冰始渡之説非必嫌其同類也陸農師謂疑則不可以類合故文從孤省要是強解耳狐烏為比在毛鄭舊義亦然但謂喻衛君臣相承為惡如一莫能分别則赤黑判然非其解矣愚謂此全取下惠好同車義蓋欲以類相從如狐烏之各從其色為類也所謂莫赤莫黑猶云麗朱者赤附墨者黑之意值此世亂時危苟有與我同類而相好者吾當與之攜手偕隱矣似於詞旨較合衛風有狐篇綏綏毛傳訓匹行朱傳訓獨行二説正相反要皆就序中喪耦起義耳嚴華谷以為定綏之意稍迂何元子云易稱小狐汔濟濡其尾亦其尾重善濡溺古語所謂狐欲渡河無如尾何者此論可謂創獲但以綏通緌謂狐尾如冠結之餘散而下垂者此但得一字之解而於兩字尚未詳也蓋狐前小後大行則其尾綏綏然而散舒故易有濡尾之占荀子綏綏乎其有文章舊注亦謂采色散舒之貌以知綏綏為散舒意耳齊風南山篇對文則飛為雌雄走為牝牡散則可以相通正義之説是也陸農師以為非牡狐之稱宜讀如狐不二雄之雄雄君之象羅瑞良引春秋秦穆伐晉之筮詞為證似矣然按伐晉之役筮得蠱卦狐有蠱惑之義因以為繇又軍中無婦人而占獨稱雄故知所惑者非他人必晉君耳如駱丞討武氏檄直指武氏狐媚惑主可知狐為物妖淫凡有淫行者皆得比之此詩刺齊襄故繫以雄若云雄為君象則迂矣小雅何草不黃篇説文芃草盛貌徐鍇以為泛泛然若風之起是也狐尾長大散而下垂芃芃然若草之叢生者故以為况亦猶綏綏意耳傳凡於字義難解者輒以小訓如交交綿蠻之類尤可哂也邶風旄丘秦風終南檜風羔裘三篇狐裘旄丘傳主狐蒼裘言終南正義主狐白裘言羔裘箋主狐黃裘言三詩互異愚謂皆當言狐白者按陳用之云士不衣狐白裘不特以其德之未成亦不敢以貴服賤也禮玉藻君衣狐白裘君謂國君君以下有卿有大夫禮皆不言而獨於士云不衣狐白則士以上大夫至天子皆得衣之斷無諸侯不敢私服之理其衣狐青之君子乃專指士而言也旄丘狐裘黎侯所服非黎臣所服此時侯雖失國而服猶仍其舊所以蒙戎欲敝耳終南秦人創見誇美諒非褻物且有錦衣為裼詞旨昭然至黃冠草服田野之飾故都人士皆服之檜君務為華美不衣狐白而反衣狐黃是舍錦繡而竊敝襦必不然矣覽者斷之蒙戎傳訓亂蓋服久而毛敝之狀與如濡正相反又其為物毛深溫厚故敝則愈覺其蒙戎耳小雅都人士篇舊説狐裘黃衣貴者亦服之但以次章言臺笠乃野人所用故知此當為野服耳愚謂狐白惟士以下不得服狐黃則通貴賤服之此云都人士必非尋常百姓所謂河南帝城多近臣是也豈可竟以為野人之用耶嚴華谷云若專以為民則萬民所望非庶民之事若專以為士大夫則下章臺笠非士大夫之服故士者通貴賤之稱凡詩中以士對女者皆謂男子耳此都人士對君子女言亦指男子得之象象鄘風君子偕老篇南州異物志云象鼻長六七尺大如臂其所食物皆以取之俗傳象牙歲脫猶愛惜之掘地而藏之人欲取當作假牙潛往易之覺則不藏故處是也又具十二生肖肉各有分段惟鼻是其本肉膽不附肝隨月在諸肉間其異於他物如此傳謂象服尊者所以為飾蓋即鄭氏所云褕翟闕翟之類也正義誤解傳意以為言服則非揥明以象骨飾服惟尊者為然則真書傳之所未聞矣嚴華谷云翟皆刻繒以象鳥羽故謂之象翟是也臯陶謨所謂豫欲觀古人之象日月星辰諸屬是其明證字説以為人於象齒也服而象焉於天象也象而服焉二語殊不可解揥摘髮具正義謂以象骨搔首因以為飾名為揥嚴華谷辨之云若摘為摘取之義則鑷子矣搔首之摘因以為飾者若今之箆兒也何元子云整髮叉也愚按揥若即箆亦非佩物疑所謂整髮叉近是古禮服有玉瑱無象揥今並舉之或是燕居之飾歟象骨即象牙古通稱齒左傳象齒焚身又羽毛齒革君地生焉皆是漢後始易稱牙釋文云牙植牙也隨形言之蓋象口中自有食齒惟兩吻出兩牙夾鼻所謂植牙是矣魏風葛屨篇象揥自是華飾偕老與玉瑱對舉固侈言其盛非簡朴之物可知此詩下有維是一轉則上正言服飾威儀之美無譏刺意何元子泥魏俗儉嗇謂婦人雜佩不一今惟象揥見其簡朴無華之甚非是詩詁謂女子著於首男子佩之按摘髮固男子所有事而詩兩言象揥皆屬婦人且書傳不聞男子佩揥之事陳用之又謂有事則為飾無事則佩亦贅語小雅采薇篇弭是弓之兩頭所以上弦鈎結之處以象骨飾之取其滑也弓弰無解轡之理鄭氏誤耳釋器云弓有緣者謂之弓謂繳束而漆之無緣者謂之弭謂不以繳束骨飾兩頭者也而李巡謂骨飾兩頭曰弓不以骨飾曰弭則象弭二字何以連文又郭璞毛詩拾遺云弭者弓之别名以象牙為之今西方有以犀角及器角為弓者則似謂純以象骨為之矣俱非牛牛王風君子于役篇牛名甚夥載爾雅及説文中然頗互異如釋畜謂體長者為牬而許氏别作二歲牛名要當以釋畜文為正又謂三歲為犙四歲為牭亦如馬驂駟之説最為可哂俱不贅論取其見於詩者列之傳訓括為至亦通何元子引説文解作潔謂潔之為義麻一專也蓋以繩繫之潔而來歸曰下括也愚謂牛羊性旅行任鞭驅不任牽縛今牧者輒數十頭為一羣兩人前後驅之豈能一一以繩繫耶不知括與佸通有會意車舝詩德音來括是矣蓋放牧四散任其所之至日夕則羣相會聚而來耳犉小雅無羊篇釋畜云黑脣犉又云牛七尺為犉有二義何元子以為牛類頗多不應獨舉黑脣言當是標其最大者是也愚按牛原未嘗以黑脣重釋畜所載有黑眥黑耳黑腹黑腳諸種不專列黑脣者詩人奚取於此而獨標之惟七尺高大者有九十方見牧養之蕃與衛風騋牝三千同意彼舉馬七尺者以侈其多此亦舉牛七尺者以誇其盛耳牛色騂犂各别黑脣之牛其身色絶無明文傳因釋畜語漫加黃牛二字先儒多本其説果爾則凡黑眥黑耳黑腹黑腳者盡屬黃牛耶郭璞以為此宜通謂黑脣牛其見達矣傳以濕濕為食時之狀食與耳無涉陸農師謂病則耳燥安則潤澤亦無其據或云臥則下垂下垂要不似濕意且牛並非歸息何以獨云臥狀乎愚按字書濕叶他合切乃水名即禹貢漯字與燥溼之溼異自漢後以形似借用紛然莫辨故佩觿集謂水名之濕不當借為燥溼之溼是也今此詩舊本皆作濕不作溼恐不應從潤澤取義但濕字水名之外更無他義耳牛之耳對上羊之角言不過舉一體以見其馴擾於義本無所取陸農師必欲於耳求解引祭義尚耳及戎右贊耳之文於是紛紛於主聽戒聽之説首持兩端究無一當也小雅信南山篇牲色惟牛有騂者羊豕但有黑白二種詩言騂牡當為牛無疑故何元子謂此與下啓毛取血膋諸文苐以牛為主蓋牛乃牲之大者周禮大司徒奉牛牲羞其肆祭義謂卿大夫毛牛而説文亦解膋為牛腸脂是也犧小雅甫田篇正義引郊特牲謂社稷太牢則四方之神亦太牢又周禮小司徒職云小祭祀共牛牲是祭四方得用牛明矣而鄭氏解犧羊為純色之羊不言牛誤也按犧從牛當為牛美名故禮天子以犧牛不與肥牛索牛等又犧尊作牛形因謂尊為犧莊子見夫郊祭之犧牛乎孟子無以供犧牲也湯使遺之牛羊徐幹七喻大宛之犧是犧直以牛言此詩犧羊亦疑謂牛羊耳鄭氏純色之説本閟宮傳駁義見後小雅大田篇傳分騂黑為三牲箋以騂黑為方色愚謂牲毛騂黑者多詩特錯舉言之與黍稷句相儷耳據甫田方祭禮同於社則牲亦自具牛羊豕三者其説當從傳為正何元子謂所以取騂色者以螟螣蟊賊秉畀炎火故報祝融所以取黑色者以雨我公田遂及我私故報玄冥祝融主火玄冥主水故也此從詩中看出用騂黑之别亦確存之小雅黍苖篇舊分車牛為二正義釋鄭意云既言將車者車中有牛而將之而别言牽傍牛者此牛不在轅中故别牽傍之語費周折此宜從集傳謂輦車以人挽大車以牛挽較明順不然則輦與車無所分别且據周禮牽傍之文此牛仍所以挽車其謂任公載器者載任於車中而牛挽之而罪𨽻者為牽傍之也以下徒御師旅文推之旅屬於師徒行御車還是師旅之人則必分四者為四事亦迂矣大雅旱麓篇正義引公羊傳周公白牡魯公騂剛羣公不毛之説謂太王王季為殷之諸侯其牲亦應不毛而云騂牲者據周所尚而言之此謬也牛牲以騂為貴書雒誥蒸祭歲文王騂牛一武王騂牛一則上祀先王先公亦應如之故詩多言騂牡騂剛騂犧耳即謂周制所尚亦何必以本朝之典推及祖宗之在前朝應用何毛色而為之説耶周頌良耜篇正義泥地官牧人文謂正禮隂祀用黝牲至於報功則以社是土神故用黃色仍用黑脣者此因傳黃牛二字傅會耳釋畜黑脣為犉未嘗顯其身之色安知不是騂與白者又安知不是七尺之牛以昭報功之盛者乃據傳訛文以為黃而黑者用報土功則穿鑿甚矣大東傳訓救為長貌故傳於此謂社稷之牛角尺然禮無其文也緯書則云社稷宗廟角握亦臆説愚按社稷之祭統於地中庸社對郊言則祭天地之牛角繭栗有明文矣其角握角尺者恐均未當要之三禮不可以律詩集傳所謂角上曲貌妙得情狀以兕觥其觩角弓其觩二詩證之義亦近似則救與觩字當通耳魯頌閟宮篇騂犧即雒誥之騂牛也傳訓騂為赤訓犧為純可哂夫既專言騂定是純色何必又云赤色之純者若騂而有他色雜之則是犁非騂矣愚故謂犧即牛之代字也犧羊之為牛羊何疑楅衡傳謂設牛角以楅之是周禮注謂楅設於角衡設於鼻非按説文楅木有所畐束也衡牛觸橫大木明是一物但牛穿鼻以任牽縛楅角時鼻亦繫於衡上耳牲色貴騂其次則玄白純色者皆可用論語獨言騂且角亦舉其最貴者非必騂為周尚也然祭祀安得盡騂牲而用之故玄牡白牡之文亦雜見書傳必以白牡為殷牲遂謂周公死有王禮嫌與文武同於是紛紜擬議之説從此起矣通論云白牡騂剛見周亦不專用騂言其無不備也且以白騂成文猶後言朱英緑縢之意傳謂白牡周公牲騂剛魯公牲何據而分之耶犧尊有二其一尊腹或足為牛首形其一作全牛形鑿背受酒舊謂畫牛於尊腹此即腹足為牛首形者但少一首字便失其制蓋本阮諶禮圖説也而王肅云太和中魯郡於地中得齊大夫子送女器有犧尊以犧牛為尊又永嘉中賊曹嶷於青州發齊景公塜得二尊亦為牛象分其背受酒合之如全牛此即作全牛形鑿背受酒者二尊皆有可據昔蔡絛謂徽宗崇尚古器遂盡見三代典禮文章其犧象二尊正如王肅所言而讀先儒解説有可哂者云云則亦僅得全牛之一説也傳謂沙飾殊不可解後人因沙通娑因娑通犧葛藤無已此鄭氏周禮注誤之耳顧太初辨之云古者犧通為戲以其字音之相同戲或為獻以其字文之相近娑沙同音犧之為娑亦如皮之為婆儀之為莪上章騂犧叶孔多一詩之中具有顯證騂犧尚音娑則犧尊之犧非緣酒尊而異其音也知犧尊所以音娑則尊當為牛而鳯羽婆娑之説非也此辨最晰詩識名解卷五

body:
  text: 詩識名解卷十一錢塘姚炳撰草部苕苕陳風防有鵲巢篇釋草惟釋苕為陵苕黄華者名蔈白華者名苃餘無文則陳風小雅二詩祇是一苕也傳於此苕别訓草又不明言何物惟陸璣確指為苕饒以為幽州謂之翹饒夏生莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿說家多宗之大抵因㫖字解作味美故見有可生食之語遂据為説耳要未可信也正義謂陵苕生下濕苕草生髙丘强分二種無論下濕之説誤作䑕尾固非即苕饒豈必盡産髙阜者此不過因詩中卭字為説耳按博物記云卭地在陳縣北則卭又為地名本不當訓髙丘舊說讒言惑人必由積累而成如苕饒蔓引牽連以及我此縁序曲解非詩意也苕華或黄或白為卭美觀以興下予之所美耳故何元子謂四有既皆比讒人則苕鷊二物似不應以㫖稱之此亦有見而云然者小雅苕之華篇傳於此詩依釋草文訓陵苕按陵苕舊説亦不一廣雅以為蘧麥然蘧麥花紅與芸黄不類郭璞謂一名陵時陸璣從之謂别名䑕尾似王芻生下溼水中七八月中花紫似今紫草考璣所説乃釋草所謂葝也苕為陵苕葝乃䑕尾分釋判然詎可相混則正義之以下溼髙丘為説者不辯而知其誣矣惟鄭漁仲以為今之凌霄花本草謂之紫葳蔓生依縁樹木皆黄花少白花者此為近之釋草苕花黄白異名可知白花外惟有黄者與詩芸黄正合故説文解蔈字謂苕之黄花是也傳謂将落則黄正義因謂苕華色紫初不黄就中有黄紫白紫之分衰則全變為黄並誤羅瑞良云凌霄雖名紫葳而華不紫詩謂芸其黄者正自華開之色得之後序謂幽王時戎夷交侵中國師起君子閔之此但溯其作詩所自耳詩人託物起興豈必泥此為説耶鄭氏以苕榦喻京師京師天下根本不應以苕榦之依附柔弱為比至若中夏曰華取其禮明樂備有華采之意乃通作草木之華為説尤非理也且詩但言華耳因華及榦復因榦及華輾轉穿鑿作詩者奚暇及此乎宋時説家俱以苕弱取喻為近情理但羅瑞良本序以周室言集傳則自作詩者一身言觀二章不如無生一語宜若自謂者若以喻周室則仍是鄭氏之㫖不免多支蔓語矣詩以花葉並言則不得以青青之葉為花落後所見即此可以證芸黄非将落之色也鄭氏變落言衰總一意耳萇楚萇楚檜風隰有萇楚篇釋草長楚訓銚弋或作銚芅郭璞陸璣皆謂即今羊桃廣雅謂之鬼桃本草謂之羊腸又呼為細子鄭漁仲謂之御弋又子赤狀如䑕糞亦名䑕矢皆是陶隠居云羊桃山野多有甚似家桃又非山桃子細小苦不堪噉花甚赤陸璣亦云葉長而狹華紫赤色二説正合而郭璞註獨以為華白豈其華固有赤白二種與字書謂羊桃藤長丈餘可以為綆詩萇楚以枝言不以蔓言故鄭氏謂銚弋初生正直長而猗難不妄尋蔓而羊桃乃蔓生之草則羊桃與萇楚為二物其説非也枝即是蔓未可鑿分至鄭氏特為刺淫作解故飾為正直不妄尋蔓之語耳安得据以為辯哉陸農師又謂有兩羊桃一種華實皆連理故詩以刺淫恣此大鑿説羊桃祇有一種其連理者不概見先言枝次言華次言實亦如桃夭次第盖立言之序然爾豈可因此别生一解乎序說皆不足据然首序但言疾恣而已恣有驕恣貪恣之不同而後序定為淫恣尤不根語陸農師乃分猗為有倚以立儺為有節以生以實不淫不恣之説何也猗儺楚詞及相如賦王褒賦俱作旖旎髙唐賦作猗旎南都賦作阿那洛神賦作婀娜義並同明是柔媚嬝娜態狀詎可以他義訓耶或謂詩有室家之語明是為男女之事而發故定從序愚謂政煩賦重正合序中恣義未可因室家二字定作淫恣解也盖苛政猛虎本欲避而去之但恨為室家所累不能逺去故歎其不如草木之無知耳一入淫慾語便穢陋至謂男以女為室女以男為家華之敷在外故興家實之含在内故興室愈墮入惡道矣稂稂曹風下泉篇稂名童粱見釋草文郭璞以為莠類陸璣云禾秀為穗而不成崱嶷然謂之童粱今人謂之宿田翁或謂守田也鄭漁仲亦以為即守田俗呼鬼稻愚按守田釋草别列一條郭璞謂似燕麥子如雕胡恐又一類從璣之説則是禾秀而不實者説文作蓈亦謂禾粟秀采生而不成謂之蕫蓈是也然則莠乃惡草稂非惡草耳稂當作涼此鄭氏妄語耳草類無名涼者故亦不明涼草是何物但以蕭蓍之屬混言其本無据可知愚謂稻田正浸潤之所及易禾言稂趂韻而已况此但從苞字取義稂蕭蓍不過草之叢生者因類舉以為言耳傳謂稂非穊草得水而病非也稂即稻禾之屬性亦資水但病在一浸字以叢生之苖無溝塗之界而苞本全溺水中且寒泉浸灌方未有已所以為慮耳不然末章黍苖何以反需隂雨之膏乎小雅大田篇羅瑞良論大田詩謂其稱稼之茂美繼以稂莠螟螣蟊賊則皆是害稼者莠既别是一物則稂亦當是一物因以本草狼尾草當之愚按釋草狼尾别列不與童粱並舉何可以音字相近謬為擬議至於莠為狗尾尚在疑似羅氏乃取配狼尾尤穉説也舊又謂稂即莨䓪引倉公傳飲莨𦿆藥一撮作證遂至稂與狼尾莨𦿆三者淆然莫辯亦不察甚矣蓍蓍曹風下泉篇陸璣謂蓍似藾蕭青色科生陸農師以為蒿屬按今蒿是處皆有而蓍草不概見且其莖花皆與蒿異不得以科生便謂為蒿屬本草蓍生少室山谷今蔡州上蔡縣白龜祠傍其生如蒿作叢髙五六尺一本一二十莖至多者三五十莖生便條直異於衆蒿秋後有花出於枝端紅紫色形如籬菊此蓍草之狀也舊以蓍草為神靈之物上覆青雲下守神龜此亦如麐鳳粉飾之説耳蓍草特為不易生之物聖人取其科生條直足供分掛揲歸之用故用以筮且圓神之德存乎易乃易理之靈非蓍草之靈也史稱千嵗百莖而王充謂七百嵗十莖則百莖又當七千嵗矣若説文五行傳博物志諸説更互異均未可盡信耳陸農師云蓍從耆草之夀者也六十為耆卦之别六十有四蓍數窮於此羅瑞良云今取蓍不能得滿百莖長丈者取八十莖以上長八尺即難得也人民好用卦者取滿六十莖以上長滿六尺者即可用矣然則廣為六十莖從為六十寸故應耆耳愚謂易太衍之數五十其用四十有九盖取象天地原不因卦數為多寡也至六十莖六尺之説特為滿百與八十者不可必得因通其窮以為六十亦可用耳若謂字從耆祇以六十為率何為又獨重一本百莖者耶何元子又謂苞蓍以比王城之中亦有老成人而從子朝為逆者如尹文公召伯奐南宫極之類也此無論典實强證即立言亦大可哂盖蓍從老取義已是曲解若老復從蓍取義其説不愈曲乎葽葽豳風七月篇傳不言葽為何草釋草亦無單名葽者但有葽繞棘蒬之文郭璞以為即今逺志嚴華谷主其説謂逺志苦澁之甚醫家以甘草熟䰞乃可用要之與詩所説似不相屬也按月令孟夏苦菜秀逸周書時訓解云小滿之日苦菜秀此疑即劉向所説苦葽者丘光庭引月令疏謂苦菜似馬薤而花白其味極苦以為今四月秀者野人呼為苦葽春初取煮去苦味和米粉作餅食之四月中根如蓬艾花如牛蒡花此為可驗云廣雅獨釋葽為萎草通雅亦謂狗尾之莠葽非逺志葽繞又按夏小正云四月有秀幽戰國策幽莠之㓜也似禾故或以幽為喓聲之轉亦是一説但害苖之草田家務鋤而去之不應以此紀時令識者斷焉鄭氏疑夏小正之王萯為葽此謬證也本草萯生田中葉青刺人有實七月采之固非四月秀者況月令明有王瓜苦菜兩條鄭氏獨舍菜而言瓜殊不可解豈以夏小正一秀字而誤据耶若月令於王瓜言生於苦菜言秀此其猶足取徴者也詩立言之㫖在月不在物言物特錯舉以誌其月耳鄭氏謂成熟自秀葽始則四月以前果實菜茹之類其成熟者頗夥況麥報先秋為用甚大而區區以一葽草為物候之先耶薁薁豳風七月篇傳以薁為蘡薁不誤正義誤引晉寶閣銘薁李以為即鬱類棣屬則誤之甚矣按蘡薁廣雅謂之蘡舌陸璣謂一名車鞅藤花木志以為其實如龍眼黑色本草謂之山葡萄苖葉蔓生與葡萄相似亦有莖大如椀者實小而圓味酸色不甚紫蘓恭誤以為千嵗藟者是也甌越諺云蘡薁熟食新粥正此詩六月所食無疑兹因蔓屬定入草部明與鬱棣迥别用俟考者嚴華谷云疏謂鬱是車下李薁是薁李則薁李非車下李矣陸璣既以唐棣為薁李又云薁李一名車下李本草有郁李仁亦云一名車下李則薁李又有車下之名盖由二者相類故名稱相亂也愚謂不然薁無李名薁與郁音同字别今誤以郁李為薁李因即以薁為李又以薁李為車下李併混鬱薁常棣唐棣四者為一物則皆正義之遺誤也何元子辯之云舊説皆以為即唐棣而沈存中又以為唐棣即鬱常棣即薁此皆非也鬱乃車下李薁乃蘡薁唐棣乃薁李本是三物何得相混此辯甚晰惟謂唐棣乃薁李則又誤當云常棣即郁李耳毛子晉云陸璣止釋鬱豈以薁即是唐棣故存而不論其實常棣與唐棣鬱與薁原是四種傳云鬱棣屬則非棣可知疏云薁鬱類則非鬱可知但燕薁蘡舌是草大概與下文葵相似不應與木類相混此説得之韓詩外傳薁作藿説文及邢昺疏引詩皆然今按藿亦音育釋草謂之山韭羅瑞良謂山韭形性與韭相類但根白葉如燈心苖是也豈舊本固作藿毛傳易作薁者與存其説葵葵豳風七月篇葵種類不一有丘葵廣雅所謂蘬是也有胡葵廣志所謂其華紫赤是也有蜀葵一名衛足葵一名戎葵釋草所謂菺戎葵是也又有黄蜀葵錦葵與蜀葵相似而各别種花葉小大亦殊有終葵釋草所謂蔠葵繁露是也别有落葵天葵承露藤葵諸名有龍葵本草謂即關河間呼苦菜者是也有菟葵釋草所謂莃菟葵是也有荆葵舊謂即荍釋草謂之蚍􅗶者以無葵名今别見有蒲葵葉大可作扇者是也有楚葵釋草所謂芹楚葵是也有澤葵即莓苔鮑昭蕪城賦所謂澤葵依井是也有鳬葵一名茆毛傳所謂茆鳧葵是也又有吳葵鴨脚葵春葵秋葵冬葵紫莖葵白莖葵是不一名若蜀葵諸類或可食或不可食雖皆名葵非葵菜耳葵菜但有紫白之分大約四五月種者可留子六七月種者為秋葵八九月種者為冬葵正月復種者為春葵王禎農書云葵為百菜之主備四時之饌可以防荒儉可以為菹腊是也葵稱露葵潘岳賦菜則緑葵含露王維詩松下清齋折露葵皆是舊謂摘葵必待露解語云觸露不掐葵日中不剪韭各有宜也然則謂露葵為葵之一種及以釋草蔠葵繁露為露葵者並謬又顔氏家訓載蔡郎以父諱純呼蓴菜為露葵此則廋詞耳葵揆古字通采菽天子葵之蕩則莫我敢葵皆是陸農師謂因能揆日嚮訓葵則為衛足專名矣且葵癸諧聲耳羅瑞良以為天有十日葵與之終始故從癸尤鑿芹小雅采菽篇芹非葵族以釋草有楚葵名故併列葵中按本草芹有兩種荻芹取根白色赤芹取莖葉並堪作菹及生菜舊謂其葉似芎藭花白色而無實根赤白色是也采菽采芹祇取引喻不當以為燕享之物玩詩首章但言錫予之盛次章但言車馬之儀無從加入燕享等事且芹産於水故因泉及芹亦非尚潔清之意也傳本取興而誤有菽芼太牢以待君子之語鄭氏故從而甚之愈滋其鑿耳羅瑞良又謂此與瓠葉同意芹盖㣲物古人不以微薄廢禮王能修之猶愈於無禮也此尤大謬彼詩惟瓠葉兔首故云薄物若燕享之禮有鼎烹即有菹醢上既作牛芼解矣則芹菹自是備物何云微薄耶且彼詩烹炮甞獻明是燕饗之詞此苐云采而已又焉知定用以待諸侯乎何元子云詩意以檻泉自下上出興君子自下國而朝於王朝檻泉之旁有芹可采興君子之來朝亦有儀從可觀也此覺淺合魯頌思樂篇采芹苐為泮水發端無相況意陸農師謂芹取有香士之於學攬其芳臭而至則采芹之譬此後世之説也羅瑞良又泥古入學有釋菜禮以菜為贄即於水中採三品之草以薦之其説尤固或又云教不擇人猶采不遺芹亦是强説耳茆魯頌思樂篇傳訓茆為鳧葵干寳謂今之蹗草陸璣云茆與荇菜相似葉大如手赤圓有肥者著手中滑不能停莖大如七柄江東人謂之蓴菜是也羅瑞良以為今蓴小於荇璣所説大於荇則絲蓴塊蓴之異耳惟本草以荇菜為鳧葵而蓴别為一種今以釋草荇斷之但有接余之名更無鳧葵之名則傳疏為足据矣周禮茆菹後鄭讀茆為茅謂茅初生者非是陸農師以采茆為學道知味之譬謂芹潔白而有節其氣芬芳而味不如蓴美其説陋矣或又謂蓴羮宜老魯侯在泮養老故興意取此此欲取興下難老尤鑿詩但云在泮飲酒而已未甞言何事而飲也其於養老之典奚關耶杜子春讀茆為卯説文用詩叶音讀若栁戴侗是許而非杜非也茆無栁音讀為卯古韻自叶不必轉音作栁耳即以今韻合之茆與老酒與醜間叶亦是一體唐李建勲柏梁詩用此法如桑柔篇柔劉憂與旬民隔句相叶三百篇中往往有此孫月峯謂即後世之轆轤韻是矣菽菽豳風七月篇廣雅分大豆為菽小豆為荅羅瑞良以為菽者衆豆之總名按今小豆不聞有呼荅者則瑞良之言是也吕氏春秋云得時之菽長莖而短足大菽則圓小菽則搏以芳是大小皆以菽名明矣羅瑞良舍烹菽而以叔苴之叔為菽謂穀之㣲者故以食農夫此大謬解按漢書元鳳二年令三輔太常郡得以叔粟當賦則菽與叔古固通然據詩正文瓜言食壺言斷荼言采樗言薪則叔自為取物之義豈可作豆菽解耶且豳民方烹菽以奉眉夀而曰吾将與瓜壺苴荼以並食農夫也必不然矣小雅小宛篇傳於此菽訓藿正義本廣雅説以為葉謂之藿明采取其葉或駁之謂詩言采芑采麥芑麥亦穀也安在藿可言采菽不可言采其説正矣猶未得其實也按説文藿同藿尗之少也又釋草蔨鹿藿郭璞謂即今鹿豆是藿亦豆别名傳易豆訓藿變文耳而正義以為豆葉因附㑹所以言采之故尤無謂也觀此則知廣雅亦徒據鄭箋謂藿為葉耳其於大小之名又曷足信乎鄭氏謂藿生原中無主以喻王位無常此因螟蛉句云然愚謂菽乃穀類種溉方成豈有無主任人采取之理且下云爾子與所生對言盖身之親枝也説者以辭害志便作繼子之喻可笑中原者庶民所共之中原也原不一菽菽非一人各有之而各采之猶各有子而各誨之此喻人道之當然螟蛉句則驗物理之自然也嚴華谷泥宜臼奔申事謂民采則菽非我有於教誨式穀語意殊不似藿小雅白駒篇按傳謂藿猶苖也愚謂此亦當指菽言説文以藿為尗之少盖豆之始生者故與苖對舉耳小雅小明篇舊謂穫菽所以為蓄時晚不得有備故憂之而感非也此詩大㫖但以行役為勞未甞以無蓄為慼菽與蕭連類相及不過即道途所有所見者以為言玩其詞㫖祇在秋冬之交亦非定是嵗莫事耳小雅采菽篇傳箋實指采菽為享侯鉶羮論見釋芹不贅然傳云菽以芼太牢是芼牛以菽非以菽葉也鄭氏不解藿亦豆名故儀禮註謂豆葉為藿而曲解此傳以證其説亦不察甚矣羅瑞良云菽於用甚多羞籩之實􅟿餌粉餈皆擣粉熬大豆以為表則菽之得為芼可知何元子謂詩以菽興車馬衣服采菽而貯以筐筥将以待不時之需諸侯來朝有錫予之禮而不可亟儲其具乎詩意止此荏菽大雅生民篇按釋草云戎菽謂之荏菽此箋及孫炎鄭漁仲皆以為大豆樊光舍人李廵郭璞並云胡豆璞又引春秋穀梁傳解戎為菽及管子北伐山戎出戎菽布之天下為證正義辨之謂后稷不應舍中國之穀而求戎産即言齊桓伐山戎始布其種則后稷所種者何時忽絶而齊桓復布之禮有戎車不可謂之胡車明戎菽為大豆其辯甚晰愚按戎本有大義見釋詁明文商書乃不畏戎毒於逺邇大雅肆戎疾不殄皆作大訓戎菽之為大菽無疑若管子所云或是伐戎時所得乃胡豆耳觀此則荏菽為大豆名非菽為大豆名益信或引齊民要術凡區種大豆令相去一尺二寸區種荏令相去三尺則荏與大豆異愚按荏乃蘇類今有一種白蘓名荏釋草蘓桂荏郭璞以為蘓荏類故名桂荏方言關東西謂之蘇或謂之荏是也與菽無涉后稷所蓺皆菜穀種不應以蘓荏並言且釋草明有荏菽之條未可分二物訓也斾説文云繼旐之旗沛然而垂名斾盖旐以全帛為之續旐末為燕尾者名之為斾也以比荏菽則是豆莢懸綴莖間參差並出亦有燕尾形故曰斾斾不專取長義及揚起勢耳瓜瓜豳風七月篇瓜蔓生種類不一有龍蹏虎掌羊骹兔頭桂枝蜜筩瑥貍頭白㼐無餘縑諸名具見廣雅今本草所載惟六種而已羅瑞良謂周詩瓜無所出之地至秦漢間始有東陵瓜其後以遼東廬江燉煌之種為美而瓜州大瓜如斛按古瓜州正唐燉煌郡左傳廹逐乃祖吾離於瓜州此其處也羅瑞良謂古人以瓜紀時夏小正五月乃瓜始食瓜也八月剥瓜乃蓄瓜也周詩七月食𤓰盖夏五月其説非是豳風舊謂以夏正紀時此自不誤今𤓰期惟王瓜四月即生其餘皆在夏秋始熟若七月為夏之五月此時瓜實未成安所得食且古人食瓜最重故為天子諸侯削者皆有異制今豳民儉於自奉而反以先時不多得之物食我農夫必不然矣豳風東山篇傳訓敦為專專義究不可解即通為匏繫亦曲説也嚴華谷讀音團取圓成之貎似矣愚謂不若與大雅敦彼行葦同解行葦傳云敦聚貎盖瓜實纍纍叢生聚繫故亦曰敦耳首章敦彼獨宿敦亦當訓聚謂軍士聚處也云獨宿者對家室而言也烝衆本釋詁文瓜實纍纍叢綴薪上自是衆義且與敦聚之解適合鄭氏改訓塵不可解正義釋塵為乆亦强語而嚴華谷從之且斷以獨宿非衆過矣瓜苦瓜之苦者此即其所見言不必泥苦字求解而傳分心苦事苦二説鄭氏更取瓜瓣喻心别以乆見使析薪作事誕甚嚴華谷謂征人想像婦見苦瓜乆在栗薪因思如我匏繫於東定作三年之歎為説太曲其故在看我征聿至四字不實耳觀末章躊躇婚娶明是既歸之語濶别許乆瞥見故園風物且喜且悲情所必至唐詩始憐幽竹山窓下不改清隂待我歸正其况也必從征夫意中想婦語又從征婦語中作思夫意祇屬笨伯小雅信南山篇鄭氏税瓜之説無所据以場人職及郊特牲文考之固有為天子樹瓜者非必盡出農力耳嚴華谷以為野人獻芹之義亦曲解何元子云此疆場當主公田之場故於此種植以盡地利而獻皇祖也是剥是菹二是字䝉上瓜言文義甚明不必以醢人豆實無瓜菹為疑也何元子謂剥言剥棗菹凡七種無瓜菹詩但言剥菹而不言其物以惟棗用剥言剥則知其為棗菹惟七種言菹則知其為七菹也此大武斷禮稱削瓜削即剥義豈可易瓜言棗至瓜菹雖不見經傳然禮𤓰祭上環則生者漬者自皆供祭品況齊民要術亦載瓜菹之法其由來舊矣烏得謂後世所用非古祭禮備物耶嚴華谷云方其削治未定為菹故言是剥及已淹漬知是為菹故言是菹於義較詳不然未有舍其生而專以菹獻者於瓜祭之禮未備矣瓞大雅綿篇瓞瓝其紹瓞釋草文舊解皆謂瓞有二其一為小瓜種專稱即瓝之别名其一則大瓜之近本初生者小如瓝亦名瓞故曰其紹瓞也愚按文義其字䝉上瓝來盖瓝瓞皆小瓜通稱故謂瓞即是瓝瓝之相繼而起者較瓝更小則謂之瓞也如此則兩瓞祇是一小瓜耳詩言瓜瓞盖舉小大以盡其類也詩言自土沮漆則是已遷豳土在公劉之後矣義不及后稷何容溯稷所自出者況篇中皆言太王及文王之事與先世無涉正義解箋謂以瓜喻嚳瓞喻稷以下非是集傳與箋疏取喻正相反箋疏先瓜而後瓞喻祖紺以上也集傳先瓞而後瓜喻太王以下也然以篇中詞㫖合之則後説允矣愚則謂瓜生皆由小而至大始雖為瓞繼漸成瓜瓜成又復生瓞此所謂緜緜不絶意耳必謂近本者為小至末者為大説亦泥大雅生民篇傳訓唪唪為多實不知何据按説文唪大笑也讀若詩瓜瓞菶菶則舊本疑原從草同菶萋之菶取茂盛意者或譌從口同唪耳字書又作義同匏邶風匏有苦葉篇匏謂之瓠此傳文陸農師駁之以為長而瘦上曰瓠短頸大腹曰匏盖匏苦瓠甘定非一物愚按謂匏即瓠者自毛傳後如説文廣雅古今注皆仍其説然匏但為器用此詩與公劉酌之用匏是也瓠甘可食詩幡幡瓠葉甘瓠纍之是也而匏又有大瓠之稱荘子魏王遺我大瓠之種故古今遂通稱之要之是兩物耳兹備列釋瓜中以俟覽者類辯云首章總言濟涉之宜則匏本為濟用者左傳苦葉不材於人供濟而已正此詩確解正義反以為斷章何也魯論飽瓜繫而不食瓜尚苦不可食何況其葉陸璣亦據傳謂匏即瓠故引瓠葉為可食之證而不知其誤也以此斷之則匏之不得為瓠益明矣鄭氏謂匏葉苦而渡處深盖八月之時隂陽交㑹始可以為昏此以飽為紀時之詠固非然云八月始可為昏庶幾猶是霜降逆女古制則以仲春為婚姻之期者實自相矛盾矣大雅公劉篇匏取儉質故用以酌正義以為自然之物不假雕飾是矣陸農師謂以匏盛酒冬即煖夏即冷物理有之然非用匏之㫖也瓠衛風碩人篇陸農師謂瓠状要類於首尾類於要微鋭縁蔓而生其状與匏異矣羅瑞良以瓠為匏之甘者猶荘子以匏為大瓠盖互易為名實非一種也釋草云瓠棲瓣郭璞直引此詩為解當是舊本原作棲取瓣在瓠内棲集義耳今詩作犀於瓠瓣難通矣按古以兕為甲因謂堅為犀漢書鼂錯傳器不犀利是也豈以齒有堅義故亦通作犀與相法齒瓣白如瓠犀青如榴子者貴詩所云自取潔白義漢書張蒼肥白如瓠亦是其證集傳方正整齊之説又從白中推出耳小雅南有嘉魚篇吕東萊謂瓠有甘有苦甘瓠則可食者此亦誤通匏為瓠故云瓠有苦者耳古書傳但有甘瓠無甘匏亦但言匏苦無言瓠苦者此可以斷已嘉賓兼賢材言若有材無德則亦不足為君子重矣陸農師就魯語苦匏不材之説因謂甘瓠為材且以賢材分上下之等鑿甚夫傳明言供濟此匏葉正㫖也陸氏顧不之取而專取一材字以穿鑿甘瓠之詩不亦誤乎小雅瓠葉篇陸璣謂匏葉少時可為羮又可醃鬻極美揚州人恒食之至八月葉即苦愚按此正所謂瓠葉也惟其可食故詩采烹以甞耳璣通作匏遂繫於有苦葉之下誤矣傳以瓠葉為庶人之菜恐未然庶人啜菽飲水而已豈有瓠兔雜陳而反謂之㣲薄者按儀禮公食大夫上大夫庶羞二十加於下大夫以雉兔鶉鴽則兔惟上大夫有之瓠葉所以芼者其非庶人之饌明矣幡翻通孟子既而幡然義同翻是也詩巷伯㨗㨗幡幡賓筵威儀幡幡盖亦輕舉意大抵如唐棣偏反之説而或乃泥字求解以為瓠葉似拭布之形亦迂甚矣壺豳風七月篇傳謂壺即瓠按瓠讀若䕶與壺音不同以形求之亦非一種瓠長壺圓故崔豹以壺為無柄之瓠亦猶匏之名大瓠耳然壺形但大腹而不細腰細腰者俗呼藥壺盧廣志謂之約腹壺是也舊説𤣥蜂若壺盖指此非單名壺者壺與匏皆中虛可渉水然匏形短頸大腹而稍扁壺則長腹而圓不可以利涉之故混為一物也詩匏有苦葉此匏可涉水之證鶡冠子中流失舩一壺千金此壺可涉水之證陸農師謂壺非食物豳民斷其蔓使堅成可用其説是也但嫌與下食農文不合長樂劉氏云枯者為壺嫰者為茹八月宜斷其梢令勿復花實所以堅其壺而大其茹此亦一説詩識名解卷十一

body:
  text: 詩識名解卷十二錢塘姚炳撰草部茅茅豳風七月篇説文以茅為菅鄭漁仲别茅葉為菅皆非古者菅茅異用菅同麻並漚為布而茅則以蓋屋其種佳者用包裹禮物及充祭祀縮酒如禹貢包匭菁茅春秋傳包茅不入及易詩白茅皆是並與菅不相涉也故陸璣謂菅似茅又異物志云香菅似茅而葉長大于茅皆以二物相例其非一種明矣鄭氏謂取茅絞索以待時用不明言何事正義訓為蠶具亦是臆揣蠶惟預備􅍉葦為栖從未聞用茅者嚴華谷云取茅將以蓋屋索綯將以縛屋蓋公宫所蓋必不用茅茅又不可為索綯今以屋為野廬取茅蓋之又作繩索以縛此屋而修治之上下文義始曉耳此解最楚綯之為絞釋言文不可易索則繩索也曰索綯者倒其詞趁韻而已而其詞益竒古集傳訓綯為索訓索為絞蓋未審其為倒文耳白茅召南野有死麕篇郭璞謂釋草藗牡茅為白茅屬陸璣云茅之白者古用包裹禮物以充祭祀縮酒用蓋同為茅類而種貴於諸茅者也釋草謂之牡茅疑亦取其為茅類之長耳邢昺泥牡字謂為不實之茅亦如牡菣之云無子殆未足信純當讀如凖緣也書顧命篾席黼純注謂以白黑雜繪緣席也白茅裹束禮物有緣義蓋上章但云包之而已此則既包而又用白茅束縛之也舊或訓為聚或通作全皆於義強合小雅白華篇此詩言束猶周易言藉正與上菅對言明白華可為菅白茅可為束二者皆有用之物非僅作裹束活字訓也舊解多以茅為束菅之用謂如妻妾之相承皆誤愚謂白華白茅總取潔白義自况其德也蓋以嫡后之尊助理隂教亦如菅茅之濟於用非可等間棄置者且白茅物薄而用重其非賤褻之比可知或乃曲解喻妾之説力詆為賤又嫌於縮酒不可通強以宗廟崇重喻褒姒得時尤可哂二章以菅茅連言然菅自菅茅自茅鄭氏以為為菅之茅則誤矣正義謂上章言取茅而棄菅故此章申之不識一取一棄從何處看出也則皆引喻之訛以致此耳菅茅生質潔白故白雲從而覆被潤澤之兩者有臭味相投意今之子乃憒憒然以色棄德莫我肯顧其視菅茅之被澤於雲何如哉故曰不猶也猶同也荑弼風靜女篇荑或作稊列子因以為茅靡一作弟靡字書荑與稊弟通易枯楊生稊鄭注亦作荑是也惟説文分荑稊為二物訓荑為草故或以荑為柔草通名然韻會謂今人食之謂之茅揠則其為茅始生專有之名明矣荑即茅所用以藉禮物者此即上彤管之藉也易茅言荑變文耳看下貽字明是藉以將禮故曰匪汝荑之為美也乃美夫人之以彤管相貽者而荑亦覺其美耳末句美字略讀緊接上為美來謂我美之也舊説以荑為喻又解贈荑在彤管之外且以為美人之所贈皆未然嚴華谷又以荑為男贈女之物報貽彤管按詞旨美人之貽自是人以此貽我而必云我為美人之貽於文亦未順此與劉貢父所説贈勺貽椒謔語合觀可發一哂何元子説此篇以靜女為一人女美者又一人貽彤管是實事歸荑是假象紛紜舛錯語意不倫且既以二章女美非靜女何以覩彤管而悅其美且珍重其貽而深以為美耶夫美者非美其色也美其所贈而歎想其正靜之德耳荑生郊外故從其地采之許東陽泥自牧二字以為相逐於野非也且如周南之女猶出遊江漢人亦貴其德之貞耳何必以城隅自牧為嫌哉夫城隅而曰俟者從其人想望之也即于歸牧馬之謂也故下曰愛而不見也衛風碩人篇舊皆以荑新生取柔義然荑自為茅始生者此以喻手當兼白言蓋柔則衆草之始生所同柔而白則茅所獨也荼鄭風出其北門篇鄭氏解此詩之荼為茅秀按茅秀亦有荼名以釋草蔈荂荼猋藨芀之文證之其説允矣陸農師混入苦菜非今正之舊以荼色白因謂女見棄又遭兵革之禍故皆喪服此大非也兵革不息男女相棄民方奔竄之不暇奚暇講求凶禮必喪服以覔其室家耶且下綦巾茹藘或蒼或赤何同遭禍而服色不同如此愚謂對上如雲自取繁盛義則陸農師之説得之鄭氏謂荼物之輕者飛行無常蓋取亂離漂泊意然與上如雲義究不協而或乃以為淫泆女子之况不尤謬乎豳風鴟梟篇傳以此荼為萑苕按茅薍相類其秀皆可稱荼然此詩通作鴟梟自言陸璣謂鴟梟喙尖如錐取茅秀為巢以麻紩之如刺襪然正與捋荼之語相合蓋所以藉巢者則是茅秀非薍秀也上綢繆牖户必取桑根之皮此但納茅秀於巢中以為之藉蓋桑土以葺其外荼租以藉其內也禮封諸侯以土蒩以白茅周禮音義亦作租説文訓蒩為茅藉是矣韭韭豳風七月篇韭之為物不與常草同故自為一類而薤屬之本草一名草鍾乳一名起陽草其收種法具見齊民要術説文謂一種而久者故謂之韭性內生根喜上跳翦不用日中杜詩夜雨翦春韭是也然釋草但釋山韭為蒮而不更列家韭又字林别載水韭之名大抵形似而種各異者正義謂祭韭者蓋以時韭新出故用之舊皆主其説愚謂用韭非薦新之義韭逞味於春故凡春祭皆用之若薦新當在三之日夏小正云正月囿有見韭是也况此祭原為薦氷而設非為薦韭而設春祭凡羹芼皆用韭此舉時物以該祭品耳宋淳化中李至上言詩四之日即今二月也又月令開氷之祭當在春分非四月所當行帝覽奏云韭長可以苫屋矣何謂薦新此辨時云爾若今韭二月已盛長無復新黃則苫屋固不待四月也果裸果裸豳風東山篇釋草云果裸之實栝樓邢昺解為果裸之草其實名栝樓是也蘇頌謂其苖引藤蔓葉如甜瓜葉而窄作又有細毛七月開花似壺蘆花淺黃色結實在花下大如拳其形有正圓者有鋭而長者似是瓜屬故有天瓜苽蔞之名然青時如瓜黃則如􅍄柿又但入藥品不與果蓏瓜瓠同類兹依釋草文别列以識其名云李時珍云裸與蓏同説文木上為果地下為蓏此物蔓生附木故得兼名栝樓即果裸二字音轉也亦作􅌣後人又轉為瓜蔞愚按釋草謂果裸之實為栝樓是果裸者根蔓葉實之總名栝樓其實名也時珍謂果裸兼得木上地下之稱近是至謂栝樓即果裸轉音則誤矣雷斆分圓者為栝長者為樓又有謂以雌雄異名並存考宇乃屋垂即今簷下故栝樓得而延蔓之與室户有别觀七月詩在宇在户之分可見蘋蘋小雅鹿鳴篇蘋與蔞異種而相似蔞葉如艾白色莖正白生食之亦香而脆葉亦可蒸為茹故鄭漁仲謂蔞即蘋然釋草明以蘋為藾蕭郭璞謂之藾蒿不與蔞混也王弇州謂蔞蒿即藾蒿則皆誤於漁仲耳盧氏雜説載唐德宗聽政暇博覽群書一日問宰臣蘋是何草楊珏以爾雅藾蕭為對上謂詩疏葉圓而花白叢生野中似非藾蕭云云然按今所傳陸璣説但謂蘋葉青白色莖似箸而輕脆通無葉圓花白之語也兹以釋草無蒿名别列於此傳訓蘋為蓱説文訓蓱為蘋皆大誤陸農師傅會之以為蓱無根而浮常與水平故曰蘋尤非理也羅瑞良又謂鄭氏以蓱非野所生非鹿所食易為藾蕭然古人稱水草之交為麋則麋鹿亦食水草此皆曲通傳説究屬強解陸農師既本傳釋蘋為水草因謂鹿食蘋亦兼飲言以合序飲食之説尤鑿蒿蒿小雅鹿鳴篇專名蒿者釋草謂之菣郭璞陸璣皆以為青蒿愚按蒿類不一惟蒿菣及皤蒿牡菣見釋草文餘書傳中有蓬蒿白蒿艾蒿蔞蒿薌蒿藾蒿蘿蒿黃花蒿牛尾蒿馬先蒿諸類以釋草無蒿名俱别見至如陸農師説青蒿亦自有黃色青色二種博物君子無槩視之可耳説家誤於傳以蘋為蓱因謂鹿食水草今諸蒿叢生原野豈亦水草類耶此不辨而知其誣者小雅蓼莪篇嚴華谷引釋草文以謂蘩蕭蔚莪之類春始生氣味既異故其名不同至秋老成則皆蒿此詩説莪蒿甚明愚按莪形似蒿故後人有蘿蒿之稱然釋草但云莪羅而已所謂蘩醜秋為蒿者正以蘩有皤蒿之名其長大則為蒿類非謂莪蕭為蘩之醜耳嚴氏合莪蒿為一物作解誤矣舊説多分莪蒿為二草得解然謂憂思亂神視莪為蒿則非羅瑞良云古言蒿以為非美物者涼秋九月枝幹益髙荒壇枉徑蕪穢不治故蒿者農惡之然則詩意蓋曰父母生我而不能得我一日養也彼蓼蓼然蒼蒨者貌視之以為菁莪之草也庶乎其美材也乃孰視之則滿徑蓬蒿而無所用也此孝子之自况也則是本為蒿而貌視為莪者也蔚小雅蓼莪篇釋草别蔚為牡菣郭璞以為無子者蓋從牡取義而陸璣云牡蒿七月華八月為角角似小豆則又有子矣至本草别以牡蒿為齊頭蒿與璣説馬新蒿異至云秋開細黃花細實如車前實而內子微小不可見故人以為無子亦是強語愚謂釋草有牡牡茅其名牡者頗夥自非無子之義蓋蒿蔚皆菣而蔚太於蒿猶雌之有雄牝之有牡者故曰牡菣嚴華谷亦以蔚為蒿之尤粗大者是也羅瑞良泥無子之説謂蒿生子以喻母牡蒿以喻父尤誕詩但以莪蒿喻材不材耳若果取義分喻父母則何不如屺岵之詩明言之而乃先母而後父且喻言則分父母為二正言又合父母為一耶羅瑞良又謂蒿猶有子者蔚則無子以見父母得我之難且蔚又治無子亦寓其意尤穿鑿與芣苡曲解相似嚴華谷云詩人取義多在首章至次章則變韻以成歌此舉蔚以言蒿之粗大耳猶揚之水一章言戍申二三章言戍甫許借甫許以言申止是戍申不戊甫許也此最得解蓋蒿蔚一種變文取韻非有他義舊解皆為過於深求故穿鑿至此明其義者可與讀全詩匪特揚水一篇堪例言也蘩召南采蘩篇蘩為皤蒿郭璞即謂白蒿邢昺以為皤猶白是也釋草蘩名凡三見後二條注家皆以為未詳惟夏小正傳以由胡釋蘩又廣雅云蘩母蒡勃也陸璣亦謂皤蒿一名遊胡北海人謂之旁勃則由胡當即皤蒿無疑至陸農師引仙經食之説遂合釋草菟蒵為一物未可據也羅瑞良則分蘩為水陸二種其一為蘿蒿屬水其一為皤蒿屬陸然釋草文莪蘿别列並不以為蘩醜本草謂白蒿生中山川澤何云非水物今洲渚滸涘間草根下滋於水而出乎陸地者比比皆是又釋水小渚曰沚乃水中可居之地詩云于沼于沚正根滋水而出乎陸者未可強分為二也皤蒿似艾葉上有白毛粗澀實非艾也陸璣以為凡艾白色為皤蒿非是菹有七韭菁茒葵芹菭筍是也無有以蘩為菹者傳箋謂執蘩菜薦豆菹皆牽於序奉祭祀之説要鮮確據但皤蒿香美可食又左傳蘋蘩薀藻之菜可薦鬼神則古或以蘩列祭品不似后妃采荇之語尤為不根耳陸農師以沼沚分內外謂荇采之左右蘩采之內外蘋藻采之上下蓋位下事繁之證此甚無謂夫荇藻亦在沼沚之中凡采不越左右之際必紐三者分别繁簡為后妃夫人等級則穿鑿之大病矣通詩無奉祭祀之語又七月采蘩明供蠶事故語録云從來説蘩可以生蠶可以供蠶事何必抵死説道只在奉祭祀不為蠶事但不知於此詩集傳何故復仍祭祀説也何元子主蠶事之説解事為成君服之事古者蠶室必近川以便浴蠶故有于沼于澗之采宫即記所謂築宫之宫蠶室是也引據甚確特不當鑿云太姒親蠶之作耳首飾有副編次三者無被文古后夫人服三翟以供祭祀其首服皆以副配之此獨言被則非祭祀之服可知或引少牢禮主婦被裼之文為證要之彼即卿大夫禮耳薦蘩之説未敢據以為確然也豳風七月篇白蒿所以生蠶此傳確不可易蓋蠶無食蘩之事特其未生者煮蘩水以沃之則易出古浴種是其遺法所以不言飼而言生也集傳謂蠶生未齊未可食桑故以此啖之不知何據釋訓謂祁祁為徐然采不一人自取衆義此指民間之女言蓋將從公室之女公子媵於他國者惟其有同歸之故故染以為裳獵以為裘皆欲獻之公子也何元子例以采蘩之詩以為宫中之人在其內則何以不先豳公而先公子耶况彼專言被此泛言人各自為義明矣芩芩小雅鹿鳴篇芩釋草無文故傳但訓草説文依傳而别出菳為黃菳是芩與菳二物蘇頌謂黃芩苖長尺餘莖幹粗如箸葉從地四面作叢生類紫草髙一尺許亦有獨莖者葉細長青色兩兩相對據此則與陸璣所説芩草莖如叉股葉如竹蔓生者相似當是一物又廣雅云黃文內虛黃芩也字亦作芩可證舊分菳芩二義謂説文作菳以其色黃或云芩者黔也黔乃黃黑之色然今黃芩多外黃內青鮮黑色者芩從黔恐未然羅瑞良謂鹿鳴所食三物一曰蘋始生香可食二曰蒿甚香三曰芩亦香草蓋草木之臭味相同有同類食之之義此強解也今黃芩無香豈可與藾蕭青蒿並為香草此奚所據耶臺臺小雅南山有臺篇臺夫須釋草文鄭漁仲謂即蕓臺菜全謬陸璣云舊説夫須莎草也有皮堅細滑緻可為簦笠以禦雨而羅瑞良又分莎草與莎為二物以為臺即莎草也一名夫須蓋匹夫所須若莎莖葉都似三稜根若附子周而多毛即今青莎與莎草不同愚按釋草云臺夫須又云薃侯莎自是兩物羅氏之説不誤一説臺别名山莎而夏小正云薃也者莎䔺也通作沙亦名地毛見廣雅則釋草所謂薃侯莎乃以莎䔺二字為名不單名莎且有地毛之名疑羅氏所謂根若附子周而多毛者近之而臺既一名山莎故舊説謂之莎草或即青莎緑莎之類此大非也臺名山莎見纂文又取為簑笠自是堅老可用者若緑莎但柔翠蔓延而已晏殊庭莎記云是草耐水旱樂蔓延雖拔心隕葉弗絶也此則青莎緑莎之屬正釋草所謂薃侯莎者耳羅瑞良謂詩以得賢為邦家立太平之基凡言八物以臺為首蓋禦雨之具雖至微然必平日知其所在蓄以待之亦猶賢者之當預蓄此誕説也通詩八物平列各自為義安得取首義以槩其餘且簑笠固以臺草為之未有專言臺而取簑笠為義者今有制器者於此不入山度材漫取杯棬巵匜之屬而曰把栁之為把栁即在是也然乎否小雅都人士篇鄭氏謂以臺皮為笠故謂之臺笠是也此與緇撮對言明非二物傳分臺禦暑笠禦雨殊難解若依羅瑞良説以臺止為衣而别笠於臺外則簑衣正禦雨之具而但云禦暑何耶今世笠制不一有用麥莖織者亦有以竹編其外而施棕皮蒻葉於內者此與用臺正相似詎云臺必不為笠乎正義引郊特牲文謂草笠野人之服是賤者也陸農師辨之以為尊者草服臺笠而卑者蒲茅愚謂笠不必定為賤者所服士君子家居亦用之如謝靈運好戴曲柄笠李太白詩飯顆山頭逢杜甫頭戴笠子日果午大抵登涉遊覽多服此者與上狐裘下充耳對言此則燕居之飾必謂此為賤服又或謂出田時所戴於都人士殊不相肖萊萊小雅南山有臺篇釋草云釐蔓華説文云萊蔓華愚按萊本音讀若釐故釐萊古通范致能吳郡志云萊釐吳音並用是也如劉向封事引詩貽我來牟作釐牟正與此合則萊之即釐無疑者餘見他書或異義同字或異文同音不可枚舉後人復因釐藜音似故或引陸璣逸説訓萊為藜而注爾雅家又不知雅之釐即詩之萊但以為蒙華并不言其狀此古今一疑案也然事物原始則云萊即藜一名落帚初生葉可食大則為樹可為杖則二者又似一物未詳是否傳因釋草無萊故不明言何草正義直以汚萊當之過矣陸璣謂萊葉可食今兖州人蒸以為茹謂之萊蒸當有所據又字書汚萊之萊讀若賚則并不叶臺韻矣或謂萊即今紅心灰藋菜譙沛人以雞蘇為萊三蒼以茱萸為萊皆名同物異愚按灰藋别是一種玉册號藜為紅心灰藋蓋形似灰藋而心赤者此即謂藜為萊之説若雞蘇茱萸則去之逺矣釋草拜蔏藋注謂赤似藜左傳斬藜藋蓬蒿而共處則藋與藜相似謂萊為藜因謂藜為藋此或有然耳陸農師謂楊舟利涉以象濟難其義猶似若據萊葉可食之説推至於藜藋充飢以為濟難之象則愈曲矣且作詩錯舉發端謂山之有草木猶國之有嘉賔耳何能一一引喻之曰若者為治平之佐若者為濟難之臣乎莪莪小雅菁菁者莪篇釋草謂莪為蘿郭璞謂今莪蒿亦名𦾰蒿陸璣謂一名蘿蒿葉似邪蒿而細科生莖可生食又可蒸食香美味頗似蔞蒿陸農師謂一名角蒿愚按本草角蒿似白蒿花如瞿麥徑三四分花罷結角長二寸許微彎與莪絶異農師之説誤爾兹以釋草無蒿名别列於此覆蠶以蘩不聞以莪陸農師引釋蟲之蛾羅以解釋草之莪蘿要是強合郝仲輿又謂蒿易長俄然而成故名莪以比育才亦未然羅瑞良謂莪為古之蘩即釋草所謂蘩之醜者愚謂蘩之醜釋草不明言何物而莪蘿别列一條且無蒿名則莪不當為蘩明矣羅氏又據此詩中沚合召南澗沚與春秋傳澗溪沼沚為左劵然召南一章云于沼于沚二章又云于澗之中春秋傳云澗溪沼沚之毛又云潢汚行潦之水前後説相合而此詩首曰中阿三曰中陵夫陵阿詎亦水中地耶莪陸生性亦宜水大抵在陵阿中者多陳藏器謂𦾰蒿生髙岡是矣詩云在沚者蓋根滋水而仍出乎陸耳若陸璣所謂澤田沮洳處非必竟是水中也故以莪為水蘩吾未敢信莪之在中阿陵沚猶士之在膠庠所謂得其地斯為良也詩之大指傳語盡之其後説家浸淫益鑿並可掃除耳小雅蓼莪篇蓼蓼傳取長大義無所據戴侗以為草蒼蒨貌得之蓋莪之色也愚謂蓼蓼猶菁菁陸農師云草之初生其色玄盛則乃青霜死而後黃落故菁文從青正與蒼蒨之説合舊解多取長大義以便於莪變為蒿之解則其誤實自此始矣嚴華谷云莪至蓼蓼然長大之時則非莪矣乃蒿也其始為莪猶可食其後為蒿則無用此孝子自怨其身之詞與凱風言棘非美材僅堪為薪之意同愚謂蓼蓼果為長大之義則此長大者便已為蒿不當仍謂之莪矣且使莪長大必變為蒿則少好長醜天下最不材者無踰於此而菁莪何以為育材之况耶夫孝子誠自怨其身也曰吾固願為莪而不得而直為蒿也蓫蓫小雅我行其野篇釋草云蓫薚馬尾即此詩之蓫無疑今人誤讀爾雅皆以蓫薚連文為商陸别名因不識詩中蓫為何物不知蓫一名薚一名馬尾觀郭璞所引本草及關西方言可見又羅瑞良亦列薚為一條不作蓫薚此其證也蘇頌謂蓫俗名章栁根多生於人家園圃中春生苖髙三四尺葉如牛舌而長莖青赤至柔脆夏秋間開紅紫花作朵根如蘆蔔而長此可以識其狀矣傳但訓蓫為惡菜鄭氏以為牛蘈陸璣主其説謂揚州人呼為羊蹄似蘆蔔而莖赤可瀹為茹滑而美幽州人謂之蓫愚按牛蘈釋草惟有藬名更無蓫名今舍藬而以蓫當之亦張冠李戴甚矣郭璞謂今江東呼牛蘈者髙尺餘許方莖葉長如鋭有穗穗間有華華紫縹色可淋為飲據其圖狀與璣所説羊蹄逈異且傳以為惡菜而璣甚稱其美又兩相刺謬矣本草注謂商陸昔人亦種之為蔬根苖莖並可洗蒸食頗與傳菜名合覽者斷焉或謂説文無蓫字蓫亦作蓄谷風詩我有旨蓄亦以御冬陶隱居謂即此菜戴侗云今羊蹄菜謂之秃唐即此物秃蓫蓄蓋一聲之轉耳此尤影響傅會之説不可據也嚴華谷謂詩意蓫菜野生不待栽培猶可治疾今婚姻交結之素乃野菜之不如其義非也此特野行無聊之况觸物寓言豈暇計及治疾之用耶葍葍小雅我行其野篇葍訓葍釋草文郭璞謂大葉白花根如指正白可啖者是也廣雅以為烏麮陸璣云河內謂之蓘幽州人謂之燕葍根正白飢荒之嵗可蒸以禦飢其草有兩種葉細而花赤有臭氣也愚按葍與蒠菜相似故陸璣釋菲為葍類當以郭注大葉白華之狀求之鄭漁仲謂即商陸是以蓫為葍矣陶隱居釋木通或云即葍藤莖又本草唐注江東人呼木通為畜葍子色白者乃猴葍也則木通原有葍名蘇頌謂木通蔓大如指夏秋開紫花亦有白花者又與郭璞説葍近似當是一物耳釋草又云葍蔓茅郭璞以為葍華有赤者為蔓蔓葍一種是也此則陸璣兩種之説蔓茅乃華赤者或當有臭氣耳鄭漁仲仍以為商陸之赤者誤甚鄭氏以采蓫采葍為婚姻之期故云仲春可采誤甚婚期逮氷未泮此不必言即果如仲春俗説亦當賦桃夭豈有采野草惡菜而識之以為佳期者此明是眼前流落光景不可因婚姻傅會也藍藍小雅采緑篇釋草葴馬藍郭璞以為今大葉冬藍也羅瑞良云菘藍汁抨為澱堪染青蓼藍不堪為澱惟作碧色其大葉者别名馬藍凡物於其大者多以馬名故以馬藍為作澱之藍愚按詩但言藍於諸藍中未知何指然采以為染則自取其大葉堪作澱者言之鄭漁仲通志藍分三種謂俱堪作澱然但稱大藍無馬藍名至釋草葴注别云馬藍菜要未可據蘇頌又謂菘藍即爾雅馬藍則三者之分又混淆矣崔實謂五月可刈藍與月令正相反愚謂采藍不必拘時大約以五月為始故以為五月藍已漸長初及可刈之候此民間私事若月令則國家之制必有關係故禁之非直為微草細事已也夏小正啓灌藍蓼固是分移之説然安知不刪繁作染薄言刈之耶至鄭氏以日作月則六日不瞻采藍之期又過五月矣總之早晚先後固無定時説詩者尤不可執成説以相拘也陸農師謂藍大於緑又其畦植如鱗則采之盈襜較易故詩以為後此傅會之説也緑乃鴟腳莎其葉細藍為馬藍其葉大此大小之辨固然然以是為易盈不易盈之别因謂序有先後詩人豈暇及此耶白華白華小雅白華篇釋草正列白華而以野菅釋之蓋以白華無他名取其已漚之名加一野字為識則白華其本名也二章總云菅茅省文成句耳陸農師乃謂菅花白故一云白華則似本名菅而偶呼為白華者誤矣至舊以為茅屬尤誤束晢補白華詩泥序謂孝子之潔白意故有涅而不渝無營無欲之句説者以此見白華之美愚謂凡華白者頗多何必於為菅之華專楊其美且如笙詩無文其序本不可信束晢所補但摹寫一白字而詞頗淺陋去作者之旨逺甚詎可據彼而論此耶舊有謂菅蒯皆苕也黃花者俗名黃芒白華者俗名白芒黃芒即蒯白芒即菅愚按苕華見釋草文黃者自名蔈白者自名茇與菅蒯無涉且菅蒯又不名芒釋草芒杜榮郭璞謂似茅皮可以為繩索屨屫本草别名芭茅亦有黃白二種乃别是一物不可混陸農師云白華不菅則脆薄白茅不束則散亂故詩以譬夫婦菅與漚麻漚紵漚菅同義矣束與束薪束芻束楚同義矣按此以二語例看得解且菅與束對舉引證二詩確甚菅陳風東門之池篇陸璣云菅似茅而滑澤無毛其根如渣芹而甜根下五寸中有白粉者柔韌宜為索漚乃尤善愚按此即白華之狀正義謂菅者已漚之名不誤至其未漚者但當云白華不當云名為茅也本草注茅有白茅菅茅黃茅香茅芭茅數種直以菅為茅之一又謂夏花者名茅秋花者名菅二物狀皆如筋可通呼地筋不可並名菅則菅又非茅要之皆矛盾語耳堇堇大雅綿篇此堇定當為苦堇釋草云齧苦堇郭璞謂今堇葵葉似栁子如米汋食之滑是也本草唐注以為此菜野生非人所種俗謂之堇菜葉似蕺花紫色者説文亦謂堇根如薺葉如細栁蒸食之甘皆可證嚴華谷引內則堇荁枌榆又公食禮鉶芼皆有滑以為內則言婦養舅姑公食禮言君待其臣皆以堇則堇是美菜傳以堇為菜不言毒物知為堇荁之堇非芨堇之堇也其辨稔矣正義解箋謂性苦者皆甘如飴若是堇荁之堇雖非周原亦自甘矣明堇是烏頭此大誤也堇菜亦有苦名詩正與苦荼並舉而見其甘美耳嚴華谷云若為驪姬置肉之堇則與鴆毒同類與荼菜可食之物非其類矣且詩人稱周原之美當言宜稼宜蔬不應言其宜毒物也荼雖苦得霜而甜故可言如飴烏頭毒物不可食何尤知其如飴乎賈山言江臯河濵雖有惡種無不猥大地之美者能使物無美惡皆猥大耳安能變毒物而為美物其論甚暢備録之釋草苦堇之堇與芨堇之堇音字原無異同亦顧於詩義何如耳字書别苦堇作堇芨堇作堇又别爾雅苦堇之堇為上聲詩芨堇之堇為去聲皆不必也蓼蓼周頌艮耜篇釋草有薔虞蓼之文郭璞謂虞蓼即澤蓼是也蘇頌以為蓼有紫赤青馬水香木七種紫赤二蓼葉小狹而厚青香二蓼葉相似而俱薄馬水二蓼葉大上有黑點木蓼一名天蓼蔓生葉似柘葉諸蓼花皆紅白子皆赤黑木蓼花黃白子皮青滑按此則蓼類不一良耜所薅是田間水中所生者其為虞蓼無疑矣説文以虞上屬讀為薔虞則似水蓼專有蓼名非是正義謂蓼是穢草此因薅云然愚謂田間不使草生恐妨五穀故凡非種皆鋤何必定是穢者始薅之耶至蓼與荼水陸異産斷非一物俗呼辣荼者荼即苦字之代蓼味辛而苦故云辣荼蓋苦之易言荼猶辛之易言辣也舊解混而一之不知何據周頌有毖篇集蓼言辛苦此妙諦但陸農師虛屬後患言何元子專指武王喪言以時考之武王既崩流言初興周公避而居東二年之秋天有風雷之變於是王迎公歸明年免喪朝廟而作閔豫此詩繼作於閔豫之後則非居喪時矣集蓼語當不指此吳越春秋載越王念復吳怨臥則以蓼詩語意雖不必著迹似亦當作如是觀是乃所謂懲毖也詩識名解卷十二

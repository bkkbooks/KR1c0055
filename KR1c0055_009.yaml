body:
  text: 詩識名解卷九錢塘姚炳撰草部竹竹衛風淇澳篇釋草謂竹為萹蓄蓋謂此詩之竹也郭璞以為似小藜赤莖節好生道傍可食羅瑞良云說文引詩作菉竹韓詩作緑􅗨菉既非色而􅗨又非竹不可合為緑色之竹箭故析而解之是矣愚按釋文􅗨萹竹也則萹蓄自有萹竹名又形微似竹蘇頌謂其細緑如竹赤莖如叉股節間花出據此則古或稱􅗨或稱竹即是一物且􅗨可名竹竹不可名􅗨以毛詩之竹而合之韓詩之􅗨其為萹蓄奚疑耶舊以緑竹為竹箭蓋本兩漢書及戴凱之竹譜亦自有考然今竹盡出江南不聞衛地多有又釋地云東南之美者有㑹稽之竹箭亦未嘗及大河南北豈淇園之竹惟盛於漢時至後無遺種而宋復滋茂今又蕩然耶其說雖有自要未敢據以言詩也宋熙寧中太子右贊善大夫吳安度召試舍人院賦入第三等論入第四等止緑竹青青詩不依注解作王芻萹蓄遂定入第五等因是改一官放罷宰臣富弼言切詳安度命意必謂王芻萹竹柔脆常草不足以詠武公之德又按史記河渠書云淇園之竹則知淇澳之竹只是竹箭之竹也又按陸德明釋文青音菁茂盛之貌於理甚通未為不識題意乞再取安度所試下學士院看詳於是賜安度進士出身此以緑竹為竹箭之始也菉竹前兩說外惟陸璣别以為一草其莖葉似竹青緑色髙數尺今淇澳傍生此人謂此為緑竹俗呼為木賊此亦一說羅瑞良則謂淇水宜竹箭從古以然然淇澳自出竹箭不妨兼有菉竹二草此又一說余前輩毛西河先生寫官記又謂當時淇上菉與竹本同生水濱而其後竹雖衰而菉猶存則菉竹本二物竹非草菉乃草也此以菉為王芻而竹即竹箭者又是一說猗舊讀如阿與猗儺之猗同傳訓為柔順是也弱草初生柔澤可愛猗猗然爾何元子以為竹林之狀互相依倚不可摧折因以興功夫夾持取合切琢風人之㫖便爾索然即此可見猗猗但宜言草不應言竹明矣舊訓青為竹色亦通但以猗猗為始生青青為堅茂如簀為極盛以喻武公學問則未必然也首章切磋琢磨瑟僴赫喧內外已無一不善豈必復於服飾笑語間論進修次第耶是竹之轉青與密比皆因武公學問起義耳且青舊讀如菁釋文直作菁菁與菁莪義同又凡草木之華皆曰菁此可以言茂盛不可以言堅剛明矣傳但訓簀為積韓詩章句云簀緑􅗨盛如積也羅瑞良以為西京賦芳草如積亦祖此義愚按釋器云簀謂之笫舊注訓牀版非也笫即今之席寢所棲者檀弓華而睆亦美其組織多文耳蓋二草布生水涯一望文理錯雜若織固當似之若竹林繁亂何可相況凌䝉初云即以既比之竹形容在林之竹是直欲指杯棬為把栁矣竹竿衛風竹竿篇此則所謂竹箭者釋草簢篠蕩是其屬說文竿竹挺是也戴凱之竹譜云謂竹是草不應稱竹竹是一族之總名一形之偏稱也植物之中有草木竹猶動品之中有魚鳥獸也然爾雅竹類并入草部而陸農師取以冠草類之首今仍其舊即附見緑竹後庶幾覽者得以類而辨之竹竿亦不必泥作衛物是詩為衛女思歸之詠所重在淇水不在釣竿蓋謂我繫情淇水之上思得竹竿以往釣然竹雖長而身去衛逺不可以釣於衛之淇猶鞭長不及之意也二語全注在逺莫致之句嚴華谷謂其幼時所見亦是莫須有之說何元子以說文無籊字謂通作擢猶引也蓋引竹竿以釣也引而又引故重言之愚按籊從竹當為竹狀與擢無涉說文多有紕漏不得以其所無遂旁通他字耳小雅斯千篇苞舊訓本按竹固一本叢生者然云竹苞非此之解釋木如竹箭曰苞蓋竹初萌時筍虇包固至長則脫苞而出有怒生之勢因以竹箭之茂為苞故謂凡草本甲拆狀似竹箭者亦統謂之苞耳又釋詁云苞蕪茂豐也苞即茂意今以一本叢生為苞取根基叢密之況豈竹固於下未密於上松密於上未固於下者與然則二語固不當為本末之分明矣此詩咏松竹惟取茂盛不取不凋正義因松之不凋轉及竹之冬青要非苞茂之㫖也筍大雅韓奕篇筍類不一釋草謂筍為竹萌又謂䈚為箭萌鄭漁仲以為凡筍類惟箭筍為美故㑹稽竹箭有聞焉今東南大抵皆三四月生者陸璣謂巴竹筍八九月生始出地長數寸煮以苦酒豉汁浸之可以就酒及食則又其一種耳正義為筍專所以為菹者稱䔩則對肉殽言爾何元子辨之以為說文訓菹為酢菜而䔩者酏食糝食之類二者皆有肉詩云䔩非云菹不可以不辨愚按釋器云菜謂之䔩蓋菜茹之總名也其類皆可為和吕氏春秋以為和之美者越酪之菌注云越酪山名菌竹筍也是筍之為和不專為菹明矣正義惟据周禮醢人有深蒲筍菹之文并解䔩為菹則亦徒得其一說耳菼菼衛風碩人篇菼名薍薍名荻荻同藡至堅成則名萑又色似隼故名隼而方言别名鳥蓲馬尾凡七名蓋與蘆並生非蒹也釋草蒹薕菼薍分釋自是二物舊解多混而為一非陸璣云菼初生三月中其心挺出下本大如箸上鋭而細其狀槩可知矣介甫字說不惟混蒹菼為一物并葭亦混為菼尤為舛錯不可不辨陸農師謂葭菼上擢則鱣鮪依焉而為罛之患故以譬妾之上僭大是曲說蓋此數者皆河水中所有詩故類舉之以侈其廣饒於義絶不相䝉也且通詩惟美碩人未嘗齒及嬖妾奈何深文至此耶自河水至葭菼五句但說得齊地廣饒四字下庶士庶姜則所謂士女佼好也禮儀盛備又從士女推出此鄭氏述卒章詩義大略如此今或以葭菼喻親迎禮容又或以揭揭盛長興姪娣衆多媵臣武壯則拘牽甚矣王風大車篇傳於此以菼為蘆之始生李巡樊光因謂蘆薍為一物則誤也至其本釋言文訓為隼義亦難解鄭氏以為毳衣有五色其青者如隼則是草色與鳥色相似故名也然陳祥道又云菼之初生其色𤣥如菼言其衣璊之為玉其色赤如璊言其裳據此則菼又不得為青色矣傳泥序聽訟之說作解使後人以大車為聽訟之車毳衣為聽訟之服其誤甚矣不知詩但謂此能決訟之人乃乘車服毳之人其貌尊嚴為可畏耳如東人以衮衣繡裳美周公豈必征東時定服此衮繡耶嚴華谷云乘是車服是服以朝享助祭儼然人望而畏之不敢犯禮其說最通陸農師据說文􅣞為隼帛其色如虋故謂之􅨷明非毳冕可知毳冕作繪宗彛非所以聽訟又其衣不得如菼青璊赤若說文之義是或一服也愚按此又以聽訟别有毳衣非如傳所云毳冕者然毳衣之屬衣繢而裳繡皆有五色則如菼如璊自可通總不當泥聽訟為說耳萑豳風七月篇傳訓薍為萑正義以為初生者為菼長大為薍成則名為萑是也惟釋草之萑别為蓷音同追乃益母草與此萑無涉萑之即菼即荻即隼今古不異說夏小正亦云萑未秀為菼皆可證蔡元度謂白露降然後萑可以為用詩言八月萑葦未用也愚按白露正八月節乃萑成材可用之時元度誤以此為周正故耳若八月為周之六月則五月大火便下而西流耶小雅小辨篇傳訓淠淠為衆今按淠無衆義集韻云淠動也字從水如水之動詩其旗淠淠是也萑葦植水飄揚有如旗之隨風者故亦謂之淠淠云爾芄蘭芄蘭衛風芄蘭篇釋草訓雚為芄蘭合之詩詞確不可易郭璞失其句讀别作雚芄則誤也邢昺溺於其說引說文芄莞為解尤誤中之誤今按釋草莞别列一條但有苻離之名更無芄蘭之名若說文祇訓芄為莞亦不以芄蘭為莞也至後人紛紜擬議竟謂莞叢生水中似蘭而莖圓故字從丸而又呼之以蘭則皆景純之遺誤耳陸璣云芄蘭一名蘿摩幽州人謂之雀瓢蔓生葉青緑色而厚斷之有白汁煮為茹滑美其子長數寸似瓠子是也按蘿摩名亦不一或呼白環藤或呼羊婆奶其實裂時如瓢因有雀瓢之稱至六七月開小長花如鈴狀紫白色結實長二三寸大如馬兜鈴沈存中云芄蘭生莢枝出於葉間垂之正如解結錐後章所謂佩韘者疑古人為韘之制亦當與芄蘭之葉相似核其形象其說未為誣矣或引徐鍇訓竹葉下垂為支謂芄蘭之葉亦下垂如竹故其莖以支名愚按支本通枝揚雄傳支葉扶疏漢地理志亦以强幹弱支皆作支專訓竹葉非是芄蘭當亦取其莢之綴於支上故以支為詠爾黍黍王風黍離篇黍有牛黍燕頷馬革驢皮稻尾諸名說文專訓為禾屬而粘者羅瑞良辨之以其類有黏不黏如稻之有粳糯其不黏者以為飯黏者别名秫以為酒是也說文又謂以大暑而種故為黍今按齊民要術夏種黍稷與殖穀同時非夏者大率以椹赤為候諺云椹離離種黍時故舊謂三月種者五月即熟月令五月農乃登黍是也奚待大暑耶陶隱居謂黍苖如蘆而異於粟唐本草又謂黍有數種其苖亦不似蘆二說各異今北地一種名蜀黍莖髙丈許狀似蘆荻而內實葉亦似蘆穗大如帚粒大如椒紅黑色南人呼為蘆穄此則與黍大别也許東陽謂黍稷二物稍相類但黍黃而稷黑黍小而稷大朱子解二物似差互今以傳文兩易之云黍穀名似稷而小穗黃色稷亦穀名一名穄苖似蘆髙丈餘穗黑色實圓重按此蓋以集傳之黍為稷者彼必有所見非虛語也然云黍穗黃稷穗黑則黍亦自有赤白黃黑數種耳離有參差懸綴之意禮明堂位叔之離磬注謂編懸之磬歷歷非一疏以為磬希疏相離是也故亦謂黍實之垂為離重言離離者非一之詞魏風碩鼠篇或云此詩首言黍者五穀之長明黍是貴非也此不過以黍叶鼠取其韻為起句耳猶鴇羽叶稷黍鴇翼叶黍稷換文成韻豈有他義耶曹風下泉篇羅瑞良謂黍之秀特舒散說者以其象火為南方之穀詩云芄芃以此其說非也黍性寒出北貉之地故孟子以為五穀不生惟黍生之今南方罕有種者若果為南方之穀豈有不宜於南而反宜於北之理則散舒象火之說謬也且詩於麥亦稱芃芃矣詎亦南方産耶小雅出車篇鄭氏以方華為六月時何元子謂植種有早晚則華實之早晚隨之非必定在六月中時方生華也今按黍稷華遲者則六月此云方華固當以早者為說故愚謂是夏正四五月說見倉庚夫司馬法冬夏不興師月令季夏之月不可起兵動衆此可以斷已舊說南仲復以六月自北徂西而伐西戎非也前三章但言出車城方不言何時此溯其所自以為昔我往矣固當以出車之初言況下雨雪一時草蟲一時倉庚又一時歷歷數來星移物換為日甚長豈朔方城於俄頃而西戎拒以經秋也與小雅楚茨篇與字有舒義漢郊祀歌專與萬物師古注以為開舒是也黍苖垂實田疇秀特舒散故為與與之象魯論與與如也對踧踖言亦是開舒意舊解或云蕃廡或云和柔或云黍黍相並如人之儔侣有黨與之義並非也小雅信南山篇彧與郁同或作亦作㦽彧彧猶郁郁今凡草木華盛者稱馥郁又稱芬郁是也何元子謂黍稷交錯成文故為彧取證說文有文章之義然一畝斷無雜樹二者若各自為區又不可以言交錯矣小雅黍苖篇芃芃對下悠悠言悠悠者行路之長也此亦取長義為允嚴華谷謂當如棫朴補傳之說不知彼以棫為小木又下云為薪故謂其短小而盛然要是臆說於本詩且不可通況移向黍苖作解耶周頌良耜篇黍稷古所並重舊謂稷為五穀之長禮稱稷曰明粢吕氏春秋云飯之美者有陽山之穄其非專為賤者之食可知矣大約黍多而稷少詩中專言黍者數見凡言稷處皆連黍言疑古以黍為常食故子卯變而食稷耳若使農人終嵗勤劬不食其所自力之黍則將采薇蕨以為生耶鄭氏於餉黍謂賤者食貴食為豐年之徴吾不信也秬大雅生民篇秬為黑黍此釋草明文愚謂秠糜芑三者皆嘉種通名惟秬乃專為黍之黑者故左傳黑牡秬黍以享司寒是也今按周禮鬯人注云釀秬為酒秬如黑黍一麩二米是混秬秠二者為一矣集傳釋秠顧本其說何與蔡元度以麻實八角而純黑者謂之秬不知彼名巨勝非秬也按陶隱居謂巨勝乃麻純黑者之名故元度因以黑黍之秬實之誤矣大雅江漢篇秬鬯依傳說則謂鬯為香草即鬱金然鬱金無鬯名故鄭氏辨之以謂黑黍之酒自名為鬯不待和鬱是也何元子又謂秬鬱相須必合二者而後為鬯亦未確愚謂鬯者㫖酒之總名用秬則為秬鬯用鬱則為鬱鬯也且鬱鬯之酒凡黍稷皆可為之此獨言秬者正以表其為嘉種之釀而鄭重之耳若和鬱則反掩其秬之美矣故知秬鬯之不待和鬱也附秠大雅生民篇羅瑞良云秬與秠之所以異秠必不黑秬必不一稃二米也而鄭氏解鬯人既云秬如黑黍一稃二米則是以秠之狀雜之於秬郭氏解釋草又云秠亦黑黍則是又以秬之色雜之於秠秬既欲兼秠之狀秠又欲兼秬之色所以紊亂不復可推究者由此故也又引漢任城所生以顯二米者為黑黍不知此漢異事歷世未有詩歌后稷降播乃民事之常必如任城所生而後降之則沒世不可待矣愚按羅說最通蓋釋草但言一稃二米為秠而已未嘗實指其何種不得以黑黍槩也秬秠之相淆康成謬亂於其先景純强證於其繼後之紛紜又何足論乎羅瑞良又謂百穀之中一稃二米者惟麥為然周所受瑞麥來牟一來二縫則秠者正指此古者來釐丕三字相通秠即來也此可謂創解但愚疑虋芑二者惟以苖稱而秠亦空言稃米當如穜穋稙稚之類皆為通名麥之一稃二米者亦其一種耳因并識其說於此林光朝謂古之定律以上黨所出秬米之中者纍之以生律度量衡或說秬黍之中者即一稃二米之黍也愚按漢書律歷志子谷秬黍中者一黍之廣度之九十分孟康注云子北方北方黑謂黑黍也師古注云子谷猶言穀子耳中者不大不小也言取黑黍穀子大小中者率為分寸也二說甚明並無一稃二米之語若以一稃二米黍合之則較常黍加大析之又較常黍加小不中之甚矣定律者何為而取此耶林光朝名兆珂閩人著詩經多識編余未見其全書今從别本録其一條稷稷王風黍離篇邢昺雜引書傳謂粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物羅瑞良則謂稷也粢也穄也皆一名特語音有輕重爾愚按稷穄同音本一字粢則稷之嘉名非語音輕重之謂也粟又古黍稷粱秫之總稱非稷所専有者唐本草注謂八榖之中稷為最下蘇頌云所謂穄米今人不甚珍此惟祠事用之農家種之以備他穀之不熟然古宗廟中與黍並重稱為粢盛則下品要是後人之說耳戴侗謂說文本爾雅爾雅本禮記記云稷曰明粢祭祀之米黍稷稻粱通謂粢盛而各為之嘉號故稷曰明粢粱曰薌萁謂稷為粢亦可謂粱為萁乎愚謂不然宗廟之祀黍稷為重稷有粢名故通謂祭祀之米為粢盛耳曲禮諸號皆漢儒文飾不可為典要者惟稷則因其本名而加一明字此禮記本爾雅非爾雅本禮記也黍離稷苖乃錯舉成文不得云時有先後黍秀而稷末秀也正義又分稷苖為六月穗為七月實為八月以其未得還歸故歷道所更見華谷辨之云使稷自苖而至於實果為行役之久則不應黍惟言離離是矣愚謂黍稷之實同時詩人此時所見當是稷穗稷實之候先言苖者不過本其初而言換字叶韻衍成三章而已如桃夭先葉次華次實詩中立言次第往往如此若必泥三者為三時豈行役之大夫每月各作一章而成此詩耶抑八月後追溯所見而道之耶固矣夫其為詩也韓詩外傳載伯封求亡之事要是傳㑹愚謂種黍之地豈必不種稷況宗廟宫室所在甚廣黍稷彌望正見其滿目荒涼若訛稷為黍縱謂憂懣目迷有何意境劉協云思親者莪蒿不分閔周者黍稷莫辨此是詞章雋語不可作詩本㫖也乂先儒解謂彼黍者我后稷之苖尤非理箕子麥秀歌亦但謂城壞生黍宫室未必盡淪滅也當時平王以亂故徙居東都王城及襄公討西戎救周乃以岐豐賜之秦遂有宗周畿內之地此本朝之賜又未有數年豈盡沒其舊耶故有謂與言蔓草荆榛者不同其必為秦得岐豐之後務本力農周大夫出過其地而見之知秦將以富强雄天下而傷周室之不競也亦一說傳以穗為秀嚴華谷云朱子論語注吐華曰秀是秀為未穗今傳所為秀則已成穗而秀茂與彼秀别愚按秀無二解集注以秀對實為華若禾苖之華不見其榮釋草云不榮而實者謂之秀徐鍇以為有實之形象下垂是也論語實以堅好言與初結實為秀者異正此篇穗實之分不可不辨小雅楚茨篇田畦行列整齊稷茂於其中如鳥之翅羽比次相附故謂之翼翼吕氏春秋云苖其弱也欲孤其長也欲相與俱其熟也欲相扶是故三以為族正翼翼之謂也小雅甫田篇舊引前漢書趙過為搜粟都尉過能為代田一畝三􅎌一夫三百􅎌而播種於三􅎌中苖生葉以上稍耨隴草因隤其土以附苖根故其詩云或藝或芓黍稷擬擬言苖稍壯每耨輒附根比盛暑隴盡而根深耐風與旱故擬擬言盛據此可見黍稷嶷嶷在夏時也愚按耘耔本夏時事以次章祈雨證之月令仲夏命有司祈祀山川百源大雩帝正其候爾附重穋豳風七月篇重穋惟以熟之先後異名更無先種後熟後種先熟之說此後鄭天官注臆解傳本不誤也又重作穜穋作稑此周禮變字附稙稚魯頌閟宫篇傳謂先種曰稙後種曰稚此以種之先後言與重穋各不相涉後鄭合稙稚以訓重穋則誤矣此四者為凡穀生熟早晚之通稱以詩與黍稷連文故并按於此蒲蒲王風揚之水篇此即蒲藻之蒲傳訓為草是也陸農師主其說以為似莞而褊有脊生於水崖柔滑而溫可為席按逸周書云潤濕不穀樹之竹葦莞蒲蓋與蘆葭為類生卑濕水濱者左傳臧文仲妾織蒲即此鄭氏謂蒲為蒲栁誤按蒲栁合言始為楊别名釋木云楊蒲栁是也書傳從無單言蒲為楊者若可專以蒲名則亦可專以栁名是二物矣左傳董澤之蒲亦指莞蒲之屬言杜注正未可據耳正義解鄭意謂總上薪言宜屬木不知薪文從草漢廣詩錯薪蔞楚蔞豈木耶嚴華谷為調停之說以為毛言草鄭言蒲栁皆蒲草此何解嚴華谷云楚愈輕蒲又愈輕至不流束蒲則弱之極矣若然則蒲栁之蒲輕乎抑蒲草之蒲輕乎孰是孰非有不待辨而自明者陳風澤陂篇蒲荷皆水草之可愛者故以興人之可愛者必以其柔滑喻心性陋矣或更謂蒲所以為席故夏姬取以自況尤陋小雅魚藻篇依有休䕃意蒲覆水涯魚遊而就䕃乃得所之況嚴華谷遵序謂蒲生近岸其水又淺愈更窘促於詞㫖不似大雅韓奕篇此又蒲之一種人謂之香蒲春初生出水時紅白色茸茸然其入土白色者啖之甘脆即傳所謂蒲蒻也鄭氏以為深蒲本周禮其義自取入土白色為深耳說文别作贅陸璣云蒲始生取其心中入地蒻大如匙柄正白生啖之甘脆煮而以苦酒浸之如食筍法此為菹之說也然疑亦可為和如蘋藻芼魚之類何元子必欲强作糝食解以為古無其傳則泥矣莞小雅斯干篇莞為蒲類釋草莞苻蘺其上蒚郭璞謂今西方人呼蒲為莞蒲江東謂之苻蘺是也本草白蒲一名苻蘺皆可證蓋蒲類之細者周禮司几筵有莞筵蒲筵粗細之分耳一說即燈心草非是鄭氏謂莞席為燕樂用正義疑之以為其室寢卧袵席亦當然愚按此明言寢言夢自為卧席董氏云几筵莞蒲則有之而葦竹無施於席則知所以為寢也是矣蓷蓷王風中谷有蓷篇釋草訓􅍉為蓷非􅍉葦之􅍉也郭璞謂即今茺蔚葉似荏方莖白花花生節間廣雅名益母草者陸璣謂舊說及魏博士濟隂周元明皆云是菴閭愚按此當主益母之說本草益母生海濱池澤與中谷合又莖本方類麻亦有野天麻之稱羅瑞良謂其全似杜天麻而不生橫枝皆可證傳訓蓷為隼嚴華谷為之說云彼􅍉音完此􅍉音追蓋借用隼字非以蓷為菼也愚謂此直由誤讀釋草之萑為萑葦故以隼釋蓷耳集傳從其說而又云葉似萑即今益母草則愈紊矣許東陽辨之以謂爾雅注及詩疏皆作葉似荏今作似萑誤不知其非字誤也蓋因傳訓為隼隼乃萑葦之萑别名以為應是菼薍之屬而釋草文則仍是訓蓷者遂騎牆作解謂其葉當似之反以舊作荏為誤遂改荏為萑而復謂之益母是合毛鄭郭陸之說為一者也嚴華谷駁傳陸草傷水之說以為茺蔚正生海濱池澤其性宜濕是也然据傳誤解為隼以為菼薍之屬則尤宜生水濱者而反謂為髙陸之草不先自相矛盾乎修集傳存兩說今按長義之修從彡此從月不應以長訓釋名云修縮也臘脯乾燥而縮此宜專取縮義草乾則枯而縮併不必以脯言耳或作蓨贅羅瑞良以此詩為燒剃行水之序愚按剃乃百草不應專以蓷言況云中谷又非田間而燒剃行水亦於凶年饑饉意不合不足据也暵乃日火猛烈之稱故易稱燥萬物者莫暵乎火說文别謂耕暴田曰暵亦未足据羅瑞良以燒剃不應獨言蓷故又謂蓷名益母曾子見之而悲詩人之託此亦其窮而反本之意則益傅㑹矣人情急則直呼父母何暇曲為寄託若室家相棄時此何景象而思及豐年燒剃又於剃草中獨拈益母以寄其反本之思乎如但云以草中益母興下有女則猶可通耳蕭蕭王風采葛篇釋草蕭訓荻無蒿名郭璞謂即蒿鄭漁仲注亦謂即青蒿也說文以為艾蒿陸璣非之云是今人所謂荻蒿者或稱牛尾蒿白葉莖粗科生多者數十莖愚按釋草别蒿作􅦕又以蘩為皤蒿餘無蒿名則蕭不當列蒿屬仍如蔞類别見可也釋草舊本蕭荻之荻從狄鄭漁仲本易從秋音秋嚴華谷羅瑞良皆主其說或當有据且取其别於蘆荻之名從之傳謂蕭所以共祭祀故鄭氏云喻臣以大事使出然核諸詩中詞㫖絶不相似也夫人君誠聽讒疏賢若趙髙勸二世深居髙拱臣下自無由見何必以事使他出而始不見之耶郝仲輿謂蕭可以爇為讒言薰灼之比要之終屬擬議不可据耳姚舜牧謂蕭采於秋故下承三秋非也秋者百穀成熟之期故以為言猶云再稔五稔耳又隂陽五行厯一月為一秋三月為三秋管子輕重乙篇嵗有四秋謂春之秋夏之秋秋之秋冬之秋可知此不得專作商秋解也曹風下泉篇此詩重在周京周京根本之地根本壞則枝葉隨之故以稂蕭蓍之叢生者為興取一苞字耳若陸農師說蕭乃事宗廟社稷之物以為民喻則稂蓍又何說以處此耶小雅蓼蕭篇傳訓蓼為長大貌戴侗謂草蒼蒨貌以蓼本辛菜名故以蒼蒨象其色蕭既受露則色愈蒼蒨愚按此與蓼莪之蓼同解莪色蒼蒨故謂之蓼蓼又謂之菁菁蕭與莪相似後人皆以為蒿屬則亦以色言可知且與下笑語龍光有關合鄭氏謂以香物之微者喻四海諸侯亦國君之賤者此臆說也蕭草叢生受露最多故以為被澤深渥之況猶湛露之豐草爾小雅小明篇此是西征大夫踰時不歸託采此以自遣乃寂寞無聊之況意謂嵗欲暮而歸無期何反在此掇拾蕭草為哉是自貽之戚耳董鼎以為感時晚而祭事不得備於詩義無涉至蕭草秋榮亦不必為嵗暮作證也大雅生民篇傳引郊特牲文原以此蕭為宗廟之用非軷祭也軷惟有羝而已此章本上肇祀而言凡宗廟以至行神皆有其典以見自后稷貽穀至今祭祀備舉之意下乃言今日郊稷之事耳祭行神無焫蕭者鄭說不足据也陸璣云蕭可作燭有香氣故祭祀以脂爇之為香愚按古祭祀以黍稷之香為香至於鬯用鬱爇用蕭但為降神禮更無用他香者韋雕五禮精義謂祭祀之禮用香今古之禮並無其文是也左傳一薰一蕕及楚詞芳杜皆是草類若後世沉檀乃隋唐通交廣海南諸郡始有之則祭禮自無用香之文耳艾艾王風采葛篇冰臺為艾别名見釋草文博物志云削冰令圓舉以向日以艾承其影則得火艾名氷臺以此未知是否初春布地生葉背白苖莖類蒿故郭璞謂之艾蒿實非蒿屬也以歷久者最良故釋詁云艾長艾歷是矣傳謂艾所以療疾鄭氏因云喻臣以急事使出此强解也郝仲輿謂艾可炙為讒言爍膚之喻此與蕭說同鑿夫一焚一炙因云熏灼爍膚若採及水草不又當云浸潤之譖乎蕭艾質類蓬蒿其芳亦遜蘭蕙楚詞用以相形蓋嗔薄俗無識者取此棄彼猶惡紫奪朱意耳田藝衡乃指為腐穢之物以通讒人之喻寃甚且焫蕭求神天子之禮羅瑞良據張揖之說别為士庶人所用而以二者為賤吾不信也詩識名解卷九

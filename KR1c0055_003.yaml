body:
  text: 詩識名解卷三錢塘姚炳撰鳥部鴟梟鴟梟豳風鴟梟篇鴟梟鸋鴂釋鳥文郭璞以為鴟類邢昺疑之謂與先儒意異愚謂此誤鴟梟為惡鳥之始前此毛鄭皆依釋鳥文以鴟梟為小雀與詩義極合自璞目為鴟類而後儒宗之以小易大匪特名物失真而詩義亦晦始作俑者於郭氏乎奚辭陸璣云鴟梟似黃雀而小其喙尖如錐取茅莠為巢以麻紩之如刺襪然懸著樹枝或一房或二房幽州人謂之鸋鴂按此正詩所云鴟梟釋鳥謂之鸋鴂者其茅莠麻紩即詩之桑土綢繆也其一房二房即詩之牖户室家也為物小故有拮據卒瘏之况著枝危故有漂搖風雨之憂核之詩義情狀吻合確然無可疑者陸農師謂爾雅言鴟梟鸋鴂繼以狂茅鴟怪鴟梟鴟則鴟梟宜亦鴟類賈誼所謂鸞鳯伏竄鴟梟翺翔是也此見最泥如鳯為羽族長而釋鳥列於桃蟲之下鶺鴒之上古人所作其不拘類此若賈誼所云乃以鴟梟况鵩鳥耳且其曰鴟梟者非鴟梟也鴟與梟也猶夫鸞鳯之為鸞與鳯也鳥類無兩鸋鴂名呂東萊據方言云自關而東呼桑飛為鸋鴂謂此乃陸璣所謂巧婦者其名偶與鴟梟之别名同與爾雅所載實兩物則更誤矣鵂亦名鴟鵂頭目似貓即釋鳥所謂怪鴟者莊子鴟鵂夜撮蚤是也舊傳其入城城空入室室空以為不祥之物不聞其善搏擊其於毁巢取子事更無驗則是禍鳥非惡鳥若謂鴟梟為鵂而并以惡鳥目之匪特誣鴟梟并誣鵂鶹矣何元子云爾雅明别鴟梟與怪鴟為二物無容混而為一得之嚴華谷謂鴟乃惡聲之鳥今鴟梟為鴟類則亦惡聲之鳥此所謂想當然耳今有延二客於一堂者其一人自北方來詰其姓名曰某某也其一人自南方來詰之其姓同其名亦近同則將以二人者之為一人與抑美厲各殊而語言大異也鴟惡則鴟梟亦惡之説何以異於是鴟梟非鴟亦非梟何元子謂單言之即梟尤誤若單言即梟又何不云單言即鴟耶且物名固有半同異者不可偏舉如蝸牛莎雞之類是也從何氏之説則蝸牛即牛莎雞即雞矣然則梟乃惡聲鴟梟固未嘗惡聲也以為比流言者非穿鑿而何周公大義滅親事出於萬不得已方將隱痛不遑未有既誅而又出忍言謂寧亡管蔡無能留管蔡以毁我周室者此傳疏誤解也蓋鴟梟小鳥善為巢而不得所託故周公借以自比首章乃設為自呼其名者意以王室新造復遭流言既陷我管蔡於不義矣猶將不利於國家乎二章則轉信其綢繆之固見其不可動搖也三章又極歎其經營之勞瘁四章乃言今日遭家多難已之東征不啻羽殺尾敝巢室漂搖是以嘵嘵哀鳴不能自已逐段按來真如鷇音婉轉敘述嗚咽核之陸璣巧婦之釋情態如見諸家皆未見及故詆為惡鳥且以破巢食子厚誣之耳鳥名多自呼者非自呼其名也因其呼而名之也如鷮鷮為鷮鵙鵙為鵙之類鴟梟當亦似此故首句先述其本然之聲下乃寫其寄託之情陸農師以黃鳥例作戒鴟梟語謂非其自道則後三章何以無一語似相戒者耶鬻有養義傳訓稚誤釋言云鬻糜也淖糜本養人之物莊子天鬻也者天食也此詩之鬻亦取食意蓋所以鬻稚子非鬻為稚故集傳通作育訓養是也傳解嘵嘵為懼本釋訓文按釋訓自作憢不作嘵注即以此詩之嘵證之非是懼從心音從口今詩從口作嘵嘵自是哀鳴不輟之意錢氏以為呌呼近之况羽殺尾敝巢室漂搖亦是悲境非懼境也且其曰嘵嘵者安知非即鷮之鷮鷮鵙之鵙鵙所謂鴟梟鴟梟其自呼蓋如此矣使先儒聞之亦必瞿然曰此非惡聲也鸛鸛豳風東山篇陸璣謂鸛似鴻而大長頸赤喙白身黑尾翅一名負釜一名黑凥一名背竈一名皂裙廣雅别作皂帔通雅又作皂君陳無功引作旱羣以其能致旱災之故謬也又負釜作負金謂喜負日而飛色如金或又謂周思方養鸛縱之後鸛背負金串卸於地故名説尤誕愚謂竈釜皆取黑意鸛尾翅多黑有背竈負釜之狀因以為名皂黑色也裙帔義通至以釜訛金以皂訛旱以裙訛羣皆因字誤致生妄語耳故舊謂殺其子六十里旱能羣飛薄霄激散雲雨亦出傅會之説陸農師謂鸛雀學術士禹步法能轉巨石解巢縛其説出北夢瑣言要是誕語不足信者羅瑞良引講堂銜鱣事謂即鸛或辨之云後漢楊震傳有冠雀銜三鱣飛集講堂以雀有朱頂故稱冠雀非謂冠即鸛也愚按鸛本有雀名又舊稱其泥巢作池養魚則銜魚固其能事况可銜三鱣定非小鳥别作朱頂之雀其大小正不知何似通冠作鸛理固有之耳釋鳥鸛鷒讀若歡團字同音别非此鸛雀也今鸛形尾短故亦從佳為雚然狀頗類鶴作巢如車輪蓋羽族之大者而説文解雚作小雀故詩考異字直以為爾雅之鸛鷒亦誤甚矣傳以鶴鳴為將雨之徴先儒皆本其説何元子辨之云鸛俯鳴則隂仰鳴則晴又善羣飛薄霄激雨雨為之散上文明言零雨其濛則非將雨矣以灑掃穹窒推之此鶴之鳴所謂仰鳴則晴者也愚按俯仰隂晴之説出禽經本未可據但就詩義推之上既言零雨此不當復以鸛鳴為將雨何駁是也要之下章倉庚祇興之子此鸛鳴亦祇興婦歎不過引喻陪襯而已與上零雨何涉故知於鸛鳴爭晴雨者猶後義耳垤固為蟻封然此詩垤字但作土丘言與蟻無涉况鸛啖蛇魚必無屑食螻蟻之事故毛鄭猶僅以鸛嗚為將雨之徴若更舍却鸛鳴獨拈蟻垤以驗雨候特謂鸛為得食而鳴者去詩義尤遠矣果爾則詩何不云蟻出于垤而云鶴鳴于垤又何不云鸛食于垤而云鸛鳴于垤也不知零雨四句乃四章總文其下觸緒成吟絶不相顧鶴何關雨事鶴鳴于垤何關蟻事詩義愈穿鑿則愈晦此類是也脊令脊令小雅常棣篇釋鳥以鶺鴒為雍渠而廣雅别作􅖥一名雃按雃從隹音牽説文石鳥一名雍渠一名精列又為鵁鶄之别名上林賦云煩鶩庸渠雍亦作庸乃水鳥也廣雅所釋蓋指此與詩脊令名同物異先儒專謂雍渠為脊令别名此誤脊令為水鳥之由矣脊令大如鷃雀長腳長尾尖喙背上青灰色腹下白頸下黑其别名有四雍渠見爾雅錢母見義訓連錢見詩疏雪姑見物類相感志然雪姑之名不過取其白似雪耳若云鳴則大雪豈無雪時長不鳴耶陸農師以為極驗恐不可信詩意取興脊令以脊令本有兄弟之誼舊謂其共母者飛鳴不相離又唐明皇時有脊令數十集麟德殿廷木翔棲浹日魏光乘作頌以為天子友悌之祥蓋其天性然也若徒以飛鳴行搖取急難意恐今烏鵲頗亦然耳嚴華谷云鄭氏以為水鳥宜在水中在原則失其常處故飛鳴以求其類非也今雪姑非水中之鳥若失其常處而飛鳴以求其類凡鳥皆然何獨脊令哉按此最有識解惟其凡鳥皆知求類故飛鳴行搖不足為脊令之取况也鄭氏因誤認雍渠便多如許穿鑿不知即是水鳥亦何妨在原幾見近洲渚者便不翔山林耶飛鳴行搖二語傳因急難態狀想出嚴華谷乃謂小宛取義在於飛則鳴常棣取義在於行則搖則益鑿矣即以常棣言之詩但謂在原而已不知其在原飛在原行也且鳥性無常未有行而不飛飛而不行者若必鑿分二章亦失物情真趣矣遑言詩義乎小雅小宛篇題字義無所考按引此詩者中論作相潛夫論作顧皆取視義當依傳為訓孔子丘陵歌題彼泰山正與此同讀若第亦不必泥睇為邪視也載飛載鳴非一脊令正與下而字我字對勘親切見脊令共母者或則飛或則鳴而不相舍我與而同一所生者當日有就月有進而共相勉也舊謂口翼俱勞無有止息以興進修不得暇逸覺於詞旨涉泛非兄弟相朂語氣鳴鳩念其父母不可得見故有宛然戾天之思脊令朂其兄弟身得相親故有題彼飛鳴之况觀此其為亂離思親作無疑矣鶴鶴小雅鶴鳴篇鶴從隹形如鵝短尾相鶴經所謂足髙而尾凋是也故陸璣但謂頂目赤腳青黑而不及尾若云頸尾俱黑恐誤蓋其翅杪色黑斂翮而立則羽尾黝然集傳因以為尾黑不知凌風鼓翅黑在翼不在尾也子瞻賦玄裳縞衣殆亦未悟短尾故耳故陳晦伯稽疑云遇九臯之介鳥偉胎化之仙禽其黑者尾耶鶴為仙禽取其能夀未有老而聲下之理此禽經謬語而羅瑞良述之也易之在隂蓋處三四重隂之下王弼以為立誠篤志雖在暗昧物亦應焉耳乃謂鳴臯之鶴為俊鳴隂之鶴為老不知二爻位處上卦之中與五相應正士之及時而未仕者何以云老且物各從其類鶴鳴子和不過同類相應之意彼鳴九臯者雖聞野聞天豈更有非其類而應之耶焦弱矦引易作鸖謂鶴惡陽故從雨鷺惡露故去雨尤誕羅瑞良雜引諸書多言鵠者謂鵠即是鶴音之轉後人以鵠名頗著謂鶴之外别有所謂鵠非也或辨之謂諸書有專言鵠者未嘗謂鵠即鶴有鶴鵠並言者明分為二惟别鶴操雄鵠雌鵠辨命論龜鵠壽千歲搗衣詩開縕舒龜鵠古原作鶴俗訛為鵠豈可據今所見鶴與鵠容貌差别信如諸家言鵠即鶴則今人通謂鸛為鸛鶴是鶴即鶴稱綬草為鷊是草即鳥也愚謂二家各得其一説不知鵠本有斛谷二音斛音與鶴通用前説是也谷音者乃小鳥射者設之以命中後説是也傳訓臯為澤何元子謂其於義無取别作􅗍引史記秭鴂先􅗍索隱亦訓為澤又謂􅗍字説文不載疑即澤字之訛故史記天官書云其色大圜黃􅗍􅗍亦音澤即潤澤之義澤或省作睪荀子側載睪芷睪芷者澤芷也睪或混作臯故睪有臯音列子望其壙睪如荀子作望其壙臯如又後漢書郡國志以成臯為成睪皆其明證然則九臯之臯本澤字傳寫訛耳愚謂不然臯併不當訓澤左傳御以如臯不可云如澤漢賈山傳江臯河濵臯對濵言非深澤可知又李竒云臯水淤地若澤中水豈能壅淤地上是臯乃澤之涯非竟為澤不可以字訛強通也鄭氏云臯澤中水溢出所為坎得之韓詩解九臯為九折之澤泥甚鄭氏謂從外數至九尤非鶴非水鳥要無深入澤中之理郝仲輿以為九臯深澤猶云九泉九天極言其深亦非詩旨也詩當取空曠之意故謂其聲上極於天下周於野與鳯鳴高岡情况相似然則所謂九臯者猶四野六幕八閎九垓之説耳桑扈桑扈小雅小宛篇釋鳥兩列桑扈古今聚訟然物殊類而同名者頗多若山海經所稱崌有鳥焉如鶚赤身白首其名竊脂又與釋鳥所列兩者絶異無容執此以泥彼耳但青雀青質非淺白嘴曲食肉好盜脂膏與扈不倫何以亦名桑扈若因其毛色而名又恐與竊藍之秋扈混此則難以臆斷者也謂釋鳥有兩桑扈則可謂詩有兩桑扈則不可蓋以竊脂對剖葦言之則為青雀以竊脂對竊丹言之則為淺白此有可據之文也若必以詩之詠鶯羽者屬淺白之竊脂而以詠啄粟者為盜竊脂膏之雀則泥且鑿矣陸農師云小雅桑扈所取者有兩竊脂故爾雅亦兩解此強説也無肉而循場啄粟失其天性不能以自活理或有之故淮南子亦有桑扈不食粟之説然按交交詞義羣飛往來頗類自適情况且安知此詩所詠非淺白之竊脂而必以盜肉之青雀就啄粟解耶愚疑引喻顚寡岸獄或亦人不如鳥意不必定作困境也杜預注扈有九種以九扈為九農之號各隨其宜以教民事賈逵樊光分為趣民耕耘收藏及驅鳥雀諸職此傅會不足據也必取釋鳥諸扈配合為九鑿矣若桑扈分為二種不且有十扈乎况爾雅鶨鶀老扈鴳之文李巡孫炎郭璞皆以老上屬扈下屬為解惟樊光定鶨鶀為句以老下屬今重文曰老扈鷃鷃是明以九扈無證強造釋鳥文作配耳吾誰欺耶小雅桑扈篇舊以此桑扈為淺白之竊脂然竊脂既是淺白其色淡然不應有文章即謂其翅領與身異色亦未必遂文采之絢爛也若盜脂之扈青質蒼翠又頗與鶯羽近似故吾謂兩詩不得各主一桑扈耳鴛鴦鴛鴦小雅鴛鴦篇鴛鴦指間有幕圓嘴似鶩故崔豹以為鳧類歸藏云有鳧鴛鴦有鴈鷫鷞是也羅瑞良分質杏黃色頭戴白毛垂至尾尾翅皆黑者為鴛鴦黃赤五彩首有纓者為鸂鶒要之鸂鶒别是一族説文作溪􅠃陳昭裕建州圖經云溪遊雄左雌右皆有式度則其名各有所取特以並遊似鴛鴦而色紫故太白詩稱七十紫鴛鴦實非其種耳匹鳥為鴛鴦專稱羅瑞良引禮記庶人之摯匹謂鳬鷖水鳥之類多相匹耦非也禮匹舊作鶩鶩之名匹於義未詳一名末匹廣雅作􅵒鴄餘冬序録云鴄為匹蓋古省文要其類羣浮水上每一遊輒數十未見其匹也鴛鴦匹處故傳以為匹鳥正不當與水鳥類同論耳傳交物有道取之以時皆依序為説核之詩語固不相蒙然徒作頌君浮詞味亦如咀蠟且於興義無取按稽聖賦云雎鳩奚别鴛鴦奚雙亦謂雙飛相耦足稱好逑故後世閨闥投贈多引為隹話此詩自為伉儷之詠其云萬年福祿必非尋常夫婦説此詩者惟何氏深得其旨録之以俟斷者何元子云此美大昏之詩故以鴛鴦起興若如序以為刺幽王則咏娶申后事也以白華之詩證之七章亦有在梁二語詞旨昭然矣幽王之娶申后當在未即位時詩人追美其初昏祝以萬年之福亦猶唐高宗欲廢王皇后長孫無忌述太宗言朕佳兒佳婦今以付卿言猶在耳之意鴛鴦不再匹故以興新昏且刺幽王黜申后立褒姒也愚按如此則詩中字字有情語無泛設何氏此解可謂隻眼矣白華詩為既廢後作故詞激而怨深鴛鴦詩為將廢時作故語恭而情切玩其立言之旨則又不當依序作刺詞觀也陸農師嚴華谷皆衍毛鄭舊義而説益腐陸氏好引魯論不射宿文説詩最為可哂此其一也若嚴氏長大能飛之説又本孔疏與鱉長後食謔語絶類夫弋射豈能悉獲非獨畢然也陷穽皆令自投非獨網然也乃以畢羅為不盡物之意是傅會也且鴛鴦一小物耳品未聞供簿正味不足充飲御而猶既畢之又羅之多方以相戕若此是焚林竭澤之為也有道明王顧如是乎何元子云凡詩言于飛者六黃鳥倉庚雄雉皆單舉一鳥若燕燕雖重言之然以比莊薑戴媯則猶之乎皆雌燕也此説誤駁見燕燕至鴻雁則有大小之異要非一族其以雌雄連言者惟鳯皇及此鴛鴦耳卷阿雖不從匹配取義而左傳齊懿氏卜妻敬仲亦有鳯皇于飛和鳴鏘鏘之占是以雄鳯雌皇之俱飛比夫婦也然則此詩雙舉鴛鴦以興夫婦何疑興義重于飛不重畢羅愚按此真解人語其看飛字極雅切有致則前此不墜卵不射宿之説不待辨而知其腐矣且云不重畢羅則嚴華谷有得有不得待其自入之語通是傅會可見首章明言畢羅亦既捕取之矣豈無驚擾之患則鄭氏休息無恐懼之説其不可通明甚嚴華谷謂在梁者乃畢羅之餘則是戢翼之鴛鴦為幸而漏網者亦非盛世明王氣象序説之不可傅會如是正義謂戢左翼舉雄者言蓋誤泥釋鳥左掩右掩之文何元子駁之謂詩明合言鴛鴦何得謂單舉雄者是也陸農師以為飛而起則仰左翼飛而下則仰右翼則是飛翔時非止息時與在梁戢翼語不合此自取並棲為義當以張子厚説為正夫一正一倒是皆左翼也皆左翼則非獨一雄也故詩合舉之曰鴛鴦也何元子云于飛畢羅皆可得所謂飛則為雙也在梁戢翼以相向所謂止則為耦也詩興夫婦之和睦如此宜其享長逺之福祇此二語詩義便自了然不當復求他説耳小雅白華篇此與鴛鴦于飛篇無異旨亦不可以釋鳥左右掩之文解也釋鳥左右之辨乃為雌雄之不可别者而設鴛鴦雌雄判然安得引為證鄭氏謂隂陽相下皆飾語也謝疊山云鴛鴦不失其匹耦幽王乃喪其良心嬖妾廢后有愧於鴛鴦矣其大意止此鶖鶖小雅白華篇秃鶖水鳥一名扶老一名舍利形似鵜鶘長頸赤目爪如雞頭項無毛形頗陋惡崔豹謂其似鶴而大蓋髣佛間耳若光以為似鳯皇景煥又謂爰居即秃鶖皆擬非其倫北史魏明帝獲鶖於宮中養之崔光諫云貪惡之鳥野澤所有黃初中鵜暫集而去猶以為戒况叨餮之禽必費魚肉菽麥稻粱之食豈可留意於醜形惡聲哉此可以知其狀矣鶖秃似老人頭童故名扶老非秃鶖别名䳓也䳓乃俗字李時珍因秃作鵚誤鵚為䳓以䳓同老因謂秃鶖一名鴜䳓引元朝常賦有鴜䳓之供飲膳要是謬證未可據耳鶴善而鶖惡分喻申褒此不易之説但在梁在林只作一得地不得地影子看如褒立而申黜云爾必泥魚梁為言謂以得食不得食喻别飽與餒則鑿矣羅瑞良云鶖貪戀之鳥也故進造於梁鶴高潔之鳥也故退棲於林以喻褒姒申后之進退語最淺合鷖鷖大雅鳧鷖篇鷖傳以為鳧屬蒼頡解詁謂即鷗也一名水梟風土記謂之鷖鴨海物異名記謂之信鳧按六書故云鷖鷗一聲之轉實一物説文有鷗無鷖則鷖當即鷗無疑列子作漚相如賦作翳皆即此與鳧不族而别名信鳧又謂之鷖鴨故傳云鳧屬耳南越記謂其色白陸農師以為蒼黑色羅瑞良云鷗亦有白者不專於青黑是也水鳥皆能出沒水中然其性各有所便陸農師謂鳧好沒鷗好浮蓋鳧未嘗不浮而性便於沒鷗未嘗不沒而性便於浮耳或駁之謂凡駢跖之鳥皆能浮湛湛而求魚必伏氣不息勢不能久此拘墟之見也水鳥而居水中猶人為公尸之在宗廟此語意淺而合陸農師謂鳧鷖安樂於水者故詩以為神祇祖考安樂之喻此從序説推出亦覺添足矣總之詩之取興若有意若無意不可執物以求解也羅瑞良謂水鳥滅沒浩蕩似不可羈然誠得其道有可馴之理因引海鷗不至之説以為誠偽之不可掩如此誕矣夫鷗鳥忘機此列子寓言耳豈可牽合作鬼神如臨如在氣象耶郝仲輿云鳧沒鷖浮有變化出沒之象以比鬼神其説亦倣此羅氏又謂古者祭義通於物理故自樂之一變而致羽物及川澤之示以至六變各有所致羽物既與川澤之示相應則所以美神祇祖考之安樂者比之鳧鷖亦其理宜也此説更誕詩人觸緒興懷斷無以物驗神之理且水鳥微族豈真有鬼神式憑之耶禮云索祭于祊不知神之所在于彼于此苟若所言但求之羽族之微足矣其傅會益可知也何元子泥二鳥不當興一尸謂先言鳧後言鷖則鳧當興考鷖當興妣以鳧能遠飛鷖不能遠飛為别又謂逸周書有鳧旌男子所執周禮有鷖總王后所用亦以定考妣之分此大穿鑿愚謂是詩為繹祭享尸之詩一章內兩言公尸而不言祖考神祇蓋正祭所重在格神繹祭所重在事尸也且尸者神之所依考妣皆式憑之未聞有一廟二尸者乃牽合旌路别鳧鷖為考妣之興亦誕甚矣何元子謂涇為水名其後沙渚潨亹乃蒙乎涇之詞非也涇水去豐鎬亦遠此詩所指不當為水名乃水流之濁者莊子涇流不辨涯涘是矣與沙渚潨亹例言總言之則一水耳鄭氏泥五者分五等鬼神鑿甚元子又以為高曽祖考之别更屬臆斷總非觸物連類之旨惟羅瑞良次序之説猶覺淺合鳯皇鳯皇大雅卷阿篇郭璞謂鳯皇高六尺許而京房易傳以為高丈二舊疑為雌雄之異未可據也鳯鳥雖大亦無高至丈二之理此當以郭説為正京房於麟亦云高丈二其誕可知且其形象亦紛傳不一如韓詩外傳載天老對黃帝語及緯書六像九苞飛行鳴聲要是諛詞羅瑞良云鳯生南方逹中國甚遠而又不妄飛鳴飲啄其至蓋罕故孔子稱之而世好事者喜為之傳道務竒怪其章紬繹其聲列於神聖故千世而不合焉其識達矣山海經鳯出丹穴為南方之産不應以五色别五方所謂發明焦明之名槩不足信又何論其為祥為孽耶樂叶圖徴所謂喪疫水旱之感必非真鳯鳥也楊升菴謂西有鳻雀東有諫珂北有定甲南有錦駝皆竊鳯形而似者漢宣成之世鳯皇數集安知非此則傅會者之妄不可不辨羅瑞良云漢儒夸大其詞推為希世之瑞夸而無驗極而必反則又推之以為孽揆厥所由實亦指野鳥為鸞耳翽翽傳訓衆多因下多士為説正義直以為鳯皇衆多引白虎通云黃帝之時鳯皇蔽日而至此誕也鄭氏疑鳯乃希見之鳥不當云衆多因解為羽聲以為衆鳥之從亦未是不知翽翽對藹藹不對多士釋訓云藹藹濟濟止也郭璞以為皆賢士盛多之容止則藹藹以士之容言翽翽以鳯之儀言總於飛時見之蓋集止者飛而集傅天者飛而傅鳯皇上擊九千不知所至而喜見其止又見其傅故曰亦也何元子乃謂羣鳥相從不一對鳯皇言故云亦則誤矣梧桐何地蔑有竹之實非佳物乃鳯皇樂棲之食之而又不見其一至可知莊子非梧桐不棲非竹實不食二語亦因詩傅會成語耳何元子謂高岡者朝廷之比梧桐者大臣爵位之比此説甚當按釋訓云藹藹萋萋臣盡力也噰噰喈喈民協服也本以梧桐比臣固無比君之説蓋鳯皇祇賢士之喻尚未應聘為臣棲梧則居位殫職師濟同心而民亦協服焉然則説文所謂鳯飛羣鳥從之以萬數其非翽羽之時而雍喈之時乎鄭氏不會釋訓之旨易喻君德誤通論詳矣通論云詩意本是高岡朝陽梧桐生其上而鳯皇棲於梧桐之上鳴焉今鳯皇言高岡梧桐言朝陽互見也解者不知見詩是鳯皇鳴高岡梧桐生朝陽則鳯皇梧桐兩不相屬雖漫引莊子非梧桐不棲之言而究不知所合也於是鄭氏以鳯皇鳴高岡喻賢者居高位則於梧桐更無著落只得以之喻君且以朝陽為溫仁之氣亦喻君德解者至今從之豈不鑿而謬乎梟梟大雅瞻卭篇此鳥之最惡者與梟絶異梟但能為聲禍民無食母之惡惟土梟傴伏其子百日而長羽翼既成食母而飛蓋稍長從母索食母無以應於是而死古者以春解祠用梟祠黃帝又漢使東郡送梟作羮賜百官皆惡其惡也梟亦有鴟名釋鳥云梟鴟郭璞以為土梟是也然在瞻卭詩明以二者對舉如為鬼為蜮各為一物鄭氏似混而為一不可不辨且梟乃惡鳥非惡聲之鳥鄭氏此言乃為下長舌寫照使後人以梟同梟禾必非其説誤之也此但以鳥之惡者詆人之惡者更無他義舊謂梟鴟皆能聚致衆鳥以比幽王鍾愛褒姒則羣小並集恐詩人念不及此矣附流離邶風旄丘篇傳以流離為鳥正義引釋鳥文謂流與鶹蓋古今之字離或作鷅以通其説此真所謂讀爾雅不熟者也試以文義按之上云鳥之雌雄不可别者以翼右掩左雄左掩右雌下云二足而羽謂之禽四足而毛謂之獸皆統論鳥獸情狀故謂凡鳥之少美長醜者俱呼為鶹鷅耳况上既釋梟鴟此不當復贅明甚後人因黃鳥有栗留離留之通強以詩流離比例且飾為食母則醜之説何其寃也若以流離為梟則梟長大食母凶惡莫甚安得如傳以為微弱之喻蘇子瞻謂以狄之微而不忌如流離之養其子不知將為己害其説似矣然玩篇中語氣皆自傷其失國飄零而未嘗及狄之強暴不如依集傳漂散之説為淺合耳瑣細也尾末也此不易之解今人稱微末事為瑣屑是矣毛公誤讀釋鳥鷅之文強解瑣尾為少好全無取義而正義傅會其説以瑣屬少以尾屬好尤不可解夫考之名物按其詞旨舉無足通其説者則流離之非鶹鷅與鶹鷅之併非土梟不辨自明矣鴟鴟大雅瞻卭篇此釋鳥所謂怪鴟郭璞以為即鴟鵂是也然惟此專有鴟名舊説大如鴟鷹黃黑斑色頭目如貓有毛角兩耳晝伏夜出鳴則雌雄相喚聲如老人初若呼後若笑所至多不祥蜀人呼轂轆鳥亦呼春哥兒楚人名呼咵鷹亦名快扛鳥吳人謂夜食鷹江東又謂之車載板里俗忌聞其聲蓋與梟同惡而實不族者也今人訛鴟為梟又以梟為梟并以鴟梟為鴟梟紛紜舛錯如其説則鴟當即梟梟又即梟瞻卭詩人何為疊床架屋乃爾乎李時珍分鴟鵂鵂鶹為二通雅合之按本草亦謂鵂鶹大如雊鵒毛色似鷂頭目似貓鳴則後竅應之其聲連轉如休留休留故名正字通云此鳥初聲若呼若笑轉而若休留非呼笑為鴟鵂之聲休留為鵂鶹之聲則仍是一物也莊子鴟鵂夜撮蚤蚤乃蚤虱後人訛蚤為爪謂夜能入人家拾人指爪知人吉凶有人獲之嗉中猶有爪甲故除爪甲者埋之户內為此此齊東野語耳鳶小雅四月篇鄭氏謂鳶為鴟類蒼頡解詁以為即鴟陸璣陸農師皆從蒼説嚴華谷是之而别於瞻卭詩解云鴟有二鳶飛戾天者鷹類也亦單名鴟惡聲之鳥者怪鴟也此配梟言者愚以嚴氏後説為當蓋惟惡聲之鳥專有鴟名鳶特從其類耳今以釋鳥茅鴟推之廣雅别名為老􅣽者疑即指此陶隱居云俗人呼為老鴉者與雕鶚並相似而大極善飛騰江淮間捕魚食之今人呼為餓鴟則鄭氏鴟類之説不誣矣鳶亦鷙鳥一種其異於衆鷙者在不擊惟乘風直上摩天回翔而已故以為風之候越人呼為風伯抱朴子云鳶之在下無力及至乎上聳身直翅而已此釋鳥鳶烏醜其飛翔之謂也翰本為鳥羽蘇子瞻以為翼之鋭是也然此詩當訓高飛非鳥羽之謂如易翰音登天王弼亦訓高飛是矣且下云潛逃于淵潛取深意正與翰之高例言若云翰為鳥羽則鱣鮪何以不云尾云鱗而云潛耶大雅旱麓篇傳襲中庸成語全無著落正義以為化及飛潛乃腐語耳鄭氏易傳求解義並強合皆因泥作人為教化鼓舞便於鳶魚喻義無解愚謂作動也言其豈弟之德之盛有以感動乎人也有一明證棫朴以天人對言此以天淵與人對言蓋天遠而難至淵深而難出人衆而難動惟鳶有乘風之力故能至于天魚有泳遊之性故能出于淵君子有豈弟之德故能動乎人二義融然絶無沾滯不必深於求解也宋明諸儒説是詩者不可勝紀大抵深言理者以為道在飛躍侈言化者以為格及禽魚要於本詩作人之旨去而萬里此皆溺於中庸斷章奧義耳通論云此言作人也上篇言倬彼雲漢為章于天此言鳶飛戾天魚躍于淵亦見淵魚文藻掞及天淵之意故亦曰豈弟君子遐不作人如此説詩便可掃除一切陸農師云鳶鈍者也而乘風以作之則高飛魚潛者也而乘氣以作之則深躍故詩以况君子作人之盛此解作字正合感動之義桃蟲桃蟲周頌小毖篇釋鳥以桃蟲為鷦且云其雌鴱則但有鷦名而非鷦鷯明矣郭璞謂之鷦􅛯陸璣直以為今鷦鷯誤也璣又引俗鷦鷯生雕之語尤不可信鄭氏亦謂鷦之所為鳥題肩或云梟大抵因傳始小終大之説傅會耳愚謂爾雅列桃蟲於鳥部則固是鳥無疑但以其亦有蟲稱故借以為説猶云問其名若為蟲覩其飛則維鳥不可因其名而忽之如武庚本為孤雛乃能挾奄徐諸國以叛事理之難測如此也廣雅釋鷦􅛯為鸋鴂按鸋鴂自是鴟梟别名無容混入若從其説則是桃蟲即鷦鷯鷦鷯又即巧婦輾轉相誣不可復辨且使後人因此反易鴟梟為惡鳥則誤中又誤也或以釋鳥桃蟲鷦又鷯鶉又鳭鷯為一物誤甚桃蟲但有鷦名鷯鶉但有鷯名李巡謂鶉一名鷯鳭鷯鷦鷯則音近而已不可易鳭為鷦也且鳭鷯之鷯叶力周切義尤難合名物之失真皆自謬為相通始之拚與翻同不必為手拊之義蓋泥桃蟲之名以為不在羽族未必能飛者孰知其竟飛而乃為鳥也如此説則鳥字上便可不添大字矣余首源世父善張氏向為鼠後為虎之喻斷桃蟲非鳥名故通論云鷦鷯雖小鳥亦鳥也安得以蟲名且莊子謂其所棲不過一枝不云桃枝也爾雅之説已自難信而郭璞復實之以鷦鷯生雕之説幾曽見鷦鷯生子為雕梟來其傅會更何疑若鷦鷯生子為雕梟不知鷦鷯又何物所生乎且詩苐云鳥不云大鳥也今為彼説以桃蟲為小鳥勢必以鳥為大鳥增添語字以就已説可乎總之若使桃蟲為鳥詩決不又云拚飛維鳥矣蓋謂蟲之小物忽變而為飛鳥以喻武庚其始甚微而臣服後乃鴟張也此又一説詩識名解卷三

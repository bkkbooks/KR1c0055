body:
  text: 詩識名解卷三錢塘姚炳撰鳥部鴟鴞鴟鴞豳風鴟鴞篇鴟鴞鸋鴂釋鳥文郭璞以爲鴟類邢昺疑之謂與先儒意異愚謂此誤鴟鴞爲惡鳥之始前此毛鄭皆依釋鳥文以鴟鴞爲小雀與詩義極合自璞目爲鴟類而後儒宗之以小易大匪特名物失真而詩義亦晦始作俑者於郭氏乎奚辭陸璣云鴟鴞似黄雀而小其喙尖如錐取茅莠爲巢以麻紩之如刺襪然懸著樹枝或一房或二房幽州人謂之鸋鴂按此正詩所云鴟鴞釋鳥謂之鸋鴂者其茅莠麻紩即詩之桑土綢繆也其一房二房即詩之牖户室家也爲物小故有拮据卒瘏之况著枝危故有漂摇風雨之憂核之詩義情狀脗合確然無可疑者陸農師謂爾雅言鴟鴞鸋鴂繼以狂茅鴟怪鴟梟鴟則鴟鴞宜亦鴟類賈誼所謂鸞鳯伏竄鴟鴞翺翔是也此見最泥如鳯爲羽族長而釋鳥列於桃蟲之下䳭鴒之上古人所作其不拘類此若賈誼所云乃以鴟鴞况鵩鳥耳且其曰鴟鴞者非鴟鴞也鴟與鴞也猶夫鸞鳯之爲鸞與鳯也鳥類無兩鸋鴂名呂東莱據方言云自關而東呼桑飛爲鸋鴂謂此乃陸璣所謂巧婦者其名偶與鴟鴞之别名同與爾雅所載實兩物則更誤矣鵂亦名鴟鵂頭目似猫即釋鳥所謂怪鴟者莊子鴟鵂夜撮蚤是也舊傳其入城城空入室室空以爲不祥之物不聞其善搏擊其於毁巢取子事更無驗則是禍鳥非惡鳥若謂鴟鴞爲鵂而并以惡鳥目之匪特誣鴟鴞并誣鵂鶹矣何元子云爾雅明别鴟鴞與怪鴟爲二物無容混而爲一得之嚴華谷謂鴟乃惡聲之鳥今鴟鴞爲鴟類則亦惡聲之鳥此所謂想當然耳今有延二客於一堂者其一人自北方來詰其姓名曰某某也其一人自南方來詰之其姓同其名亦近同則將以二人者之爲一人與抑美厲各殊而語言大異也鴟惡則鴟鴞亦惡之説何以異於是鴟鴞非鴟亦非鴞何元子謂單言之即鴞尤誤若單言即鴞又何不云單言即鴟耶且物名固有半同異者不可偏舉如蝸牛莎雞之類是也從何氏之説則蝸牛即牛莎雞即雞矣然則鴞乃惡聲鴟鴞固未甞惡聲也以爲比流言者非穿鑿而何周公大義滅親事出於萬不得已方將隠痛不遑未有既誅而又出忍言謂寧亡管蔡無能畱管蔡以毁我周室者此傳疏誤解也蓋鴟鴞小鳥善爲巢而不得所託故周公借以自比首章乃設爲自呼其名者意以王室新造復遭流言既陷我管蔡於不義矣猶將不利於國家乎二章則轉信其綢繆之固見其不可動摇也三章又極歎其經營之勞瘁四章乃言今日遭家多難已之東征不啻羽殺尾敝巢室漂摇是以嘵嘵哀鳴不能自已逐段按來眞如鷇音婉轉叙述嗚咽核之陸璣巧婦之釋情態如見諸家皆未見及故詆爲惡鳥且以破巢食子厚誣之耳鳥名多自呼者非自呼其名也因其呼而名之也如鷮鷮爲鷮鵙鵙爲鵙之類鴟鴞當亦似此故首句先述其本然之聲下乃寫其寄託之情陸農師以黄鳥例作戒鴟鴞語謂非其自道則後三章何以無一語似相戒者耶鬻有養義傳訓稚誤釋言云鬻糜也淖糜本養人之物莊子天鬻也者天食也此詩之鬻亦取食意蓋所以鬻稚子非鬻爲稚故集傳通作育訓養是也傳解嘵嘵爲懼本釋訓文按釋訓自作憢不作嘵註即以此詩之嘵證之非是懼從心音從口今詩從口作嘵嘵自是哀鳴不輟之意錢氏以為呌呼近之况羽殺尾敝巢室漂摇亦是悲境非懼境也且其曰嘵嘵者安知非即鷮之鷮鷮鵙之鵙鵙所謂鴟鴞鴟鴞其自呼蓋如此矣使先儒聞之亦必瞿然曰此非惡聲也鸛鸛豳風東山篇陸璣謂鸛似鴻而大長頸赤喙白身黑尾翅一名負釜一名黑凥一名背竈一名皂裙廣雅别作皁帔通雅又作皁君陳無功引作旱羣以其能致旱災之故謬也又負釜作負金謂喜負日而飛色如金或又謂周思方養鸛縱之後鸛背負金串卸於地故名説尤誕愚謂竈釜皆取黑意鸛尾翅多黑有背竈負釜之狀因以爲名皁黑色也裙帔義通至以釜譌金以皁譌旱以裙譌羣皆因字誤致生妄語耳故舊謂殺其子六十里旱能羣飛薄霄激散雲雨亦出傅㑹之説陸農師謂鸛雀學術士禹步法能轉巨石解巢縛其説出北夢𤨏言要是誕語不足信者羅瑞良引講堂啣鱣事謂即鸛或辨之云後漢楊震傳有冠雀啣三鱣飛集講堂以雀有朱頂故稱冠雀非謂冠即鸛也愚按鸛本有雀名又舊稱其泥巢作池養魚則啣魚固其能事况可啣三鱣定非小鳥别作朱頂之雀其大小正不知何似通冠作鸛理固有之耳釋鳥鸛鷒讀若歡團字同音别非此鸛雀也今鸛形尾短故亦從佳爲雚然狀頗類鶴作巢如車輪蓋羽族之大者而説文解雚作小雀故詩考異字直以爲爾雅之鸛鷒亦誤甚矣傳以鶴鳴爲將雨之徴先儒皆本其説何元子辨之云鸛俯鳴則隂仰鳴則晴又善羣飛薄霄激雨雨爲之散上文明言零雨其濛則非將雨矣以灑掃穹窒推之此鶴之鳴所謂仰鳴則晴者也愚按俯仰隂晴之説出禽經本未可據但就詩義推之上既言零雨此不當復以鸛鳴爲將雨何駁是也要之下章倉庚祇興之子此鸛鳴亦祇興婦歎不過引喻陪襯而已與上零雨何涉故知於鸛鳴爭晴雨者猶後義耳垤固爲蟻封然此詩垤字但作土丘言與蟻無涉况鸛啗蛇魚必無屑食螻蟻之事故毛鄭猶僅以鸛嗚爲将雨之徴若更舍却鸛鳴獨拈蟻垤以騐雨候特謂鸛爲得食而鳴者去詩義尤遠矣果爾則詩何不云蟻出于垤而云鶴鳴于垤又何不云鸛食于垤而云鸛鳴于垤也不知零雨四句乃四章總文其下觸緒成吟絶不相顧鶴何關雨事鶴鳴于垤何關蟻事詩義愈穿鑿則愈晦此類是也脊令脊令小雅常棣篇釋鳥以䳭鴒爲雝渠而廣雅别作􅖥一名雃按雃從隹音牽説文石鳥一名雝渠一名精列又爲鵁鶄之别名上林賦云煩鶩庸渠雝亦作庸乃水鳥也廣雅所釋蓋指此與詩脊令名同物異先儒專謂雝渠爲脊令别名此誤脊令爲水鳥之由矣脊令大如鷃雀長脚長尾尖喙背上青灰色腹下白頸下黑其别名有四雝渠見爾雅錢母見義訓連錢見詩疏雪姑見物類相感志然雪姑之名不過取其白似雪耳若云鳴則大雪豈無雪時長不鳴耶陸農師以爲極驗恐不可信詩意取興脊令以脊令本有兄弟之誼舊謂其共母者飛鳴不相離又唐明皇時有脊令數十集麟徳殿廷木翔棲浹日魏光乘作頌以爲天子友悌之祥蓋其天性然也若徒以飛鳴行摇取急難意恐今烏鵲頗亦然耳嚴華谷云鄭氏以爲水鳥宜在水中在原則失其常處故飛鳴以求其類非也今雪姑非水中之鳥若失其常處而飛鳴以求其類凡鳥皆然何獨脊令哉按此最有識解惟其凡鳥皆知求類故飛鳴行搖不足爲脊令之取况也鄭氏因誤認雝渠便多如許穿鑿不知即是水鳥亦何妨在原幾見近洲渚者便不翔山林耶飛鳴行搖二語傳因急難態狀想出嚴華谷乃謂小宛取義在於飛則鳴常棣取義在於行則搖則益鑿矣即以常棣言之詩但謂在原而已不知其在原飛在原行也且鳥性無常未有行而不飛飛而不行者若必鑿分二章亦失物情真趣矣遑言詩義乎小雅小宛篇題字義無所考按引此詩者中論作相潜夫論作顧皆取視義當依傳爲訓孔子丘陵歌題彼泰山正與此同讀若第亦不必泥睇爲邪視也載飛載鳴非一脊令正與下而字我字對勘親切見脊令共母者或則飛或則鳴而不相舍我與而同一所生者當日有就月有進而共相勉也舊謂口翼俱勞無有止息以興進修不得暇逸覺於詞㫖涉泛非兄弟相朂語氣鳴鳩念其父母不可得見故有宛然戾天之思脊令朂其兄弟身得相親故有題彼飛鳴之况觀此其爲亂離思親作無疑矣鶴鶴小雅鶴鳴篇鶴從隹形如鵞短尾相鶴經所謂足髙而尾凋是也故陸璣但謂頂目赤脚青黑而不及尾若云頸尾俱黑恐誤蓋其翅杪色黑斂翮而立則羽尾黝然集傳因以爲尾黑不知凌風鼓翅黑在翼不在尾也子瞻賦𤣥裳縞衣殆亦未悟短尾故耳故陳晦伯稽疑云遇九臯之介鳥偉胎化之仙禽其黑者尾耶鶴爲仙禽取其能夀未有老而聲下之理此禽經謬語而羅瑞良述之也易之在隂蓋處三四重隂之下王弼以爲立誠篤志雖在闇昩物亦應焉耳乃謂鳴臯之鶴爲俊鳴隂之鶴爲老不知二爻位處上卦之中與五相應正士之及時而未仕者何以云老且物各從其類鶴鳴子和不過同類相應之意彼鳴九臯者雖聞野聞天豈更有非其類而應之耶焦弱矦引易作鸖謂鶴惡陽故從雨鷺惡露故去雨尤誕羅瑞良雜引諸書多言鵠者謂鵠即是鶴音之轉後人以鵠名頗著謂鶴之外别有所謂鵠非也或辨之謂諸書有專言鵠者未嘗謂鵠即鶴有鶴鵠並言者明分爲二惟别鶴操雄鵠雌鵠辨命論龜鵠壽千歳擣衣詩開縕舒龜鵠古原作鶴俗譌爲鵠豈可據今所見鶴與鵠容貌差别信如諸家言鵠即鶴則今人通謂鸛爲鸛鶴是鶴即鶴稱綬草爲鷊是草即鳥也愚謂二家各得其一説不知鵠本有斛谷二音斛音與鶴通用前説是也谷音者乃小鳥射者設之以命中後説是也傳訓臯爲澤何元子謂其於義無取别作􅗍引史記秭鴂先􅗍索隱亦訓爲澤又謂􅗍字説文不載疑即澤字之譌故史記天官書云其色大圜黄􅗍􅗍亦音澤即潤澤之義澤或省作睪荀子側載睪芷睪芷者澤芷也睪或混作臯故睪有臯音列子望其壙睪如荀子作望其壙臯如又後漢書郡國志以成臯爲成睪皆其明證然則九臯之臯本澤字傳寫訛耳愚謂不然臯併不當訓澤左傳御以如臯不可云如澤漢賈山傳江臯河濵臯對濵言非深澤可知又李竒云臯水淤地若澤中水豈能壅淤地上是臯乃澤之涯非竟爲澤不可以字譌强通也鄭氏云臯澤中水溢出所爲坎得之韓詩解九臯爲九折之澤泥甚鄭氏謂從外數至九尤非鶴非水鳥要無深入澤中之理郝仲輿以爲九臯深澤猶云九泉九天極言其深亦非詩旨也詩當取空曠之意故謂其聲上極於天下周於埜與鳯鳴高岡情况相似然則所謂九臯者猶四埜六幕八閎九垓之説耳桑扈桑扈小雅小宛篇釋鳥兩列桑扈古今聚訟然物殊類而同名者頗多若山海經所稱崌有鳥焉如鶚赤身白首其名竊脂又與釋鳥所列兩者絶異無容執此以泥彼耳但青雀青質非淺白嘴曲食肉好盜脂膏與扈不倫何以亦名桑扈若因其毛色而名又恐與竊藍之秋扈混此則難以臆斷者也謂釋鳥有兩桑扈則可謂詩有兩桑扈則不可蓋以竊脂對剖葦言之則爲青雀以竊脂對竊丹言之則爲淺白此有可據之文也若必以詩之詠鶯羽者屬淺白之竊脂而以詠啄粟者爲盜竊脂膏之雀則泥且鑿矣陸農師云小雅桑扈所取者有兩竊脂故爾雅亦兩解此强説也無肉而循塲啄粟失其天性不能以自活理或有之故淮南子亦有桑扈不食粟之説然按交交詞義羣飛往來頗類自適情况且安知此詩所詠非淺白之竊脂而必以盗肉之青雀就啄粟解耶愚疑引喻顚寡岸獄或亦人不如鳥意不必定作困境也杜預註扈有九種以九扈爲九農之號各隨其宜以教民事賈逵樊光分爲趣民耕耘收藏及驅鳥雀諸職此傅㑹不足據也必取釋鳥諸扈配合爲九鑿矣若桑扈分爲二種不且有十扈乎况爾雅鶨䳢老扈鴳之文李巡孫炎郭璞皆以老上屬扈下屬爲解惟樊光定鶨䳢爲句以老下屬今重文曰老扈鷃鷃是明以九扈無證强造釋鳥文作配耳吾誰欺耶小雅桑扈篇舊以此桑扈爲淺白之竊脂然竊脂既是淺白其色淡然不應有文章即謂其翅領與身異色亦未必遂文采之絢爛也若盜脂之扈青質蒼翠又頗與鶯羽近似故吾謂兩詩不得各主一桑扈耳鴛鴦鴛鴦小雅鴛鴦篇鴛鴦指間有幕圓嘴似鶩故崔豹以爲鳧類歸藏云有鳧鴛鴦有鴈鷫鷞是也羅瑞良分質杏黄色頭戴白毛垂至尾尾翅皆黑者爲鴛鴦黄赤五彩首有纓者爲鸂鶒要之鸂鶒别是一族説文作谿􅠃陳昭裕建州圖經云溪游雄左雌右皆有式度則其名各有所取特以並遊似鴛鴦而色紫故太白詩稱七十紫鴛鴦實非其種耳匹鳥爲鴛鴦專稱羅瑞良引禮記庶人之摯匹謂鳬鷖水鳥之類多相匹耦非也禮匹舊作鶩鶩之名匹於義未詳一名末匹廣雅作􅵒鴄餘冬序録云鴄爲匹蓋古省文要其類羣浮水上每一游輙數十未見其匹也鴛鴦匹處故傳以爲匹鳥正不當與水鳥類同論耳傳交物有道取之以時皆依序爲説核之詩語固不相蒙然徒作頌君浮詞味亦如咀蠟且於興義無取按稽聖賦云雎鳩奚别鴛鴦奚雙亦謂雙飛相耦足稱好逑故後世閨闥投贈多引爲隹話此詩自爲伉儷之詠其云萬年福禄必非尋常夫婦説此詩者惟何氏深得其旨錄之以俟斷者何元子云此美大昏之詩故以鴛鴦起興若如序以爲刺幽王則咏娶申后事也以白華之詩證之七章亦有在梁二語詞旨昭然矣幽王之娶申后當在未即位時詩人追美其初昏祝以萬年之福亦猶唐高宗欲廢王皇后長孫無忌述太宗言朕佳兒佳婦今以付卿言猶在耳之意鴛鴦不再匹故以興新昏且刺幽王黜申后立褒姒也愚按如此則詩中字字有情語無泛設何氏此解可謂隻眼矣白華詩爲既廢後作故詞激而怨深鴛鴦詩爲將廢時作故語恭而情切玩其立言之旨則又不當依序作刺詞觀也陸農師嚴華谷皆衍毛鄭舊義而説益腐陸氏好引魯論不射宿文説詩最爲可哂此其一也若嚴氏長大能飛之説又本孔疏與鼈長後食謔語絶類夫弋射豈能悉獲非獨畢然也陷穽皆令自投非獨網然也乃以畢羅爲不盡物之意是傅㑹也且鴛鴦一小物耳品未聞供簿正味不足充飲御而猶既畢之又羅之多方以相戕若此是焚林竭澤之爲也有道明王顧如是乎何元子云凡詩言于飛者六黄鳥倉庚雄雉皆單舉一鳥若燕燕雖重言之然以比莊姜戴嬀則猶之乎皆雌燕也此説誤駁見燕燕至鴻雁則有大小之異要非一族其以雌雄連言者惟鳯皇及此鴛鴦耳卷阿雖不從匹配取義而左傳齊懿氏卜妻敬仲亦有鳯皇于飛和鳴鏘鏘之占是以雄鳯雌皇之俱飛比夫婦也然則此詩雙舉鴛鴦以興夫婦何疑興義重于飛不重畢羅愚按此眞解人語其看飛字極雅切有致則前此不墜卵不射宿之説不待辨而知其腐矣且云不重畢羅則嚴華谷有得有不得待其自入之語通是傅㑹可見首章明言畢羅亦既捕取之矣豈無驚擾之患則鄭氏休息無恐懼之説其不可通明甚嚴華谷謂在梁者乃畢羅之餘則是戢翼之鴛鴦爲幸而漏網者亦非盛世明王氣象序説之不可傅㑹如是正義謂戢左翼舉雄者言蓋誤泥釋鳥左掩右掩之文何元子駁之謂詩明合言鴛鴦何得謂單舉雄者是也陸農師以爲飛而起則仰左翼飛而下則仰右翼則是飛翔時非止息時與在梁戢翼語不合此自取並棲爲義當以張子厚説爲正夫一正一倒是皆左翼也皆左翼則非獨一雄也故詩合舉之曰鴛鴦也何元子云于飛畢羅皆可得所謂飛則爲雙也在梁戢翼以相向所謂止則爲耦也詩興夫婦之和睦如此宜其享長逺之福祇此二語詩義便自了然不當復求他説耳小雅白華篇此與鴛鴦于飛篇無異旨亦不可以釋鳥左右掩之文解也釋鳥左右之辨乃爲雌雄之不可别者而設鴛鴦雌雄判然安得引爲證鄭氏謂隂陽相下皆飾語也謝叠山云鴛鴦不失其匹耦幽王乃喪其良心嬖妾廢后有愧於鴛鴦矣其大意止此鶖鶖小雅白華篇秃鶖水鳥一名扶老一名舍利形似鵜鶘長頸赤目爪如雞頭項無毛形頗陋惡崔豹謂其似鶴而大蓋髣髴間耳若光以爲似鳯皇景煥又謂爰居即秃鶖皆擬非其倫北史魏明帝獲鶖於宮中養之崔光諫云貪惡之鳥埜澤所有黄初中鵜暫集而去猶以爲戒况饕餮之禽必費魚肉菽麥稻粱之食豈可畱意於醜形惡聲哉此可以知其狀矣鶖秃似老人頭童故名扶老非秃鶖别名䳓也䳓乃俗字李時珍因秃作鵚誤鵚爲䳓以䳓同老因謂秃鶖一名鴜䳓引元朝常賦有鴜䳓之供飲膳要是謬證未可據耳鶴善而鶖惡分喻申褒此不易之説但在梁在林只作一得地不得地影子看如褒立而申黜云爾必泥魚梁爲言謂以得食不得食喻别飽與餒則鑿矣羅瑞良云鶖貪戀之鳥也故進造於梁鶴高潔之鳥也故退棲於林以喻褒姒申后之進退語最淺合鷖鷖大雅鳧鷖篇鷖傳以爲鳧屬蒼頡解詁謂即鷗也一名水鴞風土記謂之鷖鴨海物異名記謂之信鳧按六書故云鷖鷗一聲之轉實一物説文有鷗無鷖則鷖當即鷗無疑列子作漚相如賦作翳皆即此與鳧不族而别名信鳧又謂之鷖鴨故傳云鳧屬耳南越記謂其色白陸農師以爲蒼黑色羅瑞良云鷗亦有白者不專於青黑是也水鳥皆能出没水中然其性各有所便陸農師謂鳧好没鷗好浮蓋鳧未甞不浮而性便於没鷗未甞不没而性便於浮耳或駁之謂凡駢跖之鳥皆能浮湛湛而求魚必伏氣不息勢不能久此拘墟之見也水鳥而居水中猶人爲公尸之在宗廟此語意淺而合陸農師謂鳧鷖安樂於水者故詩以爲神祇祖考安樂之喻此從序説推出亦覺添足矣總之詩之取興若有意若無意不可執物以求解也羅瑞良謂水鳥滅没浩蕩似不可羈然誠得其道有可馴之理因引海鷗不至之説以爲誠僞之不可掩如此誕矣夫鷗鳥忘機此列子寓言耳豈可牽合作鬼神如臨如在氣象耶郝仲輿云鳧没鷖浮有變化出沒之象以比鬼神其説亦倣此羅氏又謂古者祭義通於物理故自樂之一變而致羽物及川澤之示以至六變各有所致羽物既與川澤之示相應則所以美神祇祖考之安樂者比之鳧鷖亦其理宜也此説更誕詩人觸緒興懐斷無以物驗神之理且水鳥微族豈真有鬼神式憑之耶禮云索祭于祊不知神之所在于彼于此苟若所言但求之羽族之微足矣其傅㑹益可知也何元子泥二鳥不當興一尸謂先言鳧後言鷖則鳧當興考鷖當興妣以鳧能遠飛鷖不能遠飛爲别又謂逸周書有鳧旌男子所執周禮有鷖總王后所用亦以定考妣之分此大穿鑿愚謂是詩爲繹祭享尸之詩一章内兩言公尸而不言祖考神祇蓋正祭所重在格神繹祭所重在事尸也且尸者神之所依考妣皆式憑之未聞有一廟二尸者乃牽合旌路别鳧鷖爲考妣之興亦誕甚矣何元子謂涇爲水名其後沙渚潨亹乃蒙乎涇之詞非也涇水去豐鎬亦遠此詩所指不當爲水名乃水流之濁者莊子涇流不辨涯涘是矣與沙渚潨亹例言總言之則一水耳鄭氏泥五者分五等鬼神鑿甚元子又以爲高曽祖考之别更屬臆斷總非觸物連類之旨惟羅瑞良次序之説猶覺淺合鳯皇鳯皇大雅卷阿篇郭璞謂鳯皇高六尺許而京房易傳以爲高丈二舊疑爲雌雄之異未可據也鳯鳥雖大亦無高至丈二之理此當以郭説爲正京房於麟亦云高丈二其誕可知且其形象亦紛傳不一如韓詩外傳載天老對黄帝語及緯書六像九苞飛行鳴聲要是諛詞羅瑞良云鳯生南方逹中國甚遠而又不妄飛鳴飲啄其至蓋罕故孔子稱之而世好事者喜爲之傳道務竒怪其章紬繹其聲列於神聖故千世而不合焉其識達矣山海經鳯出丹穴爲南方之産不應以五色别五方所謂發明焦明之名槩不足信又何論其爲祥爲孽耶樂叶圖徴所謂䘮疫水旱之感必非真鳯鳥也楊升菴謂西有鳻雀東有諫珂北有定甲南有錦駝皆竊鳯形而似者漢宣成之世鳯皇數集安知非此則傅㑹者之妄不可不辨羅瑞良云漢儒夸大其詞推爲希世之瑞夸而無驗極而必反則又推之以爲孽揆厥所由實亦指埜鳥爲鸞耳翽翽傳訓衆多因下多士爲説正義直以爲鳯皇衆多引白虎通云黄帝之時鳯皇蔽日而至此誕也鄭氏疑鳯乃希見之鳥不當云衆多因解爲羽聲以爲衆鳥之從亦未是不知翽翽對藹藹不對多士釋訓云藹藹濟濟止也郭璞以爲皆賢士盛多之容止則藹藹以士之容言翽翽以鳯之儀言總於飛時見之蓋集止者飛而集傅天者飛而傅鳯皇上擊九千不知所至而喜見其止又見其傅故曰亦也何元子乃謂羣鳥相從不一對鳯皇言故云亦則誤矣梧桐何地蔑有竹之實非佳物乃鳯皇樂棲之食之而又不見其一至可知莊子非梧桐不棲非竹實不食二語亦因詩傅㑹成語耳何元子謂高岡者朝廷之比梧桐者大臣爵位之比此説甚當按釋訓云藹藹萋萋臣盡力也噰噰喈喈民協服也本以梧桐比臣固無比君之説蓋鳯皇祇賢士之喻尚未應聘爲臣棲梧則居位殫職師濟同心而民亦協服焉然則説文所謂鳯飛羣鳥從之以萬數其非翽羽之時而雝喈之時乎鄭氏不㑹釋訓之旨易喻君徳誤通論詳矣通論云詩意本是高岡朝陽梧桐生其上而鳯皇棲於梧桐之上鳴焉今鳯皇言高岡梧桐言朝陽互見也解者不知見詩是鳯皇鳴高岡梧桐生朝陽則鳯皇梧桐兩不相屬雖漫引莊子非梧桐不棲之言而究不知所合也於是鄭氏以鳯皇鳴高岡喻賢者居高位則於梧桐更無著落只得以之喻君且以朝陽爲溫仁之氣亦喻君徳解者至今從之豈不鑿而謬乎梟梟大雅瞻卭篇此鳥之最惡者與鴞絶異鴞但能爲聲禍民無食母之惡惟土梟傴伏其子百日而長羽翼既成食母而飛蓋稍長從母索食母無以應於是而死古者以春解祠用梟祠黄帝又漢使東郡送梟作羮賜百官皆惡其惡也梟亦有鴟名釋鳥云梟鴟郭璞以爲土梟是也然在瞻卭詩明以二者對舉如爲鬼爲蜮各爲一物鄭氏似混而爲一不可不辨且梟乃惡鳥非惡聲之鳥鄭氏此言乃爲下長舌寫照使後人以鴞同梟禾必非其説誤之也此但以鳥之惡者詆人之惡者更無他義舊謂梟鴟皆能聚致衆鳥以比幽王鍾愛褒姒則羣小並集恐詩人念不及此矣附流離邶風旄丘篇傳以流離爲鳥正義引釋鳥文謂流與鶹蓋古今之字離或作鷅以通其説此眞所謂讀爾雅不熟者也試以文義按之上云鳥之雌雄不可别者以翼右掩左雄左掩右雌下云二足而羽謂之禽四足而毛謂之獸皆統論鳥獸情狀故謂凡鳥之少美長醜者俱呼爲鶹鷅耳况上既釋梟鴟此不當復贅明甚後人因黄鳥有栗畱離畱之通强以詩流離比例且飾爲食母則醜之説何其寃也若以流離爲梟則梟長大食母兇惡莫甚安得如傳以爲微弱之喻蘇子瞻謂以狄之微而不忌如流離之養其子不知將爲己害其説似矣然玩篇中語氣皆自傷其失國飄零而未嘗及狄之强暴不如依集傳漂散之説爲淺合耳瑣細也尾末也此不易之解今人稱微末事爲瑣屑是矣毛公誤讀釋鳥鷅之文强解瑣尾爲少好全無取義而正義傅㑹其説以瑣屬少以尾屬好尤不可解夫考之名物按其詞旨舉無足通其説者則流離之非鶹鷅與鶹鷅之併非土梟不辨自明矣鴟鴟大雅瞻卭篇此釋鳥所謂怪鴟郭璞以爲即鴟鵂是也然惟此專有鴟名舊説大如鴟鷹黄黑斑色頭目如猫有毛角兩耳晝伏夜出鳴則雌雄相喚聲如老人初若呼後若笑所至多不祥蜀人呼轂轆鳥亦呼春哥兒楚人名呼咵鷹亦名快扛鳥呉人謂夜食鷹江東又謂之車載板里俗忌聞其聲蓋與鴞同惡而實不族者也今人譌鴟爲鴞又以鴞爲梟并以鴟鴞爲鴟梟紛紜舛錯如其説則鴟當即鴞鴞又卽梟瞻卭詩人何爲叠床架屋乃爾乎李時珍分鴟鵂鵂鶹爲二通雅合之按本草亦謂鵂鶹大如雊鵒毛色似鷂頭目似猫鳴則後竅應之其聲連轉如休畱休畱故名正字通云此鳥初聲若呼若笑轉而若休畱非呼笑爲鴟鵂之聲休畱爲鵂鶹之聲則仍是一物也莊子鴟鵂夜撮蚤蚤乃蚤虱後人譌蚤為爪謂夜能入人家拾人指爪知人吉凶有人獲之嗉中猶有爪甲故除爪甲者埋之户内爲此此齊東埜語耳鳶小雅四月篇鄭氏謂鳶爲鴟類蒼頡解詁以爲即鴟陸璣陸農師皆從蒼説嚴華谷是之而别於瞻卭詩解云鴟有二鳶飛戾天者鷹類也亦單名鴟惡聲之鳥者怪鴟也此配梟言者愚以嚴氏後説爲當蓋惟惡聲之鳥專有鴟名鳶特從其類耳今以釋鳥茅鴟推之廣雅别名爲老􅣽者疑即指此陶隱居云俗人呼爲老鴉者與鵰鶚並相似而大極善飛騰江淮間捕魚食之今人呼爲餓鴟則鄭氏鴟類之説不誣矣鳶亦鷙鳥一種其異於衆鷙者在不擊惟乗風直上摩天回翔而已故以爲風之候越人呼爲風伯抱樸子云鳶之在下無力及至乎上聳身直翅而已此釋鳥鳶烏醜其飛翔之謂也翰本爲鳥羽蘇子瞻以爲翼之鋭是也然此詩當訓高飛非鳥羽之謂如易翰音登天王弼亦訓高飛是矣且下云潛逃于淵潛取深意正與翰之高例言若云翰爲鳥羽則鱣鮪何以不云尾云鱗而云潛耶大雅旱麓篇傳襲中庸成語全無著落正義以爲化及飛潛乃腐語耳鄭氏易傳求解義並强合皆因泥作人爲教化鼓舞便於鳶魚喻義無解愚謂作動也言其豈弟之徳之盛有以感動乎人也有一明證棫樸以天人對言此以天淵與人對言蓋天遠而難至淵深而難出人衆而難動惟鳶有乘風之力故能至于天魚有泳游之性故能出于淵君子有豈弟之徳故能動乎人二義融然絶無沾滯不必深於求解也宋明諸儒説是詩者不可勝紀大抵深言理者以爲道在飛躍侈言化者以爲格及禽魚要於本詩作人之旨去而萬里此皆溺於中庸斷章奥義耳通論云此言作人也上篇言倬彼雲漢爲章于天此言鳶飛戾天魚躍于淵亦見淵魚文藻掞及天淵之意故亦曰豈弟君子遐不作人如此説詩便可掃除一切陸農師云鳶鈍者也而乘風以作之則高飛魚潛者也而乘氣以作之則深躍故詩以况君子作人之盛此解作字正合感動之義桃蟲桃蟲周頌小毖篇釋鳥以桃蟲爲鷦且云其雌鴱則但有鷦名而非鷦鷯明矣郭璞謂之鷦􅛯陸璣直以爲今鷦鷯誤也璣又引俗鷦鷯生雕之語尤不可信鄭氏亦謂鷦之所爲鳥題肩或云鴞大抵因傳始小終大之説傅㑹耳愚謂爾雅列桃蟲於鳥部則固是鳥無疑但以其亦有蟲稱故借以爲説猶云問其名若爲蟲覩其飛則維鳥不可因其名而忽之如武庚本爲孤雛乃能挾奄徐諸國以叛事理之難測如此也廣雅釋鷦􅛯爲鸋鴂按鸋鴂自是鴟鴞别名無容混入若從其説則是桃蟲即鷦鷯鷦鷯又即巧婦輾轉相誣不可復辨且使後人因此反易鴟鴞爲惡鳥則誤中又誤也或以釋鳥桃蟲鷦又鷯鶉又鳭鷯爲一物誤甚桃蟲但有鷦名鷯鶉但有鷯名李廵謂鶉一名鷯鳭鷯鷦鷯則音近而已不可易鳭爲鷦也且鳭鷯之鷯叶力周切義尤難合名物之失真皆自謬爲相通始之拚與翻同不必爲手拊之義蓋泥桃蟲之名以爲不在羽族未必能飛者孰知其竟飛而乃爲鳥也如此説則鳥字上便可不添大字矣余首源世父善張氏向爲鼠後爲虎之喻斷桃蟲非鳥名故通論云鷦鷯雖小鳥亦鳥也安得以蟲名且莊子謂其所棲不過一枝不云桃枝也爾雅之説已自難信而郭璞復實之以鷦鷯生雕之説幾曽見鷦鷯生子爲鵰鴞來其傅㑹更何疑若鷦鷯生子爲雕鴞不知鷦鷯又何物所生乎且詩苐云鳥不云大鳥也今爲彼説以桃蟲爲小鳥勢必以鳥爲大鳥增添語字以就已說可乎總之若使桃蟲爲鳥詩決不又云拚飛維鳥矣蓋謂蟲之小物忽變而爲飛鳥以喻武庚其始甚微而臣服後乃鴟張也此又一説詩識名解卷三

body:
  text: 詩識名解卷七錢唐姚炳撰草部荇荇周南關雎篇荇釋草作莕别名接余陸璣以為白莖葉紫赤色正圓徑寸餘莖大如叉股上青下白鬻其白莖以苦酒浸之脆美可案酒是也但今世鮮聞食之者與蓴種别陸農師謂亦稱鳧葵非鳧葵蓴别名即魯頌之茆又本草唐本誤以荇為猪蓴按猪蓴與絲蓴一種亦呼龜蓴總非荇類羅瑞良辨之云荇葉雖圓而稍羡不若蓴之極圓今宛陵陂湖中彌覆頃畝黃花六出日照如金俗名金蓮子又猪好食民皆以小舟載取飼猪或因是亦得猪蓴之名但非蓴菜其說詳矣陸農師本介甫鑿說易接余作菨餘以為菨餘惟后妃可比德行如此可以妾餘草故名若蘋蘩藻所謂餘草也亦誕甚矣程大昌不悟其妄反疑漢之婕妤取此義以名是為前說所愚耳夫蘋蘩蕰藻之菜皆可羞鬼神何獨為荇之餘耶嚴華谷謂凡菜皆不齊不當於荇獨言參差今池州人稱荇為莕公鬚蓋細荇亂生有若鬚然詩人之詞斯為不苟此猶愚以燕燕差池屬燕尾言之意覺更親切故羅瑞良云博士皆以參差者是莧菜因呼人莧為人荇亦可笑矣陸璣謂茆與荇相似然未嘗謂荇即茆且茆菹乃豆實而蔡元度直云荇菜謂之茆芥引魯頌薄采其茆謂德足以事鬼神故以况淑女以薦神明則誤也荇菜特以起興未嘗言其所有事如采蘩用之宫中蘋藻奠之牖下皆明言事宗廟可見此何所指耶且天官醢人陳四豆之實止於菖本茆芹深蒲而已未嘗有荇菜也傳謂后妃有關雎之德乃能供荇菜備庶物以事宗廟不知何据陸農師因傳事宗廟一語遂有荇菜厚於蘋蘩之說且云荇止於芼不言用之盛之湘之奠之亦位高事略之證尤穿鑿可笑如左傳所稱可薦鬼神亦祇蘋蘩蕰藻而已未嘗及河洲之荇也且此水草之屬必瀹為菹而後可薦惟荇非所宜薦故但云采之芼之耳可知不用故不言用不盛故不言盛不湘不奠故不言湘與奠也今乃以為后妃夫人等級之分不愈誣耶傳訓流為求本釋言文今不用說家或云順水之流或云潔於流水終非一流字確諦愚按釋詁云流差柬擇也則流似有擇義擇而後采采而後芼其義亦合芼訓搴此釋言文傳易訓擇未是蓋采者小取之芼則搴拔其全體也至東萊詩記改為熟而薦之不知何考愚謂荇菜擢秀清流原僅供人搴擷而已未嘗可熟以為羮也此總為薦宗廟之說膠於胸中便謂芼為熟薦不知內則芼羮芼字但作一菜字用昏義芼之以蘋藻亦謂生取蘋藻之類為羮上飾耳何嘗訓芼為熟烹乎羅瑞良謂民以小舟載取飼猪今熟而薦之宗廟神不其吐之耶葛葛周南葛覃篇葛類不一有就葛龍葛冶葛食葛諸種其為絺綌者乃山葛也周禮地官掌葛掌以時徴絺綌之材於山農是矣詩以葛起興蓋因手之所成溯目之所覩有風景滿眼流連不盡之致鄭氏乃喻及形體容色志在適人豈是后妃意耶宜今之皆不從也孔氏訓莫為大又與漠通廣莫曠貌葛葉之纒綿濶逺似之傳因刈濩是可用之時便以為成就貌則非字義矣何元子謂莫本古文暮字今云莫莫者蓋取稠密隂暗之義此又太泥太姒歸文王時文尚未為伯又周之先世習為勤苦與民同稼穡凡桑麻織紝無不共之故后妃之於葛躬執其勞如此陸農師引王后親蠶織紞之禮以為治葛勸女工之餘事則是從其後而論之也邶風旄丘篇此以葛興取瓜葛意但節長則延及者多應以葛之相及興衛伯叔之不相及耳郝仲輿謂旄丘前髙後下乃丘之不斷截者葛亦不斷之物故以為喻則鑿說也誕與覃通猶葛覃之覃也書誕敷亦作覃敷是其明證覃延也誕從延有延長意詩蓋曰彼旄丘之上有葛其節何延蔓而長雖前髙後下之丘猶逺相及而我之伯叔同處一地乃多日而不相恤是何心也傳釋誕為濶於義無据何元子引說文誕詞訓大言遂謂誕轉訓大又因訓大轉為闊亦曲解甚矣葛自有節初生節密後延蔓則愈長此自然之理非關土氣也鄭氏欲為衛伯不恤其職之喻遂謂土氣緩則葛生濶節皆緣詩說物於物情未必有當也王風采葛篇此詩宗序憂讒之說甚無解若以采葛為真則非臣子所有事以為喻則疑非其倫故田藝衡謂葛性善攀附喻小人郝仲輿謂葛之為物可以織讒言蔓引何以異是是皆因序說推勘終嫌於詞㫖無涉耳或云此賢臣見棄而思君之作葛藟蔓延本支聫屬比君臣情誼相維也又一說唐風葛生篇葛不自植必有所附而後延蔓楚棘其所附者也婦人之依託於夫義亦如之陸農師合葛蘝二句為訓取髙卑䝉蔓意為榮瘁隨夫之喻亦不必齊風南山篇通論云五伍通即參伍之伍葛屨相伍必兩冠緌必雙此確解正義謂五為竒是五隻非五兩矣若何元子謂著此屨者有五人則齊子歸止其從如雲豈獨五人已耶舊引屨人注云有纁屨黃屨白屨黑屨散屨所謂五兩也愚按屨惟夏用葛為便於時其纁黃白黑諸色未必皆以葛為之士喪禮夏葛屨冬白屨變皮言白可見葛屨惟用本色故喪禮不易其稱耳况朝祭屨舄各從其裳之色并無用葛者亦安得有五者之異其制耶魏風葛屨篇嚴華谷云疏以為糾糾稀疏之貌非也繚繞纒也糾三合繩亦繞纒之意故云猶繚繚也此解甚確蓋糾糾者糾而復糾正繚繞之狀今江東以絲合物皆呼繚繚即傳說耳集傳因傳繚字通為繚戾寒凉意合下履霜愚謂此四字乃霜空秋氣之云耳恐非所以言屨者也葛屨惟為當暑之需餘三時皆不用傳引儀禮夏葛冬皮特舉其寒燠之期耳必謂履霜自秋始言冬為寒甚則泥矣魏俗儉嗇夏之所用至冬不易嚴華谷謂葛屨既敝而以繩糾纒之糾而復糾謂其可以踐霜奔走道路祁寒不休是也若依鄭氏謂利其賤則未有當冬而反售其夏之所宜以為用者相去之間為利幾何小雅大東篇葛屨二句足上杼柚其空意所謂傷於財也惟其絲帛告匱故有葛屨履霜之感下乃言貴戚大臣之奔走道途為困於役耳必連下取義謂公子著葛屨以履霜或又謂夏日供賦適周至履霜時始返國皆泥藟藟周南樛木篇藟亦作櫐爾雅列釋木中所謂諸慮山櫐是也郭璞謂今江東呼櫐為藤似葛而粗大正是其物或疑草木異字不可援彼解此則泥矣按蘇頌云藟蔓延木上葉如葡萄而小冬惟凋葉即詩云葛藟者也此藤大者盤薄又名千歲櫐而韻㑹注謂千歲櫐即今言萬歲藤大者如碗冬夏不凋故從木其形蔓似草故從草蓋在草木之間則藟櫐固是一物無疑耳今詩字從草又文與葛連言故釋見葛後列草部中徐鉉以藟為葛蔓則直是葛矣非也陸璣云藟一名巨苽似燕薁亦延蔓生葉如艾白色其子赤可食酢而不美幽州謂之推藟按此與葛迥别併不可以為葛類耳下曲之木能繫葛藟君子之德自召福祿兩兩相况取義自捷併不必鑿云能逮下也或謂弱小之國有所依歸如葛藟之得所繫則福履句直是贅疣矣或引說文訓荒為蕪取蔓延廣逺意非也荒當訓蒙即傳奄義猶䝉楚䝉棘之謂禮喪大記飾棺君龍帷黼荒注云荒䝉也可證王風葛藟篇此但以葛藟之生長不絶喻宗族之飄零無依綿綿終逺兩語對勘於河絶無關涉王城在大河之南其地近河作者疑即河滸之所見以起興耳鄭氏謂生河崖取潤澤義鑿嚴華谷謂不生丘野而生河滸水岸善崩為所危蕩蓋本陸農師說而小變之並鑿舊引諸詩謂葛施中谷縈樛木誕旄丘蒙楚棘施條枚必是植於丘谷之上延蔓於草木之顛不生於水崖此拘墟之見耳即以丘谷論之釋水云水注溪為谷谷中蓋兩山間流水之道也廣雅小陵為丘丘非髙山可知今河滸河涘河漘乃近水髙出之地並非水中正葛之所託以生者而曰必生於山谷丘野而不生於水崖吾不信也且楚棘條枚之木安知近水之地無之使必執此律彼是凡作詩言葛者不云纍于樛木即云䝉于楚棘而後可此又不通之論矣大雅旱麓篇莫莫與葛覃同而傳一訓成就一訓施貌兩說各異如此可知皆緣詩立說者耳此章詩義與樛木無二解葛藟以喻福條枚以喻德自不必以蔓延起依緣之說也卷耳卷耳周南卷耳篇卷耳名不一釋草謂之苓耳廣雅謂之枲耳亦呼胡枲亦呼常枲又名葹博物志謂蜀人呼羊負來陸璣云生子如婦人耳中璫或謂之耳璫草幽州人呼爵耳羅瑞良謂幽冀謂之䄠菜實如鼠耳而蒼色人通謂之蒼耳博考之别有豬耳地葵野茄道人頭進賢菜喝起草縑絲草凡十八名皆合卷耳蒼耳為一物惟鄭漁仲辨以為今卷菜葉如錢細蔓被地非蒼耳今按本草蒼耳之名注出爾雅然爾雅實作苓不作蒼也而陸璣所釋卷耳狀葉青白色似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子如璫則又與本草所說無異並存俟考卷耳惟有常枲名今别作常思思即枲之訛也李時珍謂詩人思夫賦卷耳之章故名常思是徒據俗詁強解耳此詩詎思夫之作耶此以采耳喻懷人以頃筐喻周行蓋謂卷耳微草采之尚欲其盈筐豈我意中所欲得之賢者不登之髙位而反棄置道傍乎下章崔嵬髙岡喻髙位也馬瘏僕痡喻在位諸臣也於是且酌罍觥而勿至於長懷正念之切而思之深所謂朝夕思念至於憂勤也歐陽正義謂后妃以采卷耳之不盈而知求賢之難得因物託意諷其君子此說得之蓋賢才難得官位至繁欲求難得之才以實至繁之位是以思念憂勤不能自置耳嚴華谷引張南軒詩直謂后妃主酒漿之事預采卷耳以為麴糵此大可哂按四民月令云伏後二十日為麴至七月七日乾之覆以胡枲是卷耳固酒漿所需也但后妃至貴安得親主酒漿之事即主之不過董率潔治而已未有自持器具而采之以覆麴糵者解頥新語謂周官酒人之奚為世婦役有女酒女漿若果親采之是后妃下同酒人之奚矣且罍觥之酌皆假飾詞耳豈謂忘憂惟酒預采卷耳以為之乎羅瑞良因酒漿之說謂采采卷耳職之賤者引淮南子瞽師庶女位賤尚枲為證今按尚枲之官古無可據淮南所云當為麻枲蓋婦人所有事者故取以比庶女之職耳斷無采卷耳專設一官之理亦斷無采卷耳屬之婦人之理不足信也且求賢審官不思吕召畢散之徒而顧及於采枲之輩嗇夫喋喋雖後世猶知惡之况聖德之太姒乎芣苡芣苡周南芣苡篇芣苡大葉長穗好生道邊有馬舄勝舄陵舄車前當道牛舌草蝦蟆衣諸名王肅引周書王㑹云芣苡如李出於西戎王基駁之謂逺國貢贄非周南婦人所得采是也羅瑞良兩存其說以謂說文韓詩皆云似李其實宜子孫不妨自有芣苡與詩所說不同今按王㑹篇芣苡從木作桴及山海經亦然皆云食之宜子則應别是一種非此詩芣苡明矣蘇頌云春初生苖布地如匙面纍年者長及尺餘如鼠尾花甚細青色微赤結實如葶藶赤黑色此芣苡之狀也陸農師引韓詩傳直曰車前瞿曰芣苡之說謂生於兩傍謂之瞿今按釋草合二名為一不分瞿直陸璣亦云芣苡喜在牛跡中生故曰車前當道則不得謂生兩傍者為芣苡也愚謂瞿同衢丹鉛録引靡蓱九衢作瞿山海經少室山有木其枝五衢注云樹枝交錯五出象衢路也然則一本直生者曰車前數枝岐起者曰芣苡耳其於兩傍之義奚取焉韓詩說以芣苡為澤瀉非也澤舄叢生淺水中葉似牛舌獨莖而長即釋草所謂蕍蕮者確是别種乃欲以芣苡當之且以為臭惡之草殊不可解何元子云車前善療難産特以其性大滑耳舊因以此為樂有子之證陋矣或又引本草云強隂益精令人有子今考神農本經之語苐云車前子味甘寒無毒主氣癃上痛利水道小便除濕痺久服輕身耐老初無宜懷妊之說至唐本餘等始增入此語蓋因毛說而附㑹之也滑伯仁謂車前性寒利水男子多服則精滑而易痿婦人多服則破血而墮胎豈宜子乎此論快甚愚意通詩重在次章蓋芣苡之采采其子耳曰掇子之既落者拾取之也曰捋子之未落者手擷之也始曰采曰有求其子而方見之也終曰襭曰袺得其子而歸攜之也婦人樂之相與采以為兆曰有子矣故曰樂有子也則夫治婦人難産之說猶後焉者也以芣苡為臭惡之菜比惡疾此劉向傳經之孽耳即果有宋女之事亦是引詩自况非宋女之所作明甚且惡疾之比出列女傳不出韓詩韓詩但言傷夫耳劉向謂宋女傷夫之惡疾而歌芣苡薛君即取以實其詩劉峻辨命論又因薛君之說而寃及冉耕輾轉相因訛成典故不亦謬乎舊有蝦蟇衣理患癩之說據此則是以芣苡治惡疾非以芣苡比惡疾也彼謂芣苡為臭惡之菜者誣矣本草又稱蝦蟆能治惡疾李時珍謂蝦蟆喜伏於芣苡下故江東號為蝦蟆衣豈芣苡以藏伏之故亦感其氣而能治惡疾與蔞蔞周南漢廣篇釋草購蔏蔞無蒿名郭璞謂之蔞蒿大招亦稱蒿蔞按陸璣謂蔞葉似艾艾與蒿類舊有艾蒿之稱蔞之名蒿當以此自唐孟詵食療以爾雅蘩由胡為蔞蒿而說家遂通皤蒿為一以為特有水陸之分誤矣蔞可羮魚又生食香脆陸農師謂古今以為珍菜非諸蒿可比今從舊解以蔏蔞實之不入蒿類庶無誤覽者云許東陽引陸璣疏蔞葉長數寸髙丈餘之語以為長言其葉髙言其莖惟其髙丈餘故亦可刈而為薪集傳恐脫髙丈餘三字則於錯薪之義似有礙此足補前人之闕也錯薪舊解不一或謂芻蕘者以薪相讓即序所云文王之美化或謂芻蕘各有疆境多取則為淫故以喻男女之非禮今錯薪猶不思冒取則無思犯禮可知或又謂蔞野草之賤者以喻游女孤直而異於衆木故雖生於田野與薪相錯而翹翹可辨三者皆臆說非詩意也詩稱于歸明是指婚姻正禮而言見彼游女當以禮行不可以非禮求耳所謂刈楚刈蔞蓋引以為締姻之喻詩中多用此如析薪束芻伐柯歷歷可證通論云兩章上四句言其女子有夫彼將刈楚刈蔞以秣馬待其歸而親迎矣不可得矣猶樂府所謂羅敷自有夫也蕨蕨召南草蟲篇蕨虌釋草文陸璣謂周秦呼蕨齊魯呼虌蓋方言異也陸農師謂蕨狀如大雀拳足不如其足之蹶故曰蕨又初生者亦類鱉腳故曰虌則是以形似言亦曲說耳蕨新長如拳稱蕨至葉老不可食稱蕨萁蓋即豆萁之意故今掘根搗汁取粉者亦名蕨萁粉是也羅瑞良以為今歲焚山則來歲蕨葉繁生其舊生蕨之處蕨葉老硬紛披人志之謂之蕨此亦一說但不可誤讀廣雅作紫藄耳紫藄似蕨有花釋草藄月爾即此與蕨異種非如瑞良所謂基轉為藄也郭璞辨廣雅紫藄之說為非信然或謂一種大蕨亦可食謂之藄蕨陳藏器所謂永康道中居民多用醋醃而食之者蓋指此此皆誤以紫藄為蕨也不知花繁為爾蕨無花而藄以爾稱其為别種已明矣解之者云蕨芽拳曲繁盛如花故名月爾要是曲說舊說蕨名烏昧又名烏㮕按丹鉛録謂烏昧草即今野麥淮南謂麥曰昧故史從音為文其說似非無据又范仲淹安撫江淮進民間所食烏昧草乞宣示六宫傳諸戚里以抑奢侈愚意亦當是野麥若初生蕨乃山菜佳品而老者又枯硬不堪食雖歲饑不應取之其於奢侈之戒奚有焉然則烏昧固非蕨名耳蕨薇野菜無奉宗廟之理如夷齊義不食粟故登山采之軍士行役在外則取以為食非所以薦神明也陸農師引疏種薇供祭祀之說遂謂大夫妻之祭於其將嫁則以蘋藻於其既嫁則以薇蕨直是傅㑹不根語耳即謂漢時官園所種亦止漢制非周制也况疏但言薇未嘗言蕨乎羅瑞良以為薇蕨賤者所食薇猶禮家用之蕨不復用愈知其賤此與共宗廟之說正相反可見禮固無用蕨者亦足證陸說之誣矣愚謂碧芽兒拳自是野蔬佳品不必蘋藻貴之亦何必藜藋賤之耶薇薇召南草蟲篇釋草薇垂水邢昺以為生於水濵而枝葉垂於水者曰薇果爾則非陟山可采矣故名物疏辨之云本草薇有二種生平原川谷似柳葉者白薇也生水傍葉似萍者薇也詩言陟山又言山有則是山菜非爾雅所云垂水者愚按陸璣直謂薇為山菜莖葉皆似小豆蔓生其味亦如小豆藿可作羮又可生食而項安世亦謂即今之野豌豆苖蜀人謂之巢菜東坡改名為元修菜者兩說相合則併非白薇也鄭漁仲别以為金櫻芽不知何据集傳以為薇似蕨而差大有芒而味苦山間人食之謂之迷蕨疑即莊子所謂迷陽者愚按胡明仲云荆楚之間有草叢生修條四時發𨽻春夏之交花亦繁麗條之腴者大如巨擘剝而食之甘美野人呼為迷陽集傳蓋本其說然一云味苦一云甘美又各不同且花葉條刺亦似未盡合者不可不辨也陸農師謂薇為微者所食故草蟲序於蕨後此即駉篇馬序之鑿說也如蕨不載典禮反以為共宗廟之用至於薇以芼豕記有明文而云薇薄於蕨故後之吾不知其誠何心耳夫詩人衝口成吟豈論先後若四月之章則取韻而已何元子以為薇蕨皆二三月所采而言蕨者常在薇先則蕨之生當稍先於薇要亦不必然也小雅采薇篇戴侗謂薇即苦益菜生山中冬晚抽芽至春柔矣夏而剛宜芼豕詩云薇亦剛止歲亦陽止薇蓋至夏而剛也據此則以陽為夏與鄭氏十月之說不同愚意仍宜與首章例觀彼云歲莫此不當云夏月蓋薇之始而作而柔而剛雖因時分叙然曰歸曰歸則皆預擬之詞耳况末云今我來思雨雪霏霏其為歲莫不益可見耶詩意謂草木隨時變遷已自春徂夏而屈指歸期尚逺猶必須十月之期是以憂心孔疚此行恐不能歸來耳遣戌不必定以采薇為期文王之遣適值其時故軍士因以為興如左傳瓜期而往及瓜而代是兒戲軍非王師所為也至正義泥箋先輩可行之說分三章為三輩以薇作柔剛定行期尤非理愚謂軍士始遣在塗乃初春之時故薇方作而采之繼踰時而漸長則見其柔又踰時而已老則見其剛乃一輩途中之閲歷耳若三輩分遣前者未歸後者復出暴師頓卒莫此為甚有是理乎小雅四月篇嚴華谷謂蕨薇把桋四物皆可食承上章欲逃世患之意將遁跡山林采草木而食之如伯夷食薇四皓茹芝之意非也通詩詞㫖似有凶年流移百物凋耗不聊其生之况如百卉具腓梅栗皆廢髙原下隰之間所有者不過如此更無長物為可哀也陸農師引孔叢子於四月見孝子思祭之說以明蕨薇所以祭也下國搆禍怨亂並興不得饗其親故詩以告哀愚按左文十三年鄭伯㑹公于棐文子賦四月杜預亦謂義取行役思歸祭祀不欲為還晉然核之此詩詞㫖實無一語似思祭者不足据也蘋召南采蘋篇釋草分小者為萍大者為蘋蓋同類而殊種者郭璞混為一槩云水中浮萍江東謂之薸誤矣韓詩沈者曰蘋浮者曰薸羅瑞良謂蘋葉正四方中拆如十字根生水底葉敷水上不若小浮萍之無根而漂浮是也嚴華谷云今薸只可養魚蓋萍可茹而薸不可茹豈有不可茹之薸而乃用以祭祀乎其辨審矣鄭漁仲又疑之以為蘋即萍之大者萍屬皆不可食此必蓴類葉圜浮水上如萍耳然左傳明謂蘋蘩藴藻之菜可羞鬼神而陸璣亦謂蘋季春始生可糝蒸為茹又可用苦酒淹以就酒則其非不可食明甚但今世未聞有茹蘋者要不可以今而泥古也蘋一名田字草取四葉合成一葉如田字形也又名破銅錢又名四葉菜又名十字草皆此義湖塘田中多生之陳藏器以為蘋葉圓闊寸許下有一㸃如水沫一名芣菜是也通雅辨蘋萍為一類而别以天問靡蘋為田字草不知靡蘋即蘋大則其莖葉分為衢道有披靡連延之狀故謂之靡蘋九衢云爾風土記以蘋為芹菜之别名此不辨而知其誣者舊又謂蘋有水陸之異柳惲所云汀洲采白蘋蓋水生而似萍者宋玉所云起於青蘋之末蓋陸生而似莎者愚按蘋不陸生所謂似莎者乃藾蕭其字作蘋不作蘋兩者判然不容混也鄧元錫謂蘋為青蘋而别以破銅錢為白蘋亦未可据羅瑞良云蘋五月有花白色故稱白蘋然則白因花名要之即是青蘋耳古者婦人將嫁教於宗廟教成有蘋藻之祭昏義所謂牲用魚芼之以蘋藻是也此當為將嫁時之作觀卒章稱季女可見蓋在家采盛湘奠能循法度預知可以承先祖共祭祀耳鄭氏謂既嫁為大夫妻能循其為女之時所學所觀以為法度則不當復言蘋藻明矣陸農師謂大夫妻祭共蘋藻則使女之季者佩蘭主而奉之故傳以季女為微主此大非也主祭之季女自即大夫妻於時教成將嫁因為辭廟之祭非女主之而誰主之且祭祀之禮主婦主設羮正將嫁時所當習者未有身臨祭而反使他人為主之理愚則謂奠之尸之者乃大夫妻也采之盛之湘之者共大夫妻之役者也貴族之女惟身臨其事以為敬耳又何必親執其勞乎藻藻召南采蘋篇陸璣謂藻生水底有二種葉如雞蘇莖大如箸長四五尺其一種莖大如叉股葉如蓬蒿謂之聚藻此二藻皆可食煮熟挼去腥氣米麵糝蒸為茹嘉美今按釋草但有莙牛薻之文郭鄭注皆云葉大當是似雞蘇之種其似蓬蒿者則與傳聚藻名合而顔氏家訓又謂牛薻乃璣所謂如蓬者詩人所采究不知於二者何屬也藻與蘋異韓詩浮沉之說本謂蘋薸非蘋藻也陸農師誤讀薸為藻而云蘋即所謂藻亦訛甚矣又分藻為二種以為萍藻之藻浮蒲藻之藻沈皆因誤讀而傅㑹者也羅瑞良辨之云水上小浮萍江東謂之薸又髙誘亦稱大萍為水薸其字皆以漂蕩之漂音簞瓢之瓢字似藻說者遂以相紊蓋非其類也得之蘋藻皆浮而不沈韓詩所謂沈非真沉於水底也浮者漂水面而不濡沉者漾水中而不出今以在水中之藻而便謂其浮則浮沉先未之辨宜其誤讀韓詩而多所附㑹耳廣雅以夌菜為藻按風俗通云殿堂宫室象東井形刻荷夌水草所以厭火今屋上覆橑謂之藻井又西京賦云蒂倒茄于藻井披紅葩之狎獵注茄藕莖以其莖倒植于藻井其華下向反披據此則仍是荷與夌非藻也夌菜之名豈别有所据耶陸農師以為后妃夫人采一大夫妻采二全是武斷荇非祭品薦繁惟見左傳而采蘩詩又非以共祭者乃必苦相牽合以為一與二之分何哉小雅魚藻篇舊解魚性食藻藻茂而魚肥故以頒首莘尾為得其性此陸農師說也一云淺水生藻而魚在猶言魚在于沼亦匪克樂喻民之窮蹙窘迫此嚴華谷說也兩者相反然玩在藻依蒲自是安適之狀宜從陸說但不可入王者德及淵泉諸腐語耳魯頌泮水篇此無興義不過即泮水中所有以發語或謂字下施澡取受教義受教則灑濯自新而有文采故以為興此飾說也又有謂古之入學者有釋菜禮以菜為贄因即水中採三品之草以薦之故今釋奠先師猶用芹云要之亦未必因此耳葭葭召南騶虞篇嚴華谷謂葭蘆葦又名華一物而四名愚按爾雅葭凡兩見華蘆異釋大抵生植為葭取材為葦方秀為華未秀為蘆故與蒹並釋則謂之華詩蒹葭蒼蒼言乎其彊盛時也與菼並釋則謂之蘆詩葭菼揭揭言乎其方長時也詩蒹葭葭菼萑葦舊俱分二種陸璣所謂蘆薍别草是也惟李巡樊光二家及字說紛紜互異而大車毛傳河廣集傳亦各相混淆耳今以釋草文考之其萌虇則數者同稱至葭與蒹與菼本各為釋不相混也兹綜其名類區之曰葦曰蘆曰華則葭名曰薕則蒹名曰薍曰隼曰荻曰鳥蓲曰馬尾則菼名别為三種詳見後茁即出義文從草從出說文以為草初生出地是也猶未及壯盛莊子所謂怒生近之衛風碩人篇說文揭髙舉也此既茁之後日漸滋長揭揭然如物之髙舉上竦無己蓋猶未及蒼蒼之時也夏小正謂葦未秀為蘆故釋草文與菼並釋則云葭蘆爾馮時可謂葭出河中者得氣尤厚故衛風以為河水洋洋葭菼揭揭北魏信都芳為律管吹灰之術得河內葭灰用之應節便飛餘灰不動也愚按衛地近河故即河中所有以為詠今葭江北是處有之里俗取以為薪非必河內尤厚耳律管凡葭灰皆可用信都芳偶得其河內者試之若必以河水者為良詩人豈專為律管之用而津津稱道不置耶秦風蒹葭篇蒼深青色將黃之徴正義云八月白露節秋分八月中九月寒露節霜降九月中此時葭正苕秀風吹揚如雪其聚於地如絮故釋草曰葭華正蒼蒼之候也葭至八月成材可采豳風萑葦正其時也嚴華谷說采采以為可采而不適於用蓋泥其但謂之葭而未名為葦耳傳似亦疑其候尚早故謂采采猶淒淒於字義難通陸農師訓為采色之采尤強合何元子云周之興也詩歌茁葭是春和之明景周禮行而忠厚篤祜開卜年有道之長秦之興也詩歌蒹葭是肅殺之蕭晨周禮廢而強梁臘毒兆二世撲滅之禍愚按此以兩葭對勘言之有味蓋本序中不能用周禮而言也然彼咏春田此賦秋水因時抒景何足關興衰於其間設易地以觀恐又指成材為彊盛而薄萌蘖為微弱矣然則詞人之㫖殆不足信乎葦衛風河廣篇說文訓葦為大葭邢昺云葦即蘆之成者是也然愚謂蘆之成材而未收者猶謂之葭至落取為用乃謂之葦此章及七月可見集傳統言蒹葭之屬蓋未之審耳正義辨一葦為一束謂可以浮之水上而渡若桴筏然非一根葦也愚謂此極言其易之詞次章曾不容刁夫刁小舟也以河之廣而若不容甚言其狹耳則此一葦何必定作一束觀耶後世傳達磨一葦渡江雖屬外術亦未嘗是一束葦也豳風七月篇舊以萑葦為曲薄之用按曲非即薄薄苫為曲萑葦乃為薄中之苫者則但當云蓄以為筁耳月令注訓筁為薄亦誤大雅行葦篇敦依傳主聚義何元子以為族生其義己足不必泥敦訓厚又云厚盛也行當讀如杭蘆葦傍岸而生如有行列然故謂之行葦古注皆泥牛羊句謂是道傍之草故得而踐之不知降阿飲池牧人固任其所之矣豈蘆洲荻渚牛羊足跡所不及者耶正義謂禁牛羊勿踐則是春夏時事而言葦者先王愛其為人用人之所用在於成葦作者體其意故以葦名此不必然也葦尾韻履紙韻古通詩言葦取其叶耳詎有他義耶苞乃甲拆之謂體則具莖葉而成蘆葦之形猶人既離母腹而備官骸之體故下云維葉泥泥然爾泥泥自取柔澤之義廣雅别作苨苨云草盛也文選注又作柅柅并無解詩識名解卷七

body:
  text: 詩識名解卷二錢塘姚炳撰鳥部鶉鶉鄘風鶉之奔奔篇釋鳥云鷯鶉其雄鶛牡痺李巡以為鶉一名鷯非也鶉無鷯名釋鳥並言之自是二物鶛痺取義未詳張萱以為不亂其匹與其牝偕者曰鶛其匹不亂故其牝曰痺若牝雞司晨非以不安於痺之義乎此皆因刺宣姜立論未足據也鶉䳺相似而非一族張揖云佳鶉也鴽䳺也月令仲春田鼠化為鴽淮南子蝦蟆為鶉又釋鳥鶉子鳼鴽子鸋各有類屬可見奔奔禮表記作賁賁注云爭鬭惡貌是也然鬭鶉自古有之蓋其性然亦不必謂惡亂其匹以求合詩旨且賁同奔國語天子有虎賁諸侯有旅賁注云執戈盾夾車而趨是趨即奔義也夏小正十二月𤣥駒賁注云賁者走於地中是走又即奔義也必易賁求他解鑿矣左氏鶉之賁賁亦用成語為文取奔義耳豈天文鶉火固有奔象耶魏風伐檀篇此因韻成文錯拈物類並無舉小之意舊謂在位貪鄙小禽尚公之如此或又謂特比貆為易得而鶉比特為尤小皆非且上言三百㕓囷何於禾並取其大而於物並取其細此說之不可通者也莊子云吾未嘗好田而鶉生於宎若勿怪何耶語意正與此詩相似小雅四月篇傳以此鶉為雕正義取說文之證之或云赤鳯亦名鶉六書故因傳訓鵰謂當作則是泥傳而欲改詩也舊注又音團引詩釋為鵰沿詩傳兩誤愚按此辨頗確禽經赤鳯謂之鶉鶡冠子亦云鳯鶉火之禽陽之精也鳯凰翺翔千仞翽羽高鶱足證戾天之說但與鳶並言于義未協舊說鵰屬似是然改字作解余素未敢信也兹於鶉部兩存之苟有相詰者亦但應之曰匪鶉可耳雞雞王風君子于役篇釋鳥云雞大者蜀陸農師謂雞有蜀魯荆越諸種越雞小蜀雞大魯雞又其大者羅瑞良辨以為荆越相近若蜀者非巴蜀蓋魯成公㑹於蜀者亦魯地云爾愚按釋鳥有鶾天雞之文逸周書以為文鶾若彩雞成王時蜀人所獻又說文云魯郊以丹雞祝疑即蜀雞之類也蓋魯之蜀地人所獻而郊用之耳若蜀道至秦始通成王時安得有來獻者耶邢昺解蜀為雞之名恐未然羅瑞良引風俗通云呼雞曰朱朱相傳雞本朱氏翁化為之而漢有祝雞翁呼雞名則種别而至疑朱為祝之轉又引古今注雞名燭夜因通爾雅之蜀謂燭音本於此愚按朱祝轉音不可考燭夜之燭猶燭奸之燭蓋以其知時而名莊子見卵而求時夜注謂度時而呼更意與此同非祝音之近也若蜀則雞所産之地尤不可混燭明矣雞為知時之畜故晦明風雨皆能應候而鳴人以夜漏難憑獨重其晨啼為興居之節耳故棲塒棲桀亦以其止息驗日夕又匪特其鳴為知時也鄭風風雨篇喈喈聲衆且和與黃鳥同然此當主衆為說羣雞感時而鳴雖風雨慘凄皆不改其度有齊一之義和於雞聲無取陸農師解膠膠義為固於雞聲更不可通嚴華谷謂膠膠擾擾是雜之意則羣雞聲是也然按說文膠訓昵昵與黏通有相接之義此云膠膠蓋雞鳴相應此倡彼和如接續而為聲者此所謂常度耳非擾雜之說也何元子又謂雞聲與風雨聲相為糾雜而不可分别尤未是古晨興以雞鳴為節禮內則雞初鳴而衣服齊風雞鳴朝盈孟子雞鳴而起列女傳雞鳴樂師擊鼓以告旦后夫人鳴佩而去凡自帝后至於士庶朝㑹以及闤闠莫不皆然此時羣動俱作尚欲為桑中之期必不然耳則雞鳴之非淫奔時可知且舊以東門之楊為淫者負約不至矣其詩云昏以為期眀星煌煌夫奔者顧待雞鳴時耶齊風雞鳴篇雞鳴蠅聲古今聚訟余世父論之稔矣通論云嚴氏謂蠅以天將明乃飛而有聲雞未鳴之前無聲也非是蠅聲夜中間有然亦不必泥蒼蠅之聲猶云蟲鳴聲耳秋夜有蟲鳴此必夏夜故云蒼蠅或謂賢妃誤聽或謂君誤指皆無不可乃謂蠅以天將明乃飛而有聲是誤以蚊聲為蠅聲矣蚊則天將明乃飛而有聲即下所謂蟲飛薨薨是也自嚴氏為此說後人均疑蠅聲在雞鳴後與下月光不一例是以紛紛鑿解朱鬱儀謂月字乃日字之誤季明德以一章為疑其已遲二章為幸其尚早何元子謂賢妃警君毋謂雞鳴為早過此以往不但聞雞聲將有蒼蠅之聲矣因歎詩人本誤以蠅聲為雞聲解詩者又誤以蠅聲為蚊聲真堪捧腹鳧鳧鄭風女曰雞鳴篇鳧即釋鳥沈鳧一名鸍一名水䲹方言謂南楚之外謂之鸊鵜大者謂之鶻鵜陸璣云大小如鴨青色卑腳短喙是也此是野族其性畏人晝見人則沒水中故飛而啄食常以晨夜陸龜蒙言冬視穫於甫田夜間往往聞有聲類暴雨而疾至者一夕數四以此驗之則知星爛翺翔非虛語耳其名因以晨稱故古賦云晨鳧旦至說苑魏文侯嗜晨鳧廣志晨鳧肥而耐寒皆可證鳧與鶩自有家野之分釋鳥云鸍沈鳧又云舒鳧鶩玩詞㫖分上下為釋其賓主可見故尸子云野鴨為鳧家鴨為鶩是也余首源世父庸言録中論之尤晰謹列於篇以資博覽者庸言録云鴨之名最多孟子一匹雛曲禮庶人之摯匹廣雅作鴄是名匹左傳竊更之以鶩又名鶩爾雅舒鳧鶩又名鳧俗又名鴨一物四名或因以鴨為家鴨鳧為野鴨又以鶩為家鴨鳧為野鴨紛紛不一豫以為匹乃古字鴨乃近字家鴨為鶩野鴨為鳧耳禮庶人執鶩楚詞將與雞鶩爭食乎將泛泛若水中之鳧乎左傳竊更之以鶩又詩弋鳧與雁則是鶩為家鴨鳧為野鴨甚明若夫庾翼誚逸少有家雞野鶩之說王勃滕王閣賦落霞與孤鶩齊飛此取音調用字不足為據周禮夏官司弓矢繒矢茀矢用諸弋注云結繳於矢謂之矰矰高也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也陸龜蒙謂江之南不能弋常藥而得之羅瑞良又謂江南大陂湖中其誘鳬者皆以網植兩表於水相去甚遠中網焉以舟自前驅而逐之率一獲千百輩則較弋為便矣弋本射飛鳥之制但人情多貪并其宿者取之宿對飛言蓋棲止者非夜宿也陸農師泥序刺不說德之說强解弋為不射宿鳥所以為好德大是穿鑿且往弋之時鳧雁羣集田間安知其盡為飛者無宿者耶蓋由誤訓翺翔為鳧雁之飛逐遂至曲說如此耳鴇鴇唐風鴇羽篇郭璞謂鴇似雁無後趾毛有豹文一名獨豹此以文似豹而名羅瑞良謂鴇豹為聲之訛誤矣鴇不與雁族而實相類性近水如雁託宿洲渚間然亦非必竟為水鳥也鴇既連蹄當不棲木故以集栩集棘集桑喻征役之危苦文義本順陸農師以為鴇之勞苦如此尚得以其類集則多一折矣羅瑞良專謂水鳥不木棲亦泥夫所以不木棲者以其連蹄耳若近水之鳥何嘗不翔止山林也且鴇亦鷙鳥詎水鳥耶六書本義單作象立於樹槎上按鴇性本不樹止反以立於樹槎象形豈制字意耶今人以七十鳥為鴇尤鄙傳訓行為翮正義為鳥翮之毛有行列故稱行陸農師云鴇性羣居如雁自然而有行列詩稱鴇行以此愚按陸說得之今詞章家稱蜂行蝶隊亦以其羣飛成行言也肅肅鴇羽聲其義或取勞苦或取急疾或取振肅不一其說愚謂此當與鴻雁肅肅其羽同義蓋羣鴇飛翔其行列亦自整肅不亂故曰肅肅耳鷺鷺陳風宛丘篇陸璣云鷺水鳥也汶陽謂之白鳥齊魯之間謂之舂鋤遼東樂浪吳揚人皆謂之白鷺大小如鴟青腳高尺七八寸尾如鷹尾喙長三寸頭上有毛十數枚長尺餘毿毿然與衆毛異此可盡其狀矣其名亦不一杜牧賦稱風標公子李昉稱雪客蘇子瞻詩稱雪衣兒海録一名帶絲禽格物論一名屬玉然屬玉紫紺色不白又可以厭火故漢武帝取以名觀非鷺别名也舊說楚威王時有朱鷺合沓飛翔而來舞故鼓吹有朱鷺曲要是僅見非白鳥族耳禽經露翥則露舊注以為鶴然鶴無露名物類相感志云鷺人養之於池塘馴若家禽每至白露日即飛騰而去則仍謂鷺也故陸農師云亦或謂之白露傳謂鷺鳥之羽可以為翳鄭氏云翳舞者所持以指麾也愚按古無以鷺羽舞者周禮國子羽舞舞人所執皆翟羽籥師教吹籥以節之弼風左手執籥右手秉翟是矣舊鼓吹朱鷺曲亦援楚威王故事取其合沓飛翔之勢所謂魚以烏耳非舞鷺羽也况詩中但有擊鼓無舞羽文羅瑞良引隋樂志云建鼓商世所作又棲翔鷺於其上考梓人之職裸者羽者鱗者以為筍簴陳風鷺羽鷺翿皆筍簴之所懸說詩者乃以為舞翳而訓值為持不知值者乃植立之義耳此亦創論但筍簴惟懸鐘磬與鼓不合况三章易鼓為缶亦云值其鷺翿則又未敢執羅說以强斷也周禮羽舞皆國子舞之樂師則教以采齊肆夏之儀不自舞也至若籥師但教國子吹籥為舞節更與舞事無涉何元子因鷺羽之舞無據遂謂此與周禮之羽舞不同蓋翟羽舞人所執鷺羽舞師所執其說較誕然則宋樂志文舞之不用翟羽而用鷺羽非誤於此詩乃誤於後之說詩者耳翳華蓋也蔽也障也凡草木延蔓所蔽曰翳又鳥名又翳者所以隱射也射雉賦以講肄之餘暇習媒翳之事蓋其用不一傳所云不知何指而鄭氏鑿言舞者所持過矣釋言訓翿為纛則纛亦非舞器周禮干戈羽籥其用具備纛雖武舞不用之何况文舞鄭司農鄉師注云翿羽葆幢也蔡雍獨斷云以旄牛尾為之大如斗在左騑馬頭上所謂黃屋左纛愚疑幽公游蕩宛丘常在其下擊鼓缶人見乘輿之纛日值其上不去故因以為刺併不必强作鼓上棲鷺解也白鳥大雅靈臺篇上實言麀鹿此白鳥當有所指或謂鳥羽色白者偶舉所見而言非也鷺好而潔白汶陽謂之白鳥則鷺本有白鳥名故陸農師解此詩直云鷺白鳥也周頌振鷺篇傳以振振為羣飛貌然此詩只言振而已未嘗言振振也玩詞義則翔舉之鷺為振鷺錢氏所謂自振其羽近是後人加鳥作䳲為鷺别名誤左思蜀都賦鴻儔鶴侣䳲鷺鵜鶘本借詩振鷺文選訛作䳲非鷺一名䳲也此或當如羅說為鼓上所棲者詩言振鷺即樂志所謂翔鷺是矣羅瑞良云說者以西雍為澤案西雍當是置禮樂器之所蓋大雅於論鐘鼓必於辟雍之地以在西故曰西雍而春秋傳則云西辟樂備是辟雍西雍西辟皆樂器之所在也大射儀建鼓在阼階西南書亦云大貝鼖鼓在西房則西雍振鷺之飛為鼓上之鷺明矣鼓常在西振鷺在鼓之上有飛之象耳存以俟考何元子云此與有瞽有客之詩為微子作也微子封宋修其禮物作賓王家故有客詩云亦白其馬商尚白也鷺乃白鳥而客容似之意其衣服車旗之類皆尚白與愚按此論頗似不則容字便難立言今解作我客之容貌修潔取潔合白終屬勉强故謂為二王後者恐非也魯頌有駜篇此鷺確為鼓上之鷺以下皆有鼓咽咽文可據蓋振之為言奮也裂也動也言擊此棲鷺之鼓其鷺振然如飛動而欲下者是以鼓聲咽咽而醉且舞為可樂耳上振字解作擊字下振字解作翔字文義不連二鷺則皆指鼓上所棲也舊以鷺羽為舞者所持因下有醉舞之說似也然二章不云鼓咽咽醉言歸耶鼓則猶是而舞者變舞者變而鷺終不變吾故曰鷺為鼓上之鷺也舊解謂舞鷺羽外又有訓鷺下象舞者尤謬若使鷺鳥之下而象舞則二章鷺鳥之飛亦云象歸耶舞說之不可通於此可見此詩之舞對歸言不過醉飽之餘起舞以曲暢其情耳說者乃欲詔樂師進國子而行羽舞考之典禮則不合揆之情事亦非宜雖使詩人復起當不易吾言矣梟梟陳風墓門篇梟一名􅬠鳥見廣雅或引天問繁鳥萃棘謂繁即􅬠之誤未可據也陸璣謂大如斑鳩緑色即賈誼所賦鵩鳥正義謂一名鵩梟一名鴟以瞻卭為梟為鴟當之俗說即上梟非陸農師謂梟非鵩嚴華谷則合梟與怪鴟鵩鵂鶹四者為一而以為即瞻卭之鴟諸說互異愚按廣志謂梟為楚鳩所生如驢巨虛不孳乳或别是一種若鵩乃是鴟非梟也漢賈誼傳云鵩似梟賈公彥云梟之與鵩二鳥俱夜為惡鳴者明是兩物且以陸璣羹臛之說斷之莊子見彈而求梟炙禮內則鵠梟胖未聞鵩可為羮炙也何氏辨之審矣何元子云如邢陸說則梟梟鵩乃一物而羅瑞良别鵩與梟為二以為鵩似梟小如雉體有文采行不出域有疆服者故名鵩則鵩之非梟明矣然梟亦非梟廣雅謂之􅬠鳥未詳其狀若何其名梟者乃爾雅之梟鴟耳亦謂之土梟故瞻卭篇云為梟為鴟舊說相傳皆謂梟者土梟鴟者怪鴟與梟無涉不可不辨列女傳易梟作鶚不足據然所載陳辨女事與詩頗相似亦善於傅㑹者也魯頌泮水篇食黮懷音二語各自為義絶不相蒙一言其食一言其聲自鄭氏以為食黮音美而諸家祖之奉為典實雖賢者不免良可哂也且衛風戒鳩食黮傳因以為過醉能傷其性此篇美梟食黮箋因以為味美能好其音明是緣詩傅㑹全無所本若使鳩梟易地二者亦轉而為說耳至季明德乃謂食黮變音可見講學之功格乎禽鳥則尤腐語矣世說張天錫為孝武所器頗有嫉己者於坐問張北方何物可貴張云桑黮甘香鴟梟革響醇酪養性人無嫉心此亦援詩為說要是詞章雋語耳如蘭成謝賚馬啓云柳谷未開翻逢紫燕陵源猶遠忽見桃花此不過借馬名渲染也監儒便欲向柳谷陵源求生活耶蔡元度云惟僖公有仁厚之德故雖所惡之鳥能集可欲之地今不庭之來猶之梟去幽荒而集於泮林也此語夸誕謂鳩食黮變音已非陸農師復廣為食梅不能變音之說强以陳風墓門傅㑹則穿鑿之尤也鷊鷊陳風防有鵲巢篇釋鳥無鷊釋草有虉故傳疏皆易字訓綬草意以對上苕言耳不知此大迂論觀篇中四有物皆不倫况上言鵲此何必不言鷊也今仍為如字列鳥部中陸農師云綬鳥大如鸜鵒頭頸似雉有時吐物長數寸食必蓄嗉臆前大如斗古今注謂一名功曹今謂之錦囊此可得其名狀矣戴侗駁農師云鷊之大僅如鸜鵒而臆乃大如斗亦不察矣野人有餽豫錦囊者大如雞頷下有錦囊鳴則囊見又李時珍云吐綬雞項有嗉囊內藏肉綬常時不見春夏清明則向日擺之頂上先出兩翠角二寸許乃徐舒項下綬長闊近尺采色煥爛踰時悉斂或剖視之一無所睹其說較詳何元子引韻㑹小補謂鷊一名辟株以其行必遠草木亦名真珠雞體有真珠點文食之甚美是鷊可食故稱旨鷊綬草具五色作綬文字亦從鷊然未聞言虉可食者則不得以旨名矣當作鳥名解為正愚按何氏以鷊屬鳥固當但解旨字亦泥旨以美言與下豫美相應詩蓋以草與鳥之美者興豫之所美意境自佳必欲於可食不可食論之近鑿此誤於陸璣苕可生食之說也陸農師謂鷊善相其天而吐綬樂則見其文采有戕賊之疑則不吐此緣序為說也然序讒賊作讒言之讒此訛為戕害之戕音義迥别豈别有取爾耶憂讒之說蓋緣侜字而生其實宣公信讒之事一無所考玩豫美二字當如唐風葛生為訓疑亦婦人懷夫之詞巢甓帶言其意謂高丘之上草之美者有苕鳥之美者有鷊而豫之所美雖有如無不可得見故心焉憂思不能自安也舊謂綬草雜衆色以成文猶多言交織以成惑皆為序中讒字穿鑿耳說文鶂重文作鷊按鶂水鳥高飛似雁色蒼白雌雄相視則孕莊子白鶂相視眸子不運而風化是也與綬鳥迥别許氏謬謂重文合一又訛虉為引詩作旨􅀢其改文舛錯如此不可不辨鵜鵜曹風候人篇鵜一名鴮鸅一名汙澤一名鵜鶘又俗呼淘河按鴮鸅即汙澤從鳥從水義各有取至淘即汙意河即澤意亦不必分二說羅瑞良謂汙抒水也又戽斗亦抒水器鴮汙戽三字同音其義一是也此鳥本單名鵜釋鳥文甚明郭璞云今之鵜鶘或以其頷下胡得名抑讀爾雅者失其句讀以鴮屬上句轉音為鵜鶘耶然其名自昔已有之莊子云魚不畏網而畏鵜鶘或謂鴮鸅又名鸅鸆疑爾雅鶭即鵜别名婟澤即鴮鸅不得分為二非也郭璞謂婟澤鳥似水梟蒼黑色常在澤中見人則鳴喚不去有象主守之官故名俗呼為護田鳥其形性與鵜迥别釋鳥兩列之郭璞亦兩注之正未可混魏黃初中有鵜集靈芝池文帝識之曰此詩人所謂汙澤亦不作婟澤也鵜沈水捕魚雖深淵能沒有似淘河者故因以為名陸璣謂羣飛抒水竭澤食魚恐未然小如尺澤亦源源而來未有鵜鶘能盡之理本草謂其頥下有皮袋容一二升物展縮由囊中盛水以養魚此或其胡之用也山海經鵜鶘作􅝼鶘謂其狀如鴛鴦而人足其鳴自䚯陸農師本此為說吳志伊廣注云俗以夏至前來謂之犁湖主水夏至後來謂之犁塗主旱以其嘴之形狀似犁故云犁湖轉聲為鵜鶘又訛為駝鶴愚謂不然犁如犁田之犁作活字看犁湖猶言淘河耳此隨俗而呼者非鵜鶘為犁湖之轉也不濡不稱語意緊對蓋鵜在梁則當濡其翼而乃不濡以興之子在位則當稱其服而乃不稱所謂服者上章赤芾是也鸞鸞秦風駟鐵篇三輔決疑注載光武時有大鳥高五尺雞頭燕頷蛇頸魚尾五色備舉而多青詔問百僚咸以為鳳太史令蔡衡對云凡象鳳者有五多赤色者鳯多青色者鸞多黃色者鵷雛多紫色者鸑鷟多白色者鵠今此鳥多青乃鸞也禽經則云青鳯謂之鶡黃鳯謂之鸞而說文以鸞為赤色五彩又禽蟲述云鸞赤為丹鳯青為羽翔白為化翼𤣥為隂翥黃為土符諸書所載羽色互異大抵以青鳥之說為正陸農師亦主之要是似鳯而不與鳯族者也狀如翟見山海經及孫氏瑞應圖有虞氏之路謂之鸞車月令春則乘之蔡雍謂以金為鸞鳥懸鈴其中施於衡為遲速之節此乃天子乘車之制也若兵車用皮纒束取堅且捷利於馳驟安得為金鳥之飾故懸鈴於鑣以為聲觀小戎之車制可見箋謂置鸞於鑣異於乘車是矣羅瑞良引古今注以為五輅衡上金雀者朱鳥也又禮云衡前朱雀或謂朱雀即鸞鳥並誤朱鳥乃南方之宿取象鶉火與鸞無涉且禮朱鳥𤣥武青龍白虎皆建旟旐旗旗於車上而畫其形耳豈所飾於衡上之金雀耶鸞本車上所飾之鳥其口銜鈴故統謂之鸞今無鳥有鈴者亦以鸞名或别作鑾無二義羅瑞良必謂以車前有鸞鳥故謂之鸞鸞口有鈴故謂之鑾鳥之鸞主形鈴之鑾主聲亦過分其說矣小雅蓼蕭篇傳訓在軾曰和在鑣曰鸞正義以為無文此殆誤據駟鐵例言之也魯詩和以設軾鸞以設衡韓詩在軾曰和在軛曰鸞干寶周禮注和鸞皆以金為鈴鸞者在衡和者在軾總無有云在鑣者則鄭氏謂乘車之制異於兵車於此詩益信陸農師謂雌名和雄名鸞當上古時鸞輿順動此鳥輒集車上雄鳴於前雌應於後後世不能致作和鸞以象之此誕語蓋本抱朴子及吕氏春秋諸書不足信也夫鸞鳴和應若倡和然有倡無和則不和故謂軾上之鈴為和亦飾鸞鳥銜之耳豈上古真有雌雄二鳥鳴應於車上耶小雅采芑篇此詩在衡在鑣傳箋皆無明文以詩義與鄭氏兵車制考之則應是在鑣者或謂上言錯衡此疑即衡上之飾如漢輿服志安車立車亦一衡立八鸞存其說小雅庭燎篇傳亦以此為鸞鑣聲何元子引儀禮謂諸侯覲天子乘墨車載龍旗以朝疑墨車亦有設鸞之制愚謂鸞者鈴之總名惟車制有鸞鳥形餘不過設鈴取其聲耳杜預春秋注云錫鸞和鈴者錫在馬額鸞在鑣和在衡鈴在旗然統言之則鸞和鈴一鸞而已是也此鸞當為龍旗之鈴故首二章將至但聽其聲三章既至則觀其旗確然可據者小雅采菽篇此亦如庭燎詩為旗上鸞聲細玩語氣明是順遞惟旗淠淠而飛揚故旗上之鸞亦嘒嘒而聲動二語合觀正上所云言觀其旗也自正義以淠淠屬旌旗嘒嘒屬車馬兩義對舉語不貫穿失其解矣大雅蒸民篇人臣出使四方則乘輶軒取其輕捷便馳驟故行人乘之仲山甫奉命城齊所乘當是輶車之制鸞不在衡而在鑣理固有之故他詩多言八鸞而不及四牡惟此為可據耳大雅韓奕篇韓侯畢覲事而出國門遂於蹶父所居行娶妻親迎之禮斷無乘戎路輕車者或如漢安車立車之制施八鸞於衡上故易四牡而言百兩與魯頌泮水篇此與采菽語同亦當為旗上之鸞聲下章其音昭昭乃衡軾和鸞之音由其馬蹻蹻驗之也舊解誤鸞旗為鸞車而以二章車音為僖公之德音亦過矣商頌烈祖篇鄭氏解此詩又云鸞在鑣此自相矛盾語耳上文明言錯衡此斷當為衡上之飾乃諸侯之金路所謂金飾錯衡之車也施鸞於衡以為觀美夫何疑耶然則周殆沿殷之舊者漢安車立車之制則又沿周之舊要不當以鸞鏕例耳小雅信南山篇刀無鸞形而環有鈴故亦謂之鸞刀則鈴之統謂鸞明矣說詩者於鸞旗顧泥為鸞車耶或云環有和鋒有鸞此不足信正義引禮祭義文謂此鸞刀乃卿大夫親執是也鍾伯敬云禮卿大夫袒而毛牛尚耳則人君祭禮執鸞刀者固謂卿大夫也若儀禮特牲則謂主人立於門戶視側殺少牢則謂主人即位於廟門之外司馬刲羊司士擊豕宗人告備乃退則士大夫猶視殺而不親刲矣王介甫劉執中乃謂王執鸞刀以親殺此何據耶愚按鸞刀之執有二祭義卿大夫袒而毛牛尚耳鸞刀以刲此卿大夫執之也祭統夫人薦涗水君執鸞刀羞嚌又禮器君親制祭夫人薦盎君親割牲夫人薦酒夫曰羞嚌曰制祭曰割牲三者皆君執之也特俟司馬司士刲擊後君大夫親行其禮亦如秉耒躬耕三推五推以身親其事為敬非必自為殺耳豈可謂王無親執鸞刀之文耶倉庚倉庚豳風七月篇釋鳥云倉庚商庚郭璞謂即鵹黃也釋鳥又云倉庚鵹黃也郭璞謂其黧黑而黃因以名此郭注之誤辨見黃鳥不贅但並列其文以俟覽者而誤自見然其誤已自毛公始之傳云倉庚離黃也以黧同離有毫釐千里之别不知釋鳥黧黃之文紀其色非紀其名倉庚黧黑而黃豈名鵹黃之楚雀又安得謬為名離黃之黃鳥乎羅瑞良云倉庚黃鳥而黑章而爾雅有皇黃鳥倉庚商庚鵹黃楚雀之名觀其詞旨彼固己心疑之矣舊謂關西呼倉庚為黃鳥按豳土屬雍州為關中之域與關西接壤而此詩及東山出車何以皆不言黃鳥而言倉庚則當為兩物明矣蔡元度謂倉庚所以鳴其時也故凡紀時者皆言倉庚黃鳥所以命其德也故哀三良刺宣王皆言黃鳥此亦陸農師强分興賦之說不知謂黃鳥為命德而葛覃偏取紀時謂倉庚為紀時而東山頗似命德可見本是兩物不容强合耳山海經說黃鳥狀如梟而白首食之不妬此黃鳥并非黃鸝後人亦即訛為倉庚尤可哂楊夔止妬論云梁武帝郗氏性妬或言倉庚為膳療忌遂令治之妬果減半總是詞章傅㑹之說今安得如梟白首之黃鳥更安得如梟白首之倉庚耶月令仲春之月倉庚鳴說文鳴則蠶生其時蓋在春分之後則感春陽頗遲龜經訓倉為清訓庚為新謂感春陽清新之氣而出故名亦强解耳今以釋鳥商庚考之商為秋令庚更也謂其春鳴至秋而更變也倉商則一音之訛耳豳風東山篇鄭氏主仲春嫁娶之說故謂歸士始行時新婚今還序其情以樂之此大非也正義云毛以秋冬為昏此義必異於鄭宜以倉庚為興得之然說家謂賦時物以起興則猶未離乎仲春之說何元子因以果裸熠耀苦瓜皆夏末秋初所有而倉庚之鳴在仲春時不相值則當為追述無疑輾轉擬議仍歸鄭說而詩之本旨全失矣王肅云倉庚羽翼鮮明以喻嫁者之盛飾此二語詩義已足蓋特以倉庚興之子以熠耀興皇駁偶舉相况絶非因時而賦景物也故孔氏謂嫁之得禮明亦及時可謂善為序擺脫者陸農師為及時之說所誤又疑於歸時不合因謂倉庚鳴於仲春其羽之鮮明在夏則其鳴喈喈者昏姻之時熠耀其羽者非昏姻之時此以言得及男女之時而已其泥於舊說委曲作解如此說文云熠盛光也耀照也此詩以言羽色當是借用比擬蓋物之鮮明者莫如火今倉庚之羽灼然耀目無可名象因舉火光似之猶上章熠耀亦舉以似螢火之光非熠耀為螢火之名也故以宵行為蟲名者固非以熠耀作螢火名者亦誤觀釋蟲於蛜蝛蠨蛸下不列熠耀而别以螢火為即照可見且以詩詞按之上蛜蝛蠨蛸蟲名對舉此町畽熠耀空文對舉詞旨昭然無可疑者并附考於此傳釋熠耀為燐又釋燐為螢火正義駁之云燐者鬼火之名非螢火而陳思王螢火論又謂詩熠耀章句以為鬼火或謂之燐未為得也然按室廬荒廢夜色凄凉曠野青憐理或有之杜詩隂房鬼火亦是此况當存其說要不可以憐為螢火耳陸農師云一說螢非熠耀熠耀乃行蟲今畀溼處有蟲如蠶蠋尾後載火行而有光俗謂之熠耀此尤非也所謂如蠶載火者即未變化之螢火耳豈可别加以熠耀之名乎集傳訓熠耀為明不定而以宵行為蟲名蓋恐礙於四章倉庚之說楊升菴解之云古人用字有虛有實熠耀之為螢火實也熠耀為倉庚之羽虛也有一明證小雅有鶯其領言桑扈之領如鶯之文非謂鶯即桑扈也彼謂倉庚之羽如熠耀之明非謂熠耀即倉庚也然此亦是慧舌强解鶯但作文采貌豈直指黃鶯耶愚謂熠耀其羽猶言差池其羽泄泄其羽耳小雅出車篇此篇專為紀時之語黍稷方華夏正四五月也此為往城朔方之時雨雪載塗載塗猶云載路謂雨雪滿道也傳謂凍釋為塗泥非十二月也此為城朔方還歸之時方其還歸在塗而又奉簡書西伐逮草蟲鳴阜螽躍已踰年九月矣此為伐西戎之時至倉庚喈喈則又踰年二月也此為伐西戎還歸之時舊解皆謂凍釋為正月鳥鳴為二月出師兩地未有如此神速者則倉庚喈喈當以三年仲春為斷鵙鵙豳風七月篇釋鳥云鵙伯勞也郭璞以為似鶷􅗾而大左傳謂之伯趙氏陳思王惡鳥論云伯趙以五月鳴應隂氣之動其聲鵙鵙故以其音名餘書論鵙狀不一禽經注謂形似鴝鵒鴝鵒喙黃伯勞喙黑顔師古漢書注謂為子規方言謂為鶡鴠遁齊閒覽謂為䲷國史補謂為布穀丹鉛録謂為架犁通雅謂為苦鳥衆說紛紜皆未可據其云子規布穀惡梟者尤誤釋鳥文鳥飛有翪有翔有翬皆專狀其飛勢不應言足且翪字從羽當如邢昺竦翅之說陸農師本說文訓斂足為翪謂鵙飛斂足腹下恐未然鵙與鴂同夏小正鵙作鴂孟子注以鴂為鵙是也禽經鶗鴂鳴而草衰注本服䖍說以鵙當之又楚詞恐鴂之先鳴使百草為之不芳蓋五月一隂始生草木凋零之根已基於此鵙又賊害之鳥感陰肅殺而鳴故為草衰不芳之驗此詩麻熟載績是矣何元子乃謂鴂名鸋鴂與鵙無涉殆泥王逸楚詞注以鳭鷯名巧婦者為鵙别名故力辨其誣要之單言鴂者即鵙也臨海異物志謂鴂一名杜鵑至三月鳴晝夜不止按此名秭鴂不名鴂史記厯書秭鴂先􅗍索隱云子鴂鳥春氣發動先出野澤而鳴是也未嘗以七月始鳴志說誤陸農師云或言鴂春分鳴則衆芳生秋分鳴則衆芳歇此是謬語大戴禮五月鵙則鳴逸周書芒種之日螳螂生又五日鵙始鳴吕覽注謂仲夏隂作於下陽發於上伯勞夏至後應隂而殺蛇磔之於棘而鳴於上合諸說觀可知五月以前鵙未嘗鳴也如或所言仍以鵙為杜鵑耳羅瑞良謂伯勞以仲夏時鳴不當復有芳草引離騷鵜䳏先鳴以為鵜即秭之訛䳏即鴂字厯書所謂秭鴂先􅗍者也或轉而為南蠻鵙舌之鵙則宜其以為伯勞耳此非也按厯書云昔自在古厯建正於孟春於時冰泮發蟄百草奮興則秭鴂之鳴正百草始生時不當一云草衰一云不芳是離騷之鵜䳏斷當為鶗鴂非秭鴂也且羅氏認芳草亦太泥芳對衰言離騷謂之不芳者即禽經所云草衰耳蓋一隂始生為雕零之基也否則仲夏草正壯茂何云無芳耶若夫梨菊萎折之說恐亦有未盡然者天地之氣南燠北寒此一定者豳土在岐山北乃西北之域其寒應早鄭氏獨以為晚寒故五月之鳴鵙至此始應之祇為七月二字强解耳補傳謂鵙仲夏始鳴至七月則鳴之極而將去嚴華谷亦云七月猶鳴蓋三隂之候而寒將至也兩說得之蔡元度謂夏至則生者勞物鵙鳴同萬物而勞者也故謂之百勞此亦鑿說伯勞名頗不一左傳作伯趙舊注趙者疾也夏小正作伯鷯通卦驗又作傳勞或云趙勞之轉鷯勞之訛博百之近詩識名解卷二

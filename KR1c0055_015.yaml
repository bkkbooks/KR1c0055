body:
  text: 詩識名解卷十五錢塘姚炳撰木部榆榆唐風山有樞篇陸璣謂榆之類有十種葉皆相似皮及木理為異愚按榆有大榆刺榆白榆姑榆柘榆朗榆梜榆椰榆郎榆諸名大榆出北方木性堅韌皮汁滑二月生莢亦稱莢榆其莢飄零又稱零榆皆大榆别名也刺榆即此章樞白榆即陳風之枌俱詳見本條姑榆即廣雅山榆一作橭榆釋木謂之無姑說文謂之楩柘榆即刺榆别名朗榆郎榆並見廣志分有莢無莢二種或云有朗榆無郎榆郎即朗之訛耳梜榆莢葉味苦不如凡榆齊民要術稱梜榆刺榆凡榆三種色别種之勿雜是矣椰榆陸璣謂即大東之穫附駁見後兹從舊說以榆冠其類而列樞枌穫於後以俟覽者何元子引雜五行書謂舍北種榆九株蠶大得又榆種至十五年後中為車轂詩人因下有車馬衣裳之咏故即榆以起興此尤傅㑹夫衣由蠶而致車由木而成推本言之已是贅語乃更推及蠶所由宜木所利用者以轉相牽合如此索解作詩者之心亦太苦矣樞唐風山有樞篇樞釋木作藲訓荎郭璞以為今之刺榆是也陸璣云其針刺如柘其葉如榆瀹為茹美滑於白榆齊民要術注云世有刺榆木甚牢韌可以為犢車材梜榆可以為車轂及器物凡種者直種刺梜兩種利者為多其餘軟弱非佳好之木按二說則樞固榆類之佳者矣榆為西北之木仐隴西有榆林驛唐封域在禹貢冀州太行恆山之西樞榆皆其所産分山隰言互文耳篇中總以兩有為興如車馬衣裳昭公所皆得自有者亦在其能自用之而已羅瑞良言江南無榆但有樞晉風則兼有之其義可以說詩枌陳風東門之枌篇按釋木榆白枌嚴華谷云爾雅謂榆白為枌陸璣誤謂榆為白枌枌乃榆之白者無緣榆又為枌之白者此可謂善讀爾雅者矣郭璞謂枌榆先生葉後著莢而李時珍謂白榆木正髙大未生葉時枝條間先生榆莢形狀似錢而小色白成串俗稱榆錢後方生葉似山茱萸葉而長其說互異陳風多言東門當是陳人所遊息處故榆楊並植於其際可以休䕃而舞者羣聚焉亦猶鄭之溱洧為士女相謔之所耳此男悅女之辭鄭氏以男女别二章非是愚謂子仲之子即不績其麻之人東門宛丘即市三章所謂視爾如荍正指婆娑者而言陸農師分道舞市舞尤無謂附穫小雅大東篇鄭氏見釋木有穫落之文因易傳訓木名此大誤其後郭璞注爾雅因云可以為杯器素者陸璣以為今椰榆鄭漁仲謂當是柳杉以訛傳訛皆謂是一木之專名矣不知爾雅之訓落猶傳之訓刈也釋木文若朴枹者灌木叢木自弊柛立死椔之類皆言木之情狀非實指一木言穫落亦其例耳此詩謂已穫之薪生意既槁不可復浸猶已勞之人財力既竭不可復役喻意自明無所疑似因附駁榆後庶覽者知所類别云栲栲唐風山有樞篇栲說文作釋木謂之山樗實非樗也樗無山田之分總謂之樗而已此云山樗乃栲别名不當以樗類求之猶方俗因其似櫟遂稱栲櫟亦非栲與櫟一類之說俗語舉相似者以櫄樗栲漆並言則栲之似樗而非樗明矣陸璣泥山樗之名反以爾雅為誤不知與其所說葉如櫟木皮厚數寸者正一物耳張萱直稱栲為樗謂其與椿相類而以莊子不才之木當之不知彼自為樗此自為栲兩不相涉也何元子借其說以為栲全天年有長守之義取喻下意則真誤矣小雅南山有臺篇陸農師說此詩以栲可為車幅有久之道故曰遐不睂夀此與全天年之說相似杻杻唐風山有樞篇杻一名檍郭璞謂關西呼杻子一名土橿陸璣云或謂之牛筋正名曰萬歲葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉疏花如棟而細蘂正白蓋樹是也按考工記弓人為弓取幹之道柘為上檍次之又輪人斬材牙以橿是材中車輞及弓弩之證楊用修亦謂宮中多樹之取億萬之意謂之萬年樹注唐詩者以冬青為萬年枝皆誤是也至張萱别以杻為梓屬則非其類矣他木取夀義者皆傅㑹惟杻舊有萬歲名差可通然通詩皆有宛死之句何獨於二章之木取長守義耶如使詩人果欲取木之夀者以為興則蔑以加於松柏矣而但云栲杻乎哉小雅南山有臺篇杻自有萬歲名陸農師於此專以弓幹取久義為睂夀興已覺贅設復因弓幹取象軍旅至别南北山為君明暗之分牽引魯論仲叔圉治賓客數語分配萊楊李杻諸木何其輾轉傳㑹至此耶椒椒唐風椒聊篇大椒釋木謂之檓鄭漁仲以為俗呼樛子通志别有蓎藙陸撥南椒之名其樹大略相等陸璣以為似茱萸有斜刺莖葉堅而滑澤是也寇宗奭謂秦椒葉差大粒亦大而紋低不若蜀椒皺文為髙異是檓當為秦椒名又陶隱居云今從西來形似椒而大色黃黑味亦頗有椒氣或謂即今樛樹子樛乃豬椒恐謬則漁仲以俗呼樛子者為秦椒亦誤矣說文有茮無椒舊謂椒叢生如薔薇之屬非木故但從草不知此乃訛文有似豆菽之菽不可從也傳以椒聊連言陸璣謂聊為語助詞一說聊薄略也何元子引爾雅云朹檕梅朻者聊則檕梅名朹其朻者名聊也朻說文云髙木也聊即朹之髙者此可謂獨解但朹梅不見他書又與椒並言亦恐非倫愚疑釋木此條亦泛指木之叢生糾曲者言與朴枹者文相似不必專屬朹梅也椒條叢生因謂之椒聊即下所云逺條耳椒性多實故以為蕃衍之喻其采之盈升盈掬正其常事鄭氏欲合沃盛反常之喻强以少實解之誣椒甚矣王肅謂種一實蕃衍滿一升尤非理傳訓兩手為掬陸農師謂掬二升也愚按篆文掬從手屈掌㑹意象兩手用力形是兩手為掬也然掬二升二掬為豆四升見禮書則掬大於升與農師說合又詩以為蕃衍固不當僅為兩手所奉者耳嚴華谷云椒實蕃衍采之盈升然方興未艾將不止於今日之所觀故復歎是椒也其新長之條日益逺矣條益逺則實益蕃喻桓叔之子孫將日益衆多也舊說蕃衍碩大逺條之意重復今分别之以見詩人紆餘之㫖此最得解陳風東門之枌篇此乃男悅女之詞以視爾貽我詞㫖玩之語皆虛活非真贈投蓋覩其如荍之容而欣慕愛樂之恍若芬郁襲人異香盈握猶言風送蘭麝之意不必便與贈芍齊觀也不然則真如劉貢父所云椒益陽暖腎當為女贈士之戲語矣周頌良耜篇椒實通謂之椒非專謂椒木正義以為椒木氣香作者以椒言香則泥矣古者以椒和酒取其芬烈今俗猶用之此詩所謂椒馨乃實語非借用為馨香之詞觀楚辭直稱為椒漿可見栩栩唐風鴇羽篇釋木有栩無柞又但言櫟實之狀而不復釋為何木則栩與柞櫟三者自為一種或葉實小大之微差爾陸璣謂秦人呼柞為櫟徐州人呼櫟為杼風土記謂吳越之間名柞為櫪孫炎謂櫟之實為橡古今注亦謂杼實為橡均可互證或别櫟實之橡斗與栩橡異恐未是鄭漁仲又以栩杼為柞以櫟為槲不知槲乃槲􅈪即召南朴􅈪耳顧乃混櫟於槲而别杼於櫟其說不愈誣耶爾雅苞義凡三見釋言云苞稹釋詁云苞蕪茂豐也又釋木云如竹箭曰苞其義亦各有取然稹義之訓叢生自屬枝條言栩枝條迫迮梱緻故謂之苞栩耳鄭氏獨釋為根之狀則凡木根皆叢生者何獨於栩櫟是稱耶惟其如是是以於苞桑不得其解耳陳風東門之枌篇古者立樹以表道東門宛丘乃陳國之大都㑹故植枌栩以識其處當是表道之樹非特為遊息休䕃之用已也詩稱柞枝蓬蓬莊子櫟社樹其大蔽牛潔之百圍故遊者即於其下而婆娑以為樂爾小雅黃鳥篇何元子以桑榖為惡木故引莊子櫟社之說以為櫟亦無所可用似也然今柞木人以為梳子殼又可以染亦非竟無用者不必過為詆毁以申巳說耳櫟秦風晨風篇陸璣云秦人謂柞櫟為櫟河內人謂木蓼為櫟椒榝之屬也其子房生為梂木蓼子亦房生故說者或曰柞櫟或曰木蓼此秦詩宜從其方土之言柞櫟是也鄭漁仲駁之以為釋木云櫟其實梂詩秦風山有苞櫟並此也其釋木云栩杼與唐風集于苞栩並是柞木而陸璣誤謂是此耳愚按櫟有黑心櫟白櫟綿櫟諸類白者子尤細綿櫟以堅忍得名非木蓼也櫟即是栩蘇頌亦謂柞櫟也杼也栩也皆橡櫟之通名此當以陸說為正或又謂橡實大於櫟葉冬凋櫟不冬凋亦未然至木蓼出南鳯州揚髙如冬青不凋與櫟異種而上林賦注應劭云櫟辛木也顔師古以為木蓼葉辛初生可食亦似混為一木並誤此詩以所有為興詞㫖與弼山有榛鄭山有扶蘇唐山有樞諸篇同柞小雅車舝篇風土記云歷山在始寧邳郯二縣界上舜所耕田在於山下多柞樹吳越之間名柞為櫟故曰歷山按此則陸璣所謂五方通語者有據矣故李時珍謂本草所說柞木乃鑿子木髙者丈餘葉小而有齒光滑而韌其木及葉丫皆有針刺經冬不凋五月開碎白花不結子而别以柞為橡櫟之名是也書傳或稱柞或稱櫟或合稱柞櫟或别稱栩杼要是一種今併入栩部俾覽者得互證焉嚴華谷合引采菽綿及此詩之柞以為釋文分昨作二音止此一木不得自為參差愚按柞止有昨音其餘或隨文變叶不一如大雅載芟載柞叶下澤音側周禮柞氏之柞鄭司農讀如唶唶之唶屋笮之笮又漢有五柞宮俗或讀如乍或讀如柘則音之訛耳析薪即是執柯之說與南山綢繆諸詩義同取分合意為婚姻喻足矣不必有葉盛蔽岡女妬蔽明之說也故下直接云鮮我覯爾小雅采菽篇此當從時解分興下四句蓋柞枝根本盤固殿邦之喻也其葉蓊翳四䕃攸同之喻也皆屬來朝之諸侯言舊或分祖孫賢才或别天子諸侯俱未當何元子按尚書康王即位時事以實此詩故鑿分畢召東西亦不可據大雅綿篇鄭氏謂以柞棫生柯葉之時使大夫將師旅出聘問此大武斷王肅援世紀以附入毛傳尤傅㑹正義駁之是也且此原未嘗言文王時事自一章至八章由在豳而遷岐而定宅而授田居民而作宗廟宮室門社卒乃美其木拔道通儼然成都成邑而混夷因之逺遁耳下章文王蹶生始及文王此眀文可據者也舊訓拔為挺拔何元子引說文云擢也又增韻云攻而舉之也柞棫拔矣如左傳篳路籃縷以啓山林之意此說得之柞棫叢生又多棘刺本非嘉木故古以供薪燎之用觀旱麓棫朴二詩可見太王遷岐芟闢險阻如皇矣作屏修平凡木皆然何况叢刺之柞棫又可以為薪燎者乎此斷當為拔去之解史記秦拔我襄城師古注謂若拔木并得其根本是也集傳亦釋為挺拔之義而後注則云太王之時林木深阻至於其後木拔道通則仍主芟拔之說耳大雅旱麓篇詩之詞㫖本明順可㑹鄭氏每曲說之而義反晦如此詩明謂柞棫宜供民燎又有棫朴薪槱可證而必云燎柞棫之旁之草而柞棫始荗則蛇足甚矣嚴華谷以為不若謂民取供燎為不費詞則凡說詩而費詞者皆非詩之本㫖可知也大雅皇矣篇斯拔亦訓芟拔之義二句緊䝉上作屏八者而言見其叢棘芟除楨幹挺峙儼然都㑹氣象故下云帝作邦作對也若柞棫皆任其遂茂則岐西之地維草宅之矣何為於菑翳灌栵柳椐檿柘諸木急急務去之哉羅瑞良云詩人道柞尤多方周之興太姒夢商之庭産棘小子發取周庭之梓植之於闕間梓化為松柏柞棫驚覺以告文王文王以為宗周興王之兆此詩斯拔斯兑未必不謂此也又述文王之事亦言柞棫拔矣山木頗多而獨言柞棫蓋柞薪者民之所燎且至於聳拔則其餘從可知也愚按此皆因詩詞杜撰典實要是不經語耳果爾則柞棫乃周家發祥之徵當竭力愛護培植之而乃以為薪槱以供民燎人言其可信耶條條秦風終南篇釋木謂柚為條郭璞以為似橙實酢生江南是也傳别訓為槄陸璣從之謂即今山楸並非按條惟為柚專名與槄無涉釋木云槄山檟又云柚條二者分釋判然不得以槄為條也又孫炎注爾雅槄山檟亦引終南詩今皆不從其說何元子引列子文橘柚凋於北徙謂終南不宜有柚當與汝墳條枚義同愚按此易字求解於義難通駁見梅部即據變枳變杏之說是條梅皆西北所罕見者正惟罕見而終南有之此其所以堪誇耳不然則枝曰條幹曰枚何山蔑有而獨於終南驚相比論乎六駁秦風晨風篇陸璣云駁馬梓榆也其樹皮青白駁犖遙視似駮馬故謂之駁馬下章苞棣樹檖皆山隰之木相配不宜云獸按此足正毛傳之誤蓋駮名釋獸有文釋木無文故傳即以為如馬倨牙之獸然合之詞㫖匪但草木不倫即謂隰間有此猛獸亦覺誕妄山海經謂中曲山有獸如馬而身黑二尾一角虎牙瓜音如鼓名曰駮食虎豹此豈常有之物耶况草木中如游龍伏牛以鳥獸名者不可勝紀駮之為木無疑也古今注亦云山中有木葉似豫章皮多癬駁者名曰六駁王肅謂言六據所見而言意謂駁馬有六此謬語或云六犖音同通犖為六即所云犖駁也愚謂此直名六駮如三奈三七之類物之以數名者頗有正不必易字作犖以求其義耳檖檖秦風晨風篇檖一名蘿郭璞謂即今楊檖實似梨而小酢可食陸璣云一名赤羅一名山梨一名鹿梨一名鼠梨齊郡廣饒縣堯山魯國河內其北山中有今人亦種之按此乃梨屬陸農師以為木文細密如羅故曰羅有赤白二種以赤者為上故傳專以赤羅釋檖也說文作此省文陸農師謂秦詩初曰晨風卒曰樹檖者言人君所以用人之道始於能致之終於能立之樹檖以况可與立之臣此大强解夫樹檖緣何以立為義豈云樹者植立之意耶或解樹檖為成樹之檖愚謂此但增字成文以樹字代上苞字順言之則檖樹是也正不必於此求解若鶴鳴詩爰有樹檀文亦同此棗棗豳風七月篇棗與棘異小爾雅云棘實謂之棗陸農師亦謂棘大者棗小者棘皆混為一種非也釋木棗有壺棗要棗白棗酸棗齊棗羊棗大棗填棗苦棗無實棗棯棗諸名凡十有一舊注於齊棗填棗未詳羅瑞良所謂郭氏得其九者也又謂後世有紫棗𤣥棗西王母棗東海蒸棗洛陽夏白與夫雞心牛頭羊矢獼猴細腰諸名然釋木所謂羊棗即羊矢要棗即細腰白棗疑即夏白其餘土物又有夭棗産南徐州樂氏棗産青州南棗産浦江密雲棗産密雲波斯棗産廣州别有萬歲棗一名千歲棗木名海棕其種類同異之不可勝紀如此剝傳但訓擊正義以為棗須就樹擊之所以剝為擊是也陸農師云棗實未熟雖擊不落已熟則爛不擊自墮蓋收棗擊而落之故齊民要術所謂全赤即收收法撼而落之為上又羅瑞良引大戴禮云剝者取也其修治則曰新之疐之則剝之不得為修治明矣王介甫好為異義别以為剝其皮而進之宜其後悔奏除也樗樗豳風七月篇古語櫄樗栲漆相似如一故陸璣以為樗樹及皮皆似漆是也蘇頌云椿樗二木形幹相類椿木實而葉香可噉樗木疏而氣臭北人呼樗為山椿江東呼為鬼目寇宗奭辨二木以無花不實木身大其幹端直者為椿其有花而莢木身小幹多迂曲者為樗莊子所謂大本擁腫不中繩墨小枝拳曲不中規矩者正此說文以㯉為薪樗之樗别樗讀若華重文作穫此謬也㯉乃古樗字其讀若華者則樺與穫耳字書或合樗樺為一或分㯉樗為二並非薪樗因采荼帶言取韻成句而已凡木之不中材用者始為薪如楚棘之類皆是若謂惡木以供農夫之㸑豈養老酒食所燎盡是桂薪耶小雅我行其野篇古婚期在秋冬此確不可易者鄭氏乃以樗葉初生為仲春之時嫁娶之月誕矣且蔽芾隂翳非歷夏不能有此茂盛何云始生耶若泥樗為惡木喻遇惡人亦是穿鑿又或取依蔽休息義興下就居於詞㫖要未似愚謂此乃飢饉流離之詞當與苕華同時所作凶年百物凋耗故野行荒凉惟見惡木隂蔽所采者蓫葍惡菜而已此是賦現前光景即苕華所謂鮮可以飽者别無取喻之意耳把把小雅四牡篇此把乃釋木文所謂枸檵者郭璞以為即今枸把陸璣云樹如樗一名苦把一名地骨春生作羮茹微苦其莖似莓子秋熟正赤是也别有枸忌地輔羊乳託廬三青蔓換骨菜天精子卻老根仙人杖西王母杖諸名見本草廣韻諸書嚴華谷分杞為三種以此四牡及杕杜四月北山四杞為枸杞别南山湛露二杞為山木將仲子之杞為杞柳說本陸璣然惟枸檵專有杞名若杞梓則梓類郭璞謂之楩杞非杞也今惟以杞柳别屬柳餘諸杞仍彚釋同異是否覽者類而辨之可耳廣雅以枸乳為苦杞地筋為枸杞分二物則陸璣謂枸杞作羮茹微苦一名苦杞似混而為一又蘇頌云枸杞春生苖葉如石榴葉而軟薄堪食俗呼為甜菜疑陸璣微苦之說當是苦杞非枸杞也蘇頌謂枸杞莖幹髙三五尺作叢此即詩稱苞杞之義叢生以莖幹言則其謂之苞亦指莖幹叢生可知其義與苞栩苞桑同總無言及根枝者韻㑹小補載集韻杞或作梩增韻通作芑合芑杞梩李為一並誤栩父杞母第取叶韻不必有義觀鴇羽亦咏集于苞栩而統言父母可見此何元子云爾愚謂趁韻成文凡詩皆然何獨鴇羽四牡二篇哉持此說詩方可免穿鑿一病小雅枤杜篇嚴華谷謂鄭孔說此杞皆不明言其何物以采言之當是枸杞是也然按正義直以為杞木之葉則似竟指杞梓之杞矣采之將安用耶集傳有春暮而杞可食之語說詩者遂謂采杞又過於木萋之時或辨之云采杞當即在卉木萋止之日特期而未至故借此以致其想望耳愚謂采杞託言原不當泥時為說蘇頌謂枸杞春夏採葉秋採莖實冬採根彼雖為藥籠之須然亦足見其隨時可採不必拘為春初春暮作時物之變觀也此當為遙想征夫在役之事念其陟山采杞而以父母為憂耳與北山詞㫖正合故上云女心傷止我心傷悲而此獨云憂我父母也舊俱作婦人望夫之解故謂呼夫為父母尤非理小雅南山有臺篇嚴華谷斷此詩之杞為山木蓋據陸璣之說云杞一名狗骨山材也其樹如樗理白而滑可以為函及檢版其子為木虻可合藥故集傳說此詩亦從之按此數語乃釋枸並非釋杞者此殆誤據云爾愚謂仍當指枸杞言亦不必牽養人為義或謂杞與李同可食以興父母則又陋說也小雅湛露篇何元子仍以此杞為枸杞謂今枸杞一名狗骨其樹亦如樗陸所云即枸杞也詩以杞棘並言棘木低小則杞非大木可知且以後章桐椅例之桐椅相類杞棘亦當相類愚按木之叢生者被露獨厚杞莖幹叢生與棘並有苞稱故以杞棘並言似不應為杞梓大木然杞與棘要是二種若何氏緣枸杞通枸棘為同類諸侯之喻則武斷矣小雅四月篇舊解有據禮表記注以詩豐水有芑之芑為枸檵因謂芑杞二字通用杞桋之杞亦當通作芑乃爾雅所云白苖者此蓋强牽生民以歸肇祀之文合孔叢子思祭之語亦武斷甚矣杞固無通芑者且蕨薇皆以草言杞桋皆以木言此明文不可誣也小雅北山篇嚴華谷亦以此杞為枸杞當從其說杞葉初生可采以為茹而鄭氏以非可食之物為興郝仲輿又謂苦菜為食苦之比豈此詩之杞固即廣雅所釋苦杞者抑將同采芑之芑如陸璣所謂似苦菜集傳所謂野苦蕒者故以苦為喻耶要未可據矣常棣常棣小雅常棣篇按釋木常棣專有棣名與唐棣逈别郭璞謂今關西有棣樹子如櫻桃可食者是也分赤白二種以其結子如李而小因别有郁李之名其實非李屬也蓋鬱之實大如李此如李而小其種各異故鬱并不得為棣屬觀釋木文及陸璣所說判然無可混者戴侗合唐棣為一物殊謬至其說棣以為小木叢生髙不過五六尺其華或紅或白或單出或重出紅而重出者園圃多種之白而單出者結實如小李頗得其實存之陸農師云唐棣之華反而後合常棣之華上承下覆甚相親爾故常棣以燕兄弟又宋氏云世人多誤以常棣為唐棣於兄弟用之唐棣栘也栘開而反合者也此兩物不相親合觀二說則唐棣與常棣其華性逈殊明甚鄭氏謂承華者曰鄂按鄂同萼古通用曹憲訓為花苞是也說文引詩亦作萼唐明皇取此為兄弟之喻以華萼交輝名樓此皆可證傳云鄂鄂然外發於義未安前輩有說此詩者謂吾讀至鄂然字每不勝鄂然可為一噱鄭氏謂不字當作柑字柎乃鄂足此語確不可易何元子引韻㑹小補云萼花蘂也不花蒂也又左傳華不注山伏琛齊記引虞摯畿服經作柎言此山孤秀如華柎之注於水其讀入聲者誤也又通作趺亦作跗楊用修云束晳詩白華朱萼白華絳趺唐人亦有紅萼青趺之句皆可證又來斯行云郤至衣韎韋之跗注雜問志作韎韋之不注可見柎跗不三字皆作通用按此引據皆確備録其說存考正義謂華下有鄂鄂下有柎以鄂足比於弟華比於兄鄂既承華文與柎連則鄂柎同比弟也愚謂不然合鄂與不始成一華然則華乃總言下鄂與不則言其華之實也自說詩者多宗傳以不作豈不解故唐世以華萼名樓而詞章家稱棣萼棠花無復有言不者惟蘭成作後魏賀拔夫人墓志乃云鄂跗雄圖其言蓋有本矣此當以鄂比兄以不比弟上承下覆所謂兄弟相親之象也何元子謂一柎輒生二萼為連枝同氣之喻恐未然秦風晨風篇傳訓苞棣為唐棣正義疑之以為未詳聞不知此斷為毛公之誤耳釋木明以唐棣為栘常棣為棣則棣之名惟常棣得有之故常棣或稱常或稱棣皆可通而唐棣從未有舍唐而專言棣者戴侗謂常棣小木叢生故詩稱為苞棣若扶栘髙聳尋丈大廣數圍當在喬木之列又安得以苞稱耶小雅采薇篇傳以爾為華盛貌按爾有繁義以言常華則繁英歷録之狀似之三倉解詁謂爾為華繁是也故釋天地人物山川草木之書名爾雅又漢書儒林傳文章爾雅言其質文相副也其義俱可互證陸農師顧泥常棣之詩通爾作邇謂其上承下覆有親近之象不亦逺乎枸枸小雅南山有臺篇傳訓枸為枳枸說文作崔豹云一名樹蜜一名木餳實形卷曲核在實外一名機枸子陸璣謂枸樹山木其狀如櫨一名枸骨髙大如白枸所在山中皆有理白可為函板按此正嚴華谷所引說南山有杞者其誤據無疑矣枝柯不直子著枝端大如指長數寸噉之甘美如飴八九月熟江南特美今官園種之謂之木蜜是也木蜜前引作木虻此誤中之誤陸農師謂今俗呼枅栱羅瑞良作枅枸謂即曲禮椇榛之椇一名蜜曲録詩詁謂一名木珊瑚語録云建陽謂之皆拱子吾鄉呼為兼勾又按曲禮疏謂椇即今白石李鄭康成謂今邳郯之間食其實亦名支枸又名厲漢腳指又一名雞距子一名木屈櫟梵書謂之木􅨥凡二十餘名皆是物也正義以釋木無文引宋玉賦枳枸來巢謂枸木多枝而曲所以來巢是也嚴華谷駁之謂風賦字作枳句李善注橘踰淮為枳句曲也句音溝似非毛義愚謂此乃李注之誤枳枸為一木之名非踰淮之枳明甚荀子枳木必待櫽括蒸矯然後直又明堂位四代之俎商以椇舊謂俎足橫木為曲撓之形如椇枳之枝則枳枸木本是曲者李善誤以木狀釋木名故句讀音義皆訛嚴氏又誤據李注云然耳或謂詩所以取興枸者不徒取髙大堅久之義枸可代飴所以為養末句云保艾爾後艾之為義則養也此大穿鑿枸實即可代飴作養然其為養有限果爾詩何不言其養之大者如豳風所云葵菽棗稻之類而區區一枸為耶榖穀小雅鶴鳴篇廣雅訓榖為楮陸璣云幽州人謂之榖桑或曰楮桑羅瑞良辨之謂太戊時桑榖共生劉向以為桑猶喪也榖猶生也是以桑榖為二物也而陸璣謂穀有榖桑楮桑之稱則又一物也愚按榖自有桑名書傳所稱不一舊傳伊陟相太戊亳有祥桑共生於朝則專言桑不言榖矣而韓詩外傳稱榖生湯之廷七日而榖亡又專言榖不言桑則桑榖之為一木明甚今楮紙最下者俗呼桑皮紙亦是其證陸農師謂先賢以皮斑者為楮皮白者為榖有瓣者曰楮無瓣者曰稱分三種恐未然穀雖非嘉木然江南人績其皮以為布亦以為紙葉初生又可茹又斑榖之皮可取為冠廣州記謂蠻夷取穀皮熟捶為揭裏布鋪以擬氊則其資於用者甚廣安得以惡稱之陸農師謂惡木而以善名猶甘草名大若之類羅瑞良則謂穀田久廢所生又李時珍謂楚人呼乳為榖其木中白汴如乳故以名之三說並非榖從禾從木字義自别六書本分不可混也以榖較檀美惡自分然非真棄材也論衡楓桐之木生而速長樹檀以五月生葉後彼春榮之木則穀之易生者視之為賤矣此與上籜對舉皆不賢之喻何元子謂首言籜苐歎賢人凋謝耳此言穀則喻所進用者無非小人是以籜作檀葉解故云然駁見前小雅黃鳥篇鳥性隨木所棲不必泥榖為惡木以喻所處之非地嚴華谷云說者以黃鳥集榖啄粟喻侵迫不知黃鳥人所愛玩集木啄粟未為侵害於人其說甚當愚按舊解以無集無啄為此邦之言不我肯榖為去者之言故以侵迫為說非也穀粟乃即其異國所依之處而言耳桋桋小雅四月篇釋木以桋為赤梀白者直名梀是桋為赤梀專有之名也郭璞分赤梀樹葉細而岐鋭皮理錯戾好叢生山中白梀葉圓而岐為大木按此則桋木叢生卑小以其與梀相似故亦名梀非若白梀之為大木也釋木女桑謂之桋桑豈亦以叢生不髙大與桋相似故名與嚴華谷謂此詩之桋與蕨薇杞並言當作荑也即自牧歸荑之荑何元子從之以為茅春生布地如針謂之茅針亦可噉夏生白葉茸茸然至秋而枯則皆四月維夏時所有愚謂桋與杞並言自當同為木類嚴氏通杞作芑因改桋為荑以與蕨薇配吾不信也何元子又據郭璞說赤梀好叢生山中則非隰地所有疑爾雅以女桑為桋桑而詩亦云隰桑有阿則此隰之桋或當為女桑此語尤誕詩多以山隰對言如樞榆栲杻漆栗之類不必定是言山者非隰有言隰者非山有也且唐風云隰有杻矣而小雅云北山有杻若以山隰之義泥之不兩相刺謬乎此所謂以文害辭說詩之大病也蔦蔦小雅有頍者辨篇釋木無蔦名但有寓木列木部中而說文從木作樢以其皆寄生木上者斷為木屬無疑東方朔傳在樹為寄生是也陸璣以為葉似當盧子如覆盆子蓋與女蘿絶異女蘿延蔓乃草屬耳鄭漁仲謂女蘿即蔦之一種通志亦謂大曰蔦小曰女蘿並非蜀本草謂諸樹多有寄生葉葉並相似云是烏鳥食一物子糞落樹上感氣而生寇宗奭駁之謂若為烏鳥食物子落枝節間而生則麥當生麥穀當生穀不當生此一物其說亦自有理愚謂大抵别是木之一種不能自植必附木而榮者故桑柳楓槲皆有之通名為蔦而詩云施于松上則是松上寄生者耳或以寓木宛童蔦諸名屬桑寄生而别女蘿為松上寄生胥失之矣正義謂蔦釋草無文寄生者毛以時事言之此不知通寓木之條遂曲解如此棫棫大雅綿篇棫一名白桵郭璞以為小木叢生有刺實如耳璫紫赤可啖者陸璣引三倉說謂即柞也其材理全白無赤心者為白桵今人謂之白梂或呼白柘愚謂棫與柞自是二木棫而稱朴固是叢生者凡叢生之木未必能髙大若枳棘類可驗故此詩與皇矣皆云拔而旱麓棫朴則以為薪燎其為小木可知三倉之說未可據也鄭漁仲於釋木棫注云即山柘而通志又以為柞别名說既矛盾而兩者又並謬亦不之察矣大雅棫朴篇傳於此詩分釋棫為白桵朴為枹木於文義未明鄭氏謂白桵相朴屬而生者是也何元子泥傳說以為朴當别是一木疑朴即􅈪朴又謂槲􅈪與櫟相類亦有斗櫟即柞也詩言棫朴猶之乎言棫柞此大臆斷愚按釋木以朴為木之枹者總名則朴非一木可知且􅈪乃槲名非朴為槲名詳見朴􅈪􅈪朴正與棫朴之文同詩作朴􅈪亦即苞櫟之謂也互證昭然豈可强分為一木名乎月令注大者可析名薪小者合束名柴總言之則薪也或駁郭注謂棫以薪言棫既堪為薪不當云小木其見甚泥若漢廣詩蔞楚並可稱薪詎得執此以見棫之大耶薪槱是喻言鄭氏因槱字便泥為積柴燔燎之用以合奉璋或又推廣其說以為類帝伐崇取合六師皆武斷不可據大雅旱麓篇瑟傳訓衆貌集傳訓茂密貌何元子謂鄭衆賈公彥於周禮注疏引此皆作恤彼玊瓚恤本義訓憂當是愛惜之意愚謂不然玊瓚之瑟潔也乃瑟字本義庖羲氏作瑟使人精潔於心是也以言玊瓚則純潔之意柞棫之瑟蕭瑟也楚詞蕭瑟兮草木黃落琵琶行楓葉荻花秋瑟瑟以言柞棫則亦蕭瑟之狀故可取以為薪二義自明前說均未當大雅皇矣篇斯拔亦主芟拔之義拔柞棫與上作屏八者為一時事皆屬太王之世此句蓋承上八者而總言之也觀下自太伯王季句可見其義與綿同楛楛大雅旱麓篇楛木不槩見他書惟禹貢荆州之貢有箘簬楛又家語肅慎氏貢其楛矢大抵西北之産詩言旱麓蓋亦岐西地也陸璣云楛形似荆而赤莖似蓍上黨人織以為斗筥箱器又揉以為叉則又不獨為箭笴用矣郝仲輿謂榛可以供籩楛可以為矢文武之材以比聖德此本羅瑞良之說亦穿鑿甚矣詩但舉草木之盛以喻福祿之多更無他義嚴華谷云培塿無松柏由其氣薄故也以斯語反觀之則詞㫖自得矣椐椐大雅皇矣篇椐一名匱陸璣謂其節中腫可作杖以扶老今人以為馬鞭及杖𢎞農共北山甚有之孔光傳賜靈夀杖顔師古云木似竹有枝節長不過八九尺圍三四寸自然有合杖制不須削治是也今本草直稱為靈夀木山海經廣都之野靈夀實華又水經注來水合溱水湘水千秋水水出萬歲山山生靈夀木豈山水亦因此而得名與或謂今天台靈夀杖自然腫節乃藤也與椐别一種愚疑此即萬歲藤之類當與椐異存俟考者附翳大雅皇矣篇傳謂自斃為翳此誤讀爾雅文也按釋木云木自斃柛立死椔蔽者翳郭璞謂樹翳覆地者文義甚明今舍却自斃為柛之條又訛蔽為斃而加一自字以翳為自斃之木亦不察矣不知惟亂柯䝉蔽故名為翳耳若自斃者則枯幹秃然而已其於隂翳之義何取乎兹于椐後附見俟覽者共證焉樅樅大雅靈臺篇樅為木名釋木專列一條所謂松葉柏身是也郭璞謂今太廟梁材用此木又尸子亦有美樅之說今以詩義按之樅自當以木言云虡業惟樅者蓋謂此植木與大版皆以美樅為之猶檜楫松舟之意炫美之詞耳陳祥道云詩虡業帷樅樅身葉皆直則虡業皆植木為之此可以斷已傳訓樅為崇牙不知何據正義以有瞽之詩證之謂文承虡業云然是膠柱刻舟之見也且傳但謂樅為崇牙之名而已孔氏於義無解奮筆釋云其狀樅樅然則又易為雙聲形容之詞其不根可知樂書有樅圖其形圓首長柄所以撞鐘陳暘云撞鐘鼓謂之樅漢司馬相如傳樅金鼓又古樂府戞玉樅金是樅乃擊鐘鼓之木之名以虡業樅三者對下賁鼓鏞于義較合此又一說詩識名解卷十五

body:
  text: 詩識名解卷六錢唐姚炳撰獸部豹豹鄭風羔裘篇豹似虎圜文色黃黑者多若𤣥豹白豹青豹之類惟載書傳中不槩見其屬亦各有種舊以為虎所生非也釋獸文無豹名惟以貘為白豹與貔白狐文同其非狐豹可知且据郭璞所說貘形與豹絶異或云豹白色者别名貘則舛也而王㑹篇言屠州有黑豹白豹别名貘又有以洞冥記所載青豹為即貘者並不足據蓋貘之别名為白豹豹原未嘗有貘名耳陸璣謂毛白而文黑者為白豹此疑即土豹所以别於赤者亦非貘也列子程生馬注訓程為豹陸農師亦謂豹一名程言有所程度而食此強解耳餘冬序録云列子之程言蟲也秦人謂豹曰程蓋方言如此而張耒謂沈存中聞秦人言此中有程遂以為生馬之程不知秦聲謂蟲為程謂虎為大蟲劉貢父亦言關中呼蟲為塵也愚按青寧程馬本不根語無從核實若以程為豹是豹生於空竹馬又産於豹胎人又出於馬腹縱極謬悠何至支離若此大抵程之為蟲亦無所据或如前說秦人謂豹為蟲讀蟲若程因訛程作豹耳不然豹亦安得有程名耶正義以君裘用純此詩褎飾異皮為臣之服引唐風作證謂緣以豹皮為袪褎也陸農師言國君體柔而文之以剛其義上達引玉藻豹褎豹飾異文明飾非褎傳所謂緣蓋言領人君之服也愚按飾義通用凡緣領緣褎緣履皆謂之飾豹飾自指褎袪而言裘惟有緣褎之制未聞有緣領者玉藻以豹飾為君子之服注君子亦指士大夫言未嘗專指人君之服也左昭十二年楚子次於乾溪皮冠豹舄又瑣語云范獻子獵遺其豹冠則豹之用亦不獨以緣裘禮書謂取其武而有文古人蓋重之矣武力與豹無涉謂服豹飾之裘者其人之威望足以為一邦直道之主耳正義文甚明或牽豹為說謂豹武而有力故下三英亦以裘飾言之恐未然唐風羔裘篇陸農師以豹袪為下大夫服豹褎為上大夫服非是袪褎無别袪即褎之口豈有等殺之分耶正義云袂是褎之大名袪是褎頭之小稱其通皆為袂是也傳以裘身為本裘袂為末皮異則本末不同喻在位與民異心此臆說也裘制自有取義若使以本末不齊為嫌君子何為服之且鄭風方以武力為服之者美此復以異心為服之者刺同一服而憎愛不同若此可知皆緣詩起義非作者本㫖耳居何元子謂通作倨引前漢書郅都傳丞相條侯至貴居作證取倨傲義近似究舊皆訓窮謂窮極其惡恐未然愚意究究即察察之謂蓋好用其明以苛察為知者總言之則皆是惡也故釋訓云居居究究惡也大雅韓奕篇舊謂書傳所載豹有赤豹白豹黑豹青豹土豹𤣥豹凡六種詩韓奕篇祇載赤豹若豹飾豹褎豹袪之類並未詳何色疑因裘色異用其說非也宜為裘者正此詩之赤豹即世所謂金錢豹者色黃而赤文黑如錢圈袪褎之類亦必用此故以為美物而獻之餘皆罕見要未必為冠服飾耳狼狼齊風還篇釋獸謂狼之牡者名貛其牝者直名狼今人通呼為狼蓋舉其總名耳羅瑞良以為獸之類牝猛於牡故狼為貛之牝而狼名獨著非也又名㹪見廣雅陸璣云其鳴能小能大善為小兒啼聲以誘人蓋物之最貪暴者故古言狼疾狼貪皆取諸此陸農師又謂狼從良此字說妄語果爾則是升木之猱柔而無技仁趾之麟吝而多貪矣然乎否陸農師以為一章言肩二章言牡三章言狼蓋狼物之尤暴戾者故詩以為後此即駉序之說也若以狼列後則前肩二者不知何獸而先言之且安知非狼之三歲者為肩狼之牡者為牡耶羅瑞良又謂首章從狼之子次章從其牡又末章從其牝先牡而後牝者蓋鳥之類雄摯於雌獸之類牝猛於牡以乳護其子非可得犯也此亦恐未必然總之先後之說不可以論詩如陸氏泛言肩牡而謂以狼之貪暴者列後羅氏又以肩牡屬狼而必别其子母牝牡之序作者之意豈暇及此耶陳祥道云周禮庖人掌共六畜辨其名物春秋傳言六畜五牲以奉五味鄭司農謂六畜者麕鹿熊豕兔而鄭康成以為有狼無熊杜預謂五牲者麋鹿狼麕兔今考之於詩及禮內則少儀諸文當有野豕無狼愚按古以狼皮為裘供饌自內則八珍外不槩見惟熊蹯叠見經𫝊舍狼取熊或當如司農說耳豳風狼跋篇跋之訓躐有引挈之義李巡以為跋前行曰躐是也正義謂與疐皆是顛倒之類失其解矣蔡元度云胡跋則可上而不可退退則觸尾尾疐則可就而不可進進則踢胡此得兩語環互微㫖有顧前失後顧後失前之况舊說皆以進退對言於詞㫖未當集傳用則字代詩載字與蔡意合蓋狼胡垂地礙於前進引頸挈之則尾又擁地而躓後總一進退維谷之意也舊以狼跋疐實指周公進退為論有謂進為東征退為復辟有謂進為立朝退為居東不知此總在流言一時耳當其疑謗忽起王室傾危二叔不咸冲人未悟周公欲進不能欲退不得此際真是跋前疐後情狀不必分時實拈也嚴華谷謂狼猛捷之獸其老者雖項下垂胡若在平地亦無跋之之理所言跋疐者謂其落機穽之時進退求脫不能耳愚謂此亦取其意而已必謂在穽時始如此亦覺拘滯且似為周公遭疑謗起義正不必也貉貉豳風七月篇貉似貍鋭頭尖鼻斑色毛深厚溫滑可為裘嗜紙人或畜之行數十步輒睡用物擊竹警之乃起既行復睡蓋其性然也此即釋獸之貈與狐同類者故論語言狐必言貉詩義問云狐之類貉貒貍是也舊解即以為狐貍因下文誤耳豸無種說文以貉為北方豸種非若謂從豸者皆豸屬則豹豺貓貂之類豈盡為豸類耶貉與狐貍乃三獸名皮皆可為裘豳人亦皆取之特詩限於句故上下分言𫝊謂于貉即是取狐狸皮則混矣通論云于貉猶上之于耜于茅先言于貉者往取貉也若謂往取狐狸又謂取彼狐貍世無此重叠文法信然鄭氏謂搏貉以自為裘因下為公子裘起義其實鑿也正義便以禮無貉裘之文惟孔子服狐貉裘以居明貉裘為賤尤非理貉為狐類毛深厚溫滑亦如狐其種頗少故狐裘之用獨著若謂貉賤故禮無明文則孔子何以與狐裘同為居服且論語與衣狐貉者立亦並狐言明是貴者之裘可知蔡元度云貉之性不與物俱不為物宗故為居服為賤者之裘詩言于則有見于往非必得之詞言取則得之蓋其時則可以為貉其志則在於取狐狸緩於賤而要於貴也說更支離陸農師謂貛之出穴以貉為導詩云于貉言往祭表貉因取狐狸皮為裘周官所謂祭表貉即此羅瑞良亦從陸說引穆天子傳云天子獵於漆澤於是得白狐𤣥貉焉以祭於河宗以為此周禮獵祭貉之驗尤誕貆魏風伐檀篇此即貉之子釋獸云貈子貆是也郭璞以為其雌者名􅭗江東呼􅧯􅤘廣雅謂之貁蓋皆貈之通名貈舊叶下谷切即貉重文故釋獸有貈無貉說文謂貈似狐善睡引論語狐貈之厚以居皆可證備考以貈為貂本字函史以貈為貉别名皆誤貂無從舟之理郭璞謂貆雌者名􅭗􅭗乃刀反亦不竟作貂也貈為貉重文其謂貉别名貈者亦讀貈若貂聲不知仍是貉字耳羅瑞良謂貆形狀與貉異貉子似貍蓋貉之為貉取義於此此誕也小則為貆大即為貉若使所生者盡異形則世當有貆無貉矣貍貍豳風七月篇貍狐之類也故釋獸云狸狐貒貉醜羅瑞良以為狐口鋭而尾大貍口方而身文黃黑彬彬蓋次於豹是也文從里取諧聲陸農師謂其脊間有黑理一道如界故字從理省此亦如駱馬衣脊絡縫之說不足据貍有數種舊說大小似狐毛雜黃黑有斑如貓圓頭大尾者為貓貍善竊雞鴨肉臭不可食斑如貙虎方口鋭頭者為虎貍食蟲鼠果實似虎貍尾黑白錢文相間者為九節貍皮可為裘領宋史安陸州貢野貓花貓二種即此是也文如豹而作麝香氣者為香貍即靈貓南方白面尾似狐者為牛尾貍亦名白面貍善緣樹食百果廣雅云玉面貍人捕畜之鼠帖服不敢出又登州島一種貍頭魚尾者名海貍而本草圖經載雍州有風貍似兔而短多棲息髙木候風以過他木此又一種豳人所取自是可為裘用者釋獸云貙似狸又云貙䝢似貍亦謂似虎狸與九節貍二種也陸農師以為狐善疑貍善擬不可以有為故古者以為燕居之裘陳祥道謂公子無預於事而貍裘東郭即戎而貍製則貍裘非禮服之裘皆臆說也狐與貍類深厚溫滑孔子所以為居服者亦取其適體耳今泥此一語便謂其非禮服則錦衣狐裘最為貴重而華美者豈亦䙝服耶左傳貍製正為東郭書誇美故豳人專取此二者以奉公子也若云公子無豫於事而貍裘則反非豳人奉公之心矣何元子疑此章即射義諸侯貍首之歌非是舊謂貍善搏為小步以擬度其發必獲謂之貍步量侯道法之古者王大射則射人以貍步張三侯愚意貍首之義當取諸此按射義注云貍首詩亡此篇所引曾孫侯氏八句疑即其詩而大射貍首注云貍之言不來也射諸侯不來朝者徐廣封禪書注貍一名不來可證總與豳風為裘義無涉何氏欲與騶虞蘋蘩諸詩相匹所不敢信魚魚小雅采薇篇魚獸書不槩見故傳亦但訓魚皮不言獸也惟左傳歸夫人魚軒服䖍注云魚獸名而陸璣以為魚獸似猪其皮背上斑文腹下純青雖乾燥為弓矢服經年海水潮及天將雨其毛皆起水潮還及天晴其毛復如故與博物志所載東海半體魚狀如牛之說合又周益公言周麟之使北塞得䱒牛魚歸皮應潮當即是此則疑仍是魚屬或江豚類也羅瑞良以魚為鮫魚謂其皮有珠文而堅徑可飾物從古以然按今刀鞘諸飾多以其皮為之斑駁如沙石最堅緻世所稱沙魚是也不聞有用魚獸皮者故陳祥道云所謂魚服者魚皮之堅者皆可為之不必定魚獸也亦一說服同箙國語檿弧箕服釋名云矢其受之器以皮曰箙謂柔服用之也初學記云織竹曰􅪩以皮曰箙今傳直訓魚服為魚皮則似以皮訓服矣小雅采芑篇何元子謂此與采薇之魚服不同當是以魚皮飾馬服引荀子鮫韅注及左傳魚軒注為證蓋以上下文皆言車馬之飾不應攙一矢服於中此說似是然愚又謂簟茀句專言車鈎膺句專言馬蓋茀僅是車後户之名其旁亦當有飾或以魚皮為之如左傳之魚軒是矣但魚軒乃君夫人所乘恐未必用以飾戎車此則所不敢臆斷者耳熊熊小雅斯千篇熊形不一舊傳有猪熊馬熊二種以能人立足絶似人亦號人熊其一身之佳者有白有掌有膽白與掌供飲膳膽入藥良陸農師所謂熊堅中當心有白脂如玉味甚美俗呼熊白又冬蟄不食饑則自䑛其掌故其美在掌其膽春在首夏在腹秋在左足冬在右足是也東土人呼為子路不知何取見祖冲之述異記又異苑亦云以物擊樹呼子路可起於是便下不呼則不應也鄭氏以熊羆在山為陽之祥故生男虺蛇穴處為隂之祥故生女愚謂男女之占原不在别隂陽隂陽之義更與在山穴處無涉且即以四物言之虺蛇何嘗不在山熊羆何嘗不穴處正義已言之矣必以是而别隂陽又因隂陽而占男女則穿鑿之甚也其義如陸農師所謂強力壯毅柔弱隱伏近之小雅大東篇熊羆為裘古無所見惟黃羆之獻見韓奕詩及禹貢梁州貢熊羆然云織皮亦非裘用其毛不溫厚潤澤既勿適體亦鮮美觀若依傳解以此誇西人之富則說苑所載叔向聘吳事正足取證豈有不以狐豹之裘為美而反取熊羆耶說苑晉平公使叔向聘於吳吳人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而狐裘者愚疑此乃東人行役而操舟者杼柚皆空葛屨履霜無以禦寒聊取野獸之皮蔽體而故謂之曰裘耳玩一是字有名實不相稱意鄭氏易舟為周裘為求未育集及豐昉僞本皆依之不可据大雅韓奕篇上文訏訏甫甫語俳而意貫為一截麀鹿三句乃言山獸之多耳斯干正義云熊羆大較是山獸亦居澤在穴故韓奕言川澤訏訏有熊有羆則誤讀矣何元子以為不言山者韓地多山故略之然要是行文錯綜法羆羆小雅斯千篇釋獸謂羆如熊則羆形與熊相似郭璞以為似熊而長頭髙腳猛憨多力能拔樹關西呼貑羆是也但熊色多黑羆色多黃白為小異耳然古但稱熊掌不及羆陸璣謂羆脂粗理不及熊白之美又秋冬則有春夏則無則固是異族當不可混熊羆自是二物各具牝牡羅瑞良謂今獵者言熊是其雄羆則熊之雌者或云相類為牝牡猶麋與鹿交鰌與魚游皆非也李時珍又謂熊羆魋三種一類按釋獸云魋如小熊夫僅曰如之而必以為一類不亦泥乎或謂此詩所夢熊羆虺蛇當屬噩夢噩者驚愕之義愚按古未有占夢之書惟三夢六夢見周禮其他左氏所載不免浮夸詩中三言占夢要是寓言若使以夢為真是舍其日用切近而索之渺不可知之中君子必不然矣夫詩言夢熊羆而兆男左稱夢黃熊而致疾感同而應異如此何可執一說以相拘耶大雅韓奕篇釋獸謂羆黃白文則黃固羆之常色詩錯舉黃羆以對赤豹非必羆之黃者為貴也追貊北方苦寒之國其所寶貴者當是此耳豹羆蒙上貔皮自亦以皮言西北所産無長物所有者獸皮而已故以此為獻然皮之用自廣如車馬弓矢之飾皆以皮為之尤以猛獸者為良非必盡為裘用要不足取證熊羆是裘之說耳犬犬小雅巧言篇犬與狗一類故說文謂犬為狗之有懸蹄者然有田畜家畜之分釋畜所謂未成毫乃犬子蒙上而言者也是以熊虎之子亦稱狗郭璞引律云捕虎一購錢三千其狗半之是矣與家畜之狗不同禮檀弓仲尼之畜狗死左傳叔孫婼如晉吏人取其吠狗弗與此狗為家畜之證史記李斯傳牽黃犬出上蔡東門逐狡述異記載陸機少時頗好獵在吳豪客獻快犬名曰黃耳此犬為田畜之證大抵犬主逐狗主吠傳謂犬有田犬食犬吠犬三種要亦混而言之不可無辨箋云遇犬犬之馴者此語殊不可解正義善為說辭謂遇非犬名以能獲兔知是犬之馴擾者然據其文則直謂遇為馴犬名矣厖召南野有死麕篇厖說文謂犬之多毛者字從彡廣韻以為毛長也徐鍇云多以羽毛為飾彡彡然則彡義於長較合惟長故愈覺其多厖蓋狗之長毛者今俗呼獅毛狗疑即是此此乃已成毫之狗與未成毫犬子絶異觀詩稱感帨其為家畜可知故釋畜别而言之云厖狗也蔡元度乃謂未成毫則能吠而已能吠而大故謂之厖直是臆說狗性猜警吠所怪者此詩故為家常韻語以絶人其凛然不可犯之意自見於言外填詞所謂門外猧兒吠知是伊人至貞淫雖别其語况正復相似舊解謂正行昏禮不得有狗吠則風雅之趣索然矣所以然者由其強以麕鹿之肉為昏姻禮物耳盧齊風盧令篇何元子云韓盧宋鵲盧黑色鵲黑白色說文齊謂黑為黸則盧當作黸是也然盧與玈通舊皆借為黑色之稱故蒱樗戲號呼盧瓊采有五皆黑者曰盧盧為最勝之采劉裕挼喝五木成盧可證則亦不必定作黸耳蓋田犬之黑者皆名盧惟韓氏之盧稱駿於天下此詩所云亦取其色而已今世俗呼犬聲近盧盧要非其字程大昌以為借韓盧之名與犬為髙亦未必然也正義解傳以為令令即下環鋂聲是也陸農師乃謂令令鈴聲也鈴以令之環以制之重鋂又言貫制之衆則非矣玩詞義令令上繫以盧則明是盧項下所帶環鋂行相擊成聲令令然耳豈可引說文别以為旗鈴之聲耶重環頷帶雙環非一大貫一小之說若鋂更無一環貫二之理果爾則重鋂是一犬六環矣犬以便捷輕利為主安得如許繫項以躓其行乎說文云鋂大鎖也則應是頷帶雙鎖者耳獫秦風駟鐵篇釋畜獫但云長喙未言毛色說文别謂黑犬黃顄為獫不知何据歇驕駟鐵篇正義云此說獵事故知獫與歇驕皆田犬非守犬也陸農師云長喙善逐短喙善吠以守詩載獫歇驕獫以田獵歇驕以守故也兩說互異然農師所云守對逐而言乃謂田犬中之善守者非家畜之守犬則仍與正義不謬耳一說短喙非田犬存考傳据釋畜文作猲獢當是其本字說文亦同西京賦云屬車之簉載獫猲獢皆可證補傳反謂爾雅改從犬以合毛氏則誤矣又王雪山嚴華谷戴岷隱皆不作犬名謂歇驕歇其驕逸即休其足力之意於義亦似愚謂如其說則驕又不當屬犬言衛風四牡有驕所謂逸若不受控制者今四馬既間則車以載犬馬不從禽其逸難控之勢至此得少休歇所謂歇驕是矣似此本上四馬而言較有根據未知是否鄭氏訓載為始非也遊園當是從狩後事若云始試習獫與歇驕之犬皆曉達搏噬之事故今狩於囿中多所獲得則詞意皆屬添足玩本文脫甚豺豺小雅巷伯篇釋獸謂豺之足似狗說文以為其聲亦似之陸農師云似狗而長尾白頰髙前廣後其色黃是也故今人直呼豺狗舊說狗者豺之舅遇狗輒跪如拜狀此俚語耳要之别是一種也說文以豺為狼屬蓋從其類羅瑞良云食豺消人脂肉損人神精蓋豺性本瘦其理或然也若狼有狼臅膏列八珍之數其皮又可為裘而豺則一無所用是豺又劣於狼矣舊解豺虎之食人寒鄉之凍物非有所擇言不食不受者惡之甚也愚謂如此則極醜詆之詞即諺所謂狗彘不食其餘者似非詩人溫厚之㫖蓋此譖人無所容於天地之間必謀所以制之之法計惟有取而畀豺虎投有北而已設使彼若不食不受則無可如何姑舉而聽之昊蒼或者默正其罪即上章所云蒼天蒼天視彼驕人之意耳識者斷之猱猱小雅角弓篇猱即是猿釋獸猿作猿以下玃父文考之則猱猿連言為一物之名非釋猱為猿也猿猿猿字通無所别傳謂猱為猿屬要之即其物耳而陸農師云狨輕捷善緣木大小類猿長尾尾作金色一名猱顔氏以為其尾柔長可藉故制字從柔則是猱為狨别名又似猿而非猿者抑豈猿之别種故釋獸謂之猱猿與張揖陸璣皆以猱為獼猴且謂凡猿玃獑胡之名皆以其屬分愚謂猿與猴自是兩物按元康地記云猿與獼猴不共山宿臨旦相呼柳子憎王孫文云猿之德靜以恆王孫之德躁以囂勃諍號呶雖羣不相善蓋其性之不同如此又司馬相如賦蛭蜩玃猱顔師古以為猱即今狨皮為鞍褥者非獼猴是也猴乃是王孫陸璣所謂老者為玃此其屬耳與猱自異不可混說文云猴夔也獿貪獸也今字書以獿為猱之本字並誤何元子謂猱之類有五種一曰獼猴一曰母猴一曰貑玃一曰禺頭其一則猱愚謂上四者皆猴屬不可云猱之類也又或雜舉諸名曰猱曰猿曰狙曰玃曰猿曰猴曰狖曰獨曰狨曰獼猴曰沐猴曰母猴曰獑胡曰貑玃曰胡孫曰王孫以謂其形有大小臂有長短鳴有曉夜色有青白𤣥黃性有緩急羣特故異其名亦方言不同如此要之仍未辨猿猴之分耳又鳥獸考云猴詩謂之猱性躁而多智其說並謬鄭氏以猱升塗附二語對勘失詩中如字此明以下句喻上句也然如正義釋傳謂以猱之升木喻人心皆有仁義於理亦未順愚謂猱乃狡獸升木有不安其位之况以比子弟之凌尊者即上章受爵不讓意也蓋猱有登木之性教之則益縱其升子弟有不讓之心教之則愈凌其上其勢如塗泥相附著愈積愈厚不復可解故下二句正言在上者有美道則小人自以分相屬而不相凌矣孫育難鄭云若喻人心皆有仁義教之則進何為禁之而云毋乎可謂一語破的何元子謂猱字本作獿塗泥飾也服䖍云獿人古之善塗者又師古云獿善抆拭故今謂塗者為獿人樂記所謂及優侏儒獶雜子女不知父子是也詩以猱刺昏姻之小人猶史言沐猴而冠之意言真猱自能升木假則安能王母庸教之不必以假當真也此輩呼朋邀類實繁有徒猶如獿人之相附麗彼亦塗飾此亦塗飾皆非其本來面目與天屬之親異矣王信任之亦何為乎愚按獿乃人名蓋古之善塗塈者施廣領大袖以仰塗領袖不汚揚雄解難云獿人亡則匠石輟斤是也與猱絶不相涉何氏欲合二句為一義引此為說又礙升木二字難於立言故其說仍分而不合亦可謂強解矣獿非猱本字樂記之獶乃獿之訛非猱之訛也安得因之作證耶豕豕小雅漸漸之石篇豕有豬有彘有豚有豨有豭諸名釋獸謂豕子為豬孔鮒謂豬子為豚字林謂蹄廢者為彘方言謂朝鮮之間呼為豭南楚呼為豨說文云竭其尾故謂之豕象毛足而後有尾則豕固其總名耳羅瑞良以為凡六畜之屬皆見於釋畜惟豕見釋獸以豕者通田豕之名故别異之是也豕類非一舊謂生青兖淮徐者耳大生燕冀者皮厚生梁雍者足短生遼東者頭白生豫州者喙短生江南者耳小生嶺南者白而肥今豬最佳者稱南雄蓋物土然也豕為亥位屬水此後人五行之說理或有之然非謂竟習於水如魚鱉然也豕性不過喜卑下穢濕之所易稱見豕負塗是矣羅瑞良乃穿鑿豬􅘻字義謂豕為水畜又應於水為能充其類是欲驅負塗者而游泳清波此不問而知其誣者其意總欲為涉波作一實證耳正義云馬驚謂之駭則駭者躁疾之言釋豕四蹢皆白名為􅘻是躁疾於餘豕駭與􅘻字異義同也據此則其所以從亥者并不必作水畜應水之說矣傳疏以涉波為雨徴其後說家皆謂豕羣涉水是久雨而停潦多故蹢濯其塗而見白非以涉波為雨兆也愚謂將雨既雨諸說紛如總皆泥下離畢之義認苦雨為真與鸛鳴蟻出之說同一可笑夫出師曠日持久三年六月不知幾歷雨𤾉武人何沾沾以此為苦若東山零雨特就歸塗所遇以為言不可以此例彼也即令豕性喜雨不過羣聚卑濕之所苟游泳波漣鮮不載胥及溺矣蓋二者皆以不得其所為興豕性負塗而今涉波月行中道而今離畢武人有家室而今東征是以行役久病不遑他事兩兩相况意直捷而味深雋詩人可作倘亦許我為同心耶鄭氏謂豕離其橧牧之處與衆涉入水之波漣喻荆舒之君率民去禮義之安而居亂亡之危賤之故比方於豕也非是通詩語意惟怨憤自憐更無憎疾之㫖况云進涉波漣亦豈穢賤之事耶蒸本火氣上升之義故又訓為進涉說文云徒行厲水也進而涉水必以足故即舉其白蹄者以為言耳彼以白蹢為躁進於他豕又謂久雨則濯其塗而見白皆穿鑿或疑此豕為江豚此皆泥涉波而云然者不知豕非水族而云涉波猶魚游涸轍之意說詩者皆認涉波為真故推類及江豚尤可哂也何元子辨之云江豚乃風信於雨無與亦見其惑已豐坊僞本於此章上又有一章其詞云馬鳴蕭蕭陟彼崕矣月離于箕風揚沙矣武人東征不遑家矣蓋因春秋有月離箕風揚沙之語而妄益之此不足論也但就其文以風配雨而上云馬鳴陟崕於風無與則以涉波為雨徴者其識殆又出豐氏下矣廣雅云獸一歲為豵二歲為豝三歲為肩四歲為特則此四者乃羣獸小大之通稱非豕之專名也豝豵特三者豕屬亦有其名舊解并謂豜亦從豕因以一歲二歲文訓之遂與釋獸文相刺謬不可不辨今考騶虞春田之盛也長林豐草百獸咸集一發見五豈必盡是豕屬七月四章為裘禦寒也若以豜豵為豕恐豕皮未必供裘用惟吉日以豝對兕伐檀以特對貆鶉不妨實指田豕言之耳余因論次豕屬備列如左於豝豵特三者存其名於豜并黜其類婁豬艾豭亦勿使有亂耳矣豝召南騶虞篇廣雅謂豝為獸二歲通稱不專屬豕是也豕之名豝者則以釋獸文為正豕而牝其體必大故崔豹云漁陽以大豬為豝孔鮒亦云大者謂之豝皆非誣也王安石謂巴猶婁婁豬求子之豬即其牝者仍與舊說不異若說文二歲把拏之說宜通羣獸言之不應專謂豕耳羅瑞良謂射牝何足為仁豝蓋牝豕之小者何元子亦謂春搜乃擇取不孕者若云豕牝則有孕道當從二歲名愚謂如廣雅之說固當通指羣獸言則亦不必定作牝豕觀自無害乎其仁心耳集傳訓豝為牡豕與釋獸諸書異不知何據一發五豝一言其少五言其多皆不可泥若謂惜物之命不忍多殺則選徒命卒攻車同馬僅區區為一發已耶嚴華谷直謂止於一發不忍盡殺則過泥仁心之說也馮時可云獸五惟一發者不忍盡殺仁心如是而宋儒以為中必疊雙是後世之巧射窮兵黷武者所為非三代之禮射矣至謂四矢為一發偶一發疊雙乃得五尤附㑹可笑愚謂馮說甚當然云五惟一發則與中必疊雙之說迂泥相似不知方春和時庶類繁殖豝豵皆獸之小者羣相聚於草木之際一發矢而驚起騰躍其類約以五計焉不過極言其多之意耳不可執成數以相求也小雅吉日篇此可專指田豕言以與下兕為對豝謂之小儷兕之大者也羅瑞良據二歲文謂小豝之名因此何元子又謂豝之小者無孕道故騶虞春田取之並非羅瑞良牽序說合論二詩以謂吉日之臣自豝而殪大兕不私於已所以為奉上騶虞之君止於豝而已亦不私於已所以為仁此鑿說也田獵所獲不一禽獸詩特舉一物以例其餘耳使春田僅止於豝何以云盛且下文無燕賔奉祭之文何以見其不私己而為仁至若吉日乃虞人驅禽以待天子之射豈得謂不私所有以奉上耶豵召南騶虞篇釋獸以豕生三為豵傳以一歲為豵正義兩從之謂豵雖生數之名大小皆得名之言私其豵謂小時此國君所射未必小也愚意不然傳一歲為豵蓋通謂獸之一歲者此詩所云正當指此若豕之名豵應以釋獸文生三為正鄭志所謂過三以往猶謂之豵是矣而說文别云豵豕生六月豚則不足据也釋獸稱三為豵乃一豕所生此詩稱豵有五則羣豵所聚必謂文王化行庶類向之生三者今且廣而至五是刻舟膠柱之見也豐坊謂専取豝豵以其獨害稼郊特牲迎虎為其食田豕所以除農害也果爾則春田之際雖盡殪之亦不為過何為又有不忍多殺之說耶以此知豝豵之俱不可泥為豕也葭蓬豝豵以草木禽獸分言各見其盛季明德謂豝大故藏於葭豵小故藏於蓬試思葭乃蘆葦蓬則雕胡野茭之類皆近水之草豈田豕之所棲息者乎豳風七月篇傳於此詩實指豕一歲為豵正義但云相傳為然無正文也愚謂定當通指羣獸之一歲者言耳說見前特魏風伐檀篇傳謂獸三歲曰特正義云不知出何書何元子引爾雅豕生三豵二師一特之文以為此詩蒙上狩獵言如田豕是也愚按特義不一以上貆下鶉推之或當如何氏說為田豕蓋各指一物而言且有釋獸文可據耳附豜豳風七月篇釋獸豕屬無豜名惟麕屬有之亦非其字傳獨以字從豕便定為豕三歲者說文謂三歲豕肩相及因通齊風之肩亦為豕愚謂肩與豜同乃羣獸三歲名耳鄭氏易傳疑豜為麕鹿之類不屬豕可謂隻眼但以于貉推之又當通謂諸獸即上狐貉類為長貔貔大雅韓奕篇貔名白狐又名執夷又名白羆郭璞以為虎豹之屬蓋猛相似而實不族者也而圖讚定為豹屬且謂白狐之云似是而非則誤矣愚按貔之形狀書傳不槩見惟陸璣謂其似虎又云似熊此可据也若釋獸白狐之文蓋其别名有然與貘白豹文相似豈真謂貔為狐之白者耶郭璞泥族類而疑其名亦未之審矣廣雅謂貔為貍貓按貍與狐類其種不一今人亦呼為野貓然各有類屬更無貔名貔出遼東追貊之國别是一種豈以其子鼬身貍首故誤以為貍貓與豰為貔子見釋獸文蜀志黃腰鼬身貍首長則食母能食虎牛孫愐以為豰似豹而小腰以上黃俗名黃腰是也說文謂豰為小豕又舊作訓犬屬並泥字誤耳或引莊子豐狐文羆搏於山林伏於巖穴以為即貔亦未是詩識名解卷六

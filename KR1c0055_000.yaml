body:
  text: 詩識名解目録詩類卷一鳥部雎鳩鳲鳩隼鷹隼晨風關關雎鳩者維鳩居之鳴于嗟鳩兮鷹鳲鳩在桑飛翩翩隼宛彼鳩時維揚采芭隼沔水飛隼鴥彼晨風黃鳥黃鳥于飛鳥鳴嚶嚶睍睆黃鳥黃鳥黃鳥交交黃鳥綿蠻黃鳥鵲維鵲有巢有鵲之強強防鵲巢雀誰謂雀無角燕燕玄鳥燕燕于飛天命玄鳥雉翟附翬鷮雄雉于飛右手秉翟有鷕雉鳴翟茀以朝朝雉離于羅維雉之雊有集鷮雁鴻雍雍鳴雁鴻則離之弋鳧與雁鴻飛遵渚肅肅其羽烏鸒斯莫黑匪烏彼瞻烏爰止雌雄辨鸒斯誰知烏之卷二鳥部鶉鶉之奔奔有縣鶉兮胡瞻爾庭匪鶉匪鳶雞雞棲于塒雞雞鳴喈喈匪則鳴鳧弋鳧與雁鴇肅肅鴇羽鷺白鳥值其鷺羽振鷺于飛白鳥翯翯振振鷺梟有梟萃止翩彼飛梟鷊卭有旨鷊鵜維鵜在梁鸞輶車鸞鑣將和鸞雍雍喈八鸞瑲瑲鏘鸞聲嘒嘒鸞聲將八鸞喈八鸞鏘鸞聲噦噦其八鸞鶬鶬執鸞刀倉庚有鳴倉庚喈倉庚于飛倉庚喈鵙七月鳴鵙卷三鳥部鴟梟鴟梟鴟梟鸛鸛鳴于脊令脊令在原題彼脊令鶴鶴鳴于九臯桑扈小宛桑扈桑扈鶯羽鴛鴦鴛鴦畢羅白華戢翼鶖有鶖在梁鷖鳧鷖在沙鳯皇鳯皇于飛雍雍喈喈梟附流離為梟為鴟流離之子鴟鳶為梟為鴟飛匪鶉匪鳶鳶戾天桃蟲肇允彼桃蟲卷四獸部馬駒騋黃鴇驪白顛鐵騏馵駵騧皇駁駱駰騵驈騅駓騂驒雒騢驔魚駽我馬虺隤馬言秣其駒皎乘我乘駒我維駒皎白駒牡老馬反為駒黃騋牝三千駕良馬四之有驕乘乘四黃既駉有黃四乘乘鴇孔四驪濟濟騏比物四驪四有馬白顛騏駟鐵阜駕我馵乘其騏駉有駱騏駵是中維騧驪是驂駰皇駁其馬禱嘽嘽馬我馬駰駉有既伯既四牡項領駉有騅乘馬在廄駉駟騵彭彭有駉有驈有駉有駓有騂駉驒駉騢野駉有驔駽駉有魚駜彼乘駉駉牡馬在坰之兕我姑酌彼兕觥大稱彼兕觥匪桑扈兕觥衣兕觥殪此兕匪兕虎絲肅肅兔置斯有兔爰爰兔有兔首相彼投兔躍躍毚麟附騶虞麟之趾虞于嗟乎騶卷五獸部鼠誰謂鼠無牙以相鼠有皮泣碩鼠碩鼠熏鼠癙憂癢鼠思血穹窒羔羊羜羖牂附達羝羔羊之皮羔裘三英維羔裘如膏濈羊牛下來騫既有肥羜三百羣其角濈矜兢崩俾出童羖取牂羊墳首達羝以軷先生如麕附麌野有死麕麀鹿麌麌鹿野有死鹿維足伎伎町畽鹿場麀鹿攸伏呦呦鹿鳴甡甡其鹿虎貓有力如虎不敢暴虎袒裼暴虎有貓有虎文茵暢轂闞如虓虎狐莫赤匪狐蒙有狐綏綏狐雄狐綏綏以有芃者狐狐裘戎錦衣裘狐裘朝狐裘黃黃象象之揥也弭佩其象揥象魚服牛犉犧羊牛下來以九十其犉我其耳濕濕從騂牡與犧羊犉以其騂黑騂我車我牛楅騂牡既備騂殺時牡享以犧夏而衡白牡剛將犧尊將卷六獸部豹羔裘豹飾豹豹袪豹裦赤黃羆狼並驅從兩狼兮狼跋其胡貉貆一之日于貉貆胡瞻爾庭有縣兮貍取彼狐貍魚象弭魚服簟茀魚服熊維熊維羆熊熊羆是裘熊有有羆羆維熊維羆赤豹黃羆犬厖盧獫歇驕遇犬獲之吠無使厖也載盧令令獫歇驕豺投畀豺虎猱母教猱井木豕豝豵特附豜有豕白蹢發一發五豝彼小豝兮一發五豵公言私其豵兩胡瞻爾庭有縣特獻豜于並驅從肩兮貔獻其貔皮卷七草部荇參差荇菜葛葛之覃兮屨旄丘之葛兮葛葛生蒙楚葛彼采葛兮葛五兩糾糾屨大東屨藟葛藟纍之莫綿綿葛藟莫葛藟卷耳采采卷耳芣苡采采芣苡蔞言刈其蔞蕨言采其蕨薇言采其薇有薇亦作止山蕨薇蘋于以采蘋藻于以采藻采魚在在藻薄其藻葭葦彼茁者葭一葦杭之葭菼揭揭八月萑葦蒹葭蒼蒼敦彼行葦卷八草部蓬附諼草彼茁者蓬得首如飛蓬焉諼草葑采葑采菲葑爰采葑矣采采葑菲采葑采菲荼誰謂荼苦堇荼如飴采苦采苦寧為荼毒采荼薪樗以薅荼蓼薺其甘如薺苓隰有苓苓采苓采茨墻有茨茨如梁楚楚者茨福祿如茨如唐女蘿爰采唐矣蔦與女蘿麥來牟爰采麥矣麥芃芄其麥幪丘中有麥無食我麻麥幪貽我來牟虻言采其虻緑緑竹猗猗終朝采緑卷九草部竹竹竿筍緑竹猗猗如竹苞矣籊籊竹竿維筍及蒲菼萑葭菼揭揭八月萑葦毳衣如菼萑葦淠淠芄蘭芄蘭之支黍秬附秠彼黍離離稷無食我黍黍下泉黍苗黍方華我與與伊黍稷彧彧黍維秬召伯黍苗秬鬯一卣其餉維秠稷附重穋附稙稚彼稷之苗黍黍稷翼翼稙黍稷嶷嶷稷重穋稚菽麥蒲莞不流束蒲筍有蒲與荷莞依于其蒲維及蒲下上簟蓷中谷有蓷蕭彼采蕭兮蕭浸彼苞蕭蕭蓼彼蕭斯采穫菽取祭脂艾彼采艾兮卷十草部麻紵苴丘中有麻可藝麻如之何衣不績其麻以漚麻麻如雪漚載績玄黃叔禾麻菽麥衣可以紵九月苴附褧舜顔如舜華荷菡蓞隰有荷華蒲有蒲與荷有菡蓞茹藘茹藘在阪縞衣茹藘蕳方秉蕳兮有蒲與蕳勺藥贈之以勺藥莠維莠驕驕莠言自口莫言采其莫藚言采其藚稻稌不能藝稻粱年十月穫稻稻有秬豐多黍多稌有粱穈芑不能藝稻粱豐亘之穈芭薄言采芭水有芭蘞蘝蔓于野蒹蒹葭蒼蒼荍視爾如荍龍隰有遊龍卷十一草部苕卭有旨苕苕之華萇楚隰有萇楚稂浸彼苞稂不稂不莠蓍浸彼苞蓍葽四月秀葽薁六月食鬱及薁葵芹茆烹葵及菽薄采其芹言采其芹薄采其茆菽藿荏菽烹葵及菽采中原有菽采食我場藿蕭穫菽菽采菽斾荏菽斾瓜瓞匏瓠壺七月食瓜疆有敦瓜苦埸有瓜用綿綿瓜瓞瓠瓜瓞唪唪纍匏有苦葉瓠酌之匏齒如犀甘瓠之幡幡葉斷八月壺卷十二草部茅白茅荑荼晝爾于茅兮白茅包之白茅束露彼菅茅如自牧歸荑捋手如柔荑女荼豫手荼有韭獻羔祭韭果裸果裸之實蘋食野之蘋蒿蔚蘩食野之蒿以匪莪伊蒿蘩匪莪伊蔚于采蘩采祁祁芩食野之芩臺南山有臺臺笠緇撮萊北山有萊莪菁菁者莪蓼蓼者莪蓫言采其蓫葍言采其葍藍終朝采藍白華菅白華菅兮可以漚菅堇堇荼如飴蓼以薅荼蓼又集于蓼卷十三木部桃桃之夭夭園投我以木桃有桃楚言刈其楚綢繆束楚王風束楚葛生蒙楚鄭風束楚止于楚甘棠杜蔽芾甘棠枤杜道左杕杜葉湑枤杜睆實梅摽有梅其有條有梅侯墓門有梅子在梅梅朴􅈪林有朴􅈪唐棣唐棣之華李鬱華如桃李有投我以木李鬱丘中有李北山李六月食及薁柏柏舟泛流甫柏舟中河柏施于松柏新之柏松丸丸棘吹彼棘心在園有棘彼黃鳥止棘蠅墓門有棘其子棘在把棘青止棘榛山有榛止樹之榛栗楛其子在榛于榛榛濟濟栗栵樹之榛栗秦風隰栗東門之栗蒸在栗薪唐風隰栗灌侯栗其其栵卷十四木部椅梓楰椅桐梓漆維桑與梓其桐其椅北山有楰桐梧桐椅桐梓漆桐其桐其椅梧生矣漆椅桐梓漆有山有漆阪漆桑椹檿柘降勸于桑椹桑之未落無食桑無折我樹桑有言采其桑桑桑者間間兮阪桑止于鳲鳩在桑集于苞桑爰求柔桑桑蠶月條桑有猗彼女桑于徹彼桑土與蒸在野南山桑無集桑維桑梓隰桑有阿我樵彼桑薪檿菀彼桑桑食桑黮其其柘檜檜楫松舟松檜楫松舟斯山有橋松之如松茂矣有施于松上松柏兌徂徠松松桷舄松桷有梴木瓜投我以木瓜檀無折我樹檀有坎坎伐檀兮煌檀車幝幝爰樹檀檀車煌扶蘇山有扶蘇柳把楊柳折柳樊圃有菀者柳菀彼柳斯無折我樹把楊隰有楊楊東門之楊楊楊柳依依其北山有菁莪舟采菽舟其柳椐卷十五木部榆樞枌附穫隰有榆門之枌山有樞薪東無浸穫栲山有栲山有栲南杻隰有杻山有杻北椒椒聊之實椒貽我握椒有其馨栩櫟柞集于苞栩有宛丘之栩其無集于栩山苞櫟析柞薪維柞之枝瑟彼柞棫柞棫拔矣柞棫斯拔條有條有梅六駁山有六駁檖隰有樹檖棗八月剝棗樗采荼薪樗蔽芾其樗把集于苞把在彼把棘言采其把隰有把桋南山有把言采其把常棣常棣之華常山有苞棣維之華枸南山有枸榖其下維榖無集于榖桋隰有把桋蔦蔦與女蘿棫柞棫拔矣瑟彼柞棫芃芃棫朴柞棫斯拔楛榛楛濟濟椐附翳其柳其椐其椔其翳樅虡業惟樅臣等謹案詩識名解十五卷國朝姚炳撰炳字彥暉錢塘人自多識之訓傳自孔門爾雅一經訓詁名物略備厥後諸儒纂述日久多佚帷陸璣之疏尚有裒輯重編之本自宋蔡卞以來皆因璣書而輾轉增損者也此書亦以鳥獸草木分列四門故以識名為名其稍異諸家者兼以推尋文義頗及作詩之意爾然孔子言鳥獸草木本括舉大凡譬如史備四時不妨以春秋互見炳乃因此一語遂不戴蟲魚未免近髙叟之固其中考證辨駁往往失之蔓衍如辨麟麟二物義本説文尚有關於訓詁至於鳯凰神物世所罕睹而連篇纍牘辨其形狀之異同則與經義燕關矣至於詩中八鸞之類本為鈴屬非鸞鳥之鸞而列之鳥部然則車之伏兔將入獸部乎是皆愛竒嗜博故有此弊然核其大致可取者多固當略其蕪雜採其精英焉乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
